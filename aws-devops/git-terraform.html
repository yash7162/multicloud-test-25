<script>
const rawQuestions = [
    // --- GIT ADVANCED (50) ---
    
    {q:"How can you copy a particular commit made in one branch to another?",opts:["git merge","git rebase","git cherry-pick","git stash"],ans:2,tag:"Cherry-pick",exp:"<strong>git cherry-pick &lt;commit-hash&gt;</strong> applies the changes from a specific commit onto the current branch. Unlike merge (which combines entire branches) or rebase (which replays all commits), cherry-pick selectively applies just one commit. Ideal for hotfix backporting."},
    {q:"One of your colleagues accidentally deleted a branch and already pushed the changes to the central git repo. There are no other git repos and none of your teammates had a local copy. How would you recover this branch?",opts:["Check out the latest commit to this branch and then check it out as a new branch","Check out the previous commit to this branch and then check it out as a new branch","We can recover by using git rebase","Clone the entire repository from existing branch"],ans:0,tag:"Recovery",exp:"Use <code>git reflog</code> to find the SHA of the latest commit that was on the deleted branch, then run <code>git checkout -b recovered-branch &lt;sha&gt;</code>. The reflog records all HEAD movements even after branch deletion — it's the primary recovery tool for this scenario."},
    {q:"How can you view the commit history in Git?",opts:["git logs","git history","git commits","git log"],ans:3,tag:"History",exp:"<code>git log</code> displays the commit history. Useful flags: <code>--oneline</code> (compact view), <code>--graph</code> (ASCII branch tree), <code>--all</code> (all branches), <code>-n 10</code> (last 10 commits), <code>--author='name'</code> (filter by author). There is no <code>git logs</code>, <code>git history</code>, or <code>git commits</code> command."},
    {q:"What is a merge conflict?",opts:["An error in the Git configuration","A disagreement among team members","Overlapping changes between branches","An issue with remote repository synchronization"],ans:2,tag:"Conflicts",exp:"A <strong>merge conflict</strong> occurs when two branches have modified the <strong>same lines</strong> in the same file, and Git cannot automatically determine which version to keep. Git pauses the merge and marks conflict zones with <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>, <code>=======</code>, and <code>&gt;&gt;&gt;&gt;&gt;&gt;&gt;</code> markers for manual resolution."},
    {q:"How do you fetch the latest updates from a remote repository without merging them?",opts:["git pull","git get","git fetch","git update"],ans:2,tag:"Remote",exp:"<code>git fetch</code> downloads new commits, branches, and tags from the remote but does <strong>not</strong> merge them into your working branch. The fetched data is stored in remote-tracking branches (e.g., <code>origin/main</code>). <code>git pull</code> = <code>git fetch</code> + <code>git merge</code>."},
    {q:"How can you undo the most recent commit while keeping the changes staged?",opts:["git revert HEAD","git reset HEAD~1","git undo","git back"],ans:1,tag:"Reset",exp:"<code>git reset HEAD~1</code> (default: <code>--mixed</code>) moves the branch pointer back one commit and unstages the changes — they remain in the working directory. Use <code>--soft</code> to keep changes staged, <code>--hard</code> to discard completely. There is no <code>git undo</code> or <code>git back</code>."},
    {q:"What does the git cherry-pick command do?",opts:["Picks a random commit from history","Applies changes from a specific commit to the current branch","Deletes a specific commit","Merges two unrelated branches"],ans:1,tag:"Cherry-pick",exp:"<code>git cherry-pick &lt;hash&gt;</code> takes the diff introduced by a specific commit and applies it as a new commit on the current branch. The new commit has a <strong>different SHA</strong> but the same changes. Use <code>git cherry-pick A..B</code> to cherry-pick a range of commits."},
    {q:"Which file can you configure to ensure that certain files are never committed to the local Git repository?",opts:["Ignore.git",".gitignore","gitignore.txt","git.ignore"],ans:1,tag:"Configuration",exp:"<strong>.gitignore</strong> lists file patterns that Git should ignore (not track). Example: <code>*.log</code>, <code>node_modules/</code>, <code>.env</code>. Place it in the repo root or in subdirectories for local rules. Use <code>~/.gitignore_global</code> for machine-wide ignore rules. There is no <code>Ignore.git</code> or <code>gitignore.txt</code>."},
    {q:"How do you resolve a conflict in Git?",opts:["Identify the conflicted files","Make necessary changes so conflict doesn't arise again","Run git add on resolved files and commit","All of the above — identify, edit, add, and commit"],ans:3,tag:"Conflicts",exp:"Conflict resolution is a multi-step process: 1) <code>git status</code> to <strong>identify conflicted files</strong>, 2) <strong>manually edit</strong> each file removing conflict markers (<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>/<code>=======</code>/<code>&gt;&gt;&gt;&gt;&gt;&gt;&gt;</code>), 3) <code>git add &lt;file&gt;</code> to mark as resolved, 4) <code>git commit</code> to finalise the merge."},
    {q:"What is the primary cause of conflicts in Git?",opts:["A conflict arises when the commit to be merged has changes in the same file and same lines as the current branch","A conflict arises when the commit has a change in one place","A conflict arises without pull","A conflict arises if two developers work on different branches"],ans:0,tag:"Conflicts",exp:"Git conflicts occur specifically when <strong>two branches modify the same lines</strong> in the same file differently. Working on separate files, or even separate lines of the same file, does not cause conflicts — Git can auto-merge those. Different branches alone do not cause conflicts; it's the overlapping line changes that do."},
    {q:"A user made changes to multiple files and wants to commit them separately. Which Git command stages only one changed file?",opts:["git add .","git cherry-pick","git add file_name","git commit -m 'message'"],ans:2,tag:"Staging",exp:"<code>git add &lt;file_name&gt;</code> stages only the specified file. <code>git add .</code> stages all changes in the current directory. For even finer control, <code>git add -p &lt;file&gt;</code> lets you stage specific hunks within a file — essential for clean, focused commits."},
    {q:"You have added files from working directory to staging area. Now you want to switch to another branch. Is it possible?",opts:["Yes — Git allows switching branches with staged changes unless there are conflicts","No — you must commit first before switching branches","Yes — but only if you stash the changes first","No — staged changes are always lost when switching branches"],ans:0,tag:"Branching",exp:"<strong>Yes</strong> — Git allows switching branches with staged (and unstaged) changes as long as the switch doesn't cause conflicts with the target branch. If the target branch has conflicting changes on the same files, Git will refuse and ask you to commit or stash first."},
    {q:"A user is unable to push changes to the git remote repository. What would be the reasons?",opts:["Multiple users working with same branch","User needs to pull the changes before pushing","User working with individual branches","Both 1 and 2 — shared branch conflicts and needing to pull first"],ans:3,tag:"Remote",exp:"Push failures most commonly occur when: 1) <strong>remote has newer commits</strong> that your local branch doesn't have (non-fast-forward) — fix with <code>git pull --rebase</code>, 2) <strong>branch protection rules</strong> prevent direct pushes, 3) <strong>authentication issues</strong>, or 4) <strong>no upstream set</strong> — fix with <code>git push -u origin branch</code>."},
    {q:"Which is the good practice for creating a branch?",opts:["Create from main branch where integrations are configured","Create from development branch only to protect the main branch","We can create from any branch","We should not create branches every time"],ans:1,tag:"Workflow",exp:"<strong>Best practice</strong>: always branch from <code>develop</code> (or an integration branch), never directly from <code>main</code>/<code>production</code>. This protects stable production code. The Git Flow model: feature branches from <code>develop</code> → merge back to <code>develop</code> → release branch → merge to <code>main</code>. Direct commits to <code>main</code> should be blocked via branch protection rules."},
    {q:"Naresh created one branch and added updates to the staging area. Now he wants to create one more branch. What should he do?",opts:["Stash the changes first and then create new branch","Undo the changes from staging to working directory, then create new branch","First commit and push to remote, then create new branch","All of the above are valid approaches"],ans:3,tag:"Branching",exp:"<strong>All three approaches work</strong>: (1) <code>git stash</code> → <code>git checkout -b new-branch</code> → <code>git stash pop</code> on new branch, (2) <code>git restore --staged .</code> → <code>git checkout -b new-branch</code>, (3) <code>git commit</code> + <code>git push</code> → <code>git checkout -b new-branch</code>. Choose based on whether you want the changes to stay on the current or new branch."},
    {q:"Multiple developers are working with the same repository. What is the best practice for working with Git?",opts:["Each developer works on individual branches","All developers work with the same branch only","Pull before push","Both 1 and 3 — individual branches AND pull before push"],ans:3,tag:"Workflow",exp:"<strong>Best practices</strong>: (1) <strong>Individual feature branches</strong> prevent conflicts and enable code review via PRs; (2) <strong>Pull before push</strong> (<code>git pull --rebase</code>) ensures your branch is up-to-date before pushing. Working directly on main/shared branches is error-prone and should be avoided in team settings."},
    {q:"What is the difference between git rebase and git merge?",opts:["One additional merge commit will be created while doing git rebase","Git rebase is a linear operation — it does not create any additional merge commit","Git merge will create one more additional commit at merge time","Both 2 and 3 — rebase is linear, merge creates an extra commit"],ans:3,tag:"Rebase vs Merge",exp:"<strong>git merge</strong> creates a new merge commit combining two branch histories (preserves full history). <strong>git rebase</strong> replays commits on top of the target branch — <strong>no merge commit</strong>, creates a linear history. Rebase rewrites SHA hashes; never rebase shared/public branches as it disrupts teammates' history."},
    {q:"How do you revert a bad commit that has already been pushed?",opts:["Use git revert <commit> — creates a new commit that undoes the bad commit's changes","git reset head~1","Use git revert <commit> — it is the safe way to undo a pushed commit","It is not possible to undo an already pushed commit"],ans:0,tag:"Revert",exp:"<code>git revert &lt;commit-hash&gt;</code> creates a <strong>new commit</strong> that reverses the changes of the specified commit — safe for pushed/shared branches because it doesn't rewrite history. <code>git reset</code> rewrites history and should never be used on pushed commits in shared repos (requires force push which disrupts teammates)."},
    {q:"What is the HEAD in Git?",opts:["A HEAD is a reference to the currently checked-out commit","It is a symbolic reference to the branch that we have checked out","It refers to the GitHub remote repository's latest commit","Both 1 and 2 — HEAD references the currently checked-out commit/branch"],ans:3,tag:"Concepts",exp:"<strong>HEAD</strong> is a symbolic pointer that normally points to the <strong>current branch</strong> (e.g., <code>refs/heads/main</code>), which in turn points to the latest commit on that branch. When you checkout a specific commit hash directly, HEAD becomes <strong>detached</strong> (pointing directly to a commit rather than a branch)."},
    {q:"How do you push a new local repository to GitHub (repository does not exist on remote yet)?",opts:["git init → git add → git commit → git remote add → git push","git init → git add → git commit → git remote -v → git push","git push","git clone and push"],ans:0,tag:"Remote",exp:"Full workflow for a new repo: 1) <code>git init</code> — initialise local repo, 2) <code>git add .</code> — stage files, 3) <code>git commit -m 'init'</code> — first commit, 4) <code>git remote add origin https://github.com/user/repo.git</code> — link to remote, 5) <code>git push -u origin main</code> — push and set upstream. <code>git remote -v</code> only views remotes; it doesn't add one."},
    {q:"How can you copy code from one repo to another repo?",opts:["git clone","git fork","git merge","All of the above — clone, fork, or merge all work for copying code"],ans:3,tag:"Remote",exp:"<strong>git clone</strong>: copies a full repo to your local machine. <strong>git fork</strong> (GitHub/GitLab feature, not a Git command): creates a server-side copy in your account. <strong>git merge</strong>: can integrate code from another repo after adding it as a remote. All serve different use cases for copying/sharing code between repositories."},
    {q:"You want to discard all changes in the working directory and revert to the state of the last commit. Which Git command should you use?",opts:["git reset --hard HEAD","git checkout -- .","git clean -f","git revert HEAD"],ans:0,tag:"Reset",exp:"<code>git reset --hard HEAD</code> resets both the staging area and working directory to match the last commit — discarding all uncommitted changes. <code>git checkout -- .</code> restores working tree files but doesn't unstage. <code>git clean -f</code> removes untracked files only. <code>git reset --hard HEAD</code> is the most complete reset."},
    {q:"You want to view differences between the current working directory and the staging area. Which Git command should you use?",opts:["git diff","git status","git log","git show"],ans:0,tag:"Diff",exp:"<code>git diff</code> (no arguments) shows differences between the <strong>working directory and staging area</strong> (unstaged changes). <code>git diff --staged</code> shows staged changes vs last commit. <code>git status</code> shows which files are changed/staged but not the actual diffs. <code>git show</code> displays a specific commit's changes."},
    {q:"You want to create a new branch named 'feature' and switch to it. Which Git command should you use?",opts:["git checkout -b feature","git branch feature","git branch -b feature","git switch -b feature"],ans:0,tag:"Branching",exp:"<code>git checkout -b feature</code> creates and switches to the new branch in one command. The modern equivalent is <code>git switch -c feature</code> (<code>-c</code> not <code>-b</code> with switch). <code>git branch feature</code> creates the branch but doesn't switch to it. There is no <code>git branch -b</code>."},
    {q:"What is the purpose of the '.gitignore' file in a Git repository?",opts:["To ignore all files in the repository","To specify files that should be tracked by Git","To specify files and directories that should be ignored by Git","To force Git to commit all changes regardless of file status"],ans:2,tag:"Configuration",exp:"<strong>.gitignore</strong> tells Git to intentionally ignore (not track) specified files/directories. Patterns include: <code>*.log</code> (all log files), <code>node_modules/</code> (directory), <code>!important.log</code> (negate — track this despite *.log rule), <code>.env</code> (environment files). Already-tracked files must be removed with <code>git rm --cached</code> first."},
    {q:"Your changes are in the staging area but you don't want to commit them right now. What can you do?",opts:["Git Ignore","Git Stash","Git restore <filename>","All of the above — stash or restore both work"],ans:3,tag:"Stash",exp:"<strong>All options work</strong> for different goals: <code>git stash</code> saves staged+unstaged changes to a temporary stack (restores later with <code>git stash pop</code>), <code>git restore --staged &lt;file&gt;</code> unstages a specific file back to working directory, <code>.gitignore</code> prevents future tracking. Stash is best for temporary context-switching."},
    {q:"You have pushed your changes to the remote repository. How can you delete a particular commit from both remote and local repositories?",opts:["git reset Head~1","git revert <commit-hash>","git restore <filename>","git stash"],ans:1,tag:"Revert",exp:"<code>git revert &lt;commit-hash&gt;</code> is the <strong>safe way</strong> to undo a pushed commit — it creates a new commit that reverses the changes, preserving history. Push the revert commit normally. <code>git reset</code> rewrites history and requires <code>--force</code> push which is dangerous on shared branches. Never force-push to protected branches."},
    {q:"You ran 'git reset --hard <previous-commit>' after committing locally. What happens to the recent commit's changes?",opts:["Files are deleted for the recent commit in both local repo and working directory","Files are deleted for the recent commit in local repo only","Files remain in staging area for the recent commit","Files remain in working directory for the recent commit but deleted in local repo"],ans:0,tag:"Reset",exp:"<code>git reset --hard &lt;commit&gt;</code> is destructive — it moves the branch pointer back AND resets both the <strong>staging area and working directory</strong> to match the target commit. The recent commit's changes are completely discarded from all three areas (local repo, staging, working directory). Use with extreme caution."},
    {q:"You ran 'git reset --mixed <previous-commit>' after committing locally. What happens to the recent commit's changes?",opts:["Files are deleted in both local repo and working directory","Files are deleted in local repo only","Files remain in staging area but deleted from local repo","Files remain in working directory but deleted from local repo (unstaged)"],ans:3,tag:"Reset",exp:"<code>git reset --mixed</code> (the default) moves the branch pointer back and clears the staging area, but <strong>leaves changes in the working directory</strong>. The commit is undone, staging is cleared, but your file changes remain — you can re-stage and re-commit differently. Best for reorganising commits before pushing."},
    {q:"After running 'git revert' for a particular commit, then git pull and push again — will the reverted file still exist?",opts:["Exists — the revert created a new commit, so the file still exists in the reverted state in remote","Deleted permanently","Exists in working directory only","None of the above"],ans:0,tag:"Revert",exp:"<code>git revert</code> creates a <strong>new commit</strong> that undoes the specified commit's changes. The file still <strong>exists</strong> in the repository's history, but the revert commit removes the changes introduced by the original commit. After <code>git pull</code> and <code>git push</code>, the revert commit is on the remote — the file's state matches what it was before the reverted commit."},
    {q:"Which command applies the latest stashed changes and removes them from the stash list?",opts:["git stash apply","git stash pop","git stash drop","git stash save"],ans:1,tag:"Stash",exp:"<code>git stash pop</code> applies the most recent stash (<code>stash@{0}</code>) and <strong>removes it</strong> from the stash list. <code>git stash apply</code> applies the stash but <strong>keeps it</strong> in the list (useful if you want to apply to multiple branches). <code>git stash drop</code> removes a stash without applying it."},
    {q:"What is the difference between git stash apply and git stash pop?",opts:["Both are the same commands","git stash apply applies and removes; git stash pop only applies","git stash apply applies without removing; git stash pop applies and removes","git stash apply applies specific files; git stash pop applies all changes"],ans:2,tag:"Stash",exp:"Key difference: <strong>git stash apply</strong> re-applies stashed changes but <strong>keeps the stash entry</strong> in the stash list (safe to apply to multiple branches). <strong>git stash pop</strong> = apply + automatically removes the stash entry. If apply causes conflicts, the stash is preserved — useful for safe experimentation."},
    {q:"How do you apply a specific stash number 3 from the stash list?",opts:["git stash apply","git stash apply stash@{3}","git stash pop stash@{3}","Both b and c — both commands work with stash@{3}"],ans:3,tag:"Stash",exp:"Both <code>git stash apply stash@{3}</code> (applies and keeps the stash) and <code>git stash pop stash@{3}</code> (applies and removes the stash) work with a specific stash index. List all stashes with <code>git stash list</code> — stashes are numbered from 0 (most recent). <code>git stash show stash@{3}</code> previews the stash."},
    {q:"Your changes are in the staging area but should be on a different branch. Can you check out to that branch?",opts:["Run git stash and checkout only","Commit the changes and checkout","It is not possible if any changes are pending at staging area","All of the above are valid options"],ans:3,tag:"Branching",exp:"<strong>All three work</strong>: (1) <code>git stash</code> → switch branch → <code>git stash pop</code> (best for uncommitted work you want on another branch), (2) commit then <code>git checkout other-branch</code> (then cherry-pick if needed), (3) Git actually allows checkout with staged changes if no conflicts with target branch. Option 1 is the cleanest workflow."},
    {q:"Which command is used to finalise a conflict resolution after a merge?",opts:["git conflict resolve","git resolve","git commit --resolve","Conflicts are resolved manually by editing files, then git add and git commit"],ans:3,tag:"Conflicts",exp:"There is no <code>git conflict resolve</code> or <code>git resolve</code> command. Conflict resolution process: 1) <strong>manually edit</strong> conflicted files, removing <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>/<code>=======</code>/<code>&gt;&gt;&gt;&gt;&gt;&gt;&gt;</code> markers, 2) <code>git add &lt;resolved-file&gt;</code>, 3) <code>git commit</code> to finalise. Use <code>git mergetool</code> for a visual diff/merge editor."},
    {q:"After resolving a conflict, what is the next step to finalise the merge?",opts:["Run git merge --finish","Run git add on resolved files and commit, then push","Run git stash to store the resolved changes","Run git push directly to update the remote"],ans:1,tag:"Conflicts",exp:"After manually resolving conflict markers: <code>git add &lt;file&gt;</code> (marks as resolved), then <code>git commit</code> (creates the merge commit with a default merge message). Finally <code>git push</code> to sync with remote. There is no <code>git merge --finish</code>. <code>git push</code> alone without committing first would fail."},
    {q:"What is a git pull fast-forward?",opts:["A merge that requires manual conflict resolution","A merge that moves the branch pointer forward without creating a new merge commit","A merge that automatically creates a new commit","A merge that resets the branch history"],ans:1,tag:"Merge",exp:"A <strong>fast-forward merge</strong> occurs when the current branch has no new commits since the divergence point — Git simply <strong>moves the branch pointer forward</strong> to the target commit, no merge commit needed. Run <code>git merge --ff-only</code> to enforce fast-forward only. Use <code>git merge --no-ff</code> to always create a merge commit."},
    {q:"Which command avoids a fast-forward merge and forces a merge commit?",opts:["git merge --force","git merge --no-ff","git rebase --fast","git merge --abort"],ans:1,tag:"Merge",exp:"<code>git merge --no-ff</code> (no fast-forward) always creates a <strong>merge commit</strong> even when fast-forward is possible. This preserves the feature branch's history as a group of commits. Teams often require <code>--no-ff</code> for feature branch merges to keep a clear record of when features were integrated. <code>--abort</code> cancels an in-progress merge."},
    {q:"The user forgot to git pull before committing and ran 'git pull --rebase' to resolve the push failure. What does this command do?",opts:["Fetches from remote and rebases local commits on top of fetched changes without creating a new commit","Fetches from remote and rebases local commits on top with a new merge commit","Fetches from remote to staging area only","All of the above"],ans:0,tag:"Rebase",exp:"<code>git pull --rebase</code> = <code>git fetch</code> + <code>git rebase origin/branch</code>. It fetches remote changes and <strong>replays your local commits on top</strong> — creating a <strong>linear history</strong> without a merge commit. Preferred over <code>git pull</code> (which creates a merge commit) for keeping clean history. Resolve any conflicts during rebase with <code>git rebase --continue</code>."},
    {q:"When would you prefer using git merge instead of git rebase?",opts:["When you want a clean and linear commit history","When you want to preserve all branch history and merge commits","When you want to delete old commits","When you want to reapply commits to a different branch"],ans:1,tag:"Rebase vs Merge",exp:"Prefer <strong>git merge</strong> when: working on shared/public branches (rebase rewrites history, causing conflicts for others), you want to <strong>preserve complete branch context</strong> including when a feature was developed, or on <code>main</code>/<code>develop</code> where merge commits document integration points. Use rebase for local cleanup before sharing."},
    {q:"A developer rebased and your local branch is now out-of-sync with remote. What is the best action?",opts:["Force push your branch","Delete your branch and create a new one","Rebase your branch on top of the remote branch","Merge their branch into yours"],ans:2,tag:"Rebase",exp:"<code>git fetch origin</code> then <code>git rebase origin/feature-branch</code> (or <code>git reset --hard origin/feature-branch</code> if you have no local-only commits) brings your branch in sync. Force-pushing (<code>--force</code>) is dangerous on shared branches. The cleanest fix is rebasing your changes on top of the updated remote branch."},
    {q:"You accidentally committed to main instead of a feature branch. What is the best way to fix it?",opts:["Reset main and reapply the commits on a feature branch","Delete main","Push and hope no one notices","Revert the commits on main"],ans:0,tag:"Workflow",exp:"Best fix: 1) <code>git branch feature/my-fix</code> (save commits to a new branch from current position), 2) <code>git reset --hard HEAD~n</code> (remove the commits from main — locally), 3) <code>git push --force-with-lease origin main</code> (update remote — only if main isn't protected), 4) <code>git checkout feature/my-fix</code> and open a PR. If main is protected, use <code>git revert</code> instead."},
    {q:"You cloned a repo and git log shows no commits. What could be wrong?",opts:["The repo is empty","You forgot to pull","You are on a detached HEAD","The repo is private"],ans:0,tag:"Remote",exp:"If <code>git log</code> shows no commits, the <strong>repository is empty</strong> — no commits have been made yet. An empty repo on GitHub is valid (just initialised without a README). <code>git clone</code> of an empty repo succeeds but there's nothing to log. You'd see the message: <code>warning: You appear to have cloned an empty repository.</code>"},
    {q:"You try to push but get 'rejected - non-fast-forward'. What is your move?",opts:["git push --force","git pull --rebase, then push","git merge origin/main","Delete your local branch and reclone"],ans:1,tag:"Remote",exp:"<code>git pull --rebase origin main</code> fetches remote changes and replays your local commits on top, then <code>git push</code> succeeds. <strong>Never use --force</strong> on shared branches (overwrites teammates' work). <code>git pull --rebase</code> is the standard fix for non-fast-forward rejection — it creates a linear history without merge commits."},
    {q:"Your teammate force-pushed to a shared branch. Now your local shows diverging commits. What should you do?",opts:["Force push your version","Reset your local branch to match remote","Delete your branch","Re-clone the repo"],ans:1,tag:"Remote",exp:"<code>git fetch origin</code> then <code>git reset --hard origin/branch-name</code> resets your local branch to exactly match the remote after a force-push. This discards your local commits that diverged from the rewritten history. If you had unique local commits, use <code>git reflog</code> to find them and cherry-pick them onto the reset branch."},
    {q:"You are in the middle of a rebase and something goes wrong. How do you cancel it?",opts:["git abort","git rebase --abort","git checkout main","Delete the .git folder"],ans:1,tag:"Rebase",exp:"<code>git rebase --abort</code> stops the in-progress rebase and restores the branch to its state before <code>git rebase</code> was run. Similarly: <code>git merge --abort</code> cancels an in-progress merge, <code>git cherry-pick --abort</code> cancels cherry-pick. These abort commands are safe and preserve the pre-operation state."},
    {q:"You and your teammate are on the same branch. You ran git pull --rebase but conflicts occurred. You resolved one incorrectly and aborted. What should you do next?",opts:["Abort the rebase and merge instead using git pull","Force push your changes to avoid the conflict","Rebase again, resolve conflicts carefully using a diff tool, then continue","Delete the branch and start over from main","Ask your teammate to reset their branch"],ans:2,tag:"Rebase",exp:"<code>git rebase --abort</code> first (to cancel the in-progress rebase), then restart: <code>git pull --rebase</code>. This time use a <strong>visual diff tool</strong> (<code>git mergetool</code>, VS Code, IntelliJ) to resolve conflicts carefully. After resolving each conflict file: <code>git add &lt;file&gt;</code> → <code>git rebase --continue</code>. Force-push to a shared branch is never correct."},
    {q:"After rebasing onto develop, you try to push your feature branch but get 'rejected (non-fast-forward)'. What should you do?",opts:["Use git push --force-with-lease to safely push the rebased branch","Revert the rebase using git reflog and merge instead","Delete your branch and re-create from develop","Run git push again — it was likely transient","Abandon the branch and start fresh"],ans:0,tag:"Rebase",exp:"<code>git push --force-with-lease</code> is the <strong>safe force push</strong> after a rebase — it only succeeds if no one else has pushed to the branch since your last fetch (preventing accidental overwrite of teammates' work). Regular <code>--force</code> is riskier. After rebasing, the branch SHA history changes, hence the non-fast-forward rejection requiring a force push."},
    {q:"You accidentally pushed commits directly to main (protected branch). Your teammate asks you to revert them without affecting others' work in progress. Which is the best solution?",opts:["Use git reset --hard HEAD~n and push with --force","Use git revert <hash> for each wrong commit and push normally","Delete the main branch remotely and re-create it","Cherry-pick all good commits to a new branch and delete main","Push a backup branch, then reset remote main"],ans:1,tag:"Revert",exp:"<code>git revert &lt;hash&gt;</code> for each commit is the <strong>safest approach</strong> — it creates new undo-commits without rewriting history. Others' local clones stay valid since history is only appended, not rewritten. For multiple commits, <code>git revert HEAD~n..HEAD</code> reverts a range. Push the revert commits normally — no force push needed, no disruption to teammates."},
    {q:"You accidentally deleted a feature branch with 4 unmerged, unpushed commits. How can you recover?",opts:["Use git fsck and grep for dangling commits","Use git reflog to find the branch HEAD and recreate it","Use git stash if changes were staged","You cannot recover unless it was pushed","Recreate manually using diff backups"],ans:1,tag:"Recovery",exp:"<code>git reflog</code> records all HEAD movements including the last commit on the deleted branch. Find the SHA: <code>git reflog | grep feature-branch</code>, then recreate: <code>git checkout -b feature-branch &lt;sha&gt;</code>. The reflog retains entries for 90 days by default. <code>git fsck --lost-found</code> also works for finding dangling (orphaned) commits but is less convenient."},
    // --- TERRAFORM ADVANCED (57) ---
    
    {q:"A user wants to upgrade the Terraform plugin. How can they upgrade it?",opts:["terraform plan --upgrade","terraform fmt","terraform init -upgrade","aws configure"],ans:2,tag:"Init",exp:"<code>terraform init -upgrade</code> downloads the latest versions of all providers and modules that satisfy the version constraints in your configuration. Without <code>-upgrade</code>, <code>terraform init</code> uses cached providers if they already satisfy constraints. Run this after updating version constraints in <code>required_providers</code>."},
    {q:"Can you specify multiple dependencies using the 'depends_on' attribute in Terraform?",opts:["Yes, using a comma-separated list","No, only a single dependency can be specified","Yes, using a list syntax","No, Terraform automatically infers dependencies"],ans:2,tag:"Dependencies",exp:"<strong>Yes — depends_on accepts a list</strong>: <code>depends_on = [aws_iam_role_policy.example, aws_s3_bucket.data]</code>. Use depends_on only when Terraform cannot automatically infer the dependency from resource references. Prefer implicit dependencies (referencing attributes) whenever possible as they are more maintainable."},
    {q:"What is the purpose of the depends_on argument in a data source block?",opts:["It specifies the order of resource creation","It defines the data source dependencies","It specifies the version of the data source","It configures access permissions"],ans:1,tag:"Dependencies",exp:"<code>depends_on</code> in a data source block tells Terraform to <strong>wait until the specified resources are created</strong> before reading the data source. This is needed when the data source reads from infrastructure that Terraform is also creating — ensuring the resource exists before the data source query runs."},
    {q:"How can you dynamically generate resource configurations in Terraform?",opts:["Using count and for_each","Using dynamic blocks","Using modules","All of the above"],ans:3,tag:"Dynamic Resources",exp:"<strong>All three</strong> enable dynamic resource generation: <code>count</code> creates N identical resources, <code>for_each</code> creates named instances from a map/set, <code>dynamic</code> blocks generate repeated nested configuration blocks (like ingress rules), and <code>modules</code> encapsulate reusable patterns that can be called with different inputs."},
    {q:"What command removes a specific resource from the state file without destroying the actual resource?",opts:["terraform remove","terraform state rm","terraform delete","terraform state del"],ans:1,tag:"State Management",exp:"<code>terraform state rm &lt;resource_address&gt;</code> removes the resource from Terraform's state tracking without destroying the actual cloud resource. Use cases: removing a resource to manage it manually, preparing for a module reorganisation, or when a resource was accidentally imported. The resource continues to exist in the cloud."},
    {q:"A user configured an S3 backend for their project. Another user uses the same S3 path for a different project and runs terraform apply. What happens?",opts:["Deletes first user's configuration changes","Updates second user's state file in the same path","Second user gets an error — state file already configured","Second user changes update without disturbing first user"],ans:3,tag:"State Backend",exp:"<strong>Both state files will overwrite each other</strong> at the same S3 path — the second apply will read the first user's state, find unexpected resources, and attempt to reconcile. This is a dangerous misconfiguration. Always use <strong>unique S3 key paths</strong> per project (e.g., <code>project-a/terraform.tfstate</code> vs <code>project-b/terraform.tfstate</code>) to isolate state files."},
    {q:"How do you reference a module within a Terraform configuration file?",opts:["resource \"module\" \"name\"","module \"name\" { source = \"...\" }","resource \"name\"","module.resource \"name\""],ans:1,tag:"Modules",exp:"Modules are referenced using the <code>module</code> block: <code>module \"vpc\" { source = \"./modules/vpc\"; cidr = var.vpc_cidr }</code>. The <code>source</code> argument is required — it can be a local path, Terraform Registry address, Git URL, or S3 bucket. Call module outputs with <code>module.vpc.subnet_id</code>."},
    {q:"What file must be included in a directory for it to be recognised as a Terraform module?",opts:["module.tf","main.tf","variables.tf","outputs.tf"],ans:1,tag:"Modules",exp:"Any directory with at least one <code>.tf</code> file is a valid Terraform module. <strong>main.tf</strong> is the conventional name for the primary configuration file. A module doesn't technically require a specific filename, but best practice is: <code>main.tf</code> (resources), <code>variables.tf</code> (inputs), <code>outputs.tf</code> (outputs), <code>versions.tf</code> (provider constraints)."},
    {q:"After Terraform updates the state file following terraform apply, is the application deployment status (e.g., application running inside EC2) recorded in the state file?",opts:["No — only infrastructure resources managed by Terraform are tracked in state","Yes — the state file records everything including application status"],ans:0,tag:"State Management",exp:"<strong>No</strong> — Terraform's state file only records <strong>infrastructure resources</strong> that Terraform manages (EC2 instances, S3 buckets, security groups, etc.). Application-level status (is the app running, is the service healthy) is <strong>not tracked</strong> by Terraform. Use monitoring tools (CloudWatch, Prometheus) for application health."},
    {q:"How can you dynamically generate resource configurations in Terraform? (revisited)",opts:["Using count and for_each","Using dynamic blocks","Using modules","All of the above"],ans:3,tag:"Dynamic Resources",exp:"<strong>All three methods</strong> serve different dynamic generation needs: <code>count = var.instance_count</code> for N identical resources, <code>for_each = var.buckets</code> for named instances, <code>dynamic \"ingress\" { for_each = var.ports }</code> for nested blocks, and <code>module \"vpc\" {}</code> for reusable infrastructure patterns. Use for_each over count for non-indexed resources."},
    {q:"A user wants to destroy only a specific EC2 resource from the local configuration file. How?",opts:["terraform state rm aws_instance.example","terraform destroy aws_instance.example","terraform apply -target=aws_instance.example","terraform delete -target=aws_instance.example"],ans:0,tag:"State Management",exp:"<code>terraform state rm aws_instance.example</code> removes the resource from state (Terraform forgets it, but doesn't destroy the EC2). To actually <strong>destroy</strong> a specific resource: <code>terraform destroy -target=aws_instance.example</code>. There is no <code>terraform delete</code>. The <code>-target</code> flag with destroy destroys the resource and removes it from state."},
    {q:"A user wants to create only a specific EC2 resource from the local configuration file. How?",opts:["terraform state apply aws_instance.example","terraform apply aws_instance.example","terraform apply -target=aws_instance.example","terraform delete -target=aws_instance.example"],ans:2,tag:"Apply",exp:"<code>terraform apply -target=aws_instance.example</code> creates (or updates) only the targeted resource. The <code>-target</code> flag is useful for testing specific resources or applying changes incrementally. Note: HashiCorp recommends against regular use of <code>-target</code> in production as it can leave the configuration and state out of sync."},
    {q:"How can you source a module from a Git repository?",opts:["source = \"git@github.com:user/repo\"","source = \"git::https://github.com/user/repo.git\"","source = \"https::git@github.com/user/repo\"","source = \"github.com/user/repo\""],ans:1,tag:"Modules",exp:"<code>source = \"git::https://github.com/user/repo.git\"</code> is the correct syntax for a Git HTTPS source. For SSH: <code>\"git::git@github.com:user/repo.git\"</code>. Pin a specific tag/branch/commit: <code>\"git::https://github.com/user/repo.git?ref=v1.2.0\"</code>. The <code>git::</code> prefix explicitly specifies the Git protocol."},
    {q:"Where is the Terraform state file stored by default?",opts:["In a remote S3 bucket","In a database","Locally in the Terraform configuration directory","In Terraform Cloud"],ans:2,tag:"State Backend",exp:"By default, Terraform stores the state file as <code>terraform.tfstate</code> in the <strong>local directory</strong> where Terraform commands are run. The local backend is suitable for individual development but not for teams. Always use a <strong>remote backend</strong> (S3, GCS, Azure Blob, Terraform Cloud) for team collaboration with state locking."},
    {q:"What happens if two users run terraform apply concurrently on the same state file stored in a remote backend?",opts:["The second apply fails due to state file locking","Both commands run successfully and merge changes","The state file will be corrupted","Terraform automatically resolves any conflicts"],ans:0,tag:"State Locking",exp:"Remote backends with <strong>state locking</strong> (S3+DynamoDB, Terraform Cloud, GCS) prevent concurrent applies — the first <code>terraform apply</code> acquires a lock, and the second user gets an error: <code>Error acquiring the state lock</code>. This prevents state file corruption from race conditions. Without locking (local backend), concurrent applies can corrupt state."},
    {q:"After running terraform init, where are provider plugins downloaded?",opts:["The .terraform/providers directory in the current working directory","The .terraform.d directory in the current working directory","/etc/terraform/plugins","The .terraform.plugins directory in the current working directory"],ans:0,tag:"Init",exp:"Provider plugins are downloaded to <strong>.terraform/providers/</strong> in the current working directory. This directory also contains modules in <code>.terraform/modules/</code>. The entire <code>.terraform/</code> directory should be added to <code>.gitignore</code>. For air-gapped environments, use <code>terraform providers mirror</code> to pre-download providers."},
    {q:"What Terraform feature ensures only one person can update resources at a time when using Terraform CLI?",opts:["Version control","Local backend","Provisioners","State locking"],ans:3,tag:"State Locking",exp:"<strong>State locking</strong> prevents concurrent modifications. With an S3 backend + DynamoDB, Terraform creates a lock entry in DynamoDB before any state-modifying operation. If another <code>terraform apply</code> is running, the lock prevents the second operation. <code>terraform force-unlock &lt;lock-id&gt;</code> manually releases a stuck lock."},
    {q:"You have a Terraform config with no defined resources but a related state file exists on AWS. What happens when you run terraform apply?",opts:["Terraform will destroy all of the resources","Terraform will not perform any operations","Terraform produces an error since there are no resources defined","Terraform scans AWS and creates a new config based on the state file"],ans:0,tag:"State Management",exp:"If the configuration is empty but the state file contains resources, Terraform interprets the desired state as <strong>zero resources</strong>. Running <code>terraform apply</code> will <strong>destroy all resources</strong> tracked in state to reconcile the actual state with the desired (empty) configuration. Always double-check before applying with an empty config."},
    {q:"What are additional benefits of Infrastructure as Code (IaC)? (select three apply)",opts:["Creates a blueprint of your data center","Code can easily be shared and reused","Allows infrastructure to be versioned","All three — blueprint creation, code reuse, and versioning are key IaC benefits"],ans:3,tag:"IaC Concepts",exp:"Key IaC benefits: <strong>Blueprint</strong> — declarative configs document your entire infrastructure, <strong>Code reuse</strong> — modules and shared configurations reduce duplication, <strong>Versioning</strong> — infrastructure changes tracked in Git with history, rollback capability, and peer review. IaC also enables parallel provisioning (not eliminates it), drift detection, and repeatable environments."},
    {q:"What data does the aws_ami data source block return when queried with most_recent=true and filter for amzn2 images?",opts:["The IP address of an EC2 instance running in AWS","All possible data of a specific Amazon Machine Image from AWS","The latest AMI you previously used for an Amazon Linux 2 image","A custom AMI for Amazon Linux 2"],ans:1,tag:"Data Sources",exp:"The <code>aws_ami</code> data source with <code>most_recent = true</code> and an AMI name filter returns <strong>all attributes of the most recent matching AMI</strong> — including AMI ID, name, description, architecture, root device type, block device mappings, etc. The result is referenced as <code>data.aws_ami.amzlinux2.id</code> to get just the AMI ID."},
    {q:"If the version parameter is removed from the module block and terraform init is run again, what happens?",opts:["Terraform returns an error — version parameter is required","Terraform skips the module","Terraform uses the existing module already downloaded","Terraform downloads the latest version of the module"],ans:2,tag:"Modules",exp:"When no <code>version</code> is specified and the module is already cached in <code>.terraform/modules/</code>, <code>terraform init</code> uses the <strong>cached version</strong> without re-downloading. Running <code>terraform init -upgrade</code> would download the latest version. HashiCorp strongly recommends <strong>always pinning module versions</strong> in production to prevent unexpected breaking changes."},
    {q:"Based on the depends_on relationships in the given code, which resource is created first?",opts:["aws_s3_bucket.customer_data","aws_eip.ip","aws_instance.data_processing","module.example_sqs_queue"],ans:0,tag:"Dependencies",exp:"<strong>aws_s3_bucket.customer_data</strong> is created first — both <code>aws_instance.data_processing</code> and <code>module.example_sqs_queue</code> have <code>depends_on = [aws_s3_bucket.customer_data]</code>. The EIP references the instance (<code>instance = aws_instance.data_processing.id</code>) so it's last. Order: S3 bucket → EC2 instance → EIP + SQS module (parallel)."},
    {q:"Where is the module stored given: source = './modules/monitoring_tools'?",opts:["In a public GitLab repository","Locally on the instance running Terraform","On the Terraform public registry","A private registry in Terraform Cloud"],ans:1,tag:"Modules",exp:"The <code>./</code> prefix indicates a <strong>local path module</strong> — stored in the <code>modules/monitoring_tools</code> subdirectory relative to the calling configuration. Local modules are not downloaded during <code>terraform init</code>; they're read directly from the filesystem. Use local modules for organisation-specific, non-shareable infrastructure patterns."},
    {q:"What happens if multiple users attempt terraform apply simultaneously using a remote backend? (select two that apply)",opts:["If the backend doesn't support locking, the state file could become corrupted","If the backend supports locking, the first apply locks the file preventing the second","Both users will get an error","The apply works for both users"],ans:0,tag:"State Locking",exp:"<strong>Both A and B are correct</strong>: Without locking (e.g., plain S3 without DynamoDB), concurrent applies can corrupt the state file. With locking (S3+DynamoDB, Terraform Cloud), the first apply acquires the lock and the second gets a lock error. Always use backends that support locking for team environments."},
    {q:"Given a for_each resource using a map with keys: vault, terraform, consul, nomad — how do you reference the last (nomad) instance?",opts:["aws_instance.database[4]","aws_instance.nomad","aws_instance.database[\"nomad\"]","aws_instance.database[2]"],ans:2,tag:"for_each",exp:"With <code>for_each</code> on a map, instances are referenced by their <strong>map key</strong>: <code>aws_instance.database[\"nomad\"]</code>. Unlike <code>count</code> (which uses integer indices like <code>[0]</code>, <code>[1]</code>), <code>for_each</code> uses string keys. <code>aws_instance.database[4]</code> and <code>[2]</code> are invalid for map-based for_each."},
    {q:"You have a Terraform config with no defined resources but a related state file exists on AWS. What happens with terraform apply?",opts:["Terraform will not perform any operations","Terraform scans AWS and creates a new config from the state file","Terraform produces an error since no resources are defined","Terraform will destroy all of the resources"],ans:3,tag:"State Management",exp:"Empty configuration + existing state = <strong>Terraform destroys all state-tracked resources</strong>. Terraform's reconciliation: desired state (empty config) vs actual state (resources in state file) → action: destroy everything. This is why code review of Terraform changes is critical — accidentally deleting all resource blocks would wipe production infrastructure on the next apply."},
    {q:"Where is the AWS provider retrieving credentials from in this code: access_key = data.vault_aws_access_credentials.creds.access_key?",opts:["From the .tfvars file called vault","From a data source retrieving credentials from HashiCorp Vault — dynamically generating credentials","From a variable called vault_aws_access_credentials","From a script executing commands against Vault"],ans:1,tag:"Providers",exp:"The provider is reading credentials from a <strong>HashiCorp Vault data source</strong> (<code>data.vault_aws_access_credentials.creds</code>). Vault's AWS Secrets Engine dynamically generates short-lived IAM credentials on demand. This is the most secure approach — no static credentials in code, .tfvars, or environment variables. Credentials are generated per-run and automatically expire."},
    {q:"Which method of providing sensitive values will NOT result in sensitive information being written to the Terraform state file?",opts:["Using a declared variable","Using a tfvars file","Retrieving credentials from a data source like HashiCorp Vault","None of the above — all methods write to state"],ans:2,tag:"Security",exp:"<strong>HashiCorp Vault</strong> with dynamic credentials is the only method here that avoids writing credentials to state. Variables, tfvars, and environment variables are written to state when used as resource arguments. Vault generates ephemeral credentials that expire. Mark outputs with <code>sensitive = true</code> to suppress CLI display, but state still stores the value."},
    {q:"What block type is used to define a VPC resource referenced as aws_vpc.main.id?",opts:["data block","locals block","resource block","provider block"],ans:2,tag:"HCL Syntax",exp:"<code>aws_vpc.main.id</code> references a <strong>resource block</strong>: <code>resource \"aws_vpc\" \"main\" { cidr_block = \"10.0.0.0/16\" }</code>. The format is <code>resource_type.resource_name.attribute</code>. A <code>data</code> block would be <code>data.aws_vpc.main.id</code>. The <code>resource</code> block creates and manages actual infrastructure."},
    {q:"What will the 'Name' tag equal after terraform apply, given var.name = 'data_processing' and the locals conditional (var.name != '' ? var.name : random_id.id.hex)?",opts:["A random hex value","An empty string","data_processing","AIS Team"],ans:2,tag:"Locals",exp:"The ternary expression: <code>var.name != \"\" ? var.name : random_id.id.hex</code> — since <code>var.name = \"data_processing\"</code> (not empty), the condition is <strong>true</strong>, so <code>local.name = \"data_processing\"</code>. The <code>Name</code> tag references <code>local.name</code>, so its value will be <strong>data_processing</strong>. The random hex only applies if var.name is empty."},
    {q:"What does the 'terraform init -upgrade' command do?",opts:["Upgrades the backend to the latest supported version","Upgrades all modules and providers to the latest Terraform version","Updates all previously installed plugins and modules to the newest version that complies with version constraints","Upgrades Terraform configuration files to use the referenced Terraform version"],ans:2,tag:"Init",exp:"<code>terraform init -upgrade</code> updates all installed providers and modules to the <strong>newest version satisfying the version constraints</strong> in <code>required_providers</code>. If your constraint is <code>~> 5.0</code>, it fetches the latest 5.x.x patch. It does NOT upgrade Terraform itself — use <code>tfenv</code> or download a new binary for that."},
    {q:"True or False: A remote backend configuration is required for using Terraform.",opts:["False — local backend is the default and works without remote config","True — remote backend is required"],ans:0,tag:"State Backend",exp:"<strong>False</strong> — Terraform uses the <strong>local backend</strong> by default, storing state in <code>terraform.tfstate</code> locally. Remote backends (S3, GCS, Terraform Cloud) are optional but strongly recommended for teams. The local backend works perfectly for individual development, testing, and learning Terraform."},
    {q:"The data block uses filter values 'amzn21-ami-hvmm-*-x86_64-ebs' (note the typos). What will the data block return?",opts:["All possible data of a specific Amazon Machine Image from AWS","The latest AMI you previously used for an Amazon Linux 2 image","The IP address of an EC2 instance running in AWS","A custom AMI for Amazon Linux 2"],ans:0,tag:"Data Sources",exp:"The filter pattern <code>amzn21-ami-hvmm-*</code> has typos (should be <code>amzn2-ami-hvm-*</code>). This will likely <strong>return no results or error</strong> at runtime with 'no AMIs found'. However, if the question is about what the data source is designed to return, it returns <strong>all attributes of the matched AMI</strong>. The typos mean the filter won't match real AWS AMIs."},
    {q:"Which of the following is NOT a benefit of Terraform state?",opts:["Reduces outbound traffic by requiring state is stored locally","Determines dependency order for deployed resources","Increases performance by reducing the need to query multiple resources","Provides one-to-one mapping of configuration to real-world resources"],ans:0,tag:"State Management",exp:"<strong>Storing state locally does NOT reduce outbound traffic</strong> — Terraform always queries the provider API to refresh resource attributes during plan/apply. The actual state benefits are: dependency graph construction, performance (cached resource data reduces API calls), and configuration-to-reality mapping. Remote state actually adds network calls but enables collaboration."},
    {q:"Which of the following are true statements regarding Terraform? (select three)",opts:["Terraform is cloud-agnostic but requires a specific provider for each cloud platform","A single Terraform configuration file can manage multiple providers","Terraform can simplify management of large-scale multi-cloud infrastructure","All three statements are true about Terraform"],ans:3,tag:"IaC Concepts",exp:"<strong>All three are true</strong>: Terraform is <strong>cloud-agnostic</strong> (supports AWS, Azure, GCP, 3000+ providers) but each cloud needs its provider block. A single config can use <code>provider \"aws\"</code> and <code>provider \"google\"</code> simultaneously. Terraform excels at <strong>multi-cloud orchestration</strong> with a unified workflow. It can also manage cross-cloud dependencies via depends_on."},
    {q:"After configuring an S3 remote backend, what command migrates existing local state to the new backend?",opts:["terraform apply -refresh-only","terraform init -migrate-state","terraform plan --replace","terraform state show"],ans:1,tag:"State Backend",exp:"<code>terraform init -migrate-state</code> detects the new backend configuration and offers to <strong>copy the existing state</strong> to the new backend. You'll be prompted to confirm the migration. After migration, the local <code>terraform.tfstate</code> can be deleted (Terraform will use the remote backend). <code>-reconfigure</code> discards existing state without migration."},
    {q:"What backends support state locking for team use? (select three that apply)",opts:["Kubernetes backend","S3 backend with DynamoDB","Consul backend","Local backend — all four support locking"],ans:0,tag:"State Locking",exp:"Backends that support locking: <strong>S3 + DynamoDB</strong> (AWS), <strong>Consul</strong> (HashiCorp), <strong>Kubernetes</strong> (k8s secrets-based), Terraform Cloud, GCS, Azure Blob, etcd. The <strong>local backend does NOT support locking</strong> — multiple users can corrupt local state with concurrent operations. Always use a locking-capable backend for shared infrastructure."},
    {q:"How can you connect Terraform to an EC2 instance to create a sample file using a provisioner?",opts:["By using local","Lifecycle block","Connection block with provisioners","State configurations"],ans:2,tag:"Provisioners",exp:"Use a <strong>connection block</strong> inside the resource to specify SSH credentials, then a <strong>remote-exec provisioner</strong> to run commands: <code>connection { type = \"ssh\"; host = self.public_ip; user = \"ec2-user\"; private_key = file(\"~/.ssh/key.pem\") }</code> + <code>provisioner \"remote-exec\" { inline = [\"touch /tmp/sample.txt\"] }</code>."},
    {q:"A colleague manually updates a tag on a Terraform-managed resource in the console while you are away. What happens when you run terraform apply with your original plan?",opts:["Terraform refreshes state, recognises the manual change, and updates resource back to desired state — manual change is overwritten","Terraform returns an error since state no longer matches real-world infrastructure","Terraform destroys the manually-changed resource and recreates it","Terraform updates the manual change back, then applies new config changes"],ans:0,tag:"Drift Detection",exp:"<strong>terraform apply refreshes state first</strong>, detects the manual tag change as drift, and applies your configuration — <strong>overwriting the manual change</strong> with the value defined in your <code>.tf</code> file. Terraform always enforces the desired state in configuration. To prevent drift, use <code>lifecycle { ignore_changes = [tags] }</code> to preserve manual tag changes."},
    {q:"You created an RDS instance with Terraform and someone makes a manual change. What happens on the next terraform plan?",opts:["Manual changes will be gone after terraform apply","Changes will be updated in the config file","No changes","Existing changes will be deleted and recreated"],ans:0,tag:"Drift Detection",exp:"<code>terraform plan</code> refreshes state against actual infrastructure, detects the manual change as <strong>configuration drift</strong>, and shows a diff indicating the change Terraform will make. Running <code>terraform apply</code> will <strong>overwrite the manual change</strong> to match the <code>.tf</code> file definition. To protect specific attributes from being overwritten, use <code>lifecycle { ignore_changes = [...] }</code>."},
    {q:"If a tfstate file stored only locally gets accidentally deleted, can you recover it?",opts:["Terraform data source","Terraform Import","We cannot retrieve it","Create resources from scratch"],ans:1,tag:"State Management",exp:"<code>terraform import</code> re-imports existing cloud resources into a new state file: <code>terraform import aws_s3_bucket.mybucket my-bucket-name</code>, <code>terraform import aws_lambda_function.myfunc my-function</code>. You must import each resource individually. This is why <strong>remote state with versioning</strong> (S3 with versioning enabled) is critical — easily restore previous state versions."},
    {q:"What is the purpose of the depends_on attribute within a resource block in Terraform?",opts:["To specify dependencies between resources","To define conditional logic for resource creation","To enable parallel execution of resource provisioning","To enforce resource deletion order during destruction"],ans:0,tag:"Dependencies",exp:"<code>depends_on</code> explicitly declares a dependency, instructing Terraform to create/update the dependency before the current resource. Also <strong>enforces reverse order during destroy</strong> (dependent resource is destroyed first). Use only when Terraform cannot auto-detect the dependency — prefer implicit dependencies via attribute references (<code>= aws_vpc.main.id</code>)."},
    {q:"A user wants to display information about resources created by Terraform after execution. What should they use?",opts:["Terraform Dependent block","Terraform outputs","Terraform data source","Terraform Import"],ans:1,tag:"Outputs",exp:"<strong>Terraform outputs</strong> expose resource attributes after apply: <code>output \"instance_ip\" { value = aws_instance.web.public_ip }</code>. Outputs display in the CLI after <code>terraform apply</code>, can be queried with <code>terraform output instance_ip</code>, and are accessible by parent modules. Use <code>sensitive = true</code> to suppress display of sensitive values."},
    {q:"A user wants to create two S3 buckets — one in ap-south-1 and one in us-east-1 in the same stack. What is the approach?",opts:["Two config files with different regions","Alias providers","Dependent block","Run config files twice with different regions"],ans:1,tag:"Multi-Region",exp:"<strong>Provider aliases</strong> allow multiple instances of the same provider: <code>provider \"aws\" { region = \"ap-south-1\" }</code> and <code>provider \"aws\" { alias = \"us_east\"; region = \"us-east-1\" }</code>. Then in the resource: <code>resource \"aws_s3_bucket\" \"us\" { provider = aws.us_east; ... }</code>. This enables multi-region deployments in a single configuration file."},
    {q:"A user wants to create three S3 buckets and avoid accidental recreation when the input list order changes. Which parameter is helpful?",opts:["count","for_each","Both count and for_each","DynamoDB locking"],ans:1,tag:"for_each",exp:"<strong>for_each</strong> is the correct answer. With <code>count</code>, buckets are addressed by index (bucket[0], bucket[1]) — reordering the list changes indices, causing unnecessary destroy/recreate. With <code>for_each = toset([\"logs\", \"data\", \"backups\"])</code>, buckets are addressed by name — reordering doesn't trigger recreation since identities are stable."},
    {q:"What does the terraform validate command do?",opts:["Checks the syntax and configuration of Terraform files","Applies the changes described in a Terraform configuration","Refreshes the state","Validates the remote state file"],ans:0,tag:"Validation",exp:"<code>terraform validate</code> checks Terraform configuration files for <strong>syntax errors and internal consistency</strong> — verifying that attribute names, types, and references are valid without connecting to any provider API. It runs much faster than <code>plan</code>. Use in CI/CD pipelines as a quick pre-check before running <code>terraform plan</code>."},
    {q:"A user tried to destroy a Terraform config using terraform destroy but it is not working. What could be the reason?",opts:["lifecycle prevent_destroy = true is enabled","terraform init is missing","local block is enabled","No resource in config file"],ans:0,tag:"Lifecycle",exp:"<code>lifecycle { prevent_destroy = true }</code> blocks resource destruction — <code>terraform destroy</code> will error with: <code>Error: Instance cannot be destroyed</code>. This is intentional protection for critical resources (production databases, etc.). To destroy, you must first remove the <code>prevent_destroy</code> lifecycle rule, then run <code>terraform apply</code> (to update state), then <code>terraform destroy</code>."},
    {q:"Developer 1 is running terraform apply (with S3 backend + DynamoDB lock). Developer 2 runs terraform validate. What is the expected output for Developer 2?",opts:["Lock acquired","Try again — process is ongoing","terraform validate works without any issue","Developer 2 must wait until Developer 1's apply completes"],ans:2,tag:"State Locking",exp:"<strong>terraform validate works without acquiring any lock</strong> — it only checks configuration file syntax locally without accessing the state backend. State locking only applies to state-modifying operations: <code>terraform plan</code>, <code>terraform apply</code>, <code>terraform destroy</code>, and <code>terraform state</code> commands. Validate, fmt, and show do not need the state lock."},
    {q:"What does the Terraform plugin (provider plugin) do?",opts:["Converts HCL code into API calls and sends requests to the appropriate provider (AWS, GCP, Azure)","Communicates with the Terraform registry","Converts the provider (AWS, GCP, Azure) into HCL code","Both A and C"],ans:0,tag:"Providers",exp:"<strong>Provider plugins</strong> act as a bridge between Terraform's HCL configuration and cloud provider APIs. Each provider (aws, google, azurerm) is a separate binary plugin that: interprets resource blocks, <strong>translates them into API calls</strong> (e.g., CreateInstance, CreateBucket), handles authentication, and maps API responses back to Terraform state. Plugins are downloaded during <code>terraform init</code>."},
    {q:"What does the remote-exec provisioner do?",opts:["Runs commands using Terraform on a remote server","Runs commands using Terraform on the local system","Runs commands on both local and remote","None of the above"],ans:0,tag:"Provisioners",exp:"<strong>remote-exec</strong> connects to the newly created resource via SSH (or WinRM) and runs commands <strong>on the remote server</strong>. Use cases: installing software, running configuration scripts, bootstrapping applications. Requires a <code>connection</code> block. <strong>local-exec</strong> runs commands on the Terraform control machine. HashiCorp recommends using cloud-init or user_data over provisioners when possible."},
    {q:"What is the use of a Terraform module?",opts:["To make code standardised","To reduce code duplication","Create once and reuse whenever needed","All of the above"],ans:3,tag:"Modules",exp:"<strong>Terraform modules</strong> serve all three purposes: <strong>Standardisation</strong> — enforce consistent resource configurations across teams, <strong>DRY principle</strong> — define infrastructure once, call it multiple times with different variables, <strong>Reusability</strong> — share via Terraform Registry or internal registry. Modules are the primary mechanism for building scalable, maintainable Terraform codebases."},
    {q:"How can you delete a specific resource without changing the logic in your Terraform config?",opts:["Taint the resource using terraform taint RESOURCE_TYPE.RESOURCE_NAME command","Delete manually and reapply the config","Not possible to delete a particular resource without config changes","Use workspace to delete"],ans:0,tag:"Taint",exp:"<code>terraform taint aws_instance.web</code> marks the resource for replacement on the next <code>terraform apply</code> — Terraform destroys and recreates it. Note: <code>terraform taint</code> is deprecated in Terraform 0.15.2+. The modern equivalent is <code>terraform apply -replace=aws_instance.web</code>. The resource config is unchanged; only the lifecycle is affected."},
    {q:"How can you maintain different state files in a local repository?",opts:["Using terraform refresh","Using workspace","Not possible — only one state file per repo","Create multiple repositories"],ans:1,tag:"Workspaces",exp:"<strong>Terraform workspaces</strong> maintain separate state files for different environments: <code>terraform workspace new dev</code>, <code>terraform workspace new prod</code>. Each workspace has its own <code>terraform.tfstate</code> file (locally: <code>terraform.tfstate.d/dev/terraform.tfstate</code>). Use <code>terraform workspace select dev</code> to switch. Reference current workspace in config with <code>terraform.workspace</code>."},
    {q:"Developer 1 created an EC2 instance with Terraform. Developer 2 makes a manual change to it. What happens on the next terraform plan?",opts:["Terraform state mismatch detected — Terraform will modify the EC2 to match the desired state in the .tf file","Delete all and recreate","No changes","Terraform will modify the EC2 to match whatever is in the remote infrastructure"],ans:0,tag:"Drift Detection",exp:"<strong>Terraform detects configuration drift</strong>: it refreshes state against actual AWS infrastructure, compares with the desired state in <code>.tf</code> files, and the plan shows the diff. Running <code>terraform apply</code> will <strong>override the manual change</strong> to match the configuration file. This is the core value of IaC — the config file is always the source of truth."},
    {q:"What does Terraform state locking do?",opts:["Locks the state file during terraform plan, apply, or destroy to prevent destructive concurrent actions","Locks state during terraform init, validate — preventing destructive actions","Both A and B","Locks state during terraform delete and refresh"],ans:0,tag:"State Locking",exp:"<strong>State locking</strong> activates during state-modifying operations: <code>terraform plan</code>, <code>terraform apply</code>, <code>terraform destroy</code>, and <code>terraform state</code> commands. It does NOT lock during <code>init</code>, <code>validate</code>, <code>fmt</code>, or <code>show</code>. The lock prevents two users from simultaneously modifying state, which could cause corruption or conflicting resource changes."},
    {q:"Which is the best practice to store the Terraform state file?",opts:["S3 storage if using AWS (or equivalent cloud storage with versioning and locking)","GitHub","Both S3 and GitHub","Local storage"],ans:0,tag:"State Backend",exp:"<strong>Remote cloud storage</strong> (S3 + DynamoDB for AWS, GCS for GCP, Azure Blob for Azure, or Terraform Cloud) is best practice. Requirements: versioning (restore previous state), encryption at rest, access control (IAM), and state locking. <strong>Never store state in Git</strong> — state files often contain sensitive values (passwords, keys) in plaintext and creates merge conflicts."},
    {q:"What is a Terraform null_resource and what is it used for?",opts:["A resource with no infrastructure — used to run provisioners or trigger actions without creating real cloud resources","A resource that creates an empty placeholder in AWS","A resource used only for testing","A deprecated Terraform feature"],ans:0,tag:"Null Resource",exp:"<strong>null_resource</strong> (from the <code>hashicorp/null</code> provider) creates no real infrastructure but can: run <code>local-exec</code>/<code>remote-exec</code> provisioners, serve as a trigger mechanism using the <code>triggers</code> argument, and act as a dependency anchor. Example: <code>triggers = { always_run = timestamp() }</code> re-runs provisioners on every apply. In Terraform 1.4+, <code>terraform_data</code> replaces null_resource without needing the null provider."}
];
// Combine more questions from your bank to reach 107 total
// (Shortened here for code block display, logic remains intact)
while(rawQuestions.length < 107) {
    rawQuestions.push({...rawQuestions[Math.floor(Math.random()*rawQuestions.length)]});
}

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 4800;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('gitTfAdvancedMastery_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = (data.timeLeft === 3600) ? 4800 : data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.slice(0, 107).map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            tag: q.tag,
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 4800;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('gitTfAdvancedMastery_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 300) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/${questions.length}`;

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-meta"><span class="q-num">Q ${current+1}</span></div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === (questions.length - 1)) ? "FINISH AUDIT ✓" : "NEXT NODE →";
    
    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === (questions.length - 1)) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('gitTfAdvancedMastery_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / ${questions.length}`;
}

function retryQuiz() { localStorage.removeItem('gitTfAdvancedMastery_v1'); location.reload(); }

initQuiz();
</script>
