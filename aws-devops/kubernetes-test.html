header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}

.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}

<script>
const rawQuestions = [
{q:"If a pod fails due to an error and needs to restart automatically, which configuration should be used?",opts:["Use a Job","Use a Deployment with a restart policy set to Always","Use a StatefulSet","Use a DaemonSet"],ans:1,tag:"Pods",exp:"A <strong>Deployment</strong> manages pod replicas and automatically restarts failed pods. The default <code>restartPolicy</code> for pods managed by a Deployment is <strong>Always</strong> — if a container crashes, the kubelet on that node restarts it automatically."},
{q:"What happens when a node is marked with a NoSchedule taint?",opts:["Pods can be scheduled on it without any restrictions","Only Pods with matching tolerations can be scheduled on it","No Pods can ever run on that node","All Pods are removed from that node immediately"],ans:1,tag:"Taints & Tolerations",exp:"<strong>NoSchedule</strong> taint prevents new pods from being scheduled unless they have a matching <strong>toleration</strong>. Existing pods on the node are not affected. To schedule a pod on a tainted node, add: <code>tolerations: [{key: 'key', operator: 'Equal', value: 'value', effect: 'NoSchedule'}]</code>"},
{q:"How should Resource Quotas and Limit Ranges be configured to enforce resource constraints and prevent resource exhaustion?",opts:["Apply a Resource Quota at namespace level limiting CPU/memory, and configure a Limit Range at pod level restricting individual pods","Implement a Resource Quota limiting total cluster CPU to 8 cores and memory to 16 GiB with container-level Limit Ranges","Define a Resource Quota at namespace level based on application needs and a Limit Range at pod level setting requests at 80% of limits","Utilize Resource Quotas to limit pod count per namespace and Limit Ranges to restrict GPU resources"],ans:2,tag:"Resource Management",exp:"<strong>ResourceQuota</strong> sets total limits per namespace (total CPU/memory across all pods). <strong>LimitRange</strong> sets per-pod or per-container defaults and maximums. Option C is best: namespace-level quota based on actual needs, with LimitRange enforcing sensible request/limit ratios to prevent resource over-commitment."},
{q:"Which Kubernetes resource is used to define the network rules for controlling traffic between pods?",opts:["Service","NetworkPolicy","Ingress","Pod"],ans:1,tag:"Networking",exp:"<strong>NetworkPolicy</strong> defines rules for ingress and egress traffic between pods, namespaces, and IP blocks. By default, all pods can communicate freely. NetworkPolicy allows you to restrict traffic — for example, allowing only the frontend to talk to the backend on a specific port."},
{q:"Regarding security: Ingress with TLS vs NodePort Services — which statement is correct?",opts:["Ingress with TLS termination is more secure as it offloads encryption at the Ingress controller","NodePort Services offer better security as traffic only reaches specific ports on worker nodes","You can implement Network Policies with both Ingress and NodePort to restrict access","By default NodePort Services are more secure as they require manual client-side configuration"],ans:2,tag:"Networking",exp:"<strong>Network Policies work with both Ingress and NodePort</strong> — you can restrict which pods/namespaces can access services regardless of how they are exposed. Ingress with TLS provides SSL termination, while NodePort exposes ports on every node. Neither is inherently more secure; it depends on your Network Policy configuration."},
{q:"In Prometheus, what language is used to query metrics?",opts:["SQL","JSON","PromQL","YAML"],ans:2,tag:"Monitoring",exp:"<strong>PromQL (Prometheus Query Language)</strong> is the functional query language for Prometheus. It allows selecting and aggregating time series data. Example: <code>rate(http_requests_total[5m])</code> calculates the per-second rate of HTTP requests over a 5-minute window."},
{q:"You have two microservices (web-service and api-service). How do you best expose them externally using a single IP?",opts:["Use an Ingress with a single hostname and path-based routing rules for both services on the same external IP","Create NodePort Services for both services on different ports on all worker nodes","Configure an Ingress with multiple hostnames, each pointing to a separate Service","Utilize NodePort Services with a single port requiring manual port forwarding"],ans:0,tag:"Ingress",exp:"A single <strong>Ingress</strong> with path-based routing is the cleanest approach: <code>/web</code> routes to web-service and <code>/api</code> routes to api-service, all on the same external IP. This avoids exposing multiple NodePort ports and centralises TLS termination at the Ingress controller."},
{q:"Which statement correctly describes Guaranteed vs Burstable resource classes in Kubernetes QoS?",opts:["Guaranteed classes provide exclusive resource allocation; Burstable classes allow occasional bursts","Burstable classes offer a baseline guaranteed amount with the ability to burst beyond for short durations","Guaranteed classes are ideal for latency-sensitive pods; Burstable classes suit unpredictable workloads","All of the above are correct aspects of QoS classes"],ans:2,tag:"Resource Management",exp:"<strong>Guaranteed QoS</strong>: requests == limits for all containers — best for latency-sensitive apps, they are last to be evicted. <strong>Burstable QoS</strong>: requests &lt; limits — can use extra resources when available. <strong>BestEffort QoS</strong>: no requests/limits set — first to be evicted under pressure."},
{q:"Your application needs to interact with a cloud database service. Which Kubernetes feature can help manage credentials securely?",opts:["ConfigMap","Secrets","Volume","ServiceAccount"],ans:1,tag:"Secrets",exp:"<strong>Kubernetes Secrets</strong> store sensitive data (passwords, API keys, tokens) in base64-encoded format. They can be injected as environment variables or volume mounts. For enhanced security, integrate with external secret managers (AWS Secrets Manager, HashiCorp Vault) using tools like External Secrets Operator."},
{q:"How can pods within a namespace securely access Secrets using Service Accounts?",opts:["Define Secrets at cluster level and mount them directly using volume mounts","Create a Service Account within the namespace and grant it access using Roles and RoleBindings","Configure environment variables in the pod spec that reference Secrets directly","Utilize ConfigMaps for storing sensitive data and mount them as volumes"],ans:1,tag:"RBAC",exp:"<strong>Service Account + RBAC</strong> is the correct pattern: create a ServiceAccount, create a Role granting <code>get/list</code> on Secrets, bind with a RoleBinding. Pods use the ServiceAccount to authenticate with the API server and access only the Secrets they are authorised for."},
{q:"Network Policies are enforced at which network layer within a Kubernetes cluster?",opts:["Enforced by kube-apiserver during pod creation","Implemented as iptables rules on worker nodes","Translated into Network Security Groups (NSGs) for cloud providers","Control communication within the pod network only"],ans:1,tag:"Networking",exp:"<strong>NetworkPolicy rules are implemented as iptables (or eBPF) rules on worker nodes</strong> by the CNI plugin (Calico, Cilium, etc.). They operate at Layer 3/4 (IP and port). The kube-apiserver validates and stores the policy objects, but enforcement happens at the node network level via the CNI."},
{q:"How can you ensure a Network Policy only applies to specific pods within a namespace?",opts:["Define a pod selector matching pod IP addresses","Use pod annotations to target specific pods by name","Configure labels on the pods and reference those labels in the NetworkPolicy selector","Network Policies inherently apply to all pods in the same namespace"],ans:2,tag:"Networking",exp:"<strong>Pod selectors with labels</strong> are how NetworkPolicy targets specific pods. Example: <code>podSelector: {matchLabels: {app: backend}}</code> applies the policy only to pods with the label <code>app=backend</code>. Without a podSelector, the policy applies to all pods in the namespace."},
{q:"Which approach is more scalable for handling increased load — NodePort or Ingress?",opts:["NodePort requires manual load balancer config for scaling; Ingress can be automatically updated with backend service changes","Ingress introduces an additional point of failure; NodePort is simpler","Both NodePort and Ingress can scale horizontally by adding more service instances or Ingress controller pods","NodePort offers better high availability as it doesn't require an additional Ingress controller"],ans:0,tag:"Ingress",exp:"<strong>Ingress scales better</strong>: when you add new pods/services, the Ingress controller dynamically updates routing rules. NodePort requires manual load balancer reconfiguration for scaling. Ingress controllers (nginx, ALB) natively support horizontal scaling and are the standard for production external traffic management."},
{q:"What is the primary role of Fluentd in the EFK stack?",opts:["To store logs","To visualize logs","To collect and forward logs","To query logs"],ans:2,tag:"Logging",exp:"In the <strong>EFK stack</strong>, <strong>Fluentd</strong> (F) collects logs from pod stdout/stderr and forwards them to Elasticsearch. <strong>Elasticsearch</strong> (E) stores and indexes logs. <strong>Kibana</strong> (K) visualises and queries the logs. Fluentd is typically deployed as a <strong>DaemonSet</strong> to run on every node."},
{q:"Users need to access service A on /app1, service B on /app2, and service C on /. Which approach is most suitable?",opts:["Use NodePort with a single port and a load balancer for path-based routing","Define separate NodePort Services for each microservice on different ports","Implement an Ingress with a single hostname and path-based routing rules for A, B, and C","Define NodePort Services for each and use hostname-based virtual servers on the load balancer"],ans:2,tag:"Ingress",exp:"<strong>Path-based Ingress routing</strong> is the correct solution. A single Ingress resource can define multiple path rules: <code>/app1</code> → service-a, <code>/app2</code> → service-b, <code>/</code> → service-c. This provides a clean single-entry-point with URL-based routing handled by the Ingress controller."},
{q:"Regarding health probes and hook timeouts during rolling updates — which statement is correct?",opts:["The new replica's pre-startup hook must succeed before the health probe starts; if the post-startup hook times out, the rollout fails","The old pod's readiness probe determines when to stop it; the new pod's post-startup hook success is required before marking it healthy","The pre-startup hook can drain connections from the old pod before it stops; the health probe determines when to terminate the old pod","Multiple pre-startup and post-startup hooks can be chained for complex operations"],ans:1,tag:"Probes & Hooks",exp:"During rolling updates: the <strong>old pod's readiness probe</strong> transitioning to not-ready signals Kubernetes to stop sending traffic. The <strong>new pod's readiness probe</strong> must pass before it receives traffic. <strong>PostStart hooks</strong> run after the container starts; if they fail, the container is killed. The <code>minReadySeconds</code> and probe settings control rollout pacing."},
{q:"What is a Taint in Kubernetes?",opts:["A way to mark a node so that Pods will not be scheduled on it unless they tolerate the taint","A method for tracking resource usage","A way to label nodes for easy identification","A type of logging for Kubernetes events"],ans:0,tag:"Taints & Tolerations",exp:"<strong>Taints</strong> are applied to nodes to repel pods: <code>kubectl taint nodes node1 key=value:NoSchedule</code>. Pods must have matching <strong>Tolerations</strong> to be scheduled on tainted nodes. Common use cases: dedicated nodes for GPU workloads, separating system and application pods, or node maintenance."},
{q:"A specific container within a pod is failing. What is the best approach to analyze its logs?",opts:["Use kubectl logs <pod_name> to analyze logs from all containers","Implement a logging sidecar container to collect and stream logs centrally","Use kubectl exec <pod_name> -c <container_name> -- tail -f /var/log/messages to view failing container logs","Configure log shipping to ELK Stack for centralized analysis"],ans:2,tag:"Troubleshooting",exp:"<code>kubectl logs &lt;pod_name&gt; -c &lt;container_name&gt;</code> shows logs for a specific container in a multi-container pod. Add <code>--previous</code> to see logs from the last crashed instance. <code>kubectl exec</code> with <code>tail</code> works for live log tailing when the container is running but producing errors."},
{q:"In a multi-tenant Kubernetes cluster where microservices need to communicate with specific restrictions — what is best?",opts:["Use NSGs for basic allow/deny rules on ports at the VM level","Implement Network Policies for granular control based on pod labels, namespaces, and protocols","Configure labels on pods and reference them in Policies for added security","Network Policies and NSGs offer identical control granularity"],ans:1,tag:"Networking",exp:"<strong>Network Policies</strong> provide Kubernetes-native, fine-grained L3/L4 control using pod labels, namespace selectors, and port/protocol specifications. Unlike NSGs (which operate at VM/node level), NetworkPolicy understands Kubernetes abstractions (labels, namespaces) and follows pods as they reschedule across nodes."},
{q:"If you have multiple replicas of a pod in Kubernetes, which service type should you use to manage traffic to those replicas?",opts:["ClusterIP Service","Headless Service","NodePort Service","LoadBalancer Service"],ans:0,tag:"Services",exp:"<strong>ClusterIP Service</strong> provides a stable virtual IP with built-in load balancing across all pod replicas matching the label selector. kube-proxy (iptables/IPVS) distributes traffic evenly. Use ClusterIP for internal pod-to-pod communication; use NodePort or LoadBalancer when external access is needed."},
{q:"How do Resource Quotas and Limit Ranges interact with pod priorities and fairness?",opts:["Configure Resource Quota with priority class for critical pods granting exclusive access when quota is reached","Implement Resource Quota with fairness guarantees ensuring proportional allocation; define Limit Range with burst allowance","Configure Limit Range with priority levels allowing high-priority pods to exceed limits; enforce namespace-level Resource Quota","Utilize Resource Quotas to limit resource requests; define separate Limit Range with slightly higher limits for over-commitment buffer"],ans:1,tag:"Resource Management",exp:"<strong>PriorityClasses</strong> combined with ResourceQuotas enable fairness: use <code>scopeSelector</code> in ResourceQuota to apply different quotas per priority class. High-priority pods can preempt low-priority ones when resources are scarce. LimitRange with burst allowance lets pods temporarily exceed their requests up to defined limits."},
{q:"For a critical application, which strategy would you use to minimize downtime during updates?",opts:["Recreate strategy","Blue-Green Deployment","Rolling Update","Canary Release"],ans:2,tag:"Deployment Strategies",exp:"<strong>Rolling Update</strong> (Kubernetes default) gradually replaces old pods with new ones, maintaining availability throughout. Configure <code>maxUnavailable: 0</code> and <code>maxSurge: 1</code> for zero-downtime rolling updates. Blue-Green and Canary are also valid but require additional infrastructure setup beyond standard Kubernetes Deployments."},
{q:"Regarding the interplay between liveness and readiness probes with hooks — which statement is correct?",opts:["Liveness probe failures trigger pre-startup hooks on new replicas; readiness probe failures cause post-startup hooks to run again","Liveness probe failures cause the pod to restart, potentially triggering pre-startup hooks again; readiness probe failures prevent new traffic","Readiness probe failures indicate the pod is unhealthy and can pause the rollout until recovery; liveness probe failures are independent of hooks","The success of pre-startup hooks can influence the initial liveness probe of the new replica; readiness probes determine when to route traffic"],ans:1,tag:"Probes & Hooks",exp:"<strong>Liveness probe failure</strong> → kubelet kills and restarts the container (running lifecycle hooks again). <strong>Readiness probe failure</strong> → pod is removed from Service endpoints (no traffic until healthy). Kubernetes uses readiness to gate rollout progress — if new pods fail readiness, the rolling update pauses."},
{q:"You have a critical application with 3 replicas across 2 Availability Zones. What is the most appropriate PDB configuration?",opts:["Set minAvailable to 2 to guarantee at least 2 pods are always available across zones during upgrades","Set maxUnavailable to 1 to allow eviction of at most 1 pod during an update, promoting pod redundancy","Configure both minAvailable to 1 and maxUnavailable to 1 to ensure minimal disruption while allowing updates","The scenario requires a more sophisticated strategy beyond basic minAvailable and maxUnavailable"],ans:0,tag:"PodDisruptionBudget",exp:"<strong>minAvailable: 2</strong> for a 3-replica app guarantees at most 1 pod can be voluntarily disrupted at a time (during drains, upgrades). This ensures continued service across AZs. A PodDisruptionBudget (PDB) only affects voluntary disruptions — it does not protect against node crashes."},
{q:"For legacy applications that don't understand hostname-based routing — which approach is better?",opts:["Ingress is preferred for modern applications with a single entry point and hostname-based routing","NodePort Services are better suited for legacy applications as they expose services on a specific port","You can configure Ingress with external IP addresses to mimic NodePort behavior for legacy applications","Both Ingress and NodePort offer similar access mechanisms, making the choice independent of application type"],ans:1,tag:"Services",exp:"<strong>NodePort</strong> exposes a specific port on all worker nodes (30000-32767 range), accessible via <code>NodeIP:NodePort</code> — straightforward for legacy apps expecting a fixed IP:port. Legacy apps often can't handle hostname-based routing or path rewriting. NodePort provides simple, direct port-based access they can work with."},
{q:"Your application runs across multiple Kubernetes clusters. What approach is best for a single entry point for external access?",opts:["NodePort with a single external IP across all clusters (complex routing)","Implement a multi-cluster Ingress controller with a single hostname pointing to services across clusters","Use individual NodePort Services in each cluster and configure a global load balancer for intelligent traffic distribution","Ingress is not suitable for multi-cluster deployments; separate NodePort Services are required in each cluster"],ans:1,tag:"Multi-Cluster",exp:"A <strong>multi-cluster Ingress controller</strong> (e.g., GKE Multi-Cluster Ingress, Istio multi-cluster) provides a single hostname routing to the appropriate cluster. This enables global load balancing, failover between clusters, and simplified DNS management — the modern approach to multi-cluster traffic management."},
{q:"How do you configure an Ingress for path-based routing for a frontend (/) and shopping cart (/cart)?",opts:["Define multiple Ingress resources each with a specific path rule pointing to the corresponding service","Use a single Ingress with multiple path definitions within the http section, routing requests based on paths","Configure a wildcard path in Ingress and implement path-based routing within application code","Utilize Istio for fine-grained path control"],ans:1,tag:"Ingress",exp:"A <strong>single Ingress resource</strong> with multiple path rules is the correct approach: define <code>rules[0].http.paths</code> with <code>/cart</code> → cart-service and <code>/</code> → frontend-service. Using one Ingress is simpler to manage than multiple Ingress resources, which would all need a shared host entry."},
{q:"Which Kubernetes resource is commonly used to deploy Fluentd?",opts:["Deployment","StatefulSet","DaemonSet","ReplicaSet"],ans:2,tag:"Logging",exp:"<strong>DaemonSet</strong> ensures exactly one Fluentd pod runs on <strong>every node</strong> in the cluster (including new nodes added later). This is essential for log collection — each node's pod logs must be collected locally before forwarding to Elasticsearch. A Deployment wouldn't guarantee coverage of all nodes."},
{q:"You want to restrict the backend service to only accept traffic from the frontend deployment. What is the best approach?",opts:["Configure NSG on the backend pod to allow inbound traffic from the frontend pod IP address","Create a Network Policy in the backend namespace to allow ingress traffic only from frontend deployment pods","Implement Network Policies in both frontend and backend namespaces restricting to their respective deployments","Use NSGs on worker nodes to control inbound traffic to all pods"],ans:1,tag:"Networking",exp:"Create a <strong>NetworkPolicy in the backend namespace</strong> with <code>podSelector: {matchLabels: {app: backend}}</code> and <code>ingress: [{from: [{podSelector: {matchLabels: {app: frontend}}}]}]</code>. This allows only pods labelled <code>app=frontend</code> to send traffic to backend pods, regardless of their node placement."},
{q:"What is a Kubernetes cluster composed of?",opts:["Master node and worker nodes","Virtual machines and containers","Load balancers and storage units","Master node, worker nodes, and a cloud provider"],ans:0,tag:"Architecture",exp:"A Kubernetes cluster consists of: <strong>Control Plane (Master) node(s)</strong> running kube-apiserver, etcd, kube-scheduler, and kube-controller-manager; and <strong>Worker nodes</strong> running kubelet, kube-proxy, and the container runtime. Cloud provider integration is optional — clusters can run on-premises."},
{q:"What is a PersistentVolume in Kubernetes?",opts:["A storage resource provisioned dynamically","A volume mounted into a pod existing only as long as the pod runs","A network storage solution providing persistent storage for containers","A volume providing storage independent of the lifecycle of individual pods"],ans:3,tag:"Storage",exp:"A <strong>PersistentVolume (PV)</strong> is a cluster-level storage resource that exists independently of any pod's lifecycle. When a pod is deleted, the PV persists. Pods request storage via <strong>PersistentVolumeClaims (PVC)</strong>. PVs can be statically provisioned by admins or dynamically created via StorageClasses."},
{q:"Which of the following best describes a benefit of using Kubernetes for container orchestration?",opts:["Automatic scaling based on demand ensuring efficient resource utilization","Simplified deployment and management of containers across a cluster","Built-in load balancing distributing network traffic across containers","All of the above — rolling updates, scaling, load balancing, and deployment simplification"],ans:3,tag:"Architecture",exp:"<strong>All listed features</strong> are genuine Kubernetes benefits: <strong>HPA</strong> auto-scales pods based on CPU/memory; <strong>Deployments</strong> simplify rolling updates and rollbacks; <strong>Services</strong> provide built-in load balancing; <strong>ReplicaSets</strong> maintain desired replica counts. Kubernetes addresses the full container orchestration lifecycle."},
{q:"When do we use a headless service in Kubernetes?",opts:["To enable load balancing for external traffic to a set of pods","To expose a single pod to external clients without a cluster IP","To allow direct access to individual pods without a load balancer or cluster IP","To automatically manage the scaling of pods in a deployment"],ans:2,tag:"Services",exp:"A <strong>Headless Service</strong> (clusterIP: None) returns the IPs of individual pods via DNS instead of a single virtual IP. Used for: StatefulSets where each pod needs a stable DNS entry, service discovery in databases (Cassandra, Elasticsearch) where clients need to connect to specific instances, or client-side load balancing."},
{q:"What is the primary difference between Stateless applications and StatefulSets in Kubernetes?",opts:["Stateless applications maintain no persistent data; StatefulSets manage persistent data across pod restarts","StatefulSets can only be used for frontend applications; Stateless is for backend applications","Stateless applications are always scaled up/down; StatefulSets require manual scaling","StatefulSets use load balancing; Stateless applications do not"],ans:0,tag:"StatefulSets",exp:"<strong>StatefulSets</strong> provide: stable persistent network identity (pod-0, pod-1), ordered deployment and scaling, and persistent storage that survives pod rescheduling. Ideal for databases (MySQL, Postgres), distributed systems (Kafka, ZooKeeper). Stateless apps (web servers) use Deployments as they don't need stable identity or persistent storage."},
{q:"If a pod is deleted in Kubernetes, where can you get the same name or record for the pod?",opts:["From Kubernetes event logs which keep history of all pod names","From the pod's ReplicaSet or Deployment, which can recreate the pod with the same name","From the Kubernetes service that manages the pod","You cannot get the same name or record once a pod is deleted"],ans:3,tag:"Pods",exp:"When a Deployment/ReplicaSet recreates a pod after deletion, the <strong>new pod gets a different generated name</strong> (e.g., nginx-deploy-7d9b-xk2lp vs the old nginx-deploy-7d9b-abc12). Pod names include a random suffix. <strong>StatefulSets</strong> are the exception — they maintain stable, predictable names (pod-0, pod-1) across restarts."},
{q:"Which service is used for direct pod-to-pod communication in Kubernetes?",opts:["ClusterIP Service","NodePort Service","LoadBalancer Service","Headless Service"],ans:0,tag:"Services",exp:"<strong>ClusterIP</strong> is the default service type for pod-to-pod communication within the cluster. It provides a stable virtual IP and DNS name (service-name.namespace.svc.cluster.local). kube-proxy handles the IP routing to the backend pods. No external access — ClusterIP is only reachable from within the cluster."},
{q:"In Kubernetes, if a pod created by a Deployment is deleted and a new pod is created, how does the Service connect to the new pod?",opts:["The Service connects using the pod's name; public access is through a LoadBalancer Service","The Service connects using a static IP; public access is through NodePort","The Service uses a selector to connect to the new pod; public access is through a ClusterIP Service","The Service cannot connect to the new pod; manual configuration is required"],ans:2,tag:"Services",exp:"<strong>Services use label selectors</strong> — not pod names or IPs. When a Deployment creates a new pod with the same labels, the Service's selector automatically includes the new pod in its endpoints. This is why labels are critical in Kubernetes: the Service's <code>selector: {app: myapp}</code> works regardless of which specific pod instance is running."},
{q:"If a node in a Kubernetes cluster has 2 volumes, is it recommended to use static host paths for pod storage?",opts:["Yes, static host paths provide better performance with multiple volumes","No, static host paths can lead to portability issues and are not suitable for production","Yes, using multiple volumes enhances redundancy","No, it complicates storage management in Kubernetes"],ans:1,tag:"Storage",exp:"<strong>HostPath volumes are not recommended for production</strong> because: pods tied to a specific node lose portability (if the pod reschedules to another node, the data is gone), they create tight coupling between application and infrastructure, they may expose sensitive host directories, and they don't work with multi-node HA setups. Use PersistentVolumes instead."},
{q:"If a node has multiple volumes defined in a PV YAML, how can a Pod use a specific volume?",opts:["By referencing the volume directly in the container's command","By specifying the PersistentVolumeClaim (PVC) in the Pod definition to bind to the desired PV","By creating an environment variable pointing to the volume","By manually copying data to the volume from outside the cluster"],ans:1,tag:"Storage",exp:"Pods use <strong>PersistentVolumeClaims (PVC)</strong> to request storage. The PVC specifies storage class, access mode, and size. Kubernetes binds the PVC to a matching PV. The pod mounts the PVC as a volume: <code>volumes: [{name: data, persistentVolumeClaim: {claimName: my-pvc}}]</code>"},
{q:"To avoid data inconsistency when using multiple replicas of a pod, which method should you implement?",opts:["Use StatefulSets to maintain stable identity and persistent storage for each replica","Use ReplicaSets with stateless applications to handle traffic evenly","Use NodePort services to expose each replica individually","Use LoadBalancer to direct traffic to any pod without consistency concern"],ans:0,tag:"StatefulSets",exp:"<strong>StatefulSets</strong> provide stable network identities and dedicated PersistentVolumes for each replica. In a database cluster, each pod gets its own storage (e.g., mysql-0 writes to pvc-0) preventing data conflicts. StatefulSets also support ordered deployment and headless services for stable DNS names used for replication coordination."},
{q:"To grant a user full permissions to a Kubernetes cluster, which resource should be used?",opts:["Kubernetes Role","Kubernetes ClusterRole","Kubernetes NetworkPolicy","Kubernetes ConfigMap"],ans:1,tag:"RBAC",exp:"<strong>ClusterRole</strong> grants permissions across all namespaces cluster-wide. Bind it to a user with a <strong>ClusterRoleBinding</strong>. The built-in <code>cluster-admin</code> ClusterRole grants full access. A regular <code>Role</code> is namespace-scoped. For full cluster access, always use ClusterRole + ClusterRoleBinding."},
{q:"To grant a user permissions for actions inside a specific Kubernetes namespace, which resource should be used?",opts:["Kubernetes Role","Kubernetes ClusterRole","Kubernetes NetworkPolicy","Kubernetes ConfigMap"],ans:0,tag:"RBAC",exp:"A <strong>Role</strong> grants permissions within a <strong>specific namespace</strong> only. Bind it to a user with a <strong>RoleBinding</strong>. Example: create a Role allowing <code>get, list, watch</code> on pods in the <code>dev</code> namespace, then bind it to the developer's user. This follows least-privilege principles for namespace-level access."},
{q:"What is the best way to scale a deployment in Kubernetes based on CPU utilization?",opts:["Manually edit the deployment YAML file","Use kubectl scale command","Set up a Horizontal Pod Autoscaler","Increase the node size in your cloud provider"],ans:2,tag:"Autoscaling",exp:"<strong>Horizontal Pod Autoscaler (HPA)</strong> automatically scales deployments based on CPU, memory, or custom metrics. Configure: <code>kubectl autoscale deployment myapp --cpu-percent=70 --min=2 --max=10</code>. HPA queries the Metrics Server every 15 seconds and adjusts replicas to keep the metric at the target value."},
{q:"When deploying an application that requires consistent data across replicas, which Kubernetes resource should you use?",opts:["ReplicaSet","StatefulSet","Deployment","Job"],ans:1,tag:"StatefulSets",exp:"<strong>StatefulSet</strong> ensures data consistency by providing each pod with its own stable PersistentVolume and stable network identity. Unlike Deployments (which treat all replicas as interchangeable), StatefulSets give each pod a unique, persistent identity — critical for databases, distributed storage systems, and any stateful workload."},
{q:"If you need to expose a service to the internet, which Kubernetes service type should you use?",opts:["ClusterIP","NodePort","LoadBalancer","Headless Service"],ans:2,tag:"Services",exp:"<strong>LoadBalancer</strong> service type provisions an external cloud load balancer (AWS ELB, GCP Load Balancer) that routes internet traffic to your pods. It provides a stable external IP. NodePort works for internet access but exposes non-standard ports. In production on cloud providers, LoadBalancer is the standard for internet-facing services."},
{q:"How can you secure sensitive information such as passwords in Kubernetes?",opts:["Store them in a ConfigMap","Store them in a plain text file","Use Kubernetes Secrets","Include them in the Deployment YAML file"],ans:2,tag:"Secrets",exp:"<strong>Kubernetes Secrets</strong> store sensitive data base64-encoded (not encrypted by default — enable etcd encryption for true security). For production, combine with: <strong>RBAC</strong> to restrict Secret access, <strong>etcd encryption at rest</strong>, and <strong>external secret managers</strong> (AWS Secrets Manager + External Secrets Operator, or HashiCorp Vault)."},
{q:"What command would you use to view the logs of a specific pod?",opts:["kubectl logs <pod-name>","kubectl get logs <pod-name>","kubectl view logs <pod-name>","kubectl show logs <pod-name>"],ans:0,tag:"kubectl",exp:"<code>kubectl logs &lt;pod-name&gt;</code> is the correct command. Useful flags: <code>-f</code> (follow/stream), <code>--previous</code> (last crashed container), <code>-c &lt;container&gt;</code> (specific container in multi-container pod), <code>--since=1h</code> (last hour). There is no <code>kubectl get logs</code>, <code>view logs</code>, or <code>show logs</code> command."},
{q:"How do you configure an Ingress with path-based routing for frontend (/app) and backend API (/api)?",opts:["Define multiple Ingress resources with different paths pointing to respective service backends","Utilize a single Ingress with wildcard path (/*) and configure paths using annotations","Implement a single Ingress with multiple paths (/app, /api) using path-based routing via the nginx ingress controller","Configure a single Ingress with wildcard path and leverage service discovery for routing"],ans:2,tag:"Ingress",exp:"A <strong>single Ingress</strong> with multiple path rules is standard: <code>rules[0].http.paths: [{path: /app, backend: frontend-svc}, {path: /api, backend: api-svc}]</code>. Using the nginx ingress controller with <code>pathType: Prefix</code> gives clean path-based routing without wildcards or multiple Ingress objects."},
{q:"If you want to run a batch job that completes and then stops, which resource should you use?",opts:["Deployment","StatefulSet","Job","ReplicaSet"],ans:2,tag:"Jobs",exp:"A <strong>Kubernetes Job</strong> runs one or more pods to completion and tracks their success. When the specified number of completions is reached, the Job is complete and no new pods are created. Use <code>CronJob</code> for scheduled/recurring batch jobs. Deployments keep pods running indefinitely — wrong for one-time tasks."},
{q:"Which command would you use to delete a deployment in Kubernetes?",opts:["kubectl remove deployment <name>","kubectl delete deployment <name>","kubectl destroy deployment <name>","kubectl terminate deployment <name>"],ans:1,tag:"kubectl",exp:"<code>kubectl delete deployment &lt;deployment-name&gt;</code> is the correct command. This also deletes the associated ReplicaSet and all pods managed by the Deployment. Other valid deletion approaches: <code>kubectl delete -f deployment.yaml</code> or <code>kubectl delete deploy myapp</code> (using the short resource alias)."},
{q:"What does a Kubernetes Service of type ClusterIP do?",opts:["Exposes the service to external traffic","Provides load balancing across pods","Exposes the service only within the cluster","Routes traffic to specific nodes only"],ans:2,tag:"Services",exp:"<strong>ClusterIP</strong> creates a virtual IP accessible <strong>only within the cluster</strong>. It load-balances traffic across matching pods (using kube-proxy iptables/IPVS rules) but is not reachable from outside the cluster. It's the default service type, ideal for internal microservice-to-microservice communication."},
{q:"What is the purpose of a Persistent Volume (PV) in Kubernetes?",opts:["To store temporary data","To define a storage resource that can be used by pods","To manage the network configuration","To define the deployment strategy for applications"],ans:1,tag:"Storage",exp:"A <strong>PersistentVolume (PV)</strong> represents a piece of storage (NFS, EBS, GCE PD, etc.) provisioned in the cluster. It exists as a cluster resource independent of any pod. Pods request PVs through <strong>PersistentVolumeClaims (PVC)</strong>. PVs can be statically created by admins or dynamically provisioned by StorageClasses."},
{q:"You are tasked with ensuring high availability for a critical application on Kubernetes. Which strategy should you adopt?",opts:["Deploy with a single replica across all nodes","Use StatefulSets to ensure data consistency","Deploy multiple replicas across multiple nodes and use a LoadBalancer service","Use a DaemonSet to run a copy on every node"],ans:2,tag:"High Availability",exp:"<strong>Multiple replicas across multiple nodes</strong> with a LoadBalancer service is the HA standard. Use <code>replicas: 3</code> in the Deployment, configure <strong>Pod Anti-Affinity</strong> to spread replicas across nodes/AZs, a LoadBalancer for external traffic, and a <strong>PodDisruptionBudget</strong> to protect against voluntary disruptions."},
{q:"You need to implement a continuous deployment pipeline for a microservices application. What Kubernetes resource manages traffic during updates?",opts:["Ingress","Deployment with rolling updates","Job","ReplicaSet"],ans:1,tag:"Deployment Strategies",exp:"<strong>Deployment with rolling update strategy</strong> manages zero-downtime deployments by gradually replacing old pods. Configure <code>strategy.rollingUpdate.maxUnavailable: 0</code> and <code>maxSurge: 1</code>. Combine with readiness probes to ensure only healthy new pods receive traffic. Ingress and GitOps tools (ArgoCD) complement this for full CD pipelines."},
{q:"To monitor resource usage across your Kubernetes cluster, which tool would you recommend?",opts:["Prometheus","Fluentd","Helm","Istio"],ans:0,tag:"Monitoring",exp:"<strong>Prometheus</strong> is the standard Kubernetes monitoring tool. Deploy with the <strong>kube-prometheus-stack</strong> Helm chart, which includes Prometheus (metrics collection), Alertmanager (alerting), and Grafana (visualization). Prometheus scrapes metrics from nodes, pods, and the Kubernetes API server using the <code>/metrics</code> endpoint."},
{q:"If you need to expose an application to the internet while managing SSL termination, which resource should you use?",opts:["NodePort Service","Ingress Controller with Ingress resource","ClusterIP Service","LoadBalancer Service without SSL configuration"],ans:1,tag:"Ingress",exp:"<strong>Ingress Controller</strong> (nginx, traefik, AWS ALB) with an <strong>Ingress resource</strong> handles SSL termination at the edge — decrypting HTTPS and forwarding HTTP to backend pods. Configure TLS with a Kubernetes Secret containing the certificate: <code>tls: [{hosts: [myapp.com], secretName: myapp-tls}]</code>"},
{q:"How do you configure an Ingress with hostname-based routing and SSL termination for multiple deployments?",opts:["Define multiple Ingress resources with different hostnames, each with a TLS secret","Use a single Ingress with multiple hostname rules and a wildcard TLS secret for all hostnames","Configure hostname routing within service definitions and use the API server for SSL termination","Implement a separate load balancer with hostname routing for SSL termination"],ans:0,tag:"Ingress",exp:"Separate <strong>Ingress resources per hostname</strong> with individual TLS Secrets is cleaner for multi-tenant setups. Each Ingress has its own TLS cert. Alternatively, use a single Ingress with multiple <code>rules</code> entries and <code>cert-manager</code> to auto-provision Let's Encrypt certificates. Wildcard certs work but require a wildcard TLS Secret."},
{q:"What is the best way to limit CPU and memory resources for a pod in Kubernetes?",opts:["Define ResourceQuota at namespace level","Use LimitRange to set default resource limits","Specify resource limits in the pod's specification","Use ClusterRole to restrict resource usage"],ans:2,tag:"Resource Management",exp:"<strong>Specifying resource requests and limits directly in the pod/container spec</strong> is the most precise approach: <code>resources: {requests: {cpu: '100m', memory: '128Mi'}, limits: {cpu: '500m', memory: '512Mi'}}</code>. ResourceQuota sets namespace-wide caps; LimitRange sets namespace defaults — both complement per-pod specifications."},
{q:"In a microservices architecture, how would you manage service-to-service communication securely in Kubernetes?",opts:["Use NodePort services for direct communication","Implement Istio for service mesh capabilities including security features","Configure NetworkPolicy to restrict traffic","Use Kubernetes Secrets for managing passwords"],ans:1,tag:"Service Mesh",exp:"<strong>Istio</strong> (or Linkerd) provides: <strong>mTLS</strong> for encrypted service-to-service communication, <strong>traffic policies</strong>, <strong>circuit breakers</strong>, <strong>observability</strong> (traces, metrics), and <strong>fine-grained authorization policies</strong>. NetworkPolicy provides L3/L4 control but not L7 features like mTLS, retries, or request-level access control."},
{q:"You need to ensure that certain pods are always scheduled on specific nodes. What feature would you use?",opts:["Node Affinity","Pod Anti-Affinity","Taints and Tolerations","ReplicaSet"],ans:0,tag:"Scheduling",exp:"<strong>Node Affinity</strong> uses labels on nodes to attract pods to specific nodes. Use <code>requiredDuringSchedulingIgnoredDuringExecution</code> for hard requirements or <code>preferredDuringScheduling</code> for soft preferences. Example: schedule ML workloads only on GPU nodes labelled <code>gpu=true</code>. NodeSelector is a simpler alternative for exact label matching."},
{q:"Your team needs centralized logging for all applications in the Kubernetes cluster. Which solution would you recommend?",opts:["Use a ConfigMap to manage log files","Deploy Fluentd or Logstash as DaemonSets to collect logs from all nodes","Store logs directly in a persistent volume","Use a Sidecar container to log data from each application pod"],ans:1,tag:"Logging",exp:"<strong>Fluentd or Logstash as DaemonSets</strong> is the standard pattern — one log collector per node reads pod logs from <code>/var/log/containers/*.log</code> and forwards to a centralized store (Elasticsearch, Loki, CloudWatch). DaemonSet ensures every node is covered. The EFK stack (Elasticsearch + Fluentd + Kibana) is the most common implementation."},
{q:"What is the best way to manage network policies restricting traffic between different applications?",opts:["Use Ingress resources to control traffic","Define NetworkPolicies for each application specifying allowed traffic","Use ClusterIP services for inter-application communication","Configure RBAC to restrict network access"],ans:1,tag:"Networking",exp:"<strong>NetworkPolicy per application</strong> is the correct approach. Follow a default-deny pattern: first apply a policy that denies all ingress/egress, then add specific allow rules per application. Example: allow only <code>app=frontend</code> to reach <code>app=backend</code> on port 8080. This implements microsegmentation for zero-trust networking."},
{q:"To ensure application resilience against node failures, which configuration should you implement?",opts:["Run all pods on a single node for simplicity","Use multiple replicas distributed across different nodes","Use a StatefulSet to manage pod identities","Configure a DaemonSet for redundancy"],ans:1,tag:"High Availability",exp:"<strong>Multiple replicas distributed across different nodes</strong> using <strong>Pod Anti-Affinity</strong> rules ensures that a single node failure doesn't take down the entire application. Use <code>topologySpreadConstraints</code> or pod anti-affinity with <code>topologyKey: kubernetes.io/hostname</code> to spread replicas across nodes and availability zones."},
{q:"You want to allow users to access your application without exposing it directly to the internet. Which approach is best?",opts:["Use a NodePort service","Set up an Ingress resource with authentication","Deploy a LoadBalancer service","Use ClusterIP service with port forwarding"],ans:1,tag:"Ingress",exp:"<strong>Ingress with authentication</strong> (using nginx ingress annotations for OAuth2/basic auth, or an external auth service) provides controlled access without direct internet exposure. The Ingress controller can integrate with identity providers (Okta, Keycloak) for authentication before routing to backend services — the standard enterprise pattern."},
{q:"How can you implement blue-green deployments in Kubernetes?",opts:["Use multiple namespaces for each version","Manage multiple deployments and switch the Ingress/Service to point to the new version","Use a StatefulSet to handle versions","Create a new ReplicaSet for each version"],ans:1,tag:"Deployment Strategies",exp:"<strong>Blue-Green</strong>: deploy v2 (green) alongside v1 (blue) with different labels. Both run simultaneously. Switch the <strong>Service selector</strong> from <code>version: blue</code> to <code>version: green</code> for instant cutover. If issues arise, switch back. Alternatively, update the Ingress to point to the green deployment's service."},
{q:"What strategy can you use to safely upgrade your application with zero downtime?",opts:["Use a Job to run the upgrade","Implement a rolling update strategy in your Deployment","Manually stop old pods before starting new ones","Increase the number of replicas during the upgrade process"],ans:1,tag:"Deployment Strategies",exp:"<strong>Rolling update strategy</strong> (Kubernetes default) replaces pods incrementally: starts a new pod, waits for its readiness probe to pass, then terminates an old pod. Configure <code>maxUnavailable: 0, maxSurge: 1</code> for strict zero-downtime. Combined with readiness probes and health checks, this ensures continuous availability throughout the update."},
{q:"When setting up a Kubernetes cluster on a cloud provider, which factor is critical for high availability?",opts:["The number of namespaces in the cluster","The geographic location of nodes","The type of container runtime used","The size of Kubernetes configuration files"],ans:1,tag:"High Availability",exp:"<strong>Geographic distribution of nodes</strong> across multiple Availability Zones (AZs) is critical for HA. A single AZ failure would take down a cluster with all nodes in one location. Distribute control plane nodes across 3 AZs and worker nodes across 2+ AZs. Use <code>topologySpreadConstraints</code> to spread application pods across AZs."},
{q:"Which method is best for managing configurations and environment variables for applications running in Kubernetes?",opts:["Use hard-coded values in application code","Store configurations in a ConfigMap","Place configuration files in a Persistent Volume","Use Secrets only for sensitive information"],ans:1,tag:"ConfigMaps",exp:"<strong>ConfigMaps</strong> decouple configuration from container images, following the 12-factor app principle. Store non-sensitive config (feature flags, app settings, connection strings) in ConfigMaps. Mount as environment variables or volume files. Use <strong>Secrets</strong> for sensitive data. This allows config changes without rebuilding images."},
{q:"You need to secure API access to your Kubernetes cluster. What is a recommended approach?",opts:["Use basic authentication for all API calls","Implement RBAC to manage permissions","Disable authentication to simplify access","Use a public IP for the API server without additional security"],ans:1,tag:"RBAC",exp:"<strong>RBAC (Role-Based Access Control)</strong> is the Kubernetes standard for API security. Grant only necessary permissions per user/service account. Combine with: <strong>audit logging</strong> (<code>--audit-policy-file</code>), <strong>TLS</strong> on the API server, <strong>network policies</strong> restricting API server access, and <strong>certificate-based authentication</strong> instead of basic auth (deprecated in K8s 1.19)."},
{q:"You need to design a multi-tenant Kubernetes cluster where different teams have isolated environments. What would you implement?",opts:["Use separate namespaces for each team with ResourceQuota and NetworkPolicy","Create multiple clusters, one for each team","Use a single namespace with labels to differentiate teams","Configure RBAC without namespaces"],ans:0,tag:"Multi-tenancy",exp:"<strong>Namespace per team</strong> with: <strong>ResourceQuota</strong> (limit CPU/memory/pods per team), <strong>NetworkPolicy</strong> (isolate team traffic), <strong>RBAC</strong> (team members can only access their namespace), and <strong>LimitRange</strong> (default resource limits). This is the standard soft multi-tenancy pattern. For hard tenancy, use separate clusters."},
{q:"You need an application with dynamic scaling based on incoming traffic. Which Kubernetes feature should you use?",opts:["Deployments with manual scaling","Horizontal Pod Autoscaler (HPA)","StatefulSets to manage stateful applications","Cluster Autoscaler to manage node scaling"],ans:1,tag:"Autoscaling",exp:"<strong>HPA</strong> scales pods based on traffic-driven metrics. For HTTP traffic, use KEDA (Kubernetes Event-Driven Autoscaling) with metrics from Prometheus (requests/second) or message queue depth. HPA with <code>scaleTargetRef: Deployment</code> and custom metrics from the Metrics Server/Prometheus Adapter handles traffic-based scaling automatically."},
{q:"If you need to ensure that a Pod can always access a specific storage volume, which type should you use?",opts:["EmptyDir","HostPath","PersistentVolume","ConfigMap"],ans:2,tag:"Storage",exp:"<strong>PersistentVolume (PV)</strong> with a <strong>PersistentVolumeClaim (PVC)</strong> survives pod restarts and rescheduling. EmptyDir is ephemeral (deleted with the pod). HostPath is node-specific (not portable). ConfigMap stores configuration, not application data. PV + PVC is the only option that guarantees data persistence independent of pod lifecycle."},
{q:"Regarding pre-startup and post-startup hooks during a rolling update with multi-container pods — which statement is correct?",opts:["Pre-startup hooks run on all containers before any container stops; post-startup hooks run on all new containers after they start","Pre-startup hooks run only on new replicas before they start; post-startup hooks run only on the new container after the old one stops","Pre-startup hooks run on all containers including the old one being replaced; post-startup hooks run on all containers including the old one","The order of pre-startup and post-startup hooks cannot be guaranteed during a rolling update with multi-container pods"],ans:1,tag:"Probes & Hooks",exp:"During rolling updates: <strong>PreStop hooks</strong> run on the old pod before it's terminated (for graceful shutdown). <strong>PostStart hooks</strong> run on the new container immediately after it starts. In a rolling update, old pod terminates while new pod starts — hooks run per-container on each respective pod, not globally across all containers."},
{q:"Regarding event and log scopes in Kubernetes — which statement is correct?",opts:["Namespaced events are visible only within the namespace; cluster-level events are visible across all namespaces","Pod logs are always namespaced; events can be both namespaced and cluster-level","Cluster-level logs provide cluster-wide information; namespaced logs are specific to pods in a namespace","kubectl commands display only namespaced events by default; additional flags needed for cluster-level events"],ans:0,tag:"Observability",exp:"<strong>Kubernetes events are namespaced</strong> — <code>kubectl get events -n myapp</code> shows only that namespace's events. <code>kubectl get events --all-namespaces</code> shows all. <strong>Pod logs</strong> are always namespaced (accessed via <code>kubectl logs -n namespace pod</code>). Some cluster-level events (node events) appear in the <code>default</code> namespace."},
{q:"What is the primary function of the Kubernetes Scheduler?",opts:["To manage network policies","To allocate resources to Pods","To monitor cluster health","To store configuration data"],ans:1,tag:"Architecture",exp:"The <strong>kube-scheduler</strong> watches for newly created pods with no assigned node and selects the best node for them to run on. It considers: resource availability (CPU/memory), node affinity/anti-affinity rules, taints/tolerations, pod topology spread constraints, and custom scheduling policies. etcd stores config; controller-manager manages cluster state."},
{q:"If you want to ensure a Pod is not scheduled on the same node as another specific Pod, which feature should you use?",opts:["NodeSelector","Pod Anti-Affinity","Taints and Tolerations","Resource Limits"],ans:1,tag:"Scheduling",exp:"<strong>Pod Anti-Affinity</strong> prevents pods from co-locating on the same node. Use <code>podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution</code> with <code>topologyKey: kubernetes.io/hostname</code> and a <code>labelSelector</code> matching the target pod. Critical for HA — spread replicas across nodes to prevent single-node failures from taking down all instances."},
{q:"Which approach offers more flexibility for implementing external authentication mechanisms like OAuth or API keys?",opts:["NodePort Service allows direct internet access making external auth challenging","Ingress can integrate with external authentication providers before routing to backend services","Both NodePort and Ingress offer the same level of external access control","NodePort can be secured with network security policies within the cluster"],ans:1,tag:"Ingress",exp:"<strong>Ingress controllers</strong> (nginx, traefik) support external authentication via: annotations (<code>nginx.ingress.kubernetes.io/auth-url</code>), OAuth2 proxy sidecars, JWT validation, and API key validation. This allows authentication enforcement at the edge before requests reach backend services — centralized auth without modifying application code."},
{q:"How does Kubernetes handle scheduling of Pods when there are insufficient resources on any node?",opts:["It retries indefinitely","It moves the Pods to another cluster","It leaves the Pods in a Pending state","It automatically scales the cluster"],ans:2,tag:"Scheduling",exp:"When no node has sufficient resources, pods remain in <strong>Pending state</strong> with the event: <code>0/3 nodes are available: 3 Insufficient cpu</code>. The scheduler continuously retries. To auto-resolve this, use the <strong>Cluster Autoscaler</strong> which adds new nodes when pending pods cannot be scheduled due to resource constraints."},
{q:"Which of the following best describes Helm in the Kubernetes ecosystem?",opts:["A logging tool","A package manager for Kubernetes","A monitoring solution","A service mesh"],ans:1,tag:"Helm",exp:"<strong>Helm</strong> is the package manager for Kubernetes — it packages, configures, and deploys complex Kubernetes applications as <strong>charts</strong>. A chart bundles all related Kubernetes manifests with templating. Key commands: <code>helm install</code>, <code>helm upgrade</code>, <code>helm rollback</code>, <code>helm repo add</code>. Think of it as apt/yum for Kubernetes."},
{q:"In Argo CD, what is a 'GitOps' approach?",opts:["Using Git as version control for container images","Managing application configurations and deployments via Git repositories","Automating the build process in Git","Managing Kubernetes cluster nodes through Git"],ans:1,tag:"ArgoCD",exp:"<strong>GitOps</strong> uses Git as the single source of truth for infrastructure and application state. <strong>ArgoCD</strong> continuously syncs your cluster to match the desired state in Git. Any drift (manual changes) is detected and can be auto-corrected. Changes go through Git PRs — providing audit trail, review, and rollback via <code>git revert</code>."},
{q:"Which of the following is a key feature of Helm?",opts:["Automated rollbacks","Self-healing capabilities","Node auto-scaling","Load balancing"],ans:0,tag:"Helm",exp:"<strong>Helm supports rollbacks</strong>: <code>helm rollback my-release 1</code> rolls back to a previous revision. Helm maintains a release history in Kubernetes Secrets. This makes it easy to revert failed upgrades. Self-healing is a Kubernetes Deployment feature, not Helm. Node auto-scaling is the Cluster Autoscaler's job."},
{q:"In Argo CD, what is the purpose of an ApplicationSet?",opts:["To manage multiple applications with a single configuration","To define a single application deployment","To automate the creation of multiple applications based on a template","To set resource limits for applications"],ans:2,tag:"ArgoCD",exp:"<strong>ApplicationSet</strong> automates the creation of ArgoCD Applications from a template — enabling patterns like: one app per cluster, one app per namespace, or one app per Git directory. A single ApplicationSet can generate dozens of ArgoCD Applications dynamically, ideal for multi-cluster and multi-environment GitOps at scale."},
{q:"In a GitOps workflow with Argo CD, how do you ensure sensitive information is managed securely?",opts:["Store secrets in plain text in Git","Use Kubernetes Secrets and Helm Secrets","Encrypt the entire repository","Avoid using secrets altogether"],ans:1,tag:"ArgoCD",exp:"<strong>Helm Secrets</strong> (using SOPS or age encryption) encrypts secret values in Git, decrypting at deployment time. Combine with <strong>Kubernetes Secrets</strong> for runtime storage. Other options: <strong>Sealed Secrets</strong> (encrypt secrets, safe to store in Git), <strong>External Secrets Operator</strong> (pull from AWS Secrets Manager/Vault), or <strong>Vault Agent Injector</strong>."},
{q:"What strategy can be used in Argo CD to manage different environments (dev, staging, production) for the same application?",opts:["Multiple Git repositories","Different Helm values files","Kustomize overlays","All of the above"],ans:3,tag:"ArgoCD",exp:"<strong>All three approaches work</strong> in ArgoCD: <strong>Multiple repos</strong> (separate repo per env), <strong>Helm values files</strong> (<code>values-dev.yaml</code>, <code>values-prod.yaml</code>), <strong>Kustomize overlays</strong> (base + environment-specific patches). Kustomize overlays are popular in GitOps — a base config with per-environment patches for replica counts, resource limits, and image tags."},
{q:"What is the primary purpose of Prometheus?",opts:["Data visualization","Time-series data monitoring and alerting","Log management","Network performance analysis"],ans:1,tag:"Monitoring",exp:"<strong>Prometheus</strong> scrapes and stores <strong>time-series metrics</strong> — numerical measurements over time (CPU usage, request rates, error counts). It supports <strong>alerting rules</strong> via Alertmanager (PagerDuty, Slack, email). Grafana handles visualization. Fluentd/EFK handles logs. Prometheus does not store logs — only numeric metrics."},
{q:"Which data source type is Grafana primarily used to visualize?",opts:["SQL databases","Time-series databases","NoSQL databases","Flat files"],ans:1,tag:"Monitoring",exp:"<strong>Grafana</strong> is optimized for visualizing <strong>time-series data</strong> from sources like Prometheus, InfluxDB, and Graphite. It also supports SQL databases (PostgreSQL, MySQL), Loki (logs), Elasticsearch, and CloudWatch. The primary use case is infrastructure and application metrics dashboards built on time-series databases."},
{q:"How to design PodDisruptionBudgets for a multi-tier application with dependent deployments?",opts:["Configure separate PDBs for each deployment tier with appropriate disruption budgets, considering the dependency chain","Implement a single PDB for the entire application with restrictive disruption budget to minimize downtime across all tiers","Design PDBs with pod anti-affinity across tiers to prevent dependent pods on same nodes, mitigating cascading failures","Utilize chaos engineering tools to simulate disruptions and inform PDB strategies"],ans:0,tag:"PodDisruptionBudget",exp:"<strong>Separate PDBs per tier</strong> is correct: the database tier needs <code>minAvailable: 2</code> (stricter), the backend can have <code>maxUnavailable: 1</code>, and the frontend may tolerate <code>maxUnavailable: 2</code>. Consider the dependency chain — if the DB tier has a strict PDB, the backend should also be protected to prevent cascading unavailability during node drains."},
{q:"In Prometheus, what is a 'metric'?",opts:["A collection of logs","A numerical value that represents data over time","A type of alert","A data visualization technique"],ans:1,tag:"Monitoring",exp:"A Prometheus <strong>metric</strong> is a named, time-stamped numerical measurement. Prometheus has four metric types: <strong>Counter</strong> (monotonically increasing, e.g., request count), <strong>Gauge</strong> (can go up/down, e.g., memory usage), <strong>Histogram</strong> (distributions, e.g., request latency), and <strong>Summary</strong> (calculated quantiles). Metrics are labeled for multi-dimensional analysis."},
{q:"What is the role of a Prometheus Exporter?",opts:["To scrape metrics from Prometheus","To expose metrics from third-party systems","To visualize data in Grafana","To send alerts"],ans:1,tag:"Monitoring",exp:"A <strong>Prometheus Exporter</strong> converts third-party system metrics into the Prometheus format. Examples: <strong>node_exporter</strong> exposes Linux OS metrics, <strong>blackbox_exporter</strong> probes endpoints, <strong>mysql_exporter</strong> exposes MySQL metrics. Exporters run alongside the target system and expose a <code>/metrics</code> HTTP endpoint that Prometheus scrapes."},
{q:"How can you customize a Grafana dashboard?",opts:["By writing custom SQL queries","By using different visualization panels and layouts","By configuring Prometheus directly","By adjusting server settings"],ans:1,tag:"Monitoring",exp:"<strong>Grafana dashboards</strong> are customized using: different <strong>panel types</strong> (time series, bar chart, gauge, table, heatmap), <strong>PromQL queries</strong> for panel data sources, <strong>variables</strong> for dynamic filtering, <strong>row layouts</strong> and sizing, <strong>thresholds</strong> for color-coded alerts, and <strong>annotations</strong> for event markers. Dashboards can be exported/imported as JSON."},
{q:"What does EFK stand for in the context of logging in Kubernetes?",opts:["Elasticsearch, Fluentd, Kibana","Elasticsearch, Fluent, Kube","Elastic, Fluent, Kinesis","Elastic, Fluentd, Kubernetes"],ans:0,tag:"Logging",exp:"<strong>EFK = Elasticsearch + Fluentd + Kibana</strong>. Fluentd (DaemonSet on every node) collects and forwards pod logs → Elasticsearch stores and indexes the logs → Kibana provides search, visualization, and dashboards. An alternative is the <strong>ELK stack</strong> (Logstash instead of Fluentd) or the modern <strong>PLG stack</strong> (Promtail + Loki + Grafana)."},
{q:"Which of the following statements about Kubernetes API objects is true?",opts:["All API objects are stateless","API objects are only created at cluster initialization","API objects can be modified and deleted after creation","API objects cannot be versioned"],ans:2,tag:"Architecture",exp:"<strong>Kubernetes API objects are mutable</strong> — they can be created, read, updated, and deleted (CRUD) via <code>kubectl</code> or the API. They are versioned (apiVersion: apps/v1, networking.k8s.io/v1). They are stored in <strong>etcd</strong> (stateful). Changes to objects (like updating a Deployment) are reconciled by the appropriate controller."},
{q:"Which Kubernetes resource ensures a Pod is not scheduled on a node if it fails a health check?",opts:["PodDisruptionBudget","Taints and Tolerations","Pod Affinity","Readiness Probe"],ans:3,tag:"Probes & Hooks",exp:"A <strong>Readiness Probe</strong> determines if a pod is ready to receive traffic. If it fails, the pod is removed from the Service's endpoints (no traffic). Combined with a Deployment's rolling update, pods that fail readiness checks won't receive traffic. For node-level health, the Node Controller taints unhealthy nodes to prevent new scheduling."},
{q:"What is the primary function of the Kubernetes Controller Manager?",opts:["To manage network traffic","To schedule Pods onto nodes","To regulate the state of the cluster and manage controllers","To expose the API server"],ans:2,tag:"Architecture",exp:"The <strong>kube-controller-manager</strong> runs all built-in control loops: <strong>ReplicaSet controller</strong> (maintains desired pod count), <strong>Deployment controller</strong> (manages rollouts), <strong>Node controller</strong> (responds to node failures), <strong>Job controller</strong>, <strong>Service Account controller</strong>, etc. Each controller watches the API server and works to match current state to desired state."},
{q:"Which storage class allows dynamic provisioning of persistent volumes in Kubernetes?",opts:["Standard","NFS","EmptyDir","PersistentVolumeClaim"],ans:0,tag:"Storage",exp:"<strong>StorageClass</strong> (the 'Standard' class in many cloud providers) enables <strong>dynamic provisioning</strong> — PVs are automatically created when a PVC is submitted. Cloud StorageClasses (gp2 for AWS EBS, standard for GKE) provision volumes on-demand. EmptyDir is not a StorageClass; PVC is a request for storage; NFS requires a provisioner to be dynamic."},
{q:"Which Kubernetes feature allows you to define the order in which Pods should be scheduled?",opts:["Priority Classes","Pod Affinity","Pod Disruption Budget","Taints and Tolerations"],ans:0,tag:"Scheduling",exp:"<strong>PriorityClasses</strong> assign a priority value to pods. The scheduler places higher-priority pods first, and can <strong>preempt</strong> (evict) lower-priority pods to make room for higher-priority ones. Define with <code>PriorityClass</code> resource and reference in pod spec: <code>priorityClassName: high-priority</code>. Critical for ensuring system-critical pods are scheduled before user workloads."},
{q:"What is a common drawback of using a HostPath volume in Kubernetes?",opts:["It requires elevated privileges","It is ephemeral by nature","It cannot be shared across nodes","It does not support read/write permissions"],ans:2,tag:"Storage",exp:"<strong>HostPath volumes are node-specific</strong> — they mount a directory from the host node's filesystem. If a pod reschedules to a different node, it cannot access the data from the original node. This breaks portability and makes HostPath unsuitable for replicated workloads. It also poses security risks (access to host directories) and is not recommended for production."},
{q:"Which of the following best describes Kubernetes Network Policies?",opts:["Used to define resource limits for Pods","Enable fine-grained control over network traffic between Pods","Automatically load balance traffic across Pods","Used to monitor cluster performance"],ans:1,tag:"Networking",exp:"<strong>NetworkPolicy</strong> provides L3/L4 traffic control between pods using: <strong>podSelector</strong> (target pods), <strong>ingress rules</strong> (incoming traffic sources), <strong>egress rules</strong> (outgoing traffic destinations), and <strong>namespaceSelector</strong> (cross-namespace rules). They don't balance load (that's Services) or monitor (that's Prometheus). Enforcement requires a CNI that supports NetworkPolicy (Calico, Cilium)."},
{q:"What is the function of the Kubernetes kube-proxy?",opts:["To manage container images","To route network traffic to the appropriate Pods","To monitor resource usage","To manage cluster upgrades"],ans:1,tag:"Architecture",exp:"<strong>kube-proxy</strong> runs on every node and implements Kubernetes Services by maintaining network rules (iptables or IPVS) that route traffic to the correct pod endpoints. When you access a Service ClusterIP, kube-proxy's rules redirect the traffic to one of the backend pod IPs. In modern setups, eBPF-based alternatives (Cilium) can replace kube-proxy entirely."},
{q:"In a Kubernetes cluster, what happens when a node goes down?",opts:["All Pods on that node are immediately deleted","The Pods are rescheduled on other available nodes","The cluster enters a read-only state","There is no effect on the cluster"],ans:1,tag:"Architecture",exp:"When a node becomes unreachable, the <strong>Node Controller</strong> waits for the <code>node-monitor-grace-period</code> (default 40s), then marks it as <strong>NotReady</strong>. After <code>pod-eviction-timeout</code> (default 5min), pods are evicted and <strong>rescheduled on healthy nodes</strong> by the ReplicaSet controller (for Deployment-managed pods). Bare (un-managed) pods are not rescheduled."}
];

let questions = [];
let current = 0, score = 0, timeLeft = 4800; // 80 Mins
let answered = [];
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('k8sMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            // Force 80 min update if old cache exists
            timeLeft = (data.timeLeft === 3600 || data.timeLeft === 6000) ? 4800 : data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: q.tag || "K8S_NODE"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 4800;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('k8sMasteryCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 300) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/${questions.length}`;

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-meta"><span class="q-num">K8S: Q- ${current+1}</span></div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 99) ? "FINISH CLUSTER AUDIT ✓" : "NEXT NODE →";
    
    // Build Navigation Grid
    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 99) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('k8sMasteryCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 100`;
}

function retryQuiz() { localStorage.removeItem('k8sMasteryCache_v2'); location.reload(); }
initQuiz();
</script>
