

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#3b82f6;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#3b82f6,#60a5fa,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 800px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 950px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:850px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(59, 130, 246, 0.05)}
.option.disabled{cursor:default}

.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(59, 130, 246, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>

<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="overall-test.html">← Back to Dashboard</a>
</div>

<header>
    <div class="topic-badge">AWS_CLOUD_EXAM_MOCK</div>
    <h1>Comprehensive AWS Mock</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">80:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/140</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>

</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Global Infrastructure Audit</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Solution Architect evaluation verified. Region state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_MOCK_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  // ── EC2 (15 questions) ──
  {topic:"EC2",q:"You are running a web application on an EC2 instance. The traffic to your application has increased significantly. What is the best way to handle this increase in traffic?",opts:["Increase the instance storage","Upgrade to a larger instance type","Use an Auto Scaling group to add more instances","Enable Enhanced Networking"],ans:2,exp:"Auto Scaling automatically adjusts the number of EC2 instances based on demand, providing both scalability and cost efficiency."},
  {topic:"EC2",q:"Your company runs a high-performance application that requires consistent IOPS for its database hosted on EC2. Which storage option should you use?",opts:["General Purpose SSD (gp3)","Throughput Optimized HDD (st1)","Provisioned IOPS SSD (io2)","Cold HDD (sc1)"],ans:2,exp:"Provisioned IOPS SSD (io2) provides consistent, high IOPS performance for I/O-intensive workloads like databases."},
  {topic:"EC2",q:"If your application requires large amounts of memory for high-performance databases or in-memory analytics, which instance type is most suitable?",opts:["Compute Optimized Instances (C instances)","General Purpose Instances (M instances)","Memory Optimized Instances (R or X instances)","Accelerated Computing Instances (P instances)"],ans:2,exp:"Memory Optimized instances (R, X series) provide high memory-to-CPU ratios for in-memory databases and analytics."},
  {topic:"EC2",q:"How does Amazon EC2 Auto Scaling respond during a sudden increase in traffic?",opts:["Automatically increases the number of instances based on defined policies","Terminates all existing instances and creates new ones","Sends an alert without changing the number of instances","Reduces the number of instances to conserve resources"],ans:0,exp:"Auto Scaling scales out by launching new instances when scaling triggers are met, based on CloudWatch metrics."},
  {topic:"EC2",q:"What is a common way to configure Amazon EC2 Auto Scaling to handle periods of high and low traffic automatically?",opts:["Use Scheduled Scaling to increase instances during peak hours and reduce during off-hours","Manually start and stop instances based on estimated traffic","Set up only the minimum instance count","Disable the Auto Scaling Group during low traffic"],ans:0,exp:"Scheduled Scaling is ideal for predictable traffic patterns, automatically adjusting capacity on a timetable."},
  {topic:"EC2",q:"What is a key purpose of a multi-tier architecture on Amazon EC2?",opts:["To increase the storage capacity of EC2 instances","To separate different layers of an application for better performance, scalability, and security","To enable automatic backup of all application data","To reduce the cost of deploying applications on AWS"],ans:1,exp:"Multi-tier architecture separates presentation, application, and data layers for independent scaling, security, and maintenance."},
  {topic:"EC2",q:"Which of the following is NOT a typical component included in an Amazon Machine Image (AMI)?",opts:["Operating system","Application software","Networking configuration for a VPC","Application server configuration"],ans:2,exp:"AMIs include OS, application software, and server configuration, but not VPC-level networking settings which are defined separately."},
  {topic:"EC2",q:"What is a primary difference between Dedicated Hosts and Dedicated Instances?",opts:["Only Dedicated Instances allow BYOL licensing","Only Dedicated Hosts provide control over physical host-level configurations","Dedicated Instances provide control over hardware but not billing","Dedicated Hosts are automatically assigned to multiple users"],ans:1,exp:"Dedicated Hosts give you visibility and control over the physical server, useful for software licensing bound to hardware (BYOL)."},
  {topic:"EC2",q:"You will be launching and terminating EC2 instances on a need basis. You need to run some shell scripts when the instance is getting launched. Which options allow performing tasks during launch? (choose multiple)",opts:["Use Instance user data for shell scripts","Use Instance metadata for shell scripts","Use AutoScaling Group lifecycle hooks and trigger AWS Lambda function through CloudWatch events","Use Placement Groups and set InstanceLaunch state to trigger AWS Lambda functions"],ans:0,exp:"User Data runs scripts at instance launch. Lifecycle hooks with Lambda is also valid for ASG events. Instance metadata is read-only instance info."},
  {topic:"EC2",q:"You are planning to build a fleet of EBS-optimized EC2 instances. Your organization wants you to encrypt root volumes used to boot the instances. How can this be achieved?",opts:["Select the Encryption option for the root EBS volume while launching the EC2 instance","Once launched, encrypt the root volume using AWS KMS Master Key","Root volumes cannot be encrypted","Launch an unencrypted EC2 instance, snapshot it, make an encrypted copy of the snapshot, create AMI from encrypted snapshot, use that AMI"],ans:0,exp:"You can encrypt the root EBS volume when launching a new EC2 instance by selecting the encryption option in the storage configuration."},
  {topic:"EC2",q:"A company relies on an application that needs at least 4 EC2 instances during regular traffic and must scale up to 12 during peak loads. The application must be highly available. Which solution meets these requirements?",opts:["Auto Scaling group: min=4, max=12, 2 in AZ-A and 2 in AZ-B","Auto Scaling group: min=4, max=12, all 4 in AZ-A","Auto Scaling group: min=8, max=12, 4 in AZ-A and 4 in AZ-B","Auto Scaling group: min=8, max=12, all 8 in AZ-A"],ans:2,exp:"Setting min=8 ensures at least 4 instances per AZ during failures (high availability). Distributing across 2 AZs ensures resilience."},
  {topic:"EC2",q:"You want to launch new EC2 instances quickly with your application's environment already set up. Which approach achieves this?",opts:["Use an AMI (Amazon Machine Image) to create a custom image with your application setup and launch new instances from this AMI","Install the application manually each time you launch a new EC2 instance","Use an EBS snapshot to create a custom AMI for faster provisioning","Use an EBS volume as the root volume for all EC2 instances and manually mount it on startup"],ans:0,exp:"Custom AMIs capture your entire application environment so new instances launch pre-configured without manual setup."},
  {topic:"EC2",q:"You've set up Auto Scaling for your EC2 instances behind an ALB. One EC2 instance fails unexpectedly. What is the expected behavior of the Auto Scaling group?",opts:["Auto Scaling will launch a new EC2 instance to replace the failed one to maintain the desired number","Auto Scaling will attempt to restart the failed instance without launching a new one","The ALB will route traffic to remaining healthy instances and Auto Scaling will not be triggered","The failed instance will automatically be replaced by the Elastic Load Balancer"],ans:0,exp:"Auto Scaling monitors instance health. When an instance fails, it terminates it and launches a new one to maintain the desired count."},
  {topic:"EC2",q:"You need to create a backup of your EC2 instance's data for disaster recovery. Which AWS service should you use?",opts:["Use AWS Backup to create backups and store them in S3","Create an AMI of the instance to back up the entire system including EBS volumes","Create an EBS snapshot of the volume to back up the data","Manually copy the EBS volume data to an S3 bucket"],ans:2,exp:"EBS snapshots are the standard way to backup EBS volumes. They are stored in S3 incrementally and can restore volumes."},
  {topic:"EC2",q:"You need to run a custom script before terminating an EC2 instance in an Auto Scaling group. What should you use?",opts:["Instance Refresh","Lifecycle Hooks","Step Scaling","CloudWatch Alarms"],ans:1,exp:"Lifecycle Hooks allow you to pause instance transitions (launch/terminate) in Auto Scaling groups to perform custom actions."},

  // ── S3 (12 questions) ──
  {topic:"S3",q:"Company salespeople upload their sales figures daily. A Solutions Architect needs a durable storage solution that protects against users accidentally deleting important documents. Which action will protect against unintended user actions?",opts:["Store data in an EBS volume and create snapshots once a week","Store data in an S3 bucket and enable versioning","Store data in two S3 buckets in different AWS regions","Store data on EC2 instance storage"],ans:1,exp:"S3 versioning preserves, retrieves, and restores every version of every object, protecting against accidental deletions."},
  {topic:"S3",q:"An application saves the logs to an S3 bucket. A user wants to keep the logs for one month for troubleshooting purposes, and then purge the logs. What feature will enable this?",opts:["Adding a bucket policy on the S3 bucket","Configuring lifecycle configuration rules on the S3 bucket","Creating an IAM policy for the S3 bucket","Enabling CORS on the S3 bucket"],ans:1,exp:"S3 Lifecycle rules automate transitioning or expiring objects based on their age."},
  {topic:"S3",q:"A company is planning to use Amazon S3 to store images. The images must be encrypted at rest. The company wants to control who can access those keys but does not want to manage key rotation. What should they use?",opts:["Server-Side Encryption with keys stored in an S3 bucket","Server-Side Encryption with Customer-Provided Keys (SSE-C)","Server-Side Encryption with Amazon S3-Managed Keys (SSE-S3)","Server-Side Encryption with AWS KMS-Managed Keys (SSE-KMS)"],ans:3,exp:"SSE-KMS uses AWS KMS to manage keys, allowing access control via IAM/KMS policies. AWS handles key rotation automatically."},
  {topic:"S3",q:"A marketing company is storing CSV files in an S3 bucket. An EC2 instance needs permission to efficiently process the CSV data. Which action will MOST securely grant the EC2 instance access?",opts:["Attach a resource-based policy to the S3 bucket","Create an IAM user for the application with specific permissions to the S3 bucket","Associate an IAM role with least privilege permissions to the EC2 instance profile","Store AWS credentials directly on the EC2 instance for applications to use"],ans:2,exp:"IAM roles attached to EC2 instance profiles provide temporary credentials automatically. Never hard-code credentials on instances."},
  {topic:"S3",q:"A development team needs to host a website with HTML, CSS, client-side JavaScript, and images. Which method is the MOST cost-effective for hosting the website?",opts:["Containerize the website and host it in AWS Fargate","Create an Amazon S3 bucket and host the website there","Deploy a web server on an Amazon EC2 instance","Configure an Application Load Balancer with an AWS Lambda target"],ans:1,exp:"S3 static website hosting is the most cost-effective solution for static content — no servers to manage."},
  {topic:"S3",q:"A company hosts a static website within an S3 bucket. A employee needs to ensure that data can be recovered in case of accidental deletion. Which action will accomplish this?",opts:["Enable Amazon S3 versioning","Enable Amazon S3 Intelligent-Tiering","Enable an Amazon S3 lifecycle policy","Enable Amazon S3 cross-Region replication"],ans:0,exp:"S3 versioning keeps all versions of objects, allowing recovery of accidentally deleted or overwritten objects."},
  {topic:"S3",q:"The drug research team stores highly sensitive data in Amazon S3. They want to use their own encryption key but don't want to write code for encryption/decryption, and they want to be responsible for storing the key. Which encryption type suits this?",opts:["Server-side encryption with customer-provided encryption keys (SSE-C)","Server-Side Encryption with Amazon S3-Managed Keys (SSE-S3)","Server-Side Encryption with KMS keys (SSE-KMS)","Client-Side Encryption"],ans:0,exp:"SSE-C allows you to provide your own encryption key with each request. S3 handles encryption/decryption but never stores the key."},
  {topic:"S3",q:"How can you restrict access to your S3 bucket to specific IP ranges/addresses? Which type of policy will you use?",opts:["Use a Role-based policy to allow access only to specific IP ranges","Use a Service-based policy to configure IP restrictions on the S3 service","Use a Custom policy to define access based on IP address conditions","Use an Inline policy attached to a user or role for IP-based restrictions"],ans:2,exp:"An S3 bucket policy with aws:SourceIp condition key restricts access to specific IP ranges/addresses."},
  {topic:"S3",q:"You want to host a static website on Amazon S3. You configure the bucket for static website hosting, but when you try to access the site, you get a 403 (Forbidden) error. What might be the issue?",opts:["The bucket does not have an SSL certificate","The bucket policy does not allow public access","Static website hosting only works with CloudFront","The DNS configuration is incorrect"],ans:1,exp:"403 on S3 static websites usually means the bucket policy doesn't allow s3:GetObject for everyone (public-read access)."},
  {topic:"S3",q:"You have an S3 bucket storing backup data that becomes infrequently accessed after a month. You want to reduce storage costs by transitioning objects to S3 Glacier after 30 days. How?",opts:["Enable S3 Transfer Acceleration to move data to Glacier","Create an S3 Lifecycle policy that transitions objects to Glacier storage class after 30 days","Use CloudWatch to monitor access frequency of objects and move them manually","Set the Delete lifecycle policy to delete objects after 30 days"],ans:1,exp:"S3 Lifecycle policies automate transitioning objects between storage classes based on age — perfect for moving infrequently accessed data to Glacier."},
  {topic:"S3",q:"You want to restrict access to your S3 bucket so that only a specific IAM user has permission to upload and download objects. Which method is most appropriate?",opts:["Use an S3 bucket policy that grants permission only to the specific IAM user","Use an IAM policy attached to the IAM user that grants access to the S3 bucket","Configure S3 ACLs to give the IAM user full permissions on the bucket","Use AWS Lambda to manage access and permissions to the S3 bucket"],ans:0,exp:"An S3 bucket policy with the specific IAM user's ARN as the principal is the most direct and appropriate way to restrict bucket access."},
  {topic:"S3",q:"Who can delete objects in an S3 bucket with versioning enabled?",opts:["Anyone with IAM permissions to modify the bucket","Anyone with IAM permissions to delete objects in the bucket","Only the bucket owner","Once versioning is enabled, no object can ever be completely removed"],ans:1,exp:"Any user with s3:DeleteObject permission can delete (add a delete marker to) versioned objects. Complete deletion requires s3:DeleteObjectVersion."},

  // ── VPC (12 questions) ──
  {topic:"VPC",q:"Your EC2 instance needs to download data from an S3 bucket in the same region without incurring internet data transfer charges. What should you do?",opts:["Attach an Elastic IP to the instance","Use a NAT Gateway","Use a VPC Endpoint for S3","Assign a public IP to the instance"],ans:2,exp:"VPC Gateway Endpoints for S3 route traffic through AWS's private network, avoiding internet data transfer charges."},
  {topic:"VPC",q:"You have a public-facing web application hosted on EC2 instances in a VPC. Which combination of components is required to make the application accessible to the internet? (Select two)",opts:["Internet Gateway","NAT Gateway","Public Subnet","Elastic Load Balancer","Private IP address"],ans:0,exp:"An Internet Gateway and Public Subnet are required. The IGW attaches to the VPC and the public subnet's route table must have a route to the IGW."},
  {topic:"VPC",q:"You have created a VPC with public and private subnets. How do you ensure that only EC2 instances in the public subnet can be accessed from the internet?",opts:["Attach a Security Group allowing public traffic to the public subnet","Add a Route Table entry pointing to an Internet Gateway for the public subnet","Enable NAT Gateway for the public subnet","Assign Elastic IPs to all instances in the private subnet"],ans:1,exp:"A public subnet is defined by having a route in its route table pointing to an Internet Gateway (0.0.0.0/0 → igw-xxxx)."},
  {topic:"VPC",q:"Can multiple target groups be attached to a single Load Balancer (LB)?",opts:["Yes, but only for HTTP/HTTPS traffic","Yes, it supports multiple target groups for various routing rules","No, a Load Balancer can only have one target group","No, each target group requires its own Load Balancer"],ans:1,exp:"ALBs support multiple target groups through listener rules, enabling path-based and host-based routing to different backends."},
  {topic:"VPC",q:"How can you identify if a subnet is public or private?",opts:["A public subnet has a route to the Internet Gateway, while a private subnet does not","A public subnet has a higher CIDR range compared to a private subnet","A private subnet is always located in a separate VPC from a public subnet","A private subnet automatically allows direct access to the internet"],ans:0,exp:"The definitive distinction: a public subnet has a route 0.0.0.0/0 → Internet Gateway in its route table."},
  {topic:"VPC",q:"If an application (HTTPD) is configured on an EC2 instance in a private subnet, how can you access its URL from a web browser?",opts:["Directly access the EC2 instance using its private IP address","Use an Elastic Load Balancer (ELB) with a public IP address to route traffic to the private subnet","Assign a public IP to the EC2 instance in the private subnet","Access the EC2 instance only from other instances within the same VPC"],ans:1,exp:"An ALB in the public subnet routes traffic to the private EC2 instance. The ALB's DNS is publicly accessible."},
  {topic:"VPC",q:"You have a VPC with multiple private subnets in multiple AZs and one public subnet. In case of an AZ failure, the company wants to ensure internet connectivity is maintained. Which solution is MOST highly available?",opts:["Create a new public subnet with a NAT gateway in the same AZ. Distribute the traffic between the two NAT gateways","Create an Amazon EC2 NAT instance in a new public subnet","Create public subnets in each AZ and launch a NAT gateway in each subnet. Configure traffic from private subnets in each AZ to the respective NAT gateway","Create an Amazon EC2 NAT instance in the same public subnet"],ans:2,exp:"One NAT gateway per AZ ensures that if an AZ fails, other AZs maintain internet connectivity through their own NAT gateways."},
  {topic:"VPC",q:"You are troubleshooting a custom VPC with two subnets. Instances have elastic network interfaces with public IP addresses. However, you cannot access these instances from the Internet. What might be causing this? (Choose two)",opts:["Instances need to use public IPs, not elastic network interfaces","The VPC needs an internet gateway - attach one and update routing tables","Instances are being prevented by the default security group - add permissions for outgoing Internet traffic","Update the NACL for the subnet to allow inbound HTTP and HTTPS traffic"],ans:1,exp:"Both (B) missing Internet Gateway and (D) restrictive NACLs can prevent internet access. The VPC needs an IGW attached and proper routes."},
  {topic:"VPC",q:"Which of the following statements are true with respect to VPC? (choose multiple)",opts:["A subnet can have multiple route tables associated with it","A network ACL can be associated with multiple subnets","A route with target 'local' on the route table can be edited to restrict traffic within VPC","Subnet's IP CIDR block can be same as the VPC CIDR block"],ans:1,exp:"A subnet can only have ONE route table at a time. An NACL CAN be associated with multiple subnets. Local routes cannot be edited. A subnet CIDR can equal the VPC CIDR."},
  {topic:"VPC",q:"You have successfully set up a VPC peering connection between VPC A and VPC B in different regions. When you try to make a request from VPC A to VPC B, the request fails. Which could be a reason?",opts:["Cross-region peering is not supported in AWS","CIDR blocks of both VPCs might be overlapping","Routes not configured in route tables for peering connections","VPC A security group default outbound rules not allowing traffic to VPC B IP range"],ans:2,exp:"Even after creating a VPC peering connection, you must add routes in both VPCs' route tables to direct traffic through the peering connection."},
  {topic:"VPC",q:"You've established a peering connection between VPC A and VPC B. Instances in VPC A are in 'SG-A' and the service in VPC B uses 'SG-B'. What do you need to configure to allow traffic?",opts:["Modify security group SG-A to allow inbound traffic from SG-B","Modify security group SG-B to allow inbound traffic from SG-A","Modify the Network ACLs in both VPCs to allow traffic between them","Both A and B"],ans:1,exp:"The service receiving connections (in VPC B) needs its security group (SG-B) to allow inbound traffic from SG-A (the source in VPC A)."},
  {topic:"VPC",q:"VPC C needs to access VPC A via VPC B. However, VPC A does not directly peer with VPC C. What should you do?",opts:["Establish a transitive VPC Peering connection between VPC C and VPC A","Set up a Transit Gateway and attach VPC A, B, and C","Use a shared VPC model to enable communication","Update the route tables in VPC A and B to route traffic from C"],ans:1,exp:"VPC Peering does NOT support transitive routing. AWS Transit Gateway enables transitive routing between multiple VPCs."},

  // ── IAM (8 questions) ──
  {topic:"IAM",q:"A company is storing an access key in a text file on a custom AMI to access DynamoDB tables. The security team has mandated a more secure solution. Which solution meets the mandate?",opts:["Put the access key in an S3 bucket, and retrieve the access key on boot from the instance","Pass the access key to the instances through instance user data","Obtain the access key from a key server launched in a private subnet","Create an IAM role with permissions to access the table, and launch all instances with the new role"],ans:3,exp:"IAM roles for EC2 provide temporary, automatically rotated credentials without storing access keys anywhere."},
  {topic:"IAM",q:"What is the key difference between IAM users and IAM roles?",opts:["IAM users are associated with temporary credentials, while IAM roles have permanent credentials","IAM users are used to grant permissions to AWS resources, while IAM roles cannot","IAM roles provide temporary credentials for AWS services or users, while IAM users have permanent credentials","IAM roles cannot be used for AWS services, while IAM users can"],ans:2,exp:"IAM roles provide temporary credentials via STS (Security Token Service), while IAM users have long-term access keys and passwords."},
  {topic:"IAM",q:"Which of the following is a correct use case for an IAM role?",opts:["Giving a user access to an EC2 instance for long-term management","Allowing an application on an EC2 instance to access other AWS resources temporarily","Granting a user permanent administrative access to an S3 bucket","Creating a backup of user credentials"],ans:1,exp:"IAM roles are ideal for granting AWS services temporary permissions to access other AWS resources without storing credentials."},
  {topic:"IAM",q:"How can you make a policy more secure by restricting access to specific resources?",opts:["By using the Resource element in the policy","By using the Action element in the policy","By using only the Effect element","By using only the Condition element"],ans:0,exp:"The Resource element specifies the ARN(s) of the resources the policy applies to, limiting the scope of permissions."},
  {topic:"IAM",q:"What does the Effect element in an IAM policy specify?",opts:["The specific user to which the policy applies","Whether the action is allowed or denied","The condition for the policy","The region where the policy is valid"],ans:1,exp:"The Effect element has two possible values: Allow or Deny. It determines whether the specified actions are permitted or rejected."},
  {topic:"IAM",q:"A developer needs access to an S3 bucket to upload log files from an application. They should not have access to other S3 buckets or any other AWS resources. What is the best way to grant access?",opts:["Attach the AmazonS3FullAccess managed policy to the developer's IAM user","Create a custom policy that grants s3:PutObject and s3:GetBucketLocation permissions for the specific bucket, and attach it to the IAM user","Add the developer's IAM user to a group that has full access to S3 buckets","Use the root user to upload the files on behalf of the developer"],ans:1,exp:"Following the principle of least privilege: grant only the specific permissions (s3:PutObject) on the specific resource needed."},
  {topic:"IAM",q:"Your organization is conducting an audit and finds several IAM policies that include the * wildcard, granting full access. How can you address this security concern?",opts:["Replace the * wildcard with specific resource ARNs and actions in the policies","Delete all policies with * wildcard access and create new policies from scratch","Use Service Control Policies (SCPs) to override the permissions in the IAM policies","Add condition keys to the policies to restrict access based on IP or MFA"],ans:0,exp:"Replace wildcards with specific resource ARNs and actions following the principle of least privilege."},
  {topic:"IAM",q:"A runs application creates resized images and makes Amazon S3 API calls. How can a solutions architect ensure the application has permission to access S3?",opts:["Update the S3 role in AWS IAM to allow read/write access from Amazon ECS, and then relaunch the container","Create an IAM role with S3 permissions, and then specify that role as the taskRoleArn in the task definition","Create a security group that allows access from Amazon ECS to Amazon S3","Create an IAM user with S3 permissions, and then relaunch the Amazon EC2 instances while logged in as this account"],ans:1,exp:"For ECS tasks, a task IAM role (taskRoleArn) provides permissions to AWS resources without storing credentials in the container."},

  // ── RDS (10 questions) ──
  {topic:"RDS",q:"Your organization runs a MySQL database on RDS. You need to ensure the database can automatically scale storage when needed. What should you enable?",opts:["Multi-AZ Deployment","Read Replicas","Auto Scaling for RDS","Storage Auto Scaling"],ans:3,exp:"RDS Storage Auto Scaling automatically increases storage capacity when free storage is running low."},
  {topic:"RDS",q:"Your company runs a mission-critical e-commerce application using Amazon RDS MySQL. The database must be highly available and resilient to regional failures. What configuration should you implement?",opts:["Enable Multi-AZ deployment","Use Read Replicas across regions","Use a combination of Multi-AZ and Read Replicas","Deploy an Aurora Global Database instead of RDS MySQL"],ans:2,exp:"Multi-AZ provides HA within a region (automatic failover). Cross-region Read Replicas provide disaster recovery across regions. Combined is best."},
  {topic:"RDS",q:"You manage a PostgreSQL database on RDS. A team member accidentally deletes some data, and you need to recover the database to its state from two hours ago. What should you do?",opts:["Restore the latest snapshot and manually roll back the data","Use point-in-time recovery to restore the database to two hours ago","Use AWS CloudTrail logs to determine the deleted records","Contact AWS Support for data recovery"],ans:1,exp:"RDS Point-in-Time Recovery can restore your database to any second within the backup retention period using transaction logs."},
  {topic:"RDS",q:"Your RDS MySQL database is experiencing high CPU utilization due to a large number of read queries. The application is read-heavy. What is the best solution?",opts:["Increase the instance size of the RDS instance","Enable Multi-AZ deployment","Create Read Replicas and redirect read queries to them","Migrate to an Amazon Aurora database"],ans:2,exp:"Read Replicas offload read traffic from the primary instance. You can create up to 5 Read Replicas per RDS instance."},
  {topic:"RDS",q:"You need to migrate an on-premises Oracle database to AWS RDS Oracle with minimal downtime. What approach should you take?",opts:["Export the database schema and import it into RDS","Use AWS Database Migration Service (DMS) with continuous replication","Take a snapshot of the on-premises database and restore it to RDS","Set up VPC peering and migrate the database manually"],ans:1,exp:"AWS DMS supports continuous replication with minimal downtime, keeping the target in sync until you cut over."},
  {topic:"RDS",q:"What is the primary difference between a Single-AZ deployment and a Multi-AZ deployment in Amazon RDS?",opts:["Single-AZ deployment provides higher availability and fault tolerance","Multi-AZ deployment replicates data across multiple Availability Zones for high availability","Single-AZ deployments only support read replicas","Multi-AZ deployments are used only for non-relational databases"],ans:1,exp:"Multi-AZ synchronously replicates to a standby in another AZ and automatically fails over if the primary has issues."},
  {topic:"RDS",q:"In Amazon RDS, how does point-in-time recovery work?",opts:["It restores the database to the most recent backup snapshot only","It allows you to recover the database to any specific second within the backup retention period","It allows you to restore the database to any day within the backup retention period","It uses logs to restore data to the time when the database was first created"],ans:1,exp:"RDS uses automated backups + transaction logs to enable PITR to any second within the retention window (1-35 days)."},
  {topic:"RDS",q:"How can read replicas in Amazon RDS be used for disaster recovery?",opts:["By storing read replicas across multiple AWS accounts","By using read replicas to offload backup storage","By promoting a read replica to the primary instance in case of failure of the primary instance","By creating periodic snapshots of read replicas"],ans:2,exp:"A Read Replica in another region can be promoted to a standalone primary instance during a regional disaster."},
  {topic:"RDS",q:"You have launched an RDS instance with MySQL with default configuration. Your organization wants to encrypt all databases. How can you achieve this?",opts:["Copy snapshot from the latest snapshot, select encryption during copy, and restore a new DB instance from the newly encrypted snapshot","Stop the RDS instance, modify and select the encryption option, start the RDS instance","Create a case with AWS support to enable encryption for your RDS instance","AWS RDS is a managed service and data at rest in all RDS instances are encrypted by default"],ans:0,exp:"You cannot enable encryption on an existing unencrypted RDS instance. The workflow is: snapshot → encrypted copy → restore from encrypted snapshot."},
  {topic:"RDS",q:"You are managing an RDS instance that stores sensitive financial data. You must ensure all data at rest is encrypted with a customer-managed key (CMK) and all data in transit is encrypted. What steps would you take?",opts:["Encrypt all backups using AWS KMS and configure SSL for encryption in transit","Enable encryption with the default AWS-managed KMS key and use IAM roles for secure communication","Use S3 for storing sensitive data and only encrypt that data, leave the database unencrypted","Enable encryption using a customer-managed KMS key during RDS instance creation and configure SSL/TLS for data in transit"],ans:3,exp:"CMK must be specified at creation time. SSL/TLS certificates provided by AWS should be downloaded and used to encrypt connections to RDS."},

  // ── LAMBDA (6 questions) ──
  {topic:"LAMBDA",q:"A Lambda function processes real-time IoT sensor data and writes it to an RDS database. The function has a high execution cost due to frequent invocations and significant time connecting to the database. What is the best optimization strategy?",opts:["Increase the timeout setting for the Lambda function","Use AWS Secrets Manager to securely store database credentials and reduce connection time","Implement database connection pooling using an external library such as PgBouncer or Pymysql","Migrate the application to AWS Fargate to handle high concurrency"],ans:2,exp:"Connection pooling reuses existing database connections across Lambda invocations, dramatically reducing connection overhead."},
  {topic:"LAMBDA",q:"Which of the following cannot trigger a Lambda function directly?",opts:["Amazon S3","Amazon CloudFront","Amazon DynamoDB Streams","Amazon EC2"],ans:3,exp:"Amazon EC2 cannot directly trigger Lambda. Lambda is triggered by events from services like S3, DynamoDB, API Gateway, CloudWatch Events, etc."},
  {topic:"LAMBDA",q:"Your Lambda function writes data to an S3 bucket. You want to ensure that the function can only access this specific bucket and nothing else. What is the most secure approach?",opts:["Assign the Lambda function the AmazonS3FullAccess managed policy","Create a custom IAM policy that grants permissions to the specific bucket and attach it to the Lambda execution role","Use an inline policy in the Lambda function code to restrict access","Enable bucket versioning and ensure that the Lambda function has delete permissions"],ans:1,exp:"Custom IAM policies following least privilege, scoped to the specific bucket ARN, are the most secure approach."},
  {topic:"LAMBDA",q:"You need a Lambda function to execute every hour to generate a report. What is the most efficient way to schedule this?",opts:["Configure a CloudWatch Event Rule (EventBridge) to trigger the Lambda function every hour","Create a cron job on an EC2 instance to invoke the Lambda function every hour","Use AWS Step Functions to orchestrate the hourly invocation","Manually invoke the Lambda function from the AWS Management Console every hour"],ans:0,exp:"Amazon EventBridge (CloudWatch Events) rules with cron expressions are the native, serverless way to schedule Lambda functions."},
  {topic:"LAMBDA",q:"When should you choose AWS Lambda over EC2?",opts:["When you need to run long-running applications with a fixed server","When you need to run event-driven, short-duration tasks with no infrastructure management","When you need to run a containerized application with complex configurations","When you need full control over the underlying server and operating system"],ans:1,exp:"Lambda is ideal for event-driven, stateless, short-duration functions (max 15 min). EC2 is better for long-running, stateful applications."},
  {topic:"LAMBDA",q:"Your Lambda function fails with an AccessDenied error when trying to read an S3 bucket. What should you do?",opts:["Create a VPC endpoint for S3","Attach an IAM Role with the correct S3 permissions","Increase Lambda memory allocation","Enable Provisioned Concurrency"],ans:1,exp:"AccessDenied errors from Lambda usually mean the execution role lacks the necessary s3:GetObject or s3:ListBucket permissions."},

  // ── CLOUDWATCH (8 questions) ──
  {topic:"CLOUDWATCH",q:"Your application runs on multiple EC2 instances and you want to monitor the CPU usage across all instances in real time. What is the best way using CloudWatch?",opts:["Create a custom CloudWatch metric to report CPU usage","Use the built-in CPUUtilization metric and create a CloudWatch dashboard to display the metrics","Install the CloudWatch Agent and configure it to collect CPU usage data","Use AWS Trusted Advisor to monitor CPU usage for your instances"],ans:1,exp:"CPUUtilization is a built-in CloudWatch metric for EC2. Creating a dashboard provides a real-time view across all instances."},
  {topic:"CLOUDWATCH",q:"You have multiple applications running in different AWS regions and want to centralize all application logs in one place. What is the best solution?",opts:["Use the CloudWatch Agent to send logs from each application to a centralized CloudWatch Logs group","Create a CloudTrail trail to capture application logs and store them in an S3 bucket","Configure an AWS Lambda function to periodically retrieve logs from each region and store them in a central database","Set up an Amazon SQS queue in each region to collect logs and forward them to a single CloudWatch Logs group"],ans:0,exp:"The CloudWatch Agent can be configured to stream logs to CloudWatch Logs groups, which can be centralized using cross-account log sharing."},
  {topic:"CLOUDWATCH",q:"Your organization wants to minimize storage costs for CloudWatch Logs but still retain logs for compliance. What is the best way to manage this?",opts:["Set a retention policy on the log groups to delete logs automatically after a specified period","Manually delete log streams every month using the AWS Management Console","Export the logs to an S3 bucket and set a lifecycle policy for the bucket","Use the CloudWatch Agent to rotate logs and delete them locally"],ans:2,exp:"Exporting to S3 + lifecycle policies moves logs to cheaper storage tiers (Glacier) for compliance while reducing CloudWatch costs."},
  {topic:"CLOUDWATCH",q:"You want to automatically stop an EC2 instance when its CPU utilization remains below 10% for an hour to save costs. How can you achieve this?",opts:["Create a CloudWatch Alarm for CPU utilization and configure it to trigger an Auto Scaling policy to stop the instance","Set up a CloudWatch Alarm and use an EventBridge rule to trigger an AWS Lambda function that stops the instance","Use AWS Config to detect low CPU utilization and take corrective actions","Enable EC2 Instance Auto Scaling to scale down the instance during low CPU usage"],ans:1,exp:"CloudWatch Alarm → EventBridge rule → Lambda function is the standard serverless pattern for triggering actions based on metric thresholds."},
  {topic:"CLOUDWATCH",q:"Your organization wants to receive notifications only during business hours (9 AM to 5 PM). What is the best way to configure this?",opts:["Use an EventBridge rule to suppress notifications outside business hours","Set up a CloudWatch Alarm with an SNS topic and configure a Lambda function to filter notifications based on time","Create an SNS topic and manually enable/disable notifications during business hours","Use CloudWatch Logs Insights to filter alarms by time range"],ans:1,exp:"A Lambda function subscribed to the SNS topic can check the current time and only forward notifications during business hours."},
  {topic:"CLOUDWATCH",q:"What is the purpose of CloudWatch Alarms?",opts:["To collect log data from AWS resources","To trigger actions based on metric thresholds, such as sending notifications or auto-scaling","To store and archive CloudWatch logs","To create customized dashboards for visualizing metrics"],ans:1,exp:"CloudWatch Alarms monitor metrics and trigger actions (SNS notifications, Auto Scaling policies, EC2 actions) when thresholds are breached."},
  {topic:"CLOUDWATCH",q:"What is the primary function of CloudWatch Events (EventBridge)?",opts:["To visualize metrics and performance","To manage logs and store data","To detect and respond to changes in AWS resources and trigger actions","To set custom metric thresholds"],ans:2,exp:"EventBridge/CloudWatch Events monitors AWS resource state changes and routes events to targets like Lambda, SQS, SNS, etc."},
  {topic:"CLOUDWATCH",q:"Which of the following is a key feature of AWS CloudTrail?",opts:["It enables you to view and visualize CloudWatch metrics","It allows real-time scaling of AWS resources","It provides logs of all API calls made within your AWS account","It stores data backups for AWS resources"],ans:2,exp:"CloudTrail logs all API calls in your AWS account — who did what, when, and from where — for auditing and compliance."},

  // ── AUTO SCALING (8 questions) ──
  {topic:"AUTO SCALING",q:"A company's application runs on EC2 instances behind an ALB. On the first day of every month at midnight, CPU utilization immediately peaks to 100% due to month-end batch processing. What should be recommended?",opts:["Configure an Amazon CloudFront distribution in front of the ALB","Configure an EC2 Auto Scaling simple scaling policy based on CPU utilization","Configure an EC2 Auto Scaling scheduled scaling policy based on the monthly schedule","Configure Amazon ElastiCache to remove some of the workload from the EC2 instances"],ans:2,exp:"Since the spike is predictable (first day of month), Scheduled Scaling pre-provisions capacity before the spike occurs — more reliable than reactive policies."},
  {topic:"AUTO SCALING",q:"An application runs on EC2 instances across multiple AZs behind an ALB. The application performs best when CPU utilization of EC2 instances is at or near 40%. What should you do to maintain the desired performance?",opts:["Use a simple scaling policy to dynamically scale the Auto Scaling group","Use a target tracking policy to dynamically scale the Auto Scaling group","Use an AWS Lambda function to update the desired Auto Scaling group capacity","Use scheduled scaling actions to scale up and scale down the Auto Scaling group"],ans:1,exp:"Target Tracking Scaling adjusts capacity to maintain a specific metric (like 40% CPU) automatically, similar to a thermostat."},
  {topic:"AUTO SCALING",q:"You have set up an Auto Scaling group with a minimum of 2 instances, desired of 3, and maximum of 5. One instance fails a health check. What will happen?",opts:["The instance will be terminated and a new one will be launched","The instance will remain running and Auto Scaling will not take any action","Auto Scaling will scale down the desired size to 2 instances","Auto Scaling will launch 2 new instances to compensate for the failure"],ans:0,exp:"Auto Scaling terminates unhealthy instances and replaces them with new ones to maintain the desired capacity."},
  {topic:"AUTO SCALING",q:"You have an Auto Scaling group for a web application. You want to scale out when CPU utilization exceeds 80% for 5 minutes and scale in when CPU falls below 60% for 10 minutes. What should you do?",opts:["Create a single CloudWatch alarm with both thresholds and a scaling policy for each","Create two separate CloudWatch alarms: one for CPU > 80% (5 min) and another for CPU < 60% (10 min). Use separate scaling policies for each","Configure a single CloudWatch alarm with both thresholds. Use a single scaling policy with a cooldown period","You cannot achieve this with CloudWatch Alarms and Auto Scaling"],ans:1,exp:"Use separate CloudWatch Alarms for scale-out and scale-in with different evaluation periods and separate scaling policies."},
  {topic:"AUTO SCALING",q:"Your Application Load Balancer (ALB) is experiencing a sudden increase in traffic. What is the BEST course of action to maintain application health?",opts:["Manually scale up the Auto Scaling group","Increase the health check timeout value for the ALB","Enable connection draining on the ALB to gracefully remove unhealthy instances","Implement a scaling policy in the Auto Scaling group to automatically scale based on traffic metrics"],ans:3,exp:"An Auto Scaling policy that responds to ALB traffic metrics (like RequestCountPerTarget) is the automated, scalable solution."},
  {topic:"AUTO SCALING",q:"An Auto Scaling group for a file server experiences frequent scaling actions due to short evaluation periods in CloudWatch alarms. How can you optimize scaling behavior?",opts:["Increase the evaluation period for both scaling out and scaling in alarms","Decrease the evaluation period for both scaling out and scaling in alarms","Increase the evaluation period for the scaling out alarm and keep the scaling in period short","Decrease the evaluation period for the scaling out alarm and increase the scaling in period"],ans:3,exp:"Scale out quickly (short evaluation period) to handle load. Scale in slowly (long evaluation period) to avoid prematurely terminating instances."},
  {topic:"AUTO SCALING",q:"You are working on increasing performance for an application that routinely sees traffic spikes between 6 and 8 PM every evening. How could you most easily ensure your application can respond to these surges?",opts:["Set up a lower threshold for scaling in your Auto Scaling group; consider 50% as a starting point","Log on each evening at 7:30 PM and manually scale the application up","Set up CloudWatch monitors with Lambda function that triggers scaling","Set up scheduled scaling so that the application scales up at 5:45 PM and scales back down at 8:30 PM"],ans:3,exp:"Scheduled Scaling is ideal for known, recurring traffic patterns. Pre-scaling before the spike ensures performance."},
  {topic:"AUTO SCALING",q:"A company hosts a website with Amazon EC2 Auto Scaling. Management is concerned the company is over-provisioning infrastructure. What should the solutions architect do to ensure costs are optimized without impacting performance?",opts:["Use Auto Scaling with Reserved Instances","Use Auto Scaling with a scheduled scaling policy","Use Auto Scaling with the suspend-resume feature","Use Auto Scaling with a target tracking scaling policy"],ans:3,exp:"Target Tracking automatically adjusts capacity to maintain a target metric value, preventing both over-provisioning and under-provisioning."},

  // ── ROUTE 53 (8 questions) ──
  {topic:"ROUTE 53",q:"A customer is hosting their company website on a cluster of web servers behind a public-facing load balancer. They also use Amazon Route 53 to manage their public DNS. How should they configure the DNS zone apex record to point to the load balancer?",opts:["Create an A record pointing to the IP address of the load balancer","Create a CNAME record pointing to the load balancer DNS name","Create a CNAME record aliased to the load balancer DNS name","Create an A record aliased to the load balancer DNS name"],ans:3,exp:"For the zone apex (naked domain like example.com), you MUST use an Alias A record. CNAME records cannot be used at the zone apex."},
  {topic:"ROUTE 53",q:"You are responsible for building out an application that serves user bases in California, Tokyo, and Sydney. You want to ensure users receive localized content in their own area. Which routing policy should you consider?",opts:["Failover routing","Latency-based routing","Geolocation routing","Weighted routing"],ans:2,exp:"Geolocation routing routes traffic based on the geographic location of your users to serve region-specific content."},
  {topic:"ROUTE 53",q:"You want to configure DNS so that traffic is routed to your on-premises data center under normal conditions but automatically failover to AWS in case of a data center failure. Which combination should you use?",opts:["Weighted Routing Policy with health checks","Failover Routing Policy with health checks","Geolocation Routing Policy","Multi-value Answer Policy"],ans:1,exp:"Failover Routing with health checks is designed exactly for active-passive failover scenarios — primary fails, secondary takes over."},
  {topic:"ROUTE 53",q:"Your application runs in a hybrid cloud environment. Users accessing from AWS should be routed to an EC2 instance, while users from your corporate network should be routed to an on-premises server. Which routing policy should you use?",opts:["Geoproximity Routing Policy","Simple Routing Policy","Geolocation Routing Policy","Latency-based Routing Policy"],ans:2,exp:"Geolocation routing can route corporate network users (based on IP location) to the on-premises server and AWS users to EC2."},
  {topic:"ROUTE 53",q:"You have both a public hosted zone (example.com) and a private hosted zone (example.com) associated with your VPC. When an EC2 instance in the VPC tries to resolve app.example.com, which record is used?",opts:["The record from the public hosted zone","The record from the private hosted zone","The record from both hosted zones is combined","DNS resolution fails due to a conflict"],ans:1,exp:"When a VPC has a private hosted zone associated, DNS queries from within the VPC resolve using the private hosted zone first."},
  {topic:"ROUTE 53",q:"You created a private hosted zone associated with a VPC, but DNS resolution within the VPC is not working. What configuration might be missing?",opts:["DNS hostnames and DNS resolution options are disabled in the VPC","The private hosted zone is not configured for geolocation routing","You need a public hosted zone associated with the VPC","You need to create an alias record for the private hosted zone"],ans:0,exp:"For Route 53 private hosted zones to work, the VPC must have DNS hostnames (enableDnsHostnames) and DNS support (enableDnsSupport) enabled."},
  {topic:"ROUTE 53",q:"You have two servers and want to route 70% of traffic to one and 30% to the other. Which record type and configuration should you use?",opts:["Two A Records with weighted routing","Two CNAME Records with weighted routing","A Multi-value Answer Policy","A Failover Routing Policy"],ans:0,exp:"Weighted routing with two A records (weights 70 and 30) splits traffic proportionally between the two servers."},
  {topic:"ROUTE 53",q:"A US-based company wants to extend their AWS infrastructure from us-east-1 into eu-west-1. Which option enables an equivalent experience for users on both continents?",opts:["Use a public-facing load balancer per region to load-balance web traffic, and enable HTTP health checks","Use a public-facing load balancer per region to load-balance web traffic, and enable sticky sessions","Use Amazon Route 53, and apply a geolocation routing policy to distribute traffic across both regions","Use Amazon Route 53, and apply a weighted routing policy to distribute traffic across both regions"],ans:2,exp:"Geolocation routing ensures US users go to us-east-1 and European users go to eu-west-1, providing optimal experience for each region."},

  // ── ELB & NETWORKING (8 questions) ──
  {topic:"ELB",q:"An application tier currently hosts two web services on the same set of instances, listening on different ports. Which AWS service should a Solutions Architect use to route traffic to the service based on the incoming request path?",opts:["AWS Application Load Balancer","Amazon CloudFront","AWS Classic Load Balancer","Amazon Route 53"],ans:0,exp:"Application Load Balancer supports content-based routing (path-based and host-based) to direct requests to different target groups."},
  {topic:"ELB",q:"How does Elastic Load Balancing improve the fault tolerance of an application hosted on Amazon EC2?",opts:["By automatically scaling EC2 instances during traffic spikes","By distributing traffic across multiple instances, reducing the impact of a single instance failure","By creating backups of EC2 instances","By reducing the storage needs of the application"],ans:1,exp:"ELB distributes incoming traffic across multiple instances in multiple AZs. If one instance fails, traffic is routed to healthy instances."},
  {topic:"ELB",q:"When should you consider using a Network Load Balancer over an Application Load Balancer?",opts:["When low latency and high throughput are required for TCP traffic","When you need to route traffic based on HTTP headers","When you require SSL termination at the load balancer","When you are only serving static content"],ans:0,exp:"NLB operates at Layer 4 (TCP/UDP) and is designed for ultra-high performance, millions of requests per second, and low latency."},
  {topic:"ELB",q:"You had set up an internal HTTP(S) Elastic Load Balancer to route requests to two EC2 instances inside a private VPC. However, one target EC2 instance is showing Unhealthy status. Which could NOT be a reason?",opts:["Port 80/443 is not allowed on EC2 instance's Security Group from the load balancer","An EC2 instance is in different availability zones than load balancer","The ping path does not exist on the EC2 instance","The target did not return a successful response code"],ans:1,exp:"ALBs support cross-AZ load balancing by default, so an instance in a different AZ can still be healthy. The other options are valid causes."},
  {topic:"ELB",q:"A company has a multi-tier application that runs six front-end web servers in an Amazon EC2 Auto Scaling group in a single AZ behind an ALB. How should the solutions architect modify the infrastructure to be highly available without modifying the application?",opts:["Create an Auto Scaling group that uses three instances across each of two Regions","Modify the Auto Scaling group to use three instances across each of two Availability Zones","Create an Auto Scaling template to quickly create more instances in another Region","Change the ALB configuration to round-robin"],ans:1,exp:"Distributing instances across two AZs provides high availability — if one AZ fails, instances in the other AZ continue serving traffic."},
  {topic:"ELB",q:"Your application publishes messages to multiple downstream systems including mobile apps and backend services. You want each subscriber to receive a copy of every message. Which AWS service should you use?",opts:["SQS","SNS","Kinesis","Lambda"],ans:1,exp:"SNS (Simple Notification Service) implements the pub/sub pattern — one message is fanned out to all subscribed endpoints."},
  {topic:"ELB",q:"Jeff is building a web application on AWS. He wants to ensure his application is highly available. What infrastructure components allow Jeff to accomplish this goal? (Select 2)",opts:["Availability Zones","Regional Zones","Regions","Data Locations"],ans:0,exp:"Availability Zones and Regions are the core AWS infrastructure components for high availability. Multiple AZs in a Region provide fault isolation."},
  {topic:"ELB",q:"A company recently deployed a two-tier application in two AZs. The database servers are unable to access patches on the internet. Which solution maintains database security with the least operational overhead?",opts:["Deploy a NAT gateway inside the public subnet for each AZ and associate it with an Elastic IP. Update the routing table of the private subnet to use it as the default route","Deploy a NAT gateway inside the private subnet for each AZ","Deploy two NAT instances inside the public subnet for each AZ","Deploy two NAT instances inside the private subnet for each AZ"],ans:0,exp:"NAT Gateways are fully managed by AWS with high availability. Placing them in public subnets and routing private subnet traffic through them gives internet access with least overhead."},

  // ── CLOUDFRONT & ADVANCED (6 questions) ──
  {topic:"CLOUDFRONT",q:"You are managing a CloudFront distribution for a global e-commerce site with static content (images, stylesheets) and dynamic content (product info, shopping cart). Which strategy best optimizes content delivery?",opts:["Use CloudFront with regional edge caches to cache static content closer to users","Use Lambda@Edge to modify requests and responses, caching dynamic content globally","Use CloudFront with a low TTL for all content and rely on the origin server for frequent updates","Cache static content with a high TTL and dynamic content with a low TTL, and use CloudFront cache behaviors with path patterns to separate them"],ans:3,exp:"Different cache behaviors for static (high TTL) and dynamic (low TTL) content with path patterns is the best practice for e-commerce sites."},
  {topic:"CLOUDFRONT",q:"Your Lambda function performs queries on an RDS database. You've noticed performance issues due to high response times for complex SQL queries. How would you optimize the interaction between Lambda and RDS?",opts:["Use Lambda's increased memory allocation to speed up database queries","Refactor the SQL queries to use more efficient indexing and avoid complex joins","Set up Lambda in an event-driven model to query RDS asynchronously","Use Amazon DynamoDB instead of RDS for better query performance"],ans:1,exp:"Query optimization (proper indexing, avoiding N+1 queries, optimizing JOINs) is the most direct fix for slow database queries."},
  {topic:"CLOUDFRONT",q:"Your Lambda function is invoking multiple concurrent executions that interact with the RDS database, causing throttling due to RDS connection limits. How would you prevent Lambda from overwhelming RDS?",opts:["Increase Lambda's execution timeout","Use AWS Lambda concurrency controls to limit the number of parallel executions","Deploy RDS in Multi-AZ to handle more concurrent connections","Use Amazon Aurora Serverless, which scales automatically for Lambda functions"],ans:1,exp:"Lambda concurrency limits (reserved concurrency) prevent too many simultaneous executions from overwhelming RDS connection limits."},
  {topic:"CLOUDFRONT",q:"You are running a Lambda function that connects to an RDS instance multiple times within a single invocation. The database connection overhead is causing delays. How can you mitigate this issue?",opts:["Implement connection pooling to reuse database connections between Lambda invocations","Increase the Lambda memory size to allocate more resources for database connections","Set up RDS Auto Scaling to adjust capacity based on Lambda invocations","Use Amazon Aurora Serverless"],ans:0,exp:"RDS Proxy is the AWS-managed solution for Lambda-to-RDS connection pooling, reusing connections across many Lambda invocations."},

  {topic:"VPC",q:"You are designing a multi-VPC network architecture with three VPCs (VPC-A, VPC-B, VPC-C) each peered with each other. You need to allow VPC-A to communicate with VPC-C via VPC-B. What configuration will NOT work?",opts:["Update the route table in VPC-A to include a route for 10.2.0.0/16 pointing to the VPC Peering connection with VPC-B","Update the route table in VPC-B to include a route for 10.2.0.0/16 pointing to the VPC Peering connection with VPC-C","Update the route table in VPC-C to include a route for 10.1.0.0/16 pointing to the VPC Peering connection with VPC-B","VPC Peering does not support transitive routing, so instances in VPC-A cannot communicate with VPC-C via VPC-B"],ans:3,exp:"VPC Peering does NOT support transitive routing. Even with peering A-B and B-C, traffic from A cannot transit through B to reach C. Use Transit Gateway instead."},

];

let questions = [];
let current = 0, score = 0, timeLeft = 4800; // 80 Minutes (4800s)
let answered = [];
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('awsMockMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            // Cache-breaker: if stored time is wrong or old default, reset to 80 mins
            timeLeft = (data.timeLeft === 3600 || data.timeLeft === 6000) ? 4800 : data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            topic: q.topic,
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 4800; // Force 80 Minutes
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsMockMasteryCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 300) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/${questions.length}`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-meta"><span class="q-num">AWS : Q${current+1}</span></div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === (questions.length - 1)) ? "FINISH AUDIT ✓" : "NEXT NODE →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === (questions.length - 1)) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('awsMockMasteryCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / ${questions.length}`;
}

function retryQuiz() { 
    localStorage.removeItem('awsMockMasteryCache_v2'); 
    location.reload(); 
}

initQuiz();
</script>
