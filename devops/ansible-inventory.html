<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansible Inventory | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#facc15;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(250,204,21,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(250,204,21,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#facc15,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(250, 204, 21, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(250, 204, 21, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">ANSIBLE_INVENTORY_02</div>
    <h1>Inventory & Ad-Hoc Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Inventory Verification Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Evaluation complete. Inventory records synced.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_DEPLOYMENT</button>
    </div>
</div>

<script>
const rawQuestions = [
    {q:"What is an Ansible inventory?",opts:["List of modules","File defining managed hosts and groups for Ansible to work with","Playbook log","Plugin registry"],ans:1,exp:"The inventory acts as Ansible's 'address book', listing all servers you intend to manage."},
    {q:"Syntax to define a group in an INI inventory file?",opts:["group:","[group_name]","(group)","#group"],ans:1,exp:"INI files use brackets to categorize multiple host addresses under a single alias like [web]."},
    {q:"How to define host variables inline in an INI file?",opts:["ip variables=val","ip var=val (pairs after hostname)","ip {var:val}","ip | var=val"],ans:1,exp:"You can pass connection info like ansible_user=root directly next to the host IP."},
    {q:"What is the 'all' group in Ansible?",opts:["Built-in group containing every host in the inventory","Linux hosts only","Web servers","Root hosts"],ans:0,exp:"Ansible implicitly creates the 'all' group so you can target your entire fleet with one command."},
    {q:"Where are host_vars files stored for a specific host?",opts:["/etc/ansible/","host_vars/ directory, in a file named after the host","Playbook folder only","Inside inventory"],ans:1,exp:"Using host_vars/ folders allows you to keep the main inventory file clean and manageable."},
    {q:"Where are group_vars files stored?",opts:["/etc/group/","group_vars/ directory with files named after each group","Home dir","In playbooks"],ans:1,exp:"Group variables apply settings to many servers at once, like common database ports or firewall rules."},
    {q:"What is an Ansible ad-hoc command?",opts:["One-task playbook","One-liner command to perform a quick task without a playbook","Scheduled job","Ansible role"],ans:1,exp:"Ad-hoc commands are perfect for 'fire-and-forget' tasks like checking free memory or restarting Nginx."},
    {q:"What is the syntax for an Ansible ad-hoc command?",opts:["playbook host -m","ansible pattern -m module -a 'args'","run-ansible host","ansible-exec module"],ans:1,exp:"The pattern involves the executable, target, module (-m), and module arguments (-a)."},
    {q:"What does the -i flag do?",opts:["Specifies inventory file","Sets idempotency","Installs module","Ignores errors"],ans:0,exp:"The -i flag allows you to point to custom inventory files instead of the default /etc/ansible/hosts."},
    {q:"Ad-hoc command to restart httpd on webservers?",opts:["cmd -a 'restart'","ansible webservers -m service -a 'name=httpd state=restarted'","restart command","m yum"],ans:1,exp:"The 'service' module is the standard way to interact with systemd or init services."},
    {q:"What is YAML used for in Ansible?",opts:["Compiled code","Human-readable data serialization for playbooks","Binary config","DB query"],ans:1,exp:"YAML's clear indentation structure makes automation logic easy to read and version control."},
    {q:"What character starts a YAML list item?",opts:["*","#","-","@"],ans:2,exp:"A dash followed by a space is the standard YAML indicator for a new item in a list or sequence."},
    {q:"How are key-value pairs represented in YAML?",opts:["key=val","key: value","key -> val","key|val"],ans:1,exp:"YAML uses a colon followed by a space to separate the property from its value."},
    {q:"What does 'children' mean under a group in YAML inventory?",opts:["Sub-tasks","Nested groups — groups that are members of a parent group","Child process","Roles"],ans:1,exp:"Nesting groups via 'children' allows you to create hierarchies like 'production' containing 'web' and 'db'."},
    {q:"What is the 'ungrouped' built-in group?",opts:["All hosts","Hosts not assigned to any custom group","No-SSH hosts","Windows"],ans:1,exp:"Any host listed outside of a bracketed group in INI falls into the 'ungrouped' category."},
    {q:"Command to copy a file to all hosts?",opts:["m file","ansible all -m copy -a 'src=file dest=path'","m transfer","m scp"],ans:1,exp:"The copy module handles file transfers from the control node to the managed nodes securely."},
    {q:"What does the -b flag mean?",opts:["Background","Become (privilege escalation / sudo)","Backup","Batch"],ans:1,exp:"'-b' allows Ansible to execute commands as root, which is necessary for software installation."},
    {q:"How to limit a command to one host in a group?",opts:["--host=x","ansible host_name -m ping","--filter","--only"],ans:1,exp:"You can replace a group name with a specific hostname or IP from your inventory to target it individually."},
    {q:"Purpose of 'ansible_host' variable?",opts:["Playbook name","Actual IP/FQDN to connect to, overriding the inventory name","Version","Key path"],ans:1,exp:"This allows you to give a host a friendly alias in inventory while connecting to its real IP address."},
    {q:"Difference between host_vars and group_vars?",opts:["None","host_vars apply to one host; group_vars to a group","Tasks vs roles","JSON vs YAML"],ans:1,exp:"Ansible merges these variables, with host-level variables having higher priority than group variables."},
    {q:"Ad-hoc command to install nginx on Ubuntu?",opts:["m install","ansible all -m apt -a 'name=nginx state=present'","m run","m nginx"],ans:1,exp:"The 'apt' module is the Ansible interface for the Debian/Ubuntu package manager."},
    {q:"How to run an ad-hoc command against multiple groups?",opts:["group1 group2","ansible 'group1:group2' -m ping","[group1,2]","--groups"],ans:1,exp:"Using a colon indicates an 'OR' operation, targeting any host found in either group."},
    {q:"What does 'ansible-inventory --list' do?",opts:["List modules","Displays current inventory and variables in JSON format","List plays","Show version"],ans:1,exp:"This is the best tool for verifying how Ansible 'sees' your inventory and variable inheritance."},
    {q:"What is a dynamic inventory?",opts:["Manual file","Plugin that generates inventory from cloud providers (AWS/GCP)","YAML only","Encrypted"],ans:1,exp:"Dynamic inventory ensures your automation always has the latest list of servers from your cloud console."},
    {q:"Variable to set SSH private key for a host?",opts:["ansible_ssh_key","ansible_private_key_file","key_path","ssh_key"],ans:1,exp:"This variable is essential when different servers require different identity files for login."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('ansibleInvMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "INVENTORY_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('ansibleInvMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>⚡ EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('ansibleInvMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('ansibleInvMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
