<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Servers | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#f97316;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(249,115,22,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(249, 115, 22, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(249, 115, 22, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">WEB_SERVER_PROTOCOL_03</div>
    <h1>Apache & Tomcat Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Server Status: Active</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Web tier logic verified. Connector states cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q: "What is Apache HTTP Server?", opts: ["A Java app server","Open-source software that serves static/dynamic content over HTTP","A database manager","A CI/CD tool"], ans: 1, exp: "Apache is a general-purpose web server designed to deliver files and content to browsers over the standard HTTP protocol."},
  {q: "Command to install Apache on RHEL/CentOS?", opts: ["apt install apache2","yum install httpd","pip install apache","dnf get apache"], ans: 1, exp: "On RedHat-based systems, the package is named 'httpd' (HyperText Transfer Protocol Daemon)."},
  {q: "Command to install Apache on Ubuntu/Debian?", opts: ["yum install httpd","apt install apache2","rpm -i apache","install apache2"], ans: 1, exp: "Debian-based systems name the package 'apache2'."},
  {q: "Which command starts the Apache service?", opts: ["service start","apache start","systemctl start httpd","httpd --start"], ans: 2, exp: "Systemctl is the standard utility for managing systemd services in modern Linux distros."},
  {q: "Default port for Apache HTTP?", opts: ["8080","443","80","3000"], ans: 2, exp: "Port 80 is the global standard for unencrypted HTTP traffic. HTTPS uses 443."},
  {q: "Main Apache config location on RHEL/CentOS?", opts: ["/etc/apache2/apache2.conf","/etc/httpd/conf/httpd.conf","/var/www/html/httpd.conf","/usr/share/httpd.conf"], ans: 1, exp: "The httpd.conf file contains all server-level directives and module configurations."},
  {q: "Default DocumentRoot for Apache on RHEL?", opts: ["/var/apache/html","/usr/local/apache","/var/www/html","/etc/httpd/html"], ans: 2, exp: "This is the folder where you place index.html for it to be visible to the public."},
  {q: "Directive defining the directory for serving files?", opts: ["ServerRoot","WebRoot","DocumentRoot","FileRoot"], ans: 2, exp: "Changing this directive allows you to serve files from any folder on the system disk."},
  {q: "Command to check config syntax?", opts: ["apache2 --test","httpd -t","apachectl -check","service httpd verify"], ans: 1, exp: "Always run 'httpd -t' before restarting the server to prevent crashing the site with typos."},
  {q: "Command to enable Apache on boot?", opts: ["systemctl enable httpd","chkconfig httpd on","httpd --enable-boot","service httpd autostart"], ans: 0, exp: "Enabling ensure the web server comes back online automatically after a power cycle."},
  {q: "What is Apache Tomcat?", opts: ["Static web server","Java Servlet Container and App Server for Java web apps","Java Database","Server monitoring tool"], ans: 1, exp: "Tomcat provides the JVM environment required to execute Java Servlets and JSPs."},
  {q: "Requirement before installing Tomcat?", opts: ["Python","JDK (Java Development Kit)","Node.js","Maven"], ans: 1, exp: "Since Tomcat is written in Java, it cannot run without a valid Java Runtime or Development Kit."},
  {q: "Default port for Apache Tomcat?", opts: ["80","443","8080","3306"], ans: 2, exp: "Tomcat uses 8080 to avoid conflicts with standard web servers like Apache (80)."},
  {q: "File for configuring Tomcat ports?", opts: ["web.xml","context.xml","server.xml","tomcat.conf"], ans: 2, exp: "The <Connector> tags in server.xml define the ports and protocols Tomcat listens on."},
  {q: "File defining Tomcat Manager credentials?", opts: ["server.xml","web.xml","tomcat-users.xml","context.xml"], ans: 2, exp: "This file is where you define user roles like 'manager-gui' for the dashboard."},
  {q: "Tomcat Manager Application purpose?", opts: ["Write code","Deploy, undeploy, and manage WAR files via web GUI","Manage Linux users","Configure HTTPD"], ans: 1, exp: "It allows for 'hot deployment' of applications without restarting the entire server."},
  {q: "File type typically deployed on Tomcat?", opts: [".exe",".war (Web Application Archive)",".deb",".rpm"], ans: 1, exp: "WAR files are zip-compatible archives containing compiled classes, libraries, and web resources."},
  {q: "Tomcat directory for deployed apps?", opts: ["/apps","/conf","/webapps","/deploy"], ans: 2, exp: "Tomcat automatically 'explodes' (unzips) any WAR file placed in the webapps folder."},
  {q: "Script to start Tomcat on Linux?", opts: ["tomcat.sh start","startup.sh","start-tomcat.sh","service start"], ans: 1, exp: "The startup.sh script executes the Catalina engine in the background."},
  {q: "Env variable pointing to Tomcat home?", opts: ["TOMCAT_HOME","JAVA_HOME","CATALINA_HOME","SERVER_ROOT"], ans: 2, exp: "Tomcat uses the name 'Catalina' for its core processing engine."},
  {q: "Key difference between Apache HTTPD and Tomcat?", opts: ["Identical","HTTPD is for static content; Tomcat is for dynamic Java apps","Tomcat is for Python","HTTPD is newer"], ans: 1, exp: "Most production setups use HTTPD as a frontend proxy to handle static assets and Tomcat as the backend for logic."},
  {q: "HTTP status code for 'Not Found'?", opts: ["200","301","403","404"], ans: 3, exp: "404 is the client-side error code indicating the file path does not exist on the server."},
  {q: "Role required for Tomcat Manager GUI?", opts: ["admin","superuser","manager-gui","deployer"], ans: 2, exp: "Assigning this role in tomcat-users.xml is a mandatory security step for remote management."},
  {q: "What is Apache Virtual Hosting?", opts: ["Hosting multiple sites on one server via domain names","Hardware virtualization","Tomcat nesting","Load balancing"], ans: 0, exp: "Virtual hosts allow you to run 'site-a.com' and 'site-b.com' on the same physical IP."},
  {q: "Tomcat log file for startup/exceptions?", opts: ["access.log","catalina.out","server.log","error.log"], ans: 1, exp: "Catalina.out is the 'everything' log where all console output and stack traces are captured."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('webServerMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "WEB_TIER"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('webServerMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('webServerMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('webServerMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
