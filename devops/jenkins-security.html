<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenkins Security | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#3b82f6;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#3b82f6,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(59, 130, 246, 0.05)}
.option.disabled{cursor:default}

/* FIXED VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(59, 130, 246, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">JENKINS_SEC_PLUGIN_14</div>
    <h1>Security & Plugin mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Security Audit Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Jenkins security state verified. Plugin manifest cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q: "What is Jenkins Security Realm?", opts: ["Physical data center","Mechanism defining how Jenkins authenticates user identities","A plugin for UI themes","A backup database"], ans: 1, exp: "The Security Realm handles the 'Who are you?' part of security, connecting to LDAP, AD, or local DBs."},
  {q: "What is Authorization in Jenkins?", opts: ["Verifying passwords","Determining what authenticated users are allowed to do","Installing plugins","Cleaning workspaces"], ans: 1, exp: "Authorization handles the 'What can you do?' part, defining permissions like build, configure, or delete."},
  {q: "Which is the default Security Realm in Jenkins?", opts: ["LDAP","Jenkins' Own User Database","Active Directory","OIDC"], ans: 1, exp: "By default, Jenkins uses its internal database to manage users locally until an external source is configured."},
  {q: "What does 'Jenkins' Own User Database' provide?", opts: ["LDAP syncing","Local user management and credential storage","Single Sign-On","Hardware keys"], ans: 1, exp: "It allows admins to create accounts and passwords directly within the Jenkins metadata folders."},
  {q: "What is LDAP integration used for in Jenkins?", opts: ["File system indexing","Centralized authentication with corporate directories like AD","Email encryption","Code linting"], ans: 1, exp: "LDAP allows employees to log in to Jenkins using their standard company credentials."},
  {q: "Which authorization strategy is role-based?", opts: ["Full control for all","Matrix-based security","Role-Based Access Control (RBAC)","Project-level only"], ans: 2, exp: "RBAC allows you to assign permissions to groups like 'Developers' or 'Admins' instead of individual users."},
  {q: "What can you configure in 'Manage Jenkins' > 'Security'?", opts: ["Node IPs","Security Realm and Authorization strategy","Artifact sizes","Plugin source code"], ans: 1, exp: "This is the central hub for locking down your Jenkins instance from unauthorized access."},
  {q: "How do you create a new local user?", opts: ["Terminal only","Manage Jenkins -> Manage Users -> Create User","Dashboard right-click","Auto-created on commit"], ans: 1, exp: "Admins use the User Management screen to provision and manage local accounts manually."},
  {q: "What is a Jenkins Plugin?", opts: ["Standalone app","Extension that adds new features or integrations to Jenkins","A Java compiler","A type of Jenkins Job"], ans: 1, exp: "Plugins are the heart of Jenkins, allowing it to talk to Git, AWS, Slack, and thousands of other tools."},
  {q: "How do you install a Jenkins plugin?", opts: ["Restart server","Manage Jenkins -> Plugins -> Available tab","Maven command","Editing Jenkinsfile"], ans: 1, exp: "The Plugin Manager allows you to search the official registry and install extensions with a few clicks."},
  {q: "What is an SCM Plugin?", opts: ["Compiler plugin","Plugin for integrating Version Control (Git, SVN)","Security audit tool","Notification tool"], ans: 1, exp: "SCM plugins allow Jenkins to monitor and download source code from remote repositories."},
  {q: "What does the Git Plugin enable?", opts: ["Java packaging","Jenkins to clone repos and fetch branch history","Unit test runners","Deployment to S3"], ans: 1, exp: "It provides the essential 'git' step in pipelines and handles SSH/HTTPS authentication for repos."},
  {q: "Which plugin is primary for test reporting?", opts: ["Docker","JUnit Plugin or similar result parsers","SonarQube","Ansible"], ans: 1, exp: "JUnit and related plugins parse XML test results to show success/failure graphs on the job page."},
  {q: "What does the Maven Plugin provide?", opts: ["Automatic Jenkins install","Native execution and management of Maven build cycles","S3 artifact storage","Email formatting"], ans: 1, exp: "It allows Jenkins to treat 'mvn' commands as high-level build steps with specific dashboard reporting."},
  {q: "What is Cobertura Plugin used for?", opts: ["Encryption","Code coverage reporting and analysis","Auto-remediation","DB indexing"], ans: 1, exp: "It visualizes how much of your source code is actually being exercised by your test suite."},
  {q: "How to update an installed plugin?", opts: ["Reinstall Jenkins","Manage Jenkins -> Plugins -> Updates tab","Auto-update only","CLI command only"], ans: 1, exp: "The Updates tab flags newer versions of plugins to ensure you have the latest security and feature fixes."},
  {q: "Difference between 'Install without restart' and 'Install and restart'?", opts: ["No difference","Restart ensures all components load properly; Without restart is instant but potentially unstable","Restart is for themes","Without restart is for core"], ans: 1, exp: "While many plugins load instantly, complex core-level plugins often require a full process reboot."},
  {q: "What is the Credentials Plugin?", opts: ["Identity verification","Security layer for managing sensitive secrets like API keys/SSH keys","Auth plugin","Role manager"], ans: 1, exp: "It provides a secure encrypted vault for storing the passwords your automation needs to run."},
  {q: "How to store credentials securely?", opts: ["Hardcode in script","Manage Jenkins -> Credentials","JSON file in root","Environment variables in shell"], ans: 1, exp: "The Credentials UI ensures that passwords are encrypted at rest and never shown in plain text logs."},
  {q: "What is the Docker Plugin for?", opts: ["Containerizing Jenkins","Building images and running containers as part of build steps","Network security","Volume management"], ans: 1, exp: "It allows Jenkins jobs to build Dockerfiles and push the resulting images to registries like Docker Hub."},
  {q: "What does the Email Extension Plugin provide?", opts: ["Mail server","Highly customizable build notifications with templates","Spam filter","User registration"], ans: 1, exp: "It goes beyond the built-in mailer by allowing complex logic for when and to whom alerts are sent."},
  {q: "How to disable a plugin without deleting it?", opts: ["Remove JAR","Manage Jenkins -> Plugins -> Installed -> Checkbox","Stop Jenkins","Delete from config.xml"], ans: 1, exp: "Disabling prevents the plugin from running but keeps the files on disk for easy re-enabling later."},
  {q: "What is Confidentiality in security?", opts: ["Public access","Protecting secrets from unauthorized exposure in logs or UI","Full audit logs","Open source sharing"], ans: 1, exp: "Confidentiality ensures that only authorized processes can see the value of a password or token."},
  {q: "How does Jenkins protect credential confidentiality?", opts: ["Plain text storage","Encryption at rest and masking secrets in Console Output","Shared access","No protection"], ans: 1, exp: "Jenkins automatically scans logs and replaces secret values with asterisks (****) to prevent leaks."},
  {q: "What is Matrix-Based Security?", opts: ["Backup system","Granular permission table defining user/group rights per action","A UI theme","A plugin for parallel jobs"], ans: 1, exp: "It looks like a spreadsheet where you check boxes to grant specific users rights like 'Build' or 'Delete'."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('jenkinsSecurityMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "SECURITY_CORE"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('jenkinsSecurityMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('jenkinsSecurityMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('jenkinsSecurityMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
