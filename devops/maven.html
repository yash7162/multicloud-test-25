<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven Mastery | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#a78bfa;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(167,139,250,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(167,139,250,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(167, 139, 250, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(167, 139, 250, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">MAVEN_BUILD_PROTOCOL_10</div>
    <h1>Maven Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Build Integrity Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Maven protocol verified. pom.xml logic cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is Apache Maven?",opts:["A version control system","Build automation tool primarily for Java projects","A CI/CD platform","A containerisation tool"],ans:1,exp:"Maven uses a central pom.xml to manage project builds, dependencies, and documentation."},
  {q:"What must be installed before Maven can run?",opts:["Python 3.6+","JDK (Java Development Kit)","Node.js","Docker"],ans:1,exp:"Maven runs on the JVM and requires JAVA_HOME to be set to point to a valid JDK installation."},
  {q:"Which command installs Maven on Ubuntu/Debian?",opts:["yum install maven","sudo apt install maven -y","pip install maven","npm install -g maven"],ans:1,exp:"Debian-based systems use the APT package manager to download Maven from official repositories."},
  {q:"Which command verifies Maven installation?",opts:["maven --info","mvn -version","mvn --check","java maven"],ans:1,exp:"'mvn -version' displays the Maven home path, Java version, and OS details."},
  {q:"What is the POM file (pom.xml) in Maven?",opts:["OS properties file","Project Object Model — the central XML config for the build","A build log file","A deployment descriptor only"],ans:1,exp:"The pom.xml is the brain of the project, defining coordinates, dependencies, and build plugins."},
  {q:"Which coordinates uniquely identify a Maven artifact?",opts:["Name, Version, Type","GroupId, ArtifactId, Version","ProjectId, BuildId, ReleaseId","Company, Module, Build"],ans:1,exp:"Known as GAV, these three strings locate any specific artifact in the Maven ecosystem."},
  {q:"What does 'SNAPSHOT' mean in a Maven version?",opts:["Stable release","In-development, unstable version","A deleted version","A backup release"],ans:1,exp:"Snapshot versions tell Maven to check for newer updates in the remote repository more frequently."},
  {q:"Full Maven default build lifecycle sequence?",opts:["init, build, deploy","compile, test, package","validate, compile, test, package, verify, install, deploy","start, run, end"],ans:2,exp:"Each phase in this sequence triggers all preceding phases automatically."},
  {q:"What does 'mvn compile' do?",opts:["Runs all unit tests","Compiles source files into bytecode in target/classes","Packages the project","Deploys to Central"],ans:1,exp:"This phase handles the conversion of .java files into .class files."},
  {q:"What does 'mvn test' do?",opts:["Deploys the app","Compiles and runs unit tests; fails build if tests fail","Packages the JAR","Installs to local repo"],ans:1,exp:"Maven uses the Surefire plugin by default to execute JUnit or TestNG test suites."},
  {q:"What does 'mvn package' do?",opts:["Installs Maven","Compiles, tests, and bundles the project into a JAR/WAR","Deploys to Central","Cleans build dir"],ans:1,exp:"This phase takes the compiled code and wraps it into a distributable format."},
  {q:"What does 'mvn install' do?",opts:["Installs Java","Installs the artifact into the local repo (~/.m2)","Deploys to Maven Central","Downloads deps only"],ans:1,exp:"Installing makes the artifact available for other projects running on the same local machine."},
  {q:"What is the Maven Local Repository?",opts:["Central repo on internet","The ~/.m2/folder — local cache of artifacts","A remote Nexus server","A Git repo"],ans:1,exp:"The local repository acts as a cache so Maven doesn't have to download the same JAR twice."},
  {q:"What is Maven Central Repository?",opts:["Private Nexus server","Public default remote repo hosting open-source artifacts","Local repo backup","Log storage"],ans:1,exp:"This is the global library where Maven fetches dependencies if they are not found locally."},
  {q:"How are Maven dependencies declared in pom.xml?",opts:["deps.txt file","Inside <dependencies> section with GAV tags","build.gradle file","Import statements"],ans:1,exp:"Maven uses XML tags to define exactly which external libraries the project needs."},
  {q:"What is 'dependency scope' in Maven?",opts:["Version range","Defines when a dependency is available on the classpath","The groupId","Download priority"],ans:1,exp:"Scopes like 'test' or 'provided' ensure JARs aren't packaged into the final artifact if not needed at runtime."},
  {q:"What is a Maven Plugin?",opts:["Java class only","Component providing goals bound to build phases","Dependency manager","Testing framework"],ans:1,exp:"Plugins perform the actual work of Maven, such as compiling code or creating a WAR file."},
  {q:"What is the Maven Surefire Plugin used for?",opts:["Compiling code","Running unit tests and generating reports","Packaging","Deploying"],ans:1,exp:"Surefire is the standard plugin for the test phase of the build lifecycle."},
  {q:"What does 'mvn clean' do?",opts:["Clears terminal","Deletes the target/ directory","Removes dependencies","Resets pom.xml"],ans:1,exp:"Clean ensures that old build artifacts don't interfere with the new build process."},
  {q:"What does 'mvn deploy' do?",opts:["Deploys to production","Copies the artifact to a remote repo (Nexus/Artifactory)","Deploys container","Deploys to Tomcat"],ans:1,exp:"Deploy is the final step, sharing the finished artifact with the rest of the team or organization."},
  {q:"What is a Maven 'parent POM'?",opts:["First pom ever","A POM that child projects inherit from for shared config","A backup file","POM for test projects"],ans:1,exp:"Parent POMs reduce duplication by centralizing versions and plugin settings for multi-module projects."},
  {q:"What are transitive dependencies in Maven?",opts:["Duplicate deps","Dependencies of your dependencies that Maven pulls automatically","Direct deps only","Manual versions"],ans:1,exp:"Maven automatically crawls the dependency tree so you don't have to manually list every JAR required."},
  {q:"What file configures global settings like mirrors and proxies?",opts:["pom.xml","settings.xml","build.xml","config.properties"],ans:1,exp:"Global settings usually reside in ~/.m2/settings.xml and handle repository credentials."},
  {q:"What does 'mvn dependency:tree' display?",opts:["File structure","The complete hierarchy of direct and transitive dependencies","All plugins","All phases"],ans:1,exp:"This command is essential for identifying version conflicts and unwanted libraries."},
  {q:"What does 'mvn -DskipTests package' do?",opts:["Runs only tests","Packages the project but skips executing tests","Skips package phase","Skips downloads"],ans:1,exp:"Skipping tests saves significant time during development when you only need to verify the build/package logic."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('mavenMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "BUILD_CORE"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('mavenMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('mavenMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('mavenMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
