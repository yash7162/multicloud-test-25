<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitLab CI/CD | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#f59e0b;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(245, 158, 11, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(245, 158, 11, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">GITLAB_CI_PROTOCOL_16</div>
    <h1>GitLab CI/CD Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Pipeline Integration Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">GitLab CI protocol verified. Pipeline state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is GitLab CI/CD?",opts:["GitLab's version control system","Built-in CI/CD service in GitLab defined via YAML","A separate third-party tool","Manual deployment utility"],ans:1,exp:"GitLab CI/CD is an integral part of GitLab that automates the software development life cycle via a YAML configuration file."},
  {q:"What is the configuration file for GitLab CI/CD pipelines?",opts:[".yaml",".gitlab-ci.yml",".gitlab.yaml","pipeline.yml"],ans:1,exp:"Every GitLab pipeline must have a .gitlab-ci.yml file in the root of the repository to define its stages and jobs."},
  {q:"What is a GitLab Runner?",opts:["The GitLab server","An agent that executes CI/CD jobs defined in the YAML file","A version control system","A deployment script"],ans:1,exp:"The Runner is a lightweight application that picks up jobs from GitLab and runs them on a specific machine."},
  {q:"What types of Runners does GitLab support?",opts:["Only local runners","Shared runners, specific runners, and group runners","Only cloud runners","Standalone runners only"],ans:1,exp:"GitLab provides flexible runner scopes: Shared (for everyone), Group (for sub-projects), and Specific (for one repo)."},
  {q:"How do you register a GitLab Runner?",opts:["Manual file config only","Using 'gitlab-runner register' with URL and token","Through GitLab web portal only","No registration needed"],ans:1,exp:"Registration links the physical machine to the GitLab instance so it can start accepting jobs."},
  {q:"What is a GitLab Pipeline Stage?",opts:["A repository branch","A logical grouping of jobs that run in parallel","A code version","A environment name"],ans:1,exp:"Stages allow you to order your jobs, such as ensuring all 'Build' jobs finish before 'Test' jobs start."},
  {q:"What is the default behavior of jobs in the same stage?",opts:["Run sequentially","Run in parallel","Skip automatically","Run on demand"],ans:1,exp:"To save time, GitLab attempts to run all jobs belonging to the same stage simultaneously if enough runners are available."},
  {q:"What is a GitLab Pipeline Job?",opts:["A repo branch","A task that executes a script or command in a runner","A deployment process","A backup task"],ans:1,exp:"Jobs are the basic building blocks of a pipeline; they contain the actual shell commands to be executed."},
  {q:"What does 'only' keyword do in .gitlab-ci.yml?",opts:["Stops pipeline","Specifies which branches or events trigger the job","Limits runner selection","Defines job output"],ans:1,exp:"'only' is used to restrict job execution to specific branches, tags, or triggers like merge requests."},
  {q:"What does 'except' keyword do in .gitlab-ci.yml?",opts:["Skips pipeline","Specifies branches or events where the job should NOT run","Defines formatting","Limits runner count"],ans:1,exp:"'except' acts as a blacklist, ensuring specific jobs don't run on certain branches like development."},
  {q:"What is GitLab CI/CD 'artifacts' used for?",opts:["Code versioning","Storing output files from jobs for later stages or download","Deployment config","Env variables"],ans:1,exp:"Artifacts allow you to pass files between stages, such as a compiled binary created in 'Build' needed in 'Deploy'."},
  {q:"How long are GitLab artifacts retained by default?",opts:["1 hour","30 days (configurable)","1 year","Indefinitely"],ans:1,exp:"GitLab defaults to 30 days, but you can use 'expire_in' to shorten or lengthen this based on storage needs."},
  {q:"What is a GitLab Pipeline Variable?",opts:["Repo variable only","Environment variable available to all jobs in a pipeline","Hard-coded value","Build configuration"],ans:1,exp:"Variables store reusable strings like API keys or environment names, keeping the YAML file clean."},
  {q:"What is 'needs' dependency in GitLab CI/CD?",opts:["Required packages","Specifies job dependencies (wait for specific jobs)","Build requirements","Artifact storage"],ans:1,exp:"'needs' allows jobs to start as soon as their dependencies are done, ignoring stage boundaries for faster execution."},
  {q:"What does 'when' keyword control in GitLab CI/CD?",opts:["Pipeline timing","Conditions for job execution (success, failure, always, manual)","Artifact retention","Runner selection"],ans:1,exp:"'when' defines the logic of when a job runs—for example, only running a cleanup job on failure."},
  {q:"What is GitLab Protected Branches?",opts:["Encrypted branches","Branches with restricted push/merge permissions","All branches","Tag-only restriction"],ans:1,exp:"Protecting a branch ensures only authorized users can merge code, typically enforced on 'main' for production safety."},
  {q:"How do you pass variables to GitLab Runner jobs?",opts:["CLI only","Define in .gitlab-ci.yml or GitLab UI settings","Env files only","Hardcoding"],ans:1,exp:"Variables defined in the UI are masked and protected, making them ideal for sensitive credentials."},
  {q:"What is GitLab Cache in CI/CD?",opts:["Memory storage","Storing dependencies (like node_modules) to speed up later jobs","Database cache","Network cache"],ans:1,exp:"Cache persists files between different pipeline runs, significantly reducing build times for dependencies."},
  {q:"What is the difference between Cache and Artifacts?",opts:["No difference","Cache: speeds up jobs; Artifacts: stores job output for later use","Artifacts are cached","Same thing"],ans:1,exp:"Artifacts are for files needed by later stages in the *same* pipeline; Cache is for files needed across *different* pipelines."},
  {q:"What is GitLab's 'include' keyword used for?",opts:["Code import","Including external .gitlab-ci.yml files for reusability","Variable inclusion","Artifact import"],ans:1,exp:"'include' allows you to maintain a central library of CI templates and share them across multiple projects."},
  {q:"How do you specify the Docker image for a job?",opts:["Manual setup","Using 'image:' keyword in the job definition","Hardcoded in runner","Separate config"],ans:1,exp:"The 'image' keyword tells the runner which container environment to spin up for the job scripts."},
  {q:"What is a GitLab CI/CD 'services' keyword?",opts:["Deployment services","Additional Docker images running alongside the job (e.g. DBs)","External services","Notification services"],ans:1,exp:"Services are 'sidecar' containers used for integration testing, such as having a real database available for tests."},
  {q:"What does 'manual' trigger do in GitLab CI/CD?",opts:["Runs automatically","Requires a manual click in the UI to start the job","Disables the job","Runs on schedule"],ans:1,exp:"Manual jobs are often used for production deployments to ensure a human approves the final release step."},
  {q:"How do you view GitLab Pipeline execution logs?",opts:["Local logs only","Navigate to CI/CD > Pipelines and click the job","Database logs","Email notifications"],ans:1,exp:"The GitLab UI provides a real-time console view of the output from the Runner for debugging."},
  {q:"What is the default order of stages if not specified?",opts:["No default",".pre, build, test, deploy, .post","build, test, deploy","only deploy"],ans:1,exp:"GitLab provides a default stage order, but most developers explicitly define their stages for clarity."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('gitlabCiMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('gitlabCiMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('gitlabCiMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('gitlabCiMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
