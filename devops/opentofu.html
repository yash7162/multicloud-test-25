<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenTofu | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#818cf8;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(129,140,248,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(129,140,248,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(129, 140, 248, 0.05)}
.option.disabled{cursor:default}

.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(129, 140, 248, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">OPENTOFU_PROTOCOL_33</div>
    <h1>OpenTofu Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Deployment Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Open-source IaC protocol verified. Migration path valid.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is OpenTofu?",opts:["A HashiCorp product","Open-source community fork of Terraform governed by the Linux Foundation","A cloud provider","A Kubernetes distribution"],ans:1,exp:"OpenTofu was created to ensure the industry had a truly open-source alternative after Terraform changed its license."},
  {q:"Why was OpenTofu created?",opts:["Add features","Because Terraform moved to the restrictive Business Source License (BSL 1.1)","Improve UI","Windows only support"],ans:1,exp:"The fork occurred at Terraform 1.5.x to preserve the project under the Mozilla Public License 2.0."},
  {q:"What license does OpenTofu use?",opts:["BSL 1.1","Apache 2.0","Mozilla Public License (MPL) 2.0","MIT"],ans:2,exp:"MPL 2.0 is a copyleft open-source license that allows users to freely use and modify the software for any purpose."},
  {q:"Who governs the OpenTofu project?",opts:["HashiCorp","AWS","The Linux Foundation","Google"],ans:2,exp:"Being under the Linux Foundation ensures neutral governance and prevents any single company from controlling the code."},
  {q:"What version of Terraform is OpenTofu forked from?",opts:["0.12","1.0","1.5.x","2.0"],ans:2,exp:"Terraform 1.5.x was the final version released before the license change, serving as the stable baseline for OpenTofu."},
  {q:"Is OpenTofu compatible with existing Terraform configs?",opts:["No","Yes — fully compatible with Terraform 1.5 .tf and state files","Only AWS","Partial only"],ans:1,exp:"Compatibility was a primary goal; most users can simply swap the binary and continue working."},
  {q:"What is the OpenTofu CLI command to initialize?",opts:["terraform init","tofu init","opentofu init","tf init"],ans:1,exp:"OpenTofu uses 'tofu' as the binary name, making it short and distinct from the original."},
  {q:"What command applies changes in OpenTofu?",opts:["terraform apply","opentofu apply","tofu apply","tofu execute"],ans:2,exp:"The command structure mirrors Terraform exactly: tofu plan, tofu apply, and tofu destroy."},
  {q:"How do you migrate from Terraform to OpenTofu?",opts:["Rewrite files","Swap the binary, run 'tofu init', and use existing .tf files","Export state","Delete and recreate"],ans:1,exp:"Because it is a direct fork, the migration is designed to be a 'drop-in' replacement for version 1.5.x users."},
  {q:"What OpenTofu feature is NOT in open-source Terraform?",opts:["Remote state","Native state file encryption at rest","Provider aliases","Dynamic blocks"],ans:1,exp:"OpenTofu introduced state encryption to help security-conscious teams protect sensitive data without complex workarounds."},
  {q:"What is the OpenTofu Registry?",opts:["HashiCorp Registry","registry.opentofu.org hosting providers and modules","Private only","GitHub Marketplace"],ans:1,exp:"OpenTofu maintains its own vendor-neutral registry for the community to share infrastructure components."},
  {q:"What organization initiated the project?",opts:["Google","A coalition including Gruntwork, Spacelift, and Env0","Amazon","Microsoft"],ans:1,exp:"A group of companies concerned about vendor lock-in formed the OpenTF manifesto, leading to the fork."},
  {q:"What restriction in BSL 1.1 prompted the fork?",opts:["Paid use","Restricts use in products competing with HashiCorp (e.g. managed services)","Prohibits cloud","No source code"],ans:1,exp:"Companies offering 'Terraform-as-a-service' would have been legally vulnerable under the new license terms."},
  {q:"Do Terraform providers work with OpenTofu?",opts:["No","Yes — they share the same provider protocol","Only HashiCorp ones","Only AWS"],ans:1,exp:"OpenTofu is compatible with the vast majority of existing providers because it supports the standard protocol."},
  {q:"What file extension does OpenTofu use?",opts:[".tofu",".tf (same as Terraform)","opentofu",".hcl only"],ans:1,exp:"Using .tf ensures that code editors and existing automation scripts don't need to be updated during migration."},
  {q:"What is the OpenTofu state file format?",opts:[".otu","The same JSON-based terraform.tfstate format","Binary","Encrypted only"],ans:1,exp:"The state format is identical to Terraform 1.5, allowing for easy rollbacks if needed."},
  {q:"What is OpenTofu's stance on backward compatibility?",opts:["Breaks often","Committed to strong compatibility with Terraform 1.5.x","No commitment","Only latest TF"],ans:1,exp:"Maintaining the ability to run existing Terraform code is a core pillar of the project's roadmap."},
  {q:"What is 'tofu plan' equivalent to?",opts:["ansible-playbook","terraform plan previewing changes","terraform apply","terraform validate"],ans:1,exp:"It provides the same dry-run capability to see what will happen before a deployment starts."},
  {q:"What does the OpenTofu community offer vs single-vendor control?",opts:["No support","Transparent governance, open roadmap, and community decisions","Enterprise only","Bug fixes only"],ans:1,exp:"OpenTofu decisions are made via public RFCs (Requests for Comment), ensuring the community has a voice."},
  {q:"What is the 'tofu fmt' command?",opts:["Formats state","Formats .tf files to canonical HCL style","Formats providers","Validates syntax"],ans:1,exp:"Formatting ensures that all team members' code looks consistent, regardless of who wrote it."},
  {q:"Can you use Terraform modules with OpenTofu?",opts:["No","Yes — local and registry modules work without modification","Public only","JSON only"],ans:1,exp:"Modules are treated as HCL configuration blocks, which OpenTofu parses exactly like Terraform."},
  {q:"What is 'tofu validate' used for?",opts:["Cloud credentials","Checks syntax and internal consistency of .tf files","Validates state","Validates versions"],ans:1,exp:"Validation is a local check to catch typos or missing variables before running a plan."},
  {q:"How does OpenTofu handle Terraform Cloud workspaces?",opts:["Compatible","Not compatible; teams use Spacelift, env0, or Atlantis","Special token","New cloud"],ans:1,exp:"Since Terraform Cloud is a proprietary service, OpenTofu users typically use open-source or third-party alternatives."},
  {q:"Significance of the 'OpenTF Manifesto'?",opts:["Roadmap","Public statement signed by 100s of companies demanding open-source","Internal doc","TF tutorial"],ans:1,exp:"The manifesto was the catalyst that showed how much the industry valued a truly open-source IaC ecosystem."},
  {q:"Enterprise advantage of OpenTofu?",opts:["Better AWS","No commercial use restrictions or BSL compliance issues","Faster","Better docs"],ans:1,exp:"Enterprises can build their own platforms on top of OpenTofu without worrying about licensing lawsuits from a competitor."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('openTofuMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "IAC_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('openTofuMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('openTofuMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('openTofuMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
