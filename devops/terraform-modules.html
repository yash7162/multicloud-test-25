<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraform Modules | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#ef4444;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(239,68,68,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(239, 68, 68, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(239, 68, 68, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">TF_MODULE_PROTOCOL_30</div>
    <h1>Terraform Modules Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Encapsulation Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Module logic verified. Dependency tree cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is a Terraform module?",opts:["Single resource block","Container of multiple resources grouped as a reusable unit","Provider plugin","State management tool"],ans:1,exp:"Modules are like functions in HCL, allowing you to bundle code and reuse it across different projects."},
  {q:"What is the 'root module' in Terraform?",opts:["The TF binary","Main directory containing the .tf files you run commands in","First module in a chain","Built-in TF module"],ans:1,exp:"The root module is the starting point that orchestrates child modules and provider configurations."},
  {q:"How do you call a child module?",opts:["include module","module \"name\" { source = \"./path\" }","import \"./module\"","use module"],ans:1,exp:"The module block requires a unique name and a source path to identify the code to execute."},
  {q:"What is a local module?",opts:["Registry module","Module stored in a local directory referenced by relative path","Local-only resource module","Built-in module"],ans:1,exp:"Local modules are stored on your machine and are perfect for project-specific logic."},
  {q:"What is a Terraform Registry module?",opts:["Local module","Publicly available, versioned module from registry.terraform.io","Private module in S3","Git repo module"],ans:1,exp:"The Registry provides a community hub for verified infrastructure patterns like VPCs and EKS clusters."},
  {q:"Source syntax for a Registry module?",opts:["registry/namespace","namespace/module-name/provider (e.g. terraform-aws-modules/vpc/aws)","https://url","module://name"],ans:1,exp:"This standardized naming convention helps Terraform find and download the correct code."},
  {q:"What is a Git registry module?",opts:["GitHub Marketplace","Module sourced directly from Git using a git:: URL","Git-tagged module only","GitLab only"],ans:1,exp:"You can pull modules directly from private or public repositories using SSH or HTTPS URLs."},
  {q:"How to specify a specific version for a Registry module?",opts:["module { version: 5 }","version = \"~> 5.0\" inside the module block","terraform install @5.0","tag = \"v5.0\""],ans:1,exp:"Versioning prevents unexpected infrastructure changes when a module author updates the source code."},
  {q:"What happens when you run 'terraform init' after adding a module?",opts:["Applies immediately","Downloads/installs module source to .terraform/modules","Validates syntax","Creates state"],ans:1,exp:"Init downloads a local copy of the module so Terraform can read its internal resource definitions."},
  {q:"What are module input variables?",opts:["Auto-created vars","Variables declared in module's variables.tf that accept values from parent","Output values","Provider vars"],ans:1,exp:"Inputs allow you to customize the module's behavior from the root configuration."},
  {q:"What are module output values?",opts:["Execution logs","Values exported from a module, accessible in the parent module","Passed variables","Error messages"],ans:1,exp:"Outputs allow a module to share resource IDs (like a VPC ID) with other resources in the root module."},
  {q:"How to reference a module output in the root?",opts:["output.mod.val","module.module_name.output_name","mod_name.out_name","ref(mod, out)"],ans:1,exp:"You must use the 'module' prefix followed by the name you gave the module block."},
  {q:"Purpose of module versioning?",opts:["Speed up plan","Ensures consistent infrastructure by locking to specific code states","Reduces state size","Required for all"],ans:1,exp:"Versioning is critical for production stability, ensuring 'TF Apply' is always predictable."},
  {q:"Recommended structure for a module?",opts:["module.tf only","main.tf, variables.tf, and outputs.tf in a folder","No standard","index and config"],ans:1,exp:"Standardizing the file structure makes it easy for other engineers to understand and use your modules."},
  {q:"What is the '.terraform/modules' directory?",opts:["Custom module store","Directory where TF caches downloaded Registry/Git modules","State storage","Binary store"],ans:1,exp:"This is a temporary cache that should never be committed to your version control system (Git)."},
  {q:"What is a module registry repository?",opts:["Local folder","Any VCS (Git) or Registry hosting reusable modules","Docker registry","Cloud workspace"],ans:1,exp:"Repositories act as the source of truth for the shared code you pull into your projects."},
  {q:"Naming convention for published Registry modules?",opts:["tf-provider","tf-provider-module","terraform-<PROVIDER>-<MODULE> (e.g. terraform-aws-vpc)","provider_mod"],ans:2,exp:"The Registry strictly enforces this naming format to ensure the UI can display the correct provider icons."},
  {q:"Can a module call another module?",opts:["No","Yes — creating a hierarchy of reusable components","Only in Cloud","Registry only"],ans:1,exp:"Nested modules allow for highly modular architectures, but keep the depth shallow for simplicity."},
  {q:"What does 'terraform get' do?",opts:["List providers","Downloads modules specified in config without initializing providers","Get state","Download plugins"],ans:1,exp:"'Get' is a lighter version of 'init' that specifically targets the module synchronization process."},
  {q:"What is the 'source' argument in a module block?",opts:["Module name","Required argument specifying where the module code resides","Version","Provider name"],ans:1,exp:"Source is the most important argument; without it, Terraform has no idea what code to run."},
  {q:"How to use a Git tag for a module source?",opts:["source=\"git::url#v1\"","source = \"git::https://url.git?ref=v1.0\"","source=\"git://@v1\"","git_ref=\"v1\""],ans:1,exp:"Using a tag (ref) ensures your infrastructure code is pinned to a specific release of the module repo."},
  {q:"Benefit of pre-built Registry modules?",opts:["Always free","They provide tested, community-maintained best practice patterns","No variables","Auto-update infra"],ans:1,exp:"Registry modules handle complex edge cases (like NAT Gateways in VPCs) so you don't have to write the YAML/HCL logic."},
  {q:"Module 'for_each' or 'count' purpose?",opts:["State counting","Creating multiple instances of a module with different configs","Count inputs","Iterate regions"],ans:1,exp:"You can loop a whole module (e.g. create 3 identical microservice environments) with a single block."},
  {q:"What is 'depends_on' in a module block for?",opts:["Version pinning","Explicitly declaring a module depends on another resource completing first","Setting priority","Authentication"],ans:1,exp:"Use depends_on when one module relies on a resource that isn't directly passed as a variable."},
  {q:"Best practice for dev/prod with modules?",opts:["Separate .tf files","Separate root directories (environments/) calling shared modules","Workspaces only","Duplicate code"],ans:1,exp:"Isolation by directory is the safest way to ensure a change in 'dev' cannot possibly touch 'production' state."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('tfModulesMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "MODULE_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('tfModulesMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('tfModulesMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('tfModulesMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
