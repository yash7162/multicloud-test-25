<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraform Best Practices | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#ef4444;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(239,68,68,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(239, 68, 68, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(239, 68, 68, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">IAC_EXPERT_PROTOCOL_32</div>
    <h1>Terraform Best Practices</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">IaC Compliance Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Terraform expert protocol verified. Resource state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"How do you configure multiple AWS providers targeting different regions in Terraform?",opts:["Create multiple main.tf files","Use provider aliases","Use two separate state files","Set AWS_REGION env var per resource"],ans:1,exp:"Provider aliases allow you to define multiple configurations for the same provider, enabling multi-region resource management."},
  {q:"How do you reference a specific provider alias in a resource?",opts:["provider_alias = \"eu\"","provider = aws.eu","use_provider = \"eu\"","Define region in resource"],ans:1,exp:"Inside the resource block, use the 'provider' argument followed by 'providerName.aliasName'."},
  {q:"What does 'for_each' do when used on a resource?",opts:["Loops over tasks","Creates one resource instance for each key-value pair in a map or set","Creates a list output","Loops over providers"],ans:1,exp:"'for_each' is a meta-argument that creates multiple instances of a resource based on a collection, making code dynamic."},
  {q:"What is the primary difference between 'count' and 'for_each'?",opts:["No difference","count uses indexes (0,1); for_each uses keys for named instances","count is deprecated","for_each only works with modules"],ans:1,exp:"'for_each' is generally preferred because adding or removing items from the middle of a list doesn't cause index shifts and resource re-creation."},
  {q:"How to iterate over a list of ports using for_each?",opts:["Use count","Convert to set: for_each = toset(var.ports)","Use a for loop inside resource","Use dynamic blocks with count"],ans:1,exp:"The 'for_each' meta-argument requires a map or a set. 'toset()' is the standard way to handle lists."},
  {q:"What is a Terraform 'dynamic' block used for?",opts:["Dynamic variables","Generating repeated nested blocks (like SG ingress) programmatically","Dynamic provider loading","Runtime resolution"],ans:1,exp:"Dynamic blocks allow you to generate repeated configuration patterns within a single resource definition."},
  {q:"What is a 'locals' block used for?",opts:["Declaring inputs","Defining named, computed values to simplify expressions and keep code DRY","Defining outputs","Storing credentials"],ans:1,exp:"Locals help you calculate complex logic once and reuse it many times throughout your code without repeating it."},
  {q:"What is the Terraform Docker provider useful for?",opts:["Testing syntax","Managing Docker resources locally for testing patterns without cloud costs","Containerizing Terraform","Deploying to K8s"],ans:1,exp:"It's an excellent way to practice HCL logic and resource orchestration on your local laptop."},
  {q:"Terraform best practice regarding module structure?",opts:["All code in main.tf","Separate main.tf, variables.tf, and outputs.tf for encapsulation","Never use modules","Store secrets in .tf"],ans:1,exp:"Standardizing file structure makes your infrastructure code easier to read and maintain for team members."},
  {q:"Recommended way to manage secrets in Terraform?",opts:["Hardcode them","Store in .tfvars and commit","Use AWS Secrets Manager or mark variables as sensitive","Use locals"],ans:2,exp:"Secrets should never touch version control. Use remote vaults or env vars marked with 'sensitive = true'."},
  {q:"Complete recommended Terraform workflow for teams?",opts:["edit -> apply","write -> fmt -> validate -> plan -> review -> apply","init -> apply -> destroy","plan -> init -> apply"],ans:1,exp:"Peer review and automated planning (CI/CD) are critical for preventing accidental infrastructure destruction."},
  {q:"What is Atlantis in the context of Terraform?",opts:["AWS service","Open-source tool that automates plan/apply via PR comments","Provider name","HashiCorp product"],ans:1,exp:"Atlantis enables a GitOps workflow where infrastructure is changed only after a Pull Request is approved and commented on."},
  {q:"What is Terraform Cloud?",opts:["A cloud provider","HashiCorp's SaaS for remote state, team collaboration, and policy enforcement","CI/CD pipeline","Monitor"],ans:1,exp:"Terraform Cloud acts as a centralized brain for Terraform, handling state locking and remote execution automatically."},
  {q:"Core AWS resource for an EKS cluster in Terraform?",opts:["aws_kubernetes","aws_eks","aws_eks_cluster","aws_k8s"],ans:2,exp:"'aws_eks_cluster' handles the control plane setup, which is the brain of the Kubernetes environment."},
  {q:"Resource used to create an EKS node group?",opts:["aws_eks_nodes","aws_ec2_node_group","aws_eks_node_group","aws_kubernetes_nodes"],ans:2,exp:"Node groups represent the worker machines that actually run your containerized pods."},
  {q:"What is AWS ECS?",opts:["K8s service","Managed container orchestration service (simpler alternative to K8s)","Serverless compute","Container registry"],ans:1,exp:"ECS is an AWS-native service that makes it very easy to run Docker containers at scale."},
  {q:"What is AWS Fargate?",opts:["EC2 type","Serverless compute engine for ECS/EKS (no servers to manage)","Registry","Load balancer"],ans:1,exp:"Fargate removes the 'Node' management layer, so you only define the CPU/RAM for your container and pay for usage."},
  {q:"Resource to create an ECS cluster?",opts:["aws_ecs","aws_ecs_service","aws_ecs_cluster","aws_container_cluster"],ans:2,exp:"The cluster is the logical group of tasks and services running in your environment."},
  {q:"Key argument for Fargate ECS tasks?",opts:["launch_type=SERVERLESS","requires_compatibilities = [\"FARGATE\"] and network_mode = \"awsvpc\"","fargate = true","compute_type=fargate"],ans:1,exp:"Fargate tasks have specific networking and capability requirements defined in the Task Definition."},
  {q:"What is Terraform's 'moved' block?",opts:["Moves state file","Declaratively refactor resource addresses without destroying infrastructure","Moves providers","Moves variables"],ans:1,exp:"Moved blocks allow you to rename resources or move them into modules without Terraform trying to delete and recreate them."},
  {q:"What is Terraform's 'check' block (TF 1.5+)?",opts:["Validates versions","Defines assertions to verify infrastructure health after apply","Checks syntax","Security scan"],ans:1,exp:"Check blocks allow you to perform functional testing on your live infrastructure directly within the HCL."},
  {q:"Complementary HashiCorp tools?",opts:["TF and Vault only","Vault, Consul, Packer, Nomad, Boundary","Vault and Consul","Puppet and Chef"],ans:1,exp:"HashiCorp provides a full 'Zero Trust' stack for secrets, discovery, images, and scheduling."},
  {q:"What is Packer and its relation to Terraform?",opts:["State compressor","Builds machine images (AMIs) that Terraform can provision","CLI plugin","Secrets manager"],ans:1,exp:"Packer creates the 'Golden Image', and Terraform uses that image ID to launch the actual infrastructure."},
  {q:"Best practice for version constraints?",opts:["Never pin","Always pin exact","Use constraint operators (~>, >=) for minor/patch stability","Use latest"],ans:2,exp:"The pessimistic constraint (~>) is best as it allows bug fixes (patches) but blocks breaking changes (majors)."},
  {q:"What is Terraform's 'for' expression?",opts:["Loop resources","Transforming collections (creating new lists/maps from existing ones)","Running playbooks","Provisioner loop"],ans:1,exp:"For expressions allow you to filter and transform data, such as capitalizing a list of names or mapping IDs."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('tfBestPracticesMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "IAC_EXPERT"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('tfBestPracticesMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('tfBestPracticesMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('tfBestPracticesMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
