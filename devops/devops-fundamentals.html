<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Fundamentals | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#10b981;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(16,185,129,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(16, 185, 129, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(16, 185, 129, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">DEVOPS_CORE_01</div>
    <h1>DevOps Fundamentals mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_BLOCK</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Protocol Verification Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">DevOps cultural state verified. Delivery pipeline cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
    {q:"What is the primary goal of DevOps?",opts:["Replace developers","Bridge the gap between Dev and Ops for faster delivery","Automate only testing","Eliminate sysadmins"],ans:1,exp:"DevOps aims to break down silos between teams to deliver software faster, more reliably, and more frequently through shared tools and processes."},
    {q:"Which of the following best describes the DevOps philosophy?",opts:["Separate silos","Devs never interact with deployment","Culture of collaboration across the entire lifecycle","Ops manages all code"],ans:2,exp:"It is a cultural movement emphasizing shared responsibility, starting from requirements gathering through development to production support."},
    {q:"Which year saw a significant rise in DevOps adoption driven by cloud?",opts:["2003","2008","2015","2000"],ans:2,exp:"By 2015, the convergence of major cloud providers and containerization made the DevOps 'Infrastructure-as-Code' model the industry standard."},
    {q:"Which industry has seen the highest adoption of DevOps?",opts:["Agriculture","Financial Services & Tech","Retail","Healthcare"],ans:1,exp:"FinTech leads because rapid feature delivery is a competitive requirement, while strict compliance necessitates the audit trails provided by automation."},
    {q:"DevOps market trends indicate that job roles are:",opts:["Sysadmin roles increasing","DevOps roles declining","Fastest growing in IT","Only for architects"],ans:2,exp:"Demand for DevOps professionals far exceeds supply, as companies across all sectors migrate to cloud-native architectures."},
    {q:"What is a Shell Script?",opts:["GUI tool","Program written in shell language to automate CLI tasks","Windows only tool","DB query language"],ans:1,exp:"Shell scripts are files containing sequences of commands that the OS executes, essential for automating server tasks."},
    {q:"Common use of shell scripts in DevOps?",opts:["UI design","Automating server provisioning and deployment","Mobile apps","DB management only"],ans:1,exp:"Scripts handle the 'glue' between different tools, performing tasks like environment setup, backups, and log rotation."},
    {q:"Which skill is considered most important for a DevOps Engineer?",opts:["Java only","CI/CD, automation, cloud, and tools","DB admin only","Front-end only"],ans:1,exp:"A DevOps engineer needs broad knowledge of the delivery pipeline, ranging from version control to production observability."},
    {q:"Which is NOT a typical skill for a DevOps Engineer?",opts:["Git proficiency","CI/CD understanding","Graphic design","Linux knowledge"],ans:2,exp:"DevOps is focused on engineering and automation; graphic design is typically handled by UI/UX or marketing teams."},
    {q:"In a Delivery Pipeline, which stage comes immediately after code commit?",opts:["Production","Build / Compile","Monitoring","UAT testing"],ans:1,exp:"The build stage turns source code into a binary artifact that can be tested and eventually deployed."},
    {q:"What is the correct order of a typical DevOps delivery pipeline?",opts:["Deploy-Test-Build-Code","Code → Build → Test → Deploy → Monitor","Test-Code-Deploy-Build","Monitor-Deploy-Test-Code"],ans:1,exp:"Software flows from development (Code), to artifact creation (Build), verification (Test), release (Deploy), and operational health (Monitor)."},
    {q:"What role does 'Continuous Integration' play?",opts:["Manual deployment","Automatically builds and tests code on every commit","Performance monitoring","Replaces testing"],ans:1,exp:"CI ensures that code changes from different developers work together immediately, preventing 'integration hell' at the end of a sprint."},
    {q:"Which tool is commonly used for CI in DevOps?",opts:["Photoshop","Jenkins","Excel","Notepad"],ans:1,exp:"Jenkins is the most widely adopted open-source automation server for building and testing software."},
    {q:"Which tool is used for container orchestration?",opts:["Jenkins","Ansible","Kubernetes","SonarQube"],ans:2,exp:"Kubernetes manages the lifecycle of containers, handling scaling, self-healing, and service discovery."},
    {q:"What does 'Infrastructure as Code' (IaC) mean?",opts:["UI code","Managing infra using code/scripts instead of manual clicks","SQL only","Word documentation"],ans:1,exp:"IaC treats servers, networks, and databases like software code, allowing them to be version controlled and automatically provisioned."},
    {q:"Which represents the 'Three Ways' of DevOps?",opts:["Speed-Security-Savings","Flow, Feedback, Continual Learning","Plan-Do-Check","Build-Test-Deploy"],ans:1,exp:"The Three Ways (Gene Kim) are the underpinning principles: Flow (left-to-right), Feedback (right-to-left), and Learning (culture)."},
    {q:"What is 'Continuous Delivery'?",opts:["Pizza delivery","Auto-deploy every commit without checks","Ensuring code is always in a deployable state for on-demand release","Manual only"],ans:2,exp:"CD focuses on keeping the application ready for production at any time, even if the final deployment is a manual business decision."},
    {q:"Which tool is used for Configuration Management?",opts:["Docker","Ansible","Git","Maven"],ans:1,exp:"Ansible uses YAML-based 'playbooks' to ensure that all servers are configured identically and reach their desired state."},
    {q:"Purpose of monitoring in the pipeline?",opts:["Write features","Observe application health and alert on issues","Compile code","Manage Git"],ans:1,exp:"Monitoring provides the visibility needed to detect performance regressions and failures in production before users report them."},
    {q:"Which statement best describes 'Shift Left'?",opts:["Move servers","Moving testing and security earlier in the cycle","Ops handles everything","Move to different region"],ans:1,exp:"Shifting left means integrating quality and security checks at the very beginning of development to fix issues when they are cheapest to resolve."},
    {q:"Which practice focuses on automating production deployment?",opts:["Integration","Continuous Deployment","Version Control","Load Balancing"],ans:1,exp:"Continuous Deployment takes CD a step further by automatically pushing every build that passes all tests directly to production."},
    {q:"Main benefit of DevOps?",opts:["Manual work","Slower cycles","Faster delivery of high-quality software","No bugs"],ans:2,exp:"DevOps allows businesses to innovate faster, respond to market changes quickly, and maintain a highly stable platform."},
    {q:"Which is part of the ecosystem for artifact management?",opts:["JFrog Artifactory","Word","OpenOffice","Zoom"],ans:0,exp:"Artifact repositories like JFrog store the versioned binaries (JARs, Docker images) produced by the build stage."},
    {q:"What does CALMS stand for?",opts:["Code-Auto-Link-Monitor-Scale","Culture, Automation, Lean, Measurement, Sharing","Configure-Apply-Load-Manage-Ship","Compile-Archive-Launch-Monitor-Sync"],ans:1,exp:"The CALMS framework is the standard for evaluating how well an organization has adopted the DevOps mindset."},
    {q:"Role of 'Automated Testing'?",opts:["Review code","Verify that changes don't break existing functionality","Deploy code","Monitor CPU"],ans:1,exp:"Automation allows for thorough regression testing that would be impossible to perform manually on every single code change."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('devopsFundMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "CULTURE"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('devopsFundMasteryCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('devopsFundMasteryCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('devopsFundMasteryCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
