<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Fundamentals | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#06b6d4;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(6,182,212,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#06b6d4,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(6, 182, 212, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(6, 182, 212, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">DOCKER_CORE_PROTOCOL_01</div>
    <h1>Docker Fundamentals</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Container Verification Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Docker logic verified. Image layers cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is Docker?",opts:["Version control tool","Containerization platform for packaging apps with dependencies","Deployment service","Monitoring tool"],ans:1,exp:"Docker isolates applications into containers, ensuring they run the same way regardless of the environment."},
  {q:"What is a Docker Image?",opts:["Photo file","Lightweight, immutable template containing app code and libraries","Configuration file","Deployment artifact"],ans:1,exp:"Images are the read-only blueprints used to create running containers."},
  {q:"What is a Docker Container?",opts:["Shipping container","Running instance of a Docker image","Storage device","Network interface"],ans:1,exp:"Containers are the live execution of an image, providing a portable runtime environment."},
  {q:"What is Docker Engine?",opts:["Web server","The core platform (daemon, API, CLI) that builds and runs containers","Database","Cache system"],ans:1,exp:"Docker Engine is the client-server application that powers the entire container lifecycle."},
  {q:"What is a Dockerfile?",opts:["Config text","Script file with instructions to build a Docker image","Deployment plan","System log"],ans:1,exp:"Dockerfiles contain a sequence of instructions used by the 'docker build' command to create an image."},
  {q:"What is the FROM instruction in a Dockerfile?",opts:["Source check","Specifies the base image for the new image","File import","Entry location"],ans:1,exp:"All Dockerfiles must begin with a FROM instruction to set the foundation (e.g., Ubuntu, Alpine, Node)."},
  {q:"What is the RUN instruction in a Dockerfile?",opts:["Execute container","Executes commands during image build (e.g., apt install)","Port mapping","Volume mount"],ans:1,exp:"RUN creates a new layer by executing commands and committing the resulting state to the image."},
  {q:"What is the COPY instruction in a Dockerfile?",opts:["Clone container","Copies files from the host machine to the image filesystem","Directory creation","State backup"],ans:1,exp:"COPY moves local application source code or configurations into the image being built."},
  {q:"What is the EXPOSE instruction in a Dockerfile?",opts:["Public access","Documents which ports the container intends to listen on","App deployment","Network bridge"],ans:1,exp:"EXPOSE serves as metadata documentation for networking, though it doesn't actually open the port."},
  {q:"What is the CMD instruction in a Dockerfile?",opts:["Copy logic","Specifies the default command to run when the container starts","Build trigger","Cleanup tool"],ans:1,exp:"CMD sets the default executable for the container, which can be easily overridden at runtime."},
  {q:"What is the ENTRYPOINT instruction in a Dockerfile?",opts:["Start path","Configures the container to run as a specific executable","Network gate","Default user"],ans:1,exp:"ENTRYPOINT is harder to override than CMD and is used to make containers behave like dedicated binaries."},
  {q:"What command pulls an image from Docker Hub?",opts:["docker push","docker pull","docker build","docker fetch"],ans:1,exp:"'docker pull' downloads images from a remote registry to your local system cache."},
  {q:"What command creates and starts a container?",opts:["docker create","docker run","docker start","docker up"],ans:1,exp:"'docker run' is the most used command; it pulls, creates, and starts a container in one go."},
  {q:"What does the 'docker ps' command do?",opts:["Process list","Lists currently running containers","Shows images","Stops all"],ans:1,exp:"Use 'docker ps' to see active containers and 'docker ps -a' to see all containers (including stopped ones)."},
  {q:"What does the 'docker images' command do?",opts:["Image gallery","Lists all Docker images stored locally on the host","Container list","Registry check"],ans:1,exp:"This shows you every image that has been built or pulled to your local workstation."},
  {q:"What command stops a running container?",opts:["docker kill","docker stop","docker pause","docker rm"],ans:1,exp:"'docker stop' allows the application inside the container to shut down gracefully before exiting."},
  {q:"What is Docker Compose?",opts:["Deployment tool","Tool for defining and running multi-container applications via YAML","Single container CLI","CI tool"],ans:1,exp:"Compose allows you to manage stacks (e.g., Frontend + DB) with a single configuration file."},
  {q:"What is the docker-compose.yml file for?",opts:["Image building","Defining services, networks, and volumes for a multi-container stack","Logging","System config"],ans:1,exp:"This YAML file allows you to version control your entire application architecture."},
  {q:"What command starts services in docker-compose.yml?",opts:["docker-compose up","docker-compose start","docker-compose run","docker-compose create"],ans:0,exp:"'docker-compose up' builds (if needed), creates, and starts all containers defined in the YAML file."},
  {q:"What is Docker Hub?",opts:["Local repo","Official cloud-based registry for sharing and finding container images","Docker docs","Docker IDE"],ans:1,exp:"Docker Hub is the central library where most public images (like Nginx or Python) are hosted."},
  {q:"What is Docker Networking?",opts:["Physical cables","Mechanism for containers to talk to each other and the internet","Port mapping only","VPN logic"],ans:1,exp:"Docker creates virtual bridges to manage communication between isolated container environments."},
  {q:"What is a Docker Volume?",opts:["Storage size","Persistent storage that lives outside the container lifecycle","RAM limit","CPU share"],ans:1,exp:"Volumes ensure your data (like a database) isn't lost when the container is deleted or updated."},
  {q:"Single vs Multi-stage builds difference?",opts:["Same logic","Multi-stage uses multiple FROMs to minimize final image size","Syntax only","Registry type"],ans:1,exp:"Multi-stage builds allow you to compile code in one large image and copy the binary to a tiny production image."},
  {q:"What does a Docker Layer represent?",opts:["Virtual NIC","A read-only instruction in a Dockerfile that forms part of an image","Disk partition","Volume mount"],ans:1,exp:"Images are built in layers; if you change one line, Docker only rebuilds that layer and the ones following it."},
  {q:"Which command removes all stopped containers?",opts:["docker rm -all","docker container prune","docker delete stopped","docker wipe"],ans:1,exp:"Pruning is a cleanup command that helps reclaim disk space by removing unused Docker objects."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('dockerIntroMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "CONTAINER_CORE"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('dockerIntroMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('dockerIntroMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('dockerIntroMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
