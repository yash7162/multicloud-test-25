<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Actions | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#10b981;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(16,185,129,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#10b981,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(16, 185, 129, 0.05)}
.option.disabled{cursor:default}

.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(16, 185, 129, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">GITHUB_ACTIONS_01</div>
    <h1>GitHub Actions mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Audit Status</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Automation protocol verified. Deployment history cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_SESSION</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is GitHub Actions?",opts:["A version control system","GitHub's native CI/CD automation platform","A repository management tool","A deployment service"],ans:1,exp:"GitHub Actions is built into GitHub, enabling developers to automate software workflows directly from their repositories."},
  {q:"Where are GitHub Actions workflows defined?",opts:["Main branch only",".github/workflows/ directory in YAML files","Root directory","Configuration file only"],ans:1,exp:"Workflow logic must reside in the .github/workflows/ folder for GitHub to detect and execute the YAML files."},
  {q:"What is a GitHub Actions Workflow?",opts:["A repo branch","An automated process defined in YAML that runs on GitHub events","Deployment strategy","Security policy"],ans:1,exp:"Workflows are the top-level automated processes that respond to events like pushes or pull requests."},
  {q:"What are GitHub Actions Jobs?",opts:["Repo issues","Sets of steps executed in a workflow on the same runner","Code commits","Pull requests"],ans:1,exp:"Jobs represent a single execution environment where multiple tasks (steps) are performed together."},
  {q:"What are GitHub Actions Steps?",opts:["Commits in history","Individual tasks within a job (commands or actions)","Pull request reviews","Branch operations"],ans:1,exp:"Steps are the smallest unit of execution in a job, either running shell commands or existing actions."},
  {q:"What are GitHub Actions Actions?",opts:["Repo actions","Reusable units of code that perform tasks","Git commands","Deployment strategies"],ans:1,exp:"Actions are reusable components, either from the GitHub Marketplace or your own repo, used within steps."},
  {q:"What is a GitHub Actions Runner?",opts:["A Git command","A machine (hosted or self-hosted) that executes workflow jobs","Deployment tool","Repo tool"],ans:1,exp:"A Runner is the compute instance where your workflow code is actually executed."},
  {q:"What are GitHub-Hosted Runners?",opts:["Personal computers","Virtual machines hosted by GitHub with pre-installed tools","Self-managed servers","Cloud instances"],ans:1,exp:"GitHub provides managed VMs with popular operating systems so you don't have to maintain your own servers."},
  {q:"What are Self-Hosted Runners?",opts:["GitHub runners","Machines you provide and manage to run workflows","Cloud instances only","Docker containers"],ans:1,exp:"Self-hosted runners allow you to run jobs on your own infrastructure for more control over hardware and security."},
  {q:"What is the syntax for triggering a workflow on push?",opts:["on: push","trigger: push","when: push","events: push"],ans:0,exp:"The 'on:' keyword is used to define the specific GitHub events that start the workflow."},
  {q:"What does 'on: pull_request' trigger do?",opts:["On branch creation","Triggers workflow when PRs are opened, updated, or reopened","Only on merge","On commit only"],ans:1,exp:"This trigger is essential for automated testing and code quality checks during the review process."},
  {q:"What is a GitHub Actions Secret?",opts:["Password file","Encrypted sensitive data securely stored and accessible in workflows","Public keys","Hard-coded passwords"],ans:1,exp:"Secrets allow you to use API keys or passwords in pipelines without exposing them in the source code."},
  {q:"How do you access a secret in GitHub Actions?",opts:["$secret.NAME","${{ secrets.SECRET_NAME }}","${SECRET_NAME}","secrets.get(NAME)"],ans:1,exp:"The double-brace syntax is used to pull encrypted variables from the repository settings securely."},
  {q:"Where do you define GitHub Actions Secrets?",opts:["In YAML file","Repo Settings > Secrets and variables > Actions","Main branch","Config file"],ans:1,exp:"Secrets are managed through the web interface under repository settings to ensure they stay encrypted."},
  {q:"What are Environment Variables in Actions?",opts:["System variables only","Variables passed to workflows (secrets or plain values)","File paths","Hard-coded values"],ans:1,exp:"Env vars are used to store configuration data that can be shared across different jobs or steps."},
  {q:"How do you define environment variables in a workflow?",opts:[".env file only","Using 'env:' keyword in jobs or steps","Hard-coding","Config file only"],ans:1,exp:"The 'env:' block defines key-value pairs at the workflow, job, or individual step level."},
  {q:"What is the 'uses' keyword in GitHub Actions?",opts:["Specifies job output","Specifies an Action to run from Marketplace or path","Job condition","Environment setup"],ans:1,exp:"'uses' points the runner to an existing action (like actions/checkout) to execute it."},
  {q:"What is the 'run' keyword in GitHub Actions?",opts:["Executes Action","Executes shell commands directly on the runner","Job scheduling","Trigger configuration"],ans:1,exp:"'run' is used when you want to execute standard CLI commands like 'npm test' or 'make build'."},
  {q:"What does 'if' condition do?",opts:["Mark as complete","Conditionally executes jobs or steps based on expressions","Required parameter","Output formatting"],ans:1,exp:"The 'if' keyword allows you to skip jobs or steps based on logic (e.g., only run if a previous step failed)."},
  {q:"What is 'matrix' strategy?",opts:["No meaning","Creates multiple job instances with different configurations","Output format","Deployment strategy"],ans:1,exp:"Matrices allow you to test your code against multiple versions of a language or multiple OS versions simultaneously."},
  {q:"How do you use matrix in workflows?",opts:["No way","Define matrix under strategy block and access with ${{ matrix.X }}","Hard-coding","Separate files"],ans:1,exp:"Defining a matrix simplifies testing by automating the repetition of jobs with different parameters."},
  {q:"What is 'needs' in GitHub Actions?",opts:["No purpose","Specifies job dependencies (wait for completions)","Artifact storage","Trigger config"],ans:1,exp:"'needs' defines the order of operations, ensuring that a deploy job doesn't start until the test job passes."},
  {q:"What is GitHub Actions Artifact?",opts:["Code file","Files created during workflow (reports, binaries) stored for download","Env variable","Log file"],ans:1,exp:"Artifacts allow you to persist data after a job ends, such as compiled binaries or test result files."},
  {q:"How do you upload artifacts?",opts:["Manual only","Using 'actions/upload-artifact' action with path and name","Env variables","Separate tool"],ans:1,exp:"The upload-artifact action is the standard way to save data from the runner to GitHub's storage."},
  {q:"What is the default checkout action?",opts:["uses: git/clone","uses: actions/checkout@v4","run: git checkout","uses: repo/get"],ans:1,exp:"Nearly every workflow starts with 'actions/checkout' to bring the source code onto the runner."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('githubActionsMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('githubActionsMasteryCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('githubActionsMasteryCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('githubActionsMasteryCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
