<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubernetes Advanced | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#84cc16;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(132,204,22,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(132,204,22,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(132,204,22,.08);border:1px solid rgba(132,204,22,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#84cc16,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(132, 204, 22, 0.05)}
.option.disabled{cursor:default}

/* FIXED VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(132, 204, 22, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">K8S_ADVANCED_PROTOCOL_22</div>
    <h1>Kubernetes Advanced Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Cluster Integrity Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Advanced orchestration protocol verified. Control plane state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_SESSION</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is Helm in the Kubernetes ecosystem?",opts:["A monitoring tool","A package manager for K8s apps using Charts","A container runtime","A network plugin"],ans:1,exp:"Helm acts like 'apt' or 'yum' for Kubernetes, simplifying the deployment of complex applications."},
  {q:"What is a Helm Chart?",opts:["A Grafana dashboard","A collection of files describing a set of K8s resources","A Docker image","A YAML ConfigMap"],ans:1,exp:"Charts bundle multiple Kubernetes manifests together with templates and default values."},
  {q:"Which command installs a Helm chart?",opts:["helm deploy","helm apply","helm install","helm run"],ans:2,exp:"The 'install' command takes a chart and creates a specific instance (release) in your cluster."},
  {q:"What file in a Helm chart contains default configuration values?",opts:["Chart.yaml","templates/","values.yaml","requirements.yaml"],ans:2,exp:"values.yaml is where users provide the settings that customize the templates in the chart."},
  {q:"What is a Helm Release?",opts:["A new version of Helm CLI","An instance of a chart deployed to a cluster","A public repo","A rollback action"],ans:1,exp:"Every time you install a chart, Helm creates a unique 'Release' name to track that specific deployment."},
  {q:"What does kube-scheduler use to place a pod?",opts:["Random selection","Resource requests, affinity, taints, and capacity","Alphabetical order","etcd lookup"],ans:1,exp:"The scheduler evaluates nodes against pod requirements to find the most efficient placement."},
  {q:"What is a Node Taint?",opts:["Performance metric","A mark on a node that repels pods without matching tolerations","Security cert","Network policy"],ans:1,exp:"Taints allow nodes to 'push away' pods, ensuring only specific workloads run on specific hardware."},
  {q:"What is Node Affinity?",opts:["Pod-to-pod network","Rules that attract pods to specific nodes based on labels","Volume rule","Pod communication"],ans:1,exp:"Affinity is the opposite of taints; it 'attracts' pods to nodes that have specific key-value pairs."},
  {q:"What does the Metrics Server provide?",opts:["Long-term storage","Real-time resource usage (CPU/RAM) for nodes and pods","Container registry","Backup"],ans:1,exp:"Metrics Server is a lightweight data source used by HPA and 'kubectl top'."},
  {q:"Which command shows pod CPU/memory usage?",opts:["kubectl stats","kubectl top pods","kubectl usage","kubectl monitor"],ans:1,exp:"The 'top' command provides a real-time snapshot of cluster resource consumption."},
  {q:"What is a Persistent Volume (PV)?",opts:["Temp storage","A cluster-wide storage resource independent of pod lifecycle","Local disk","ConfigMap storage"],ans:1,exp:"PVs provide a way to 'abstract' storage so it doesn't get deleted when a pod restarts."},
  {q:"What is a Persistent Volume Claim (PVC)?",opts:["User request for storage","Storage class definition","Volume snapshot","Backup config"],ans:0,exp:"PVCs are the way developers ask the cluster for a specific amount of storage (e.g., 10GB)."},
  {q:"What is a StorageClass?",opts:["Storage namespace","Defines how a PV is dynamically provisioned","Pod volume type","ConfigMap type"],ans:1,exp:"StorageClasses allow the cluster to automatically create PVs on-demand from cloud providers like AWS."},
  {q:"What does EKS stand for?",opts:["Elastic Kubernetes Service","Extended K8s","Enterprise K8s","Elastic Scheduler"],ans:0,exp:"EKS is the AWS managed service that takes care of the Kubernetes control plane for you."},
  {q:"What does AKS stand for and which cloud provides it?",opts:["Amazon K8s - AWS","Azure Kubernetes Service - Microsoft","Advanced K8s - Google","IBM K8s"],ans:1,exp:"AKS is the Microsoft Azure equivalent of EKS, simplifying cluster management."},
  {q:"What does GKE stand for?",opts:["General K8s","Google Kubernetes Engine","Global K8s","Geo Extension"],ans:1,exp:"GKE is Google Cloud's managed offering, widely considered the most mature K8s service."},
  {q:"What does EFK stand for in logging?",opts:["Elastic, Fluentd, Kibana","Elasticsearch, Fluentd, Kibana","Filebeat variant","Event monitoring"],ans:1,exp:"EFK is a standard stack for gathering and searching logs across an entire cluster."},
  {q:"In EFK, what is the role of Fluentd?",opts:["Store data","Visualize logs","Collect, filter, and ship logs to Elasticsearch","Run scripts"],ans:2,exp:"Fluentd runs as a DaemonSet on every node to 'scrape' logs from all running containers."},
  {q:"In EFK, what is Kibana used for?",opts:["Storing logs","Pod collection","Visualizing and querying logs in Elasticsearch","Scripts"],ans:2,exp:"Kibana provides the web dashboard where you can search through the gigabytes of log data."},
  {q:"Which command lists Helm releases?",opts:["helm list","helm get all","helm show","helm status"],ans:0,exp:"'helm list' or 'helm ls' shows you exactly what is currently deployed via Helm."},
  {q:"What is a ConfigMap?",opts:["Volume type","API object for non-sensitive configuration key-pairs","Secret store","Network policy"],ans:1,exp:"ConfigMaps separate your application logic from its environment-specific configuration."},
  {q:"What is a Kubernetes Secret used for?",opts:["App code","Storing sensitive data like passwords/tokens in base64","Network policy","Scheduling"],ans:1,exp:"Secrets are designed specifically for sensitive data, ensuring it isn't stored in plain text YAML."},
  {q:"What Helm command updates an existing release?",opts:["helm update","helm upgrade","helm patch","helm redeploy"],ans:1,exp:"'upgrade' allows you to change the version of your app or modify its values without a total delete."},
  {q:"What is Pod Disruption Budget (PDB)?",opts:["Cost policy","Policy limiting simultaneous pod disruptions for HA","Resource limit","Scheduling rule"],ans:1,exp:"PDBs ensure that at least a certain number of pods are always running during cluster maintenance."},
  {q:"Purpose of Namespaces in multi-team clusters?",opts:["Increase speed","Logically isolate resources and manage per-team access","Reduce node count","Speed up deploy"],ans:1,exp:"Namespaces act as virtual clusters, preventing different teams from interfering with each other's pods."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('k8sAdvancedMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "ADV_ORCHESTRATION"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('k8sAdvancedMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('k8sAdvancedMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('k8sAdvancedMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
