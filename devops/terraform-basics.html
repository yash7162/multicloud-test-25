<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraform Basics | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#ef4444;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(239,68,68,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(239, 68, 68, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(239, 68, 68, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">TERRAFORM_CORE_PROTOCOL_29</div>
    <h1>Terraform Basics Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Provisioning Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Terraform HCL protocol verified. Resource state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is the correct order of Terraform workflow commands?",opts:["plan → init → apply","init → plan → apply","apply → plan → init","init → apply → plan"],ans:1,exp:"You must initialize the workspace (init), dry-run the changes (plan), and then execute (apply)."},
  {q:"What does 'terraform init -upgrade' do?",opts:["Reinstalls Terraform","Upgrades providers to the latest version satisfy constraints","Upgrades the binary","Migrates state"],ans:1,exp:"It tells Terraform to check the registry for newer provider versions within your allowed range."},
  {q:"How do you declare an input variable in Terraform?",opts:["var http_port = 80","variable \"http_port\" { default = 80 }","let http_port = 80","set http_port 80"],ans:1,exp:"The 'variable' block defines the name, type, and optional default values for inputs."},
  {q:"How do you reference a variable in a Terraform resource?",opts:["$http_port","var.http_port","variables[http_port]","@http_port"],ans:1,exp:"Access inputs using the 'var.' prefix. In strings, use the ${var.name} interpolation syntax."},
  {q:"Purpose of 'variables.tf' in a project?",opts:["Stores values","Declares input variable definitions (name, type, default)","Stores credentials","Defines output values"],ans:1,exp:"By convention, this file is used for schema definitions, while values live in .tfvars files."},
  {q:"Purpose of 'output.tf'?",opts:["Logs plan","Defines values displayed after apply or passed to other modules","Stores defaults","Defines providers"],ans:1,exp:"Outputs are like return values from a function, showing useful info like public IPs or resource IDs."},
  {q:"What Terraform resource creates an AWS VPC?",opts:["aws_network","aws_vpc","aws_virtual_network","aws_network_vpc"],ans:1,exp:"'aws_vpc' is the core provider resource for creating isolated virtual networks in AWS."},
  {q:"What Terraform resource creates an AWS subnet?",opts:["aws_network_subnet","aws_subnet","aws_vpc_subnet","aws_cidr_block"],ans:1,exp:"Subnets reside within a VPC and are defined using the 'aws_subnet' resource type."},
  {q:"How do you reference another resource's attribute?",opts:["ref(res.attr)","resource_type.resource_name.attribute","$resource_type.attr","get(attr)"],ans:1,exp:"Terraform uses this dotted notation to create dependency graphs automatically."},
  {q:"What is the Terraform Console?",opts:["Web UI","Interactive REPL for evaluating expressions and testing functions","Dashboard","Cloud UI"],ans:1,exp:"The console allows you to experiment with HCL functions and see variable values instantly."},
  {q:"What is 'user_data' in an AWS EC2 resource?",opts:["Tags","Startup script (shell/cloud-init) triggered on boot","Credentials","Metadata"],ans:1,exp:"User data allows you to automate software installation the moment an instance starts for the first time."},
  {q:"What function reads a file's content into a string?",opts:["read_file()","load()","file()","open()"],ans:2,exp:"The 'file()' function is commonly used to load shell scripts into the user_data argument."},
  {q:"What does 'terraform output' command show?",opts:["Plan details","The output values defined in the config after apply","Provider info","Resource list"],ans:1,exp:"It provides a quick way to view your defined outputs without having to re-run an apply."},
  {q:"Which resource type creates an EC2 instance?",opts:["aws_server","aws_ec2_instance","aws_instance","aws_virtual_machine"],ans:2,exp:"Despite the service name EC2, the HCL resource is simply named 'aws_instance'."},
  {q:"What is the 'terraform.tfvars' file?",opts:["State backup","File used to assign specific values to declared variables","Provider config","Module definition"],ans:1,exp:"Terraform automatically looks for this filename to populate your variable definitions."},
  {q:"Variable type representing a key-value pair?",opts:["list","tuple","map","set"],ans:2,exp:"Maps allow you to look up values using specific strings, like region names or environment labels."},
  {q:"What is string interpolation in HCL?",opts:["Encrypting","Embedding expressions within strings using ${} syntax","Concatenating with +","Type conversion"],ans:1,exp:"Interpolation makes it easy to generate dynamic names like 'web-server-${var.env}'."},
  {q:"How to pass a variable value via CLI command?",opts:["--variable","terraform apply -var=\"key=val\"","--set name=val","-env key=val"],ans:1,exp:"The -var flag overrides defaults and .tfvars files for temporary testing or CI/CD usage."},
  {q:"Resource type for AWS security group?",opts:["aws_firewall","aws_security_group","aws_network_acl","aws_sg"],ans:1,exp:"Security groups act as a virtual firewall for your instances to control inbound/outbound traffic."},
  {q:"What does 'terraform state list' do?",opts:["Lists providers","Lists all resources currently tracked in the state file","Lists files","Lists modules"],ans:1,exp:"This is useful for seeing exactly what is managed in your environment versus what is in your code."},
  {q:"What is a local value (locals)?",opts:["CLI var","Named expression for internal reuse within a configuration","Output","Env var"],ans:1,exp:"Locals help you calculate a value once and reuse it, preventing copy-paste errors in your code."},
  {q:"Conventional file split of main.tf?",opts:["main.tf only","main.tf, variables.tf, outputs.tf, providers.tf","main.tf, config.tf","modules.tf, vars.tf"],ans:1,exp:"Splitting files by concern is the industry standard for maintainable infrastructure-as-code."},
  {q:"What is the Terraform Registry?",opts:["Local cache","Public host for providers and modules (registry.terraform.io)","Internal DB","Log system"],ans:1,exp:"The registry is the library where Terraform finds the code to talk to AWS, Azure, GCP, and more."},
  {q:"What does 'terraform workspace new dev' do?",opts:["New .tf file","Creates a new separate state for env isolation","New provider","New module"],ans:1,exp:"Workspaces allow you to use the exact same code to deploy to multiple environments (Dev/Prod) with distinct states."},
  {q:"What does 'sensitive = true' do for an output?",opts:["Encrypts state","Hides the value from CLI output and logs","Deletes output","Read-only"],ans:1,exp:"This prevents sensitive tokens or passwords from accidentally being printed to the terminal or CI console."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('tfBasicsMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "IAC_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('tfBasicsMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('tfBasicsMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('tfBasicsMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
