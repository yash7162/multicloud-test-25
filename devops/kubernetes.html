<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubernetes Fundamentals | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#84cc16;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(132,204,22,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(132,204,22,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(132,204,22,.08);border:1px solid rgba(132,204,22,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#84cc16,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(132, 204, 22, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(132, 204, 22, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">K8S_CORE_PROTOCOL_20</div>
    <h1>Kubernetes Fundamentals</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Cluster Verification Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Kubernetes protocol verified. Cluster state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q: "What is Kubernetes?", opts: ["A Linux distribution","An open-source container orchestration platform","A cloud provider","A type of virtual machine"], ans: 1, exp: "Kubernetes (K8s) is an open-source platform originally developed by Google for automating container deployment and management."},
  {q: "Which component is the brain of a cluster managing the state?", opts: ["Worker Node","etcd","Control Plane (Master Node)","kubelet"], ans: 2, exp: "The Control Plane consists of components like the API Server and etcd that make global decisions about the cluster."},
  {q: "What is etcd in Kubernetes?", opts: ["A container runtime","A distributed key-value store for all cluster data","A load balancer","A networking plugin"], ans: 1, exp: "etcd stores the authoritative configuration and state of the cluster; if etcd is lost, the cluster is lost."},
  {q: "Which component schedules pods onto worker nodes?", opts: ["API Server","Controller Manager","kube-scheduler","kubelet"], ans: 2, exp: "The scheduler looks for pods with no assigned node and selects the best node for them to run on."},
  {q: "What is the role of the kube-apiserver?", opts: ["Run containers","Expose the Kubernetes API as the front-end of the control plane","Store cluster state","Monitor node health"], ans: 1, exp: "All administrative tasks and internal communication happen via the API Server endpoint."},
  {q: "Which agent ensures containers are running healthy in pods?", opts: ["kube-proxy","etcd","kube-scheduler","kubelet"], ans: 3, exp: "The kubelet is the primary node agent that takes a set of PodSpecs and ensures containers are running."},
  {q: "What is kube-proxy responsible for?", opts: ["Scheduling pods","Maintaining network rules for pod communication","Storing secrets","Running etcd"], ans: 1, exp: "Kube-proxy handles host-level networking and ensures traffic reaches the correct containerized service."},
  {q: "What is the smallest deployable unit in Kubernetes?", opts: ["Container","Node","Pod","Deployment"], ans: 2, exp: "A Pod abstracts one or more containers, sharing a network IP and storage volumes."},
  {q: "Which tool bootstraps a cluster on EC2 VMs?", opts: ["kubectl","helm","kubeadm","minikube"], ans: 2, exp: "Kubeadm is the standard tool to build a production-like cluster from scratch on Linux servers."},
  {q: "Minimum recommended memory for a master node via kubeadm?", opts: ["512 MB","1 GB","2 GB","4 GB"], ans: 2, exp: "Kubernetes control plane components require at least 2GB of RAM to function reliably."},
  {q: "What command initializes a master node?", opts: ["kubectl init","kubeadm start master","kubeadm init","k8s init master"], ans: 2, exp: "'kubeadm init' sets up the control plane and generates the join token for worker nodes."},
  {q: "What does RBAC stand for?", opts: ["Role-Based Access Control","Resource API Control","Runtime Binary Config","Role-Based Application Control"], ans: 0, exp: "RBAC is the security model used to define who can do what within the cluster API."},
  {q: "Which object defines permissions within a namespace?", opts: ["ClusterRole","ServiceAccount","Role","RoleBinding"], ans: 2, exp: "A Role defines 'verbs' (actions) on 'resources' (objects) restricted to a single namespace."},
  {q: "What is a RoleBinding in Kubernetes?", opts: ["A network policy","An object that grants permissions to a user or ServiceAccount","A storage class","A pod config"], ans: 1, exp: "A RoleBinding links a set of permissions (the Role) to specific users or service accounts."},
  {q: "Which kubectl command shows all cluster nodes?", opts: ["kubectl list nodes","kubectl get nodes","kubectl describe cluster","kubectl show nodes"], ans: 1, exp: "'kubectl get nodes' provides a quick list of available compute capacity and their status."},
  {q: "Which command gives detailed pod event info?", opts: ["kubectl get pod","kubectl info pod","kubectl describe pod <name>","kubectl logs pod"], ans: 2, exp: "'describe' is essential for debugging why a pod might be failing or stuck in 'Pending'."},
  {q: "Which command lists pods in ALL namespaces?", opts: ["kubectl get pods","kubectl get pods --all","kubectl get pods -A","kubectl list pods"], ans: 2, exp: "The -A flag is a shortcut for --all-namespaces, showing the entire cluster's workload."},
  {q: "What is a Namespace in Kubernetes?", opts: ["A physical server","A virtual cluster to isolate resources","A pod type","A storage volume"], ans: 1, exp: "Namespaces allow you to slice one physical cluster into multiple virtual environments for teams."},
  {q: "What does 'apiVersion' specify in a YAML?", opts: ["K8s version","The API group and version for the resource","Docker version","YAML schema"], ans: 1, exp: "It tells the API server which version of the object schema to use (e.g., apps/v1)."},
  {q: "The four top-level required fields in a manifest?", opts: ["name, image, port, replicas","apiVersion, kind, metadata, spec","version, type, labels, containers","group, name, namespace, spec"], ans: 1, exp: "Every Kubernetes object definition MUST include these four sections to be valid."},
  {q: "What does the 'kind' field define?", opts: ["Container image","The type of resource (Pod, Deployment, etc.)","Namespace","Resource version"], ans: 1, exp: "Kind specifies exactly what you are trying to create (e.g., Service, ConfigMap)."},
  {q: "Which container runtime is common after Docker deprecation?", opts: ["rkt","LXC","containerd","podman"], ans: 2, exp: "Containerd is a lightweight, industry-standard runtime that K8s uses to manage container lifecycles."},
  {q: "What is the default namespace name?", opts: ["kube-system","kube-public","default","kube-node-lease"], ans: 2, exp: "If you don't specify a namespace, all resources are placed in the 'default' namespace."},
  {q: "What CNI plugin is common for pod networking?", opts: ["iptables","Flannel or Calico","Docker Bridge","eth0"], ans: 1, exp: "CNI plugins provide the networking 'fabric' that allows pods to communicate across different nodes."},
  {q: "Which command applies a YAML configuration?", opts: ["kubectl run -f","kubectl create -f","kubectl apply -f file.yaml","kubectl deploy"], ans: 2, exp: "'apply' is declarative and handles updates to existing objects, making it ideal for GitOps."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('k8sFundamentalsMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "CORE_ARCHITECTURE"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('k8sFundamentalsMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('k8sFundamentalsMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('k8sFundamentalsMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
