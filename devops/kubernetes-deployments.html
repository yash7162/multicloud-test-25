<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K8s Deployments | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#84cc16;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(132,204,22,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(132,204,22,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(132,204,22,.08);border:1px solid rgba(132,204,22,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#84cc16,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(132, 204, 22, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(132, 204, 22, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">K8S_DEPLOY_PROTOCOL_21</div>
    <h1>Kubernetes Deployments</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Orchestration Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">K8s application protocol verified. Deployment history cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q: "What Kubernetes object manages a ReplicaSet and provides declarative updates to pods?", opts: ["StatefulSet","DaemonSet","Deployment","Job"], ans: 2, exp: "Deployments are the standard way to manage stateless applications, handling scaling and rolling updates."},
  {q: "Which field in a Deployment YAML specifies the number of pod replicas?", opts: ["count","instances","replicas","pods"], ans: 2, exp: "The 'replicas' field ensures the cluster maintains the specific number of running pods at all times."},
  {q: "What resource exposes pods to network traffic inside or outside the cluster?", opts: ["Ingress","ConfigMap","Service","Endpoint"], ans: 2, exp: "Services provide a single, stable DNS name and IP address to access a group of pods."},
  {q: "Which Service type uses a cloud load balancer for external access?", opts: ["ClusterIP","NodePort","LoadBalancer","ExternalName"], ans: 2, exp: "Type LoadBalancer integrates with AWS/Azure/GCP to provision a physical load balancer for your service."},
  {q: "Which Service type exposes a service on a static port on each Node's IP?", opts: ["ClusterIP","NodePort","LoadBalancer","ExternalName"], ans: 1, exp: "NodePort opens a specific port (30000-32767) on every node in the cluster."},
  {q: "What is the default Service type in Kubernetes?", opts: ["NodePort","LoadBalancer","ExternalName","ClusterIP"], ans: 3, exp: "ClusterIP is the default, providing internal-only connectivity for microservices."},
  {q: "What does HPA stand for?", opts: ["High Performance App","Horizontal Pod Autoscaler","Host Pod Assignment","Hybrid Pod Architecture"], ans: 1, exp: "HPA scales the number of replicas up or down based on CPU or custom metric thresholds."},
  {q: "What resource is required for HPA to work with CPU scaling?", opts: ["kube-proxy","Metrics Server","Prometheus","etcd"], ans: 1, exp: "Metrics Server must be running to provide the raw resource usage data to the HPA controller."},
  {q: "What does the Cluster Autoscaler do?", opts: ["Scales pods","Adds or removes nodes based on pending pods","Monitors health","Manages secrets"], ans: 1, exp: "It manages the underlying virtual machine count, adding nodes when pods have nowhere to run."},
  {q: "What is an Ingress in Kubernetes?", opts: ["Volume type","API object managing external HTTP/HTTPS access","Security policy","Namespace type"], ans: 1, exp: "Ingress acts as a Layer 7 router, allowing you to host multiple services behind one IP via path-based routing."},
  {q: "What component is needed to make an Ingress resource functional?", opts: ["Scheduler","CoreDNS","Ingress Controller (e.g. NGINX)","kube-proxy"], ans: 2, exp: "The Ingress resource is just a set of rules; the Controller is the actual software that enforces them."},
  {q: "What is a Liveness Probe?", opts: ["Traffic check","Check if container is running; restarts it if it fails","Disk check","YAML validator"], ans: 1, exp: "Liveness probes help recover from 'deadlocked' states by automatically restarting unhealthy containers."},
  {q: "What is a Readiness Probe?", opts: ["Restart check","Checks if container is ready to serve traffic; removes from service if not","CPU check","Image validator"], ans: 1, exp: "Readiness probes ensure traffic is only sent to pods that have finished their startup tasks."},
  {q: "What is a Startup Probe used for?", opts: ["Initial scaling","Checks if slow apps have finished starting before other probes begin","Memory monitor","Image puller"], ans: 1, exp: "Startup probes are essential for legacy apps that take a long time to initialize."},
  {q: "Which strategy replaces pods gradually without downtime?", opts: ["Recreate","Blue-Green","Rolling Update","Canary"], ans: 2, exp: "RollingUpdate is the default K8s strategy, replacing pods one-by-one to maintain availability."},
  {q: "Command to roll back a Deployment to the previous version?", opts: ["kubectl undo","kubectl rollout undo deployment <name>","kubectl revert","kubectl restore"], ans: 1, exp: "This command instantly reverts the image and configuration to the previous successful revision."},
  {q: "What is a ServiceAccount?", opts: ["Admin account","An identity for pods to authenticate with the K8s API","Service type","Billing ID"], ans: 1, exp: "ServiceAccounts provide pods with the tokens they need to interact with the cluster's control plane."},
  {q: "Official web-based UI for managing K8s resources?", opts: ["Grafana","Lens","kubernetes-dashboard","Kibana"], ans: 2, exp: "The Kubernetes Dashboard provides a GUI for developers who prefer not to use the command line."},
  {q: "Spec field controlling max unavailable pods during update?", opts: ["maxSurge","maxUnavailable","minReady","updateStrategy"], ans: 1, exp: "MaxUnavailable ensures a minimum percentage of pods remain up during a rolling deploy."},
  {q: "What is Container Orchestration?", opts: ["Dockerfile writing","Automating deployment, scaling, and management of container fleets","Single node running","Log monitoring"], ans: 1, exp: "Orchestration handles the complex 'life' of containers across many different servers."},
  {q: "Which command scales a deployment to 5 replicas?", opts: ["kubectl resize","kubectl scale deployment <name> --replicas=5","kubectl set replicas","kubectl update"], ans: 1, exp: "The scale command is the fastest way to manually adjust the capacity of your application."},
  {q: "What is a DaemonSet?", opts: ["One replica deploy","Ensures a copy of a pod runs on every single node","Scheduled job","Stateful controller"], ans: 1, exp: "DaemonSets are perfect for log shippers (like Fluentd) or monitoring agents (like Node Exporter)."},
  {q: "How to access the Dashboard via browser safely?", opts: ["SSH to master","Run 'kubectl proxy' and access local URL","Public URL","etcd API"], ans: 1, exp: "Kubectl proxy creates a secure tunnel between your workstation and the cluster API."},
  {q: "What does the 'selector' in a Service do?", opts: ["Node selection","Matches pods by labels to route traffic","Port selection","Namespace logic"], ans: 1, exp: "The selector is the 'glue' that connects the Service's IP to the actual running Pods."},
  {q: "Purpose of 'imagePullPolicy: Always'?", opts: ["Pull once","Always pull latest image from registry on pod start","Never pull","Node restart only"], ans: 1, exp: "Always ensures that if an image tag is updated in the registry, the pod will definitely use the new version."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('k8sDeployMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "K8S_DEPLOY"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('k8sDeployMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('k8sDeployMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('k8sDeployMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
