<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Repositories | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#6366f1;--correct:#10b981;--wrong:#ef4444;--neutral:#a78bfa}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(99, 102, 241, 0.05)}
.option.disabled{cursor:default}

.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(99, 102, 241, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">GIT_REPO_PROTOCOL_05</div>
    <h1>Git Repositories</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Sync Integrity Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Git distribution protocol verified. History cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is a Local Repository in Git?",opts:["A repo on GitHub","The .git database stored on your own computer containing full history","Network drive folder","Cloud backup copy"],ans:1,exp:"The Local Repository allows you to work, commit, and manage branches entirely offline."},
  {q:"What is a Remote Repository in Git?",opts:["RAM-only repo","A Git repo hosted on a server (GitHub/GitLab) accessible over network","USB drive repo","Private local folder"],ans:1,exp:"Remote repositories act as a central hub for team collaboration and code sharing."},
  {q:"What command initializes a new local Git repository?",opts:["git start","git new","git init","git create"],ans:2,exp:"'git init' creates the hidden .git directory required for tracking project changes."},
  {q:"What is the default name Git gives to the primary remote repository?",opts:["main","upstream","source","origin"],ans:3,exp:"'origin' is the conventional alias for the URL you cloned from."},
  {q:"Which command creates a local copy of a remote repository?",opts:["git pull","git fetch","git clone","git download"],ans:2,exp:"Cloning downloads the entire repository, including history and tracking branches, to your machine."},
  {q:"What does 'git push' do?",opts:["Downloads changes","Uploads local commits to the remote repository","Creates branch","Merges branches"],ans:1,exp:"Push transfers your local history to the remote server to share with others."},
  {q:"What does 'git pull' do?",opts:["Uploads changes","Fetches changes and merges them into the current branch","Creates new remote","Deletes remote branch"],ans:1,exp:"Pull is a high-level command that combines 'fetch' and 'merge' in one step."},
  {q:"Difference between 'git fetch' and 'git pull'?",opts:["Identical","Fetch downloads only; Pull downloads AND merges","Fetch is for tags","Fetch is slower"],ans:1,exp:"Fetch is safer because it doesn't automatically change your local working code."},
  {q:"Which command adds a new remote repository to a project?",opts:["git remote add origin <URL>","git connect","git link","git set-remote"],ans:0,exp:"This creates a named connection to a server URL for future pushing and pulling."},
  {q:"What command shows configured remotes?",opts:["git show remotes","git remote -v","git list","git remotes show"],ans:1,exp:"The -v (verbose) flag shows both the fetch and push URLs for all remotes."},
  {q:"What is a 'bare' repository in Git?",opts:["No commits","A repo without a working directory, used as a central server hub","Single-branch repo","GitHub public repo"],ans:1,exp:"Bare repositories contain only metadata and objects, making them ideal for servers like GitHub."},
  {q:"When you clone a repo, what branch is checked out by default?",opts:["Branch named 'clone'","The default branch (usually main or master)","Empty branch","Last created branch"],ans:1,exp:"Git automatically switches you to the primary production branch defined by the remote repo."},
  {q:"What does 'git push -u origin main' do?",opts:["Deletes main","Pushes main and sets it as the upstream tracking branch","Renames branch","Merges main"],ans:1,exp:"The -u flag links your local branch to the remote branch for easier future commands."},
  {q:"What is an 'upstream' branch in Git?",opts:["First created","A remote branch that a local branch tracks for sync","Deprecated branch","Main branch only"],ans:1,exp:"Tracking an upstream branch allows you to run 'git pull' without specifying names every time."},
  {q:"Which protocol is used to communicate with remotes securely?",opts:["FTP","HTTP only","SSH and HTTPS","Telnet"],ans:2,exp:"SSH and HTTPS are the standard secure transport layers for Git data transfer."},
  {q:"What does 'git remote rename origin upstream' do?",opts:["Deletes origin","Renames the remote 'origin' to 'upstream'","Creates new remote","Pushes to upstream"],ans:1,exp:"This updates your local configuration to use a different handle for the same server."},
  {q:"What command removes a remote connection?",opts:["git delete remote","git remote remove origin","git rm remote","git unlink"],ans:1,exp:"This deletes the reference in your local config, but does not harm the server-side code."},
  {q:"Team workflow: what happens when two devs push conflicting changes?",opts:["Auto-pick newer","The second push is rejected; dev must pull and resolve first","Both lost","Git deletes both"],ans:1,exp:"Git enforces 'fast-forward only' pushes to prevent accidental data loss in shared repos."},
  {q:"What is a 'fork' on platforms like GitHub?",opts:["Git branch command","A personal copy of someone else's repo on your account","Deleting repo","Merge type"],ans:1,exp:"Forking is a server-side feature used to create an independent copy for contributing or experimenting."},
  {q:"Relationship between fork and original (upstream)?",opts:["Disconnected","Fork maintains a link to pull updates and submit PRs","Forking deletes original","Share branch names only"],ans:1,exp:"Forks remain logically connected to the source to facilitate open-source contributions."},
  {q:"Which command shows detailed info about a remote?",opts:["git remote show origin","git info","git describe","git details"],ans:0,exp:"This reveals branch tracking, URLs, and which branches are out of sync."},
  {q:"What does 'git push origin --delete feature' do?",opts:["Deletes local","Deletes the remote branch named feature on origin","Renames branch","Merges feature"],ans:1,exp:"This is how you clean up the server after a feature has been successfully integrated."},
  {q:"What is the purpose of 'git fetch origin'?",opts:["Pushes local commits","Downloads commits from origin without merging into local work","Deletes tracking branches","Creates new remote"],ans:1,exp:"Fetch updates your 'origin/main' reference so you can see what others have done without risk."},
  {q:"Where is the local repository database physically stored?",opts:["In /usr/local/git/","In the .git hidden folder in the project directory","System temp folder","Home directory"],ans:1,exp:"Every repository is contained within that specific folder's .git sub-directory."},
  {q:"What does 'git clone --depth 1' do?",opts:["Clones one file","Creates a shallow clone with only the latest commit","Main branch only","Clones without .git"],ans:1,exp:"Shallow clones save time and bandwidth when you only need the current code state, not the full history."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('gitRepoMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('gitRepoMasteryCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('gitRepoMasteryCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('gitRepoMasteryCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
