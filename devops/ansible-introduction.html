<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansible Intro | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#facc15;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(250,204,21,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(250,204,21,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#facc15,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(250, 204, 21, 0.05)}
.option.disabled{cursor:default}

/* High Visibility Highlighting Logic */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(250, 204, 21, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">ANSIBLE_PROTOCOL_01</div>
    <h1>Ansible Introduction mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Automation Verification Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Infrastructure management verified. Inventory state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_DEPLOYMENT</button>
    </div>
</div>

<script>
const rawQuestions = [
    {q:"What is Ansible?",opts:["A container orchestration tool","Open-source IT automation for configuration and deployment","A cloud monitoring platform","A version control system"],ans:1,exp:"Ansible is a powerful automation engine that handles configuration management and app deployment using human-readable YAML."},
    {q:"Which language are Ansible playbooks written in?",opts:["JSON","XML","YAML","Python"],ans:2,exp:"YAML (Yet Another Markup Language) is used for its simplicity and readability compared to traditional scripts."},
    {q:"What makes Ansible agentless?",opts:["Uses lightweight daemon","Connects via SSH/WinRM without managed-side software","Uses REST APIs only","Requires Docker"],ans:1,exp:"Agentless means you don't need to install any Ansible-specific software on the target servers; it uses standard protocols."},
    {q:"What is the Ansible control node?",opts:["A managed server","The machine where Ansible is installed and executed from","A backup node","Kubernetes master"],ans:1,exp:"The control node is the brain of your automation where you run commands and store playbooks."},
    {q:"What are managed nodes in Ansible?",opts:["Machines with Ansible installed","Remote servers that Ansible manages and automates","Cloud VMs only","Containers only"],ans:1,exp:"Managed nodes are the target systems (hosts) that receive the automation tasks from the control node."},
    {q:"What is the default SSH port Ansible uses?",opts:["22","8080","443","2222"],ans:0,exp:"Ansible defaults to standard SSH port 22 for Linux/Unix communication."},
    {q:"Which command installs Ansible on RHEL/CentOS?",opts:["apt-get install","yum install ansible","pip install","brew install"],ans:1,exp:"YUM is the native package manager used to install Ansible on Red Hat-based distributions."},
    {q:"What file is the default Ansible inventory file?",opts:["/etc/ansible/hosts","/ansible/inventory","/etc/ansible/inventory.yml","~/hosts"],ans:0,exp:"Ansible looks at /etc/ansible/hosts by default to find the list of managed servers."},
    {q:"What is the purpose of the inventory file?",opts:["Store logs","Define and organize managed hosts/nodes","Store private keys","Configure plugins"],ans:1,exp:"The inventory acts as the address book for Ansible, grouping servers by function or environment."},
    {q:"Which module tests connectivity to managed nodes?",opts:["shell","ping","command","setup"],ans:1,exp:"The 'ping' module verifies a usable login and a functional Python environment on the remote side."},
    {q:"What is the Ansible configuration file?",opts:["/etc/ansible/config","/etc/ansible/ansible.cfg","/etc/ansible/settings.ini","~/.ansible/config"],ans:1,exp:"ansible.cfg controls global behaviors like the inventory path and SSH connection timeouts."},
    {q:"How does Ansible establish SSH connections?",opts:["Password only","SSH key-based (passwordless) or password","Kerberos only","VPN tunnels"],ans:1,exp:"While passwords work, SSH keys are the recommended practice for seamless automation."},
    {q:"What command generates an SSH key pair?",opts:["ansible-keygen","ssh-keygen -t rsa","openssl genrsa","ssh-copy-id"],ans:1,exp:"ssh-keygen is the standard Linux tool to create the public/private keys required for SSH access."},
    {q:"What command copies the SSH public key to a node?",opts:["ssh-copy-key","scp ~/.ssh/id_rsa.pub","ssh-copy-id user@host","ansible-ssh-copy"],ans:2,exp:"ssh-copy-id automates the process of adding your public key to the remote server's authorized_keys file."},
    {q:"What is Ansible's deployment model?",opts:["Pull-based","Push-based (Control node pushes to targets)","Both","Neither"],ans:1,exp:"Ansible 'pushes' configurations to the managed nodes, giving you direct control over timing."},
    {q:"What Python version is required on managed nodes?",opts:["Python 1.x","Python 2.6+ or 3.5+","Python 3.9+ only","No Python"],ans:1,exp:"Ansible modules are mostly written in Python and require an interpreter on the remote host to run."},
    {q:"What does 'Infrastructure as Code' mean in Ansible?",opts:["Writing app code","Managing infrastructure via machine-readable playbooks","Docker only","Cloud-native only"],ans:1,exp:"IaC allows you to version and automate your server state just like software source code."},
    {q:"Which ad-hoc command checks disk usage?",opts:["ansible all -m ping","ansible all -m command -a 'df -h'","ansible all -m shell -a 'top'","ansible all -m setup"],ans:1,exp:"Ad-hoc commands are perfect for quick tasks across many servers without writing a full playbook."},
    {q:"What is idempotency in Ansible?",opts:["Different results every time","Multiple runs produce the same result with no unintended changes","A loop type","Security feature"],ans:1,exp:"Idempotency ensures that if a task is already complete, Ansible won't try to change it again."},
    {q:"What is the purpose of 'ansible_user'?",opts:["Ansible version","The SSH username for connecting to a host","Sudo password","Playbook author"],ans:1,exp:"This variable defines which account Ansible should use when logging into the managed nodes."},
    {q:"What does 'host_key_checking = False' do?",opts:["Disables SSH","Disables strict host verification to prevent interactive prompts","Enables password","Enables 2FA"],ans:1,exp:"It prevents Ansible from hanging on 'Are you sure you want to connect?' prompts for new servers."},
    {q:"What is the 'setup' module used for?",opts:["Software install","Gathering facts/system info (IP, OS, RAM)","Creating users","Managing files"],ans:1,exp:"The setup module runs automatically to gather 'Facts' that you can use as variables in your logic."},
    {q:"In which format is the default inventory usually written?",opts:["YAML","JSON","INI format","XML"],ans:2,exp:"The default hosts file uses the INI style, which is simple and easy to read for humans."},
    {q:"What is the 'become' directive?",opts:["Loop keyword","Enables privilege escalation (sudo)","Connection plugin","Variable type"],ans:1,exp:"'become' allows Ansible to run tasks as another user, typically to get root permissions via sudo."},
    {q:"What is Ansible Tower (AWX)?",opts:["CLI tool","Web-based UI and dashboard for team orchestration","Ansible plugin","Monitoring tool"],ans:1,exp:"AWX/Tower adds a visual interface, scheduling, and role-based access control to Ansible."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('ansibleIntroMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "CONFIG_MGMT"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('ansibleIntroMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('ansibleIntroMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('ansibleIntroMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
