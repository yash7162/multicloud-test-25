<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenkins Advanced | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#a78bfa;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(167,139,250,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(167,139,250,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#a78bfa,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(167, 139, 250, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(167, 139, 250, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">JENKINS_DISTRIBUTED_13</div>
    <h1>Jenkins Advanced</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Audit Status</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Jenkins Advanced logic verified. Agent configurations cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q: "What is a Jenkins Master Node?", opts: ["Backup server","The central Jenkins server orchestrating jobs and managing the system","A development machine","A testing environment"], ans: 1, exp: "The Master handles job configuration, scheduling, and overall system orchestration."},
  {q: "What is a Jenkins Slave/Agent Node?", opts: ["Backup storage","A machine that executes build jobs dispatched by the master","A Git server","A database server"], ans: 1, exp: "Slaves (Agents) provide the compute resources to execute the tasks defined by the Master."},
  {q: "Why use Master/Agent architecture?", opts: ["Required by Jenkins","To distribute load, run parallel jobs, and enable scalability","To reduce costs","To simplify configuration"], ans: 1, exp: "It prevents the central Master from becoming a bottleneck while allowing parallel build execution."},
  {q: "How does a Slave/Agent connect to the Master?", opts: ["SSH only","Direct file sharing","HTTP/HTTPS, SSH, or JNLP protocol","Email only"], ans: 2, exp: "Jenkins supports various connection methods including secure SSH and Java-based JNLP."},
  {q: "What is Jenkins JNLP?", opts: ["Java plugin system","Java Network Launch Protocol — allows agents to connect without SSH","Build plugin","Monitoring tool"], ans: 1, exp: "JNLP is useful for Windows agents or environments where SSH access is restricted."},
  {q: "How do you add a new agent in Jenkins?", opts: ["Manage Jenkins -> Manage Nodes -> New Node","Edit config files","Use SSH only","Auto-discovered"], ans: 0, exp: "The Jenkins UI provides a wizard to define agent names, root directories, and launch methods."},
  {q: "What are Agent Labels in Jenkins?", opts: ["Job names","Tags used to identify capabilities (e.g., 'linux', 'docker')","Plugin types","Build triggers"], ans: 1, exp: "Labels allow you to pin specific jobs to specific types of hardware or operating systems."},
  {q: "What is the Jenkins Workspace?", opts: ["User interface","The directory where a job checks out code and executes steps","Dashboard","Backup location"], ans: 1, exp: "Every job on every node uses a unique workspace folder to avoid file conflicts."},
  {q: "How to configure custom workspace location?", opts: ["Fixed location","Job config -> General -> Use custom workspace","System properties","In Jenkinsfile only"], ans: 1, exp: "This is useful if you have specific high-speed storage or requirements for path naming."},
  {q: "What happens to the workspace after a job finishes?", opts: ["Auto-deleted","Persists on disk for future builds","Archived","Moved to backup"], ans: 1, exp: "Persistence allows for 'incremental' builds which are much faster than full clones."},
  {q: "How do you clean up old workspaces?", opts: ["Manual delete","Post-build Actions -> Delete workspace or use Cleanup plugin","Auto-deleted by OS","Delete script"], ans: 1, exp: "Proper cleanup ensures the Agent disks don't fill up with outdated build artifacts."},
  {q: "What is Jenkins Authentication?", opts: ["Backup system","Process of verifying user identity","Monitoring feature","Build stage"], ans: 1, exp: "Authentication asks 'Who are you?' using DB, LDAP, or Single Sign-On."},
  {q: "What is Jenkins Authorization?", opts: ["Same as auth","Controlling what actions users are allowed to perform","Deleting builds","Monitoring service"], ans: 1, exp: "Authorization asks 'What are you allowed to do?' using matrices or roles."},
  {q: "How to enable local user authentication?", opts: ["Enabled by default","Manage Jenkins -> Global Security -> Jenkins user database","Edit XML","LDAP only"], ans: 1, exp: "The internal database is the simplest way to manage small teams directly in Jenkins."},
  {q: "What is LDAP in Jenkins?", opts: ["Build tool","Integration with corporate directories (Active Directory)","Storage system","Reporting tool"], ans: 1, exp: "LDAP allows users to login with their company-wide credentials."},
  {q: "How do you create a new user?", opts: ["Auto-created","Manage Jenkins -> Manage Users -> Create User","Config files","LDAP only"], ans: 1, exp: "The 'Manage Users' screen allows admins to provision accounts and set passwords."},
  {q: "What is an API Token in Jenkins?", opts: ["Login password","Token used for programmatic access (alternative to password)","Git token","Webhook key"], ans: 1, exp: "Tokens are safer than passwords for use in automated scripts and remote triggers."},
  {q: "How do you configure Authorization strategy?", opts: ["Manage Jenkins -> Global Security -> Select strategy","Automatic","Plugins only","Edit config.xml"], ans: 0, exp: "This is where you decide between simple 'logged in users can do anything' vs strict RBAC."},
  {q: "What is Role-Based Authorization?", opts: ["Same as Matrix","Assigning roles (Admin, Dev) with predefined permissions","Manual assignment","Built-in feature"], ans: 1, exp: "Role-based strategies make managing hundreds of users easier by grouping permissions."},
  {q: "What is Project-Based Matrix Authorization?", opts: ["Global setting","Defining permissions per specific job","Plugin name","Build status"], ans: 1, exp: "Matrix auth provides the most granular control, allowing specific users to only see specific jobs."},
  {q: "How do you secure credentials (passwords, keys)?", opts: ["Plain text in Jenkinsfile","Use Jenkins Credentials Store to encrypt secrets","Save in config","Environment variables"], ans: 1, exp: "The Credentials Store ensures secrets are never printed in logs or visible in plain text."},
  {q: "What are common types of Credentials?", opts: ["Username/Password only","Username/Password, SSH keys, AWS keys, GitHub tokens","API keys only","Tokens only"], ans: 1, exp: "Jenkins handles a wide variety of secret types to integrate with almost any third-party service."},
  {q: "How to use Credentials in a Pipeline?", opts: ["Reference by name","Use 'withCredentials' or environment block with credential binding","Plain text","Shell scripts only"], ans: 1, exp: "Binding a credential to a variable in the Jenkinsfile is the standard secure practice."},
  {q: "Minimum essential plugins for Jenkins?", opts: ["No plugins","Pipeline, Git, and Credentials plugins","Only Matrix plugin","Plugins are optional"], ans: 1, exp: "The 'Suggested Plugins' at setup include these to ensure standard CI/CD functionality."},
  {q: "How do you backup Jenkins?", opts: ["Auto-backed up","Backup the $JENKINS_HOME directory","Use plugins only","Cloud only"], ans: 1, exp: "All critical data lives in JENKINS_HOME; backing this up allows for full system recovery."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('jenkinsAdvancedMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "JENKINS_OPS"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('jenkinsAdvancedMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('jenkinsAdvancedMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('jenkinsAdvancedMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
