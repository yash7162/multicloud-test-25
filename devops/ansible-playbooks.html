<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansible Playbooks | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#facc15;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(250,204,21,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(250,204,21,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#facc15,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(250, 204, 21, 0.05)}
.option.disabled{cursor:default}

/* FIXED VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(250, 204, 21, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">ANSIBLE_ORCHESTRATION_03</div>
    <h1>Ansible Playbooks Mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Playbook Execution Success</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Automation protocol verified. YAML state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_DEPLOYMENT</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is an Ansible Playbook?",opts:["An ad-hoc command","A YAML file defining a series of plays and tasks","An inventory file","A module registry"],ans:1,exp:"Playbooks are the blueprints of Ansible automation, allowing you to orchestrate complex deployments across multiple servers."},
  {q:"What command runs an Ansible playbook?",opts:["ansible -p","ansible-playbook playbook.yml","run-ansible","ansible --play"],ans:1,exp:"The 'ansible-playbook' command is the dedicated CLI tool to parse and execute your YAML files."},
  {q:"What is a 'play' in an Ansible playbook?",opts:["A single task","A mapping of host groups to specific tasks","A template file","A handler"],ans:1,exp:"A single playbook can contain multiple 'plays', each targeting different host groups (e.g. one for DBs, one for Web)."},
  {q:"How do you define variables in a playbook?",opts:["Using $ prefix","Using the 'vars:' section or {{ }} brackets","Environment variables only","JSON config only"],ans:1,exp:"Variables allow for dynamic data usage. They are referenced using double curly braces (Jinja2 syntax)."},
  {q:"What is the 'when' keyword used for?",opts:["Scheduling","Conditional task execution","Timing logs","Loop control"],ans:1,exp:"'when' allows you to skip tasks based on facts, like only running an 'apt' update if the host OS is Ubuntu."},
  {q:"What is the Ansible 'loop' keyword?",opts:["Recursive playbook","Iterates over a list to execute a task multiple times","While loop","Retries"],ans:1,exp:"Looping replaces the older 'with_items' syntax, allowing you to process lists of packages, users, or files efficiently."},
  {q:"What is an Ansible Handler?",opts:["HTTP module","A task that only runs when notified by a change","Variable type","Error catcher"],ans:1,exp:"Handlers are perfect for service restarts; they only fire if a previous task actually changed a configuration file."},
  {q:"What is the 'notify' keyword used for?",opts:["Sending emails","Triggering a handler when a task results in 'changed'","Logging","Setting global vars"],ans:1,exp:"'notify' is the trigger mechanism that links a standard task to its associated handler task."},
  {q:"What is an Ansible Block?",opts:["Docker layer","A way to group tasks for common directives and error handling","Network segment","YAML comment"],ans:1,exp:"Blocks group related tasks and allow for programming-style try/catch/finally logic using rescue and always."},
  {q:"What is 'rescue' inside a block?",opts:["Log save","Exception handling tasks that run if the block tasks fail","File backup","Retry count"],ans:1,exp:"Rescue blocks allow your automation to recover gracefully from errors without failing the entire run."},
  {q:"What is an Ansible Template?",opts:["Playbook copy","A Jinja2 file (.j2) for generating dynamic configuration files","Docker file","Inventory map"],ans:1,exp:"Templates allow you to use variables inside configuration files like nginx.conf or index.html."},
  {q:"Which module deploys templates?",opts:["copy","file","template","jinja2"],ans:2,exp:"The 'template' module renders the file locally and then pushes the result to the remote server."},
  {q:"What are Ansible Core Modules?",opts:["Ruby scripts","Built-in modules that ship with the basic Ansible install","Galaxy only","Deprecated"],ans:1,exp:"Core modules like yum, apt, and service are maintained by the official Ansible team for reliability."},
  {q:"What are Ansible Extra Modules?",opts:["Paid features","Community-maintained modules from Galaxy or Collections","Cloud only","Legacy only"],ans:1,exp:"Extra modules expand Ansible to support nearly every third-party API and hardware vendor available."},
  {q:"What is an Ansible Role?",opts:["User ID","Standard directory structure for reusable automation components","Host type","Internal plugin"],ans:1,exp:"Roles are the professional way to share and reuse automation across different teams and companies."},
  {q:"Command to create a role skeleton?",opts:["ansible-role init","ansible-galaxy init role_name","ansible-playbook --create","mkdir -p role"],ans:1,exp:"Ansible-galaxy provides the standard scaffolding for tasks, vars, handlers, and templates folders."},
  {q:"What is Ansible Galaxy?",opts:["Cloud provider","A community hub for downloading and sharing roles/collections","Monitor","IDE"],ans:1,exp:"Galaxy is like 'GitHub' for Ansible logic, hosting thousands of pre-made roles for common software."},
  {q:"What is the 'register' keyword for?",opts:["License key","Capturing the output of a task into a variable","Auth","Logs"],ans:1,exp:"Registering output allows you to use the result of one command (like a status check) in a 'when' statement later."},
  {q:"What is 'vars_prompt' used for?",opts:["Inventory check","Asking for user input interactively at runtime","Defaults","Value display"],ans:1,exp:"Use this when you need to ask for sensitive passwords or specific deployment versions before the play starts."},
  {q:"What does 'ignore_errors: yes' do?",opts:["Silence log","Continues playbook execution even if the task fails","Auto-retry","Skip task"],ans:1,exp:"This is useful when a task failure (like checking a non-existent file) shouldn't stop the whole deployment."},
  {q:"Modern loop equivalent in Ansible?",opts:["for_each","loop","repeat","iterate"],ans:1,exp:"The 'loop' keyword is the current standard for iteration, replacing the legacy 'with_' prefixes."},
  {q:"Purpose of 'defaults/main.yml' in a role?",opts:["Main tasks","Lowest precedence variables for easy overriding","Secrets","Metadata"],ans:1,exp:"Variables in 'defaults' are meant to be overridden by users to customize how the role behaves."},
  {q:"Role 'meta/main.yml' file purpose?",opts:["Task list","Defines role dependencies and authorship info","Defaults","Templates"],ans:1,exp:"The meta file ensures that if your role needs 'mysql' installed first, Ansible handles that dependency."},
  {q:"Jinja2 filter '| default()' purpose?",opts:["Variable type","Sets a fallback value if a variable is missing","Formatting","Security"],ans:1,exp:"Filters allow you to prevent playbook crashes by providing safe default values for optional variables."},
  {q:"What does '--check' flag do?",opts:["Linting","Dry-run simulation of the playbook","Verify hosts","Syntax only"],ans:1,exp:"Check mode lets you see exactly what Ansible would change without actually touching the target servers."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('ansiblePlaybookMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "YAML_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('ansiblePlaybookMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('ansiblePlaybookMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('ansiblePlaybookMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
