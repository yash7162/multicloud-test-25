<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraform Intro | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#ef4444;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(239,68,68,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(239, 68, 68, 0.05)}
.option.disabled{cursor:default}

/* FIXED HIGHLIGHT LOGIC */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(239, 68, 68, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">TERRAFORM_INTRO_PROTOCOL_28</div>
    <h1>Terraform Introduction</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Provisioning result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Terraform baseline protocol verified. Configuration cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_SESSION</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is Terraform?",opts:["Container runtime","Open-source IaC tool by HashiCorp for provisioning infrastructure","Configuration manager","CI/CD pipeline tool"],ans:1,exp:"Terraform allows you to build, change, and version infrastructure safely and efficiently across various cloud providers."},
  {q:"What language is used for Terraform configuration?",opts:["YAML","JSON","HCL (HashiCorp Configuration Language)","Python"],ans:2,exp:"HCL is designed to be human-readable and machine-friendly for defining resource dependencies."},
  {q:"What is Infrastructure Automation?",opts:["Manual provisioning","Using code to automatically provision and manage infrastructure","Automated testing","CI/CD only"],ans:1,exp:"Automation removes human error from infrastructure management and ensures repeatable environments."},
  {q:"What is a Terraform Provider?",opts:["UI plugin","Plugin that enables Terraform to interact with cloud APIs (AWS, Azure, etc.)","Resource module","Backend config"],ans:1,exp:"Providers are the translators that turn HCL into specific API calls for cloud platforms."},
  {q:"How to specify the AWS provider in HCL?",opts:["provider { name = 'aws' }","provider \"aws\" { region = \"us-east-1\" }","use aws { }","import aws"],ans:1,exp:"The provider block configures the cloud plugin with necessary credentials and region information."},
  {q:"What is a Terraform Resource?",opts:["Variable type","Infrastructure object (EC2, S3, VPC) defined with a resource block","Provider plugin","Module output"],ans:1,exp:"Resources are the actual building blocks of your infrastructure, like virtual servers or networking rules."},
  {q:"What is the default configuration file name?",opts:["terraform.yaml","infrastructure.tf","main.tf","config.tf"],ans:2,exp:"By convention, 'main.tf' is where the primary infrastructure logic resides."},
  {q:"What does 'terraform init' do?",opts:["Creates resources","Downloads providers and initializes the working directory","Validates syntax","Shows a preview"],ans:1,exp:"Init is the first step in any project, ensuring all necessary plugins are installed locally."},
  {q:"What does 'terraform plan' do?",opts:["Creates infrastructure","Shows a preview of what will be created, modified, or destroyed","Destroys resources","Validates only"],ans:1,exp:"Planning is a safe way to check your logic before executing changes against live infrastructure."},
  {q:"What does 'terraform apply' do?",opts:["Validates code","Shows a plan","Executes the plan to reach the desired state","Destroys all"],ans:2,exp:"Apply takes the plan and makes it real by calling the cloud APIs to provision resources."},
  {q:"What does 'terraform destroy' do?",opts:["Deletes .tf files","Removes all infrastructure managed by the configuration","Removes state file","Uninstalls plugins"],ans:1,exp:"Destroy is used to clean up environments when they are no longer needed, saving costs."},
  {q:"What is the Terraform state file?",opts:["Config backup","JSON file tracking the current state of managed infrastructure","Provider config","Deployment log"],ans:1,exp:"The state file maps your HCL definitions to real-world resource IDs on the cloud provider."},
  {q:"Purpose of 'required_providers'?",opts:["Lists commands","Specifies needed provider versions and sources","Defines vars","Lists modules"],ans:1,exp:"It ensures that every member of the team uses the same plugin version for consistency."},
  {q:"Common file extension for Terraform?",opts:[".yaml",".json",".tf",".hcl"],ans:2,exp:".tf is the standard extension, though JSON format is also technically supported for machine generation."},
  {q:"What is a Terraform data source?",opts:["Variable type","Way to fetch information from existing infrastructure not managed by Terraform","Provider plugin","Backend type"],ans:1,exp:"Data sources allow you to 'lookup' existing IDs like AMIs or Subnets to use in your resources."},
  {q:"Declarative vs Imperative in Terraform?",opts:["Imperative","Declarative — you define the end goal; Terraform handles the steps","Hybrid","Neither"],ans:1,exp:"In a declarative system, you don't write 'how' to create a server, just 'that' it should exist."},
  {q:"Where to download Terraform?",opts:["GitHub only","releases.hashicorp.com or package managers","AWS only","pip install"],ans:1,exp:"HashiCorp provides pre-compiled binaries for all major operating systems on their release site."},
  {q:"What does 'terraform validate' do?",opts:["Shows costs","Checks syntax and internal consistency of configuration","Applies code","Formats code"],ans:1,exp:"Validate is used to find bugs in your HCL code before you even try to connect to the cloud."},
  {q:"What does 'terraform fmt' do?",opts:["Rewrites HCL to canonical style/indentation","Destroys code","Docs generator","Plugin manager"],ans:0,exp:"Consistency in code style makes collaboration and code reviews much easier for teams."},
  {q:"What is HCL?",opts:["Programming language","Human-readable language for defining infrastructure","YAML superset","JSON variant"],ans:1,exp:"HashiCorp Configuration Language was designed specifically to strike a balance between readability and programmatic power."},
  {q:"What is 'terraform.tfvars' used for?",opts:["Storing passwords","Assigning values to input variables","Main config","State backup"],ans:1,exp:"It acts as a configuration file to provide specific values for environment-agnostic HCL code."},
  {q:"What is an output value?",opts:["Log file","Value exported after apply (like public IP) for display or other modules","Variable","Attribute"],ans:1,exp:"Outputs provide feedback to the user or passing data between different parts of your automation."},
  {q:"What does 'depends_on' do?",opts:["Var dependency","Explicitly defines the order of resource creation","Sets timeout","Locks resource"],ans:1,exp:"While Terraform usually figures out the order automatically, depends_on is used for hidden dependencies."},
  {q:"Terraform vs Ansible primary use case?",opts:["App vs Infra","Terraform is for provisioning (Infra); Ansible is for configuration (Software)","Same thing","Docker only"],ans:1,exp:"Terraform builds the server; Ansible installs the software inside it. They are complementary."},
  {q:"What is the Terraform Registry?",opts:["Local cache","Public hub (registry.terraform.io) for providers and modules","Internal DB","Log system"],ans:1,exp:"The Registry is where the community shares reusable modules and where official cloud providers are hosted."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('tfIntroMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "IAC_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('tfIntroMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('tfIntroMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('tfIntroMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
