<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Branching | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#10b981;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(16,185,129,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* RESTORED TOPBAR WITH BACK BUTTON */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--neutral); color: var(--neutral); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(16, 185, 129, 0.05)}
.option.disabled{cursor:default}

.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(16, 185, 129, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="index.html">← Back to Topics</a>
</div>

<header>
    <div class="topic-badge">GIT_BRANCHING_09</div>
    <h1>Branching & Merging</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Git history analysis complete.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_SESSION</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is a branch in Git?",opts:["A full copy","A lightweight movable pointer to a commit","A merge operation","A remote repo reference"],ans:1,exp:"A branch is just a 41-byte file containing a commit hash. Git creates them instantly."},
  {q:"What is the default branch name in modern Git?",opts:["master","develop","main","trunk"],ans:2,exp:"Industry standards moved to 'main' in 2020 for inclusivity and clarity."},
  {q:"Which command creates a new branch named 'feature'?",opts:["git branch new","git create feature","git branch feature","git checkout feature"],ans:2,exp:"git branch creates the pointer; git checkout/switch moves you to it."},
  {q:"Which command creates a new branch AND switches to it?",opts:["git branch -move","git checkout -b feature","git create switch","git branch --switch"],ans:1,exp:"The -b flag is a shortcut to create and move in one command."},
  {q:"What does 'git switch branchname' do?",opts:["Creates branch","Deletes branch","Switches working directory to branch","Merges branch"],ans:2,exp:"git switch is the modern, dedicated command for moving between branches."},
  {q:"What is a 'fast-forward' merge?",opts:["Auto resolution","Pointer advances because target has no new commits","Merge skipping conflicts","Force push"],ans:1,exp:"Fast-forward happens when the histories haven't diverged, so Git just slides the pointer forward."},
  {q:"What is a 'three-way merge'?",opts:["Triple merge","A merge using common ancestor and both tips","Merge with 3 conflicts","3 developers"],ans:1,exp:"When histories diverge, Git looks at the common base and the two tips to create a combined state."},
  {q:"Which command merges a branch into current?",opts:["git join","git merge feature","git combine","git pull"],ans:1,exp:"git merge integrates the changes from the named branch into your active branch."},
  {q:"What is a merge conflict?",opts:["Duplicate names","Git cannot auto-merge due to different changes on the same line","Push error","Corrupt commit"],ans:1,exp:"Conflicts occur when Git cannot determine which change is 'correct' and asks the human to decide."},
  {q:"Which command lists all local branches?",opts:["git branches","git branch","git list","git show"],ans:1,exp:"Standard 'git branch' displays your local list and marks the active one with an asterisk."},
  {q:"Which command safely deletes a merged branch?",opts:["git branch -delete","git branch -d feature","git delete","git remove"],ans:1,exp:"The lowercase -d prevents you from deleting a branch that has unique, unmerged work."},
  {q:"What is 'HEAD' in Git?",opts:["First commit","Special pointer indicating your current location","Remote main","Staging area"],ans:1,exp:"HEAD is 'where you are'. Usually it points to a branch, but it can point directly to a commit."},
  {q:"What is a 'detached HEAD' state?",opts:["Corrupt file","HEAD points to a commit hash instead of a branch","HEAD has no commits","Remote pointer"],ans:1,exp:"This happens when you checkout a specific hash. You are no longer on any branch."},
  {q:"What does 'git branch -vv' show?",opts:["Verbose branches","Local branches with last commit and upstream tracking info","Delete verbose","Log verbose"],ans:1,exp:"Very useful for seeing how far ahead or behind your local branch is from the remote."},
  {q:"What is 'rebasing' in Git?",opts:["Reverting base","Reapplying commits on top of another branch for linear history","New base repo","Auto merge"],ans:1,exp:"Rebasing rewrites history to look like all work happened in a perfect straight line."},
  {q:"What is the key difference between merge and rebase?",opts:["Identical","Merge keeps history; rebase rewrites it for a clean timeline","Merge is faster","Rebase is remote only"],ans:1,exp:"Merge is safer and keeps context; rebase is cleaner but destructive to commit hashes."},
  {q:"Which command rebases on top of main?",opts:["git merge --rebase","git rebase main","git rebase onto","git squash"],ans:1,exp:"This moves your branch's base to the current tip of the main branch."},
  {q:"What is interactive rebase used for?",opts:["Team rebase","Editing, squashing, or reordering commits","Auto branching","Multi-remote merge"],ans:1,exp:"Interactive rebase (-i) allows you to clean up your messy local commits before sharing them."},
  {q:"How do you push a new branch for the first time?",opts:["git push origin","git push --new","git push origin feature","git create remote"],ans:2,exp:"You must tell the server the name of the branch you are sending for the first time."},
  {q:"What does 'git merge --no-ff' do?",opts:["Forces fast-forward","Forces a merge commit even if FF is possible","Prevents conflicts","Deletes branch"],ans:1,exp:"Preserves the visual proof that a feature branch existed in the history graph."},
  {q:"Which workflow uses main, develop, and feature?",opts:["GitHub Flow","Trunk-Based","GitFlow","GitOps Flow"],ans:2,exp:"GitFlow is the classic structured model for release-based projects."},
  {q:"What is 'squash merging'?",opts:["Immediate delete","Combining all feature commits into one commit on main","FF rebase","Force-push"],ans:1,exp:"Great for keeping your main branch history extremely clean and high-level."},
  {q:"Which command renames a local branch?",opts:["git branch -r","git branch -m old new","git rename","git mv"],ans:1,exp:"The -m flag (move) is the standard way to rename Git pointers."},
  {q:"How do you delete a remote branch?",opts:["git branch -d","git push origin --delete feature","git remote remove","git delete origin"],ans:1,exp:"You are 'pushing' a deletion instruction to the remote server."},
  {q:"What is GitHub Flow?",opts:["Complex workflow","Simple workflow: branch, push, PR, merge","No branch workflow","Release-only"],ans:1,exp:"Lightweight and ideal for continuous delivery/deployment environments."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('gitBranchMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('gitBranchMasteryCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('gitBranchMasteryCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('gitBranchMasteryCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
