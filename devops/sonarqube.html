<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarQube | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#84cc16;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(132,204,22,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(132,204,22,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(132,204,22,.08);border:1px solid rgba(132,204,22,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#84cc16,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(132, 204, 22, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(132, 204, 22, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">SONAR_CORE_PROTOCOL_11</div>
    <h1>SonarQube mastery</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Quality Audit</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Code analysis complete. Quality gate state cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_SESSION</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q:"What is SonarQube?",opts:["A testing framework","Open-source platform for continuous code quality and static analysis","A cloud host","A compiler"],ans:1,exp:"SonarQube inspects code to find bugs, vulnerabilities, and technical debt automatically."},
  {q:"What are the three main issue types detected?",opts:["Syntax, logic, type","Bugs, Vulnerabilities, and Code Smells","Memory, CPU, Disk","Init, Run, Stop"],ans:1,exp:"Reliability (Bugs), Security (Vulnerabilities), and Maintainability (Code Smells) are the core pillars."},
  {q:"What does 'Technical Debt' mean?",opts:["Unpaid bills","Estimated time required to fix maintainability issues (Code Smells)","Server costs","Lines of code"],ans:1,exp:"Technical Debt represents the long-term cost of choosing an easy, messy solution over a better, cleaner approach."},
  {q:"What is the default port for SonarQube?",opts:["8080","3000","443","9000"],ans:3,exp:"Port 9000 is the standard entry point for the SonarQube web dashboard."},
  {q:"Which DB is used for evaluation (embedded)?",opts:["MySQL","PostgreSQL","H2","Oracle"],ans:2,exp:"H2 is great for testing but lacks the persistence and scale needed for production environments."},
  {q:"Java requirement for SonarQube 9.x+?",opts:["Java 8","JDK 11 or 17","Java 7","Node.js"],ans:1,exp:"Modern SonarQube versions require LTS versions of the JDK to run the backend server."},
  {q:"What is a SonarQube 'Quality Gate'?",opts:["A firewall","Conditions code must meet to pass analysis (e.g. 0 Blocker Bugs)","A UI plugin","Login page"],ans:1,exp:"Quality Gates provide a 'Go/No-Go' signal for pipelines to block bad code from moving forward."},
  {q:"What is 'Code Coverage'?",opts:["File count","Percentage of code lines executed by automated tests","Security score","Total lines"],ans:1,exp:"Coverage tells you how much of your logic is actually being verified by your test suite."},
  {q:"What is a 'Code Smell'?",opts:["Runtime error","Maintainability issue — works but is poorly written/hard to fix","Vulnerability","Compilation fail"],ans:2,exp:"Smells aren't necessarily broken, but they make the code difficult to understand for other developers."},
  {q:"What is a 'Project Key'?",opts:["Admin pass","A unique ID that identifies your project on the server","Port number","DB string"],ans:1,exp:"The key ensures that when you scan code, it updates the correct dashboard on the SonarQube server."},
  {q:"Tool that scans code and sends results to server?",opts:["UI only","SonarScanner or Maven Plugin","Jenkins alone","Docker"],ans:1,exp:"The scanner acts as the client that performs the actual compute work of analyzing the files."},
  {q:"Maven command for SonarQube analysis?",opts:["mvn sonar:run","mvn sonar:sonar","mvn sonar:scan","mvn analyze"],ans:1,exp:"The sonar-maven-plugin makes it easy to integrate quality checks into standard Java build cycles."},
  {q:"Maven property for server URL?",opts:["sonar.host","sonar.server.url","-Dsonar.host.url=...","-Dsonar.url=..."],ans:2,exp:"The host URL tells the scanner exactly where to upload the analysis report."},
  {q:"Purpose of a SonarQube 'Token'?",opts:["Encryption","Authenticating scanners without using admin passwords","Reports","DB access"],ans:1,exp:"Tokens are unique strings used by CI systems to talk to the server securely."},
  {q:"What does the Dashboard show?",opts:["CPU usage","Bugs, Smells, Coverage, and Quality Gate status","Only security","Commit history"],ans:1,exp:"It provides a 'Single Pane of Glass' for the health of your entire codebase."},
  {q:"What is the 'Duplications' metric?",opts:["File copies","Percentage of identical code blocks across files","Method count","Class count"],ans:1,exp:"High duplication leads to maintenance nightmares, as a bug fix might need to be applied in multiple places."},
  {q:"Use of 'sonar-project.properties'?",opts:["Replace pom.xml","Config file for standalone SonarScanner CLI","DB config","Docker config"],ans:1,exp:"This file defines the project parameters for languages that don't use Maven or Gradle."},
  {q:"What is 'OWASP Top 10' in SonarQube?",opts:["Languages","Critical web security risk categories mapped to vulnerabilities","Java frameworks","DevOps tools"],ans:1,exp:"SonarQube categories its findings so you can see if you are at risk for standard attacks like SQL injection."},
  {q:"CI/CD Integration method?",opts:["Manual only","A pipeline stage that blocks on Quality Gate failure","Post-production","Staging only"],ans:1,exp:"Automation ensures that code quality is checked on every single pull request and merge."},
  {q:"What is 'SonarLint'?",opts:["Replacement","IDE plugin providing real-time analysis while coding","Mobile app","Server tool"],ans:1,exp:"SonarLint acts like a 'spellchecker' for code, helping devs catch issues before they even commit."},
  {q:"Analysis technique used?",opts:["Runtime","Static Application Security Testing (SAST) — analyzes source without running it","Load testing","Integration"],ans:1,exp:"SAST looks at the code structure and logic flow to find potential flaws without needing a running server."},
  {q:"Reliability Rating A–E meaning?",opts:["Formatting","A=0 bugs, E=at least 1 Blocker bug","Response time","Uptime"],ans:1,exp:"These letter grades give managers a high-level view of the technical quality of the code."},
  {q:"What is a 'Security Hotspot'?",opts:["Server crash","Sensitive code needing manual human review","Breach alert","Auth failure"],ans:1,exp:"Hotspots flag code that 'might' be dangerous (like using weak encryption) and ask a human to verify context."},
  {q:"Maven plugin GroupID?",opts:["com.sonar","org.sonarsource.scanner.maven","org.sonarqube","com.sonarqube"],ans:1,exp:"This is the official identifier for the Maven plugin required for Java integrations."},
  {q:"What is the 'New Code' period?",opts:["New dev code","Changes since a specific date or version (focus of Quality Gates)","New server version","Deleted code"],ans:1,exp:"Modern DevOps focus on 'Cleaning the Leak' — ensuring new code is perfect even if the old code is messy."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('sonarQubeMasteryCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "QUALITY_LOGIC"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('sonarQubeMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('sonarQubeMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('sonarQubeMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
