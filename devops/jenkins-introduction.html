<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenkins Intro | Veera Sir Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#0f1623;--border:#1a2332;--border2:#243044;--text:#dce8f5;--muted:#4a6080;--accent:#ec4899;--correct:#10b981;--wrong:#ef4444;--neutral:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh; overflow-x: hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(236,72,153,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(236,72,153,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* TOPBAR NAVIGATION */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.back-btn-top{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.back-btn-top:hover{gap:12px;opacity:0.8}

header{position:relative;z-index:1;padding:40px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.2);border-radius:8px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;background:linear-gradient(135deg,#ec4899,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.header-stats{display:flex;justify-content:center;gap:15px;margin:20px auto; max-width: 600px;}
.hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
.hs-val{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:1.2rem}
.hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

.timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
.nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
.nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
.nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
.nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

.quiz-wrap{max-width:780px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:24px}

.option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(236, 72, 153, 0.05)}
.option.disabled{cursor:default}

/* HIGH VISIBILITY HIGHLIGHTING */
.option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
.option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}

.option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700}
.option.correct-ans .option-letter{background:var(--correct);color:#000}
.option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

.explanation{margin-top:20px;padding:15px;background:rgba(236, 72, 153, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.85rem;color:var(--text);line-height:1.6;display:none}
.explanation.show{display:block; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btn{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

.scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
.score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a class="back-btn-top" href="devops.html">← Back to DevOps</a>
</div>

<header>
    <div class="topic-badge">JENKINS_CORE_PROTOCOL_12</div>
    <h1>Jenkins Introduction</h1>
    <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
    </div>
</header>

<div id="mainQuiz">
    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
        <div id="questionContainer"></div>
        <div class="q-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
            <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
        </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
    <div class="q-card">
        <div class="hs-lbl">Final Automation Result</div>
        <div class="score-num-big" id="finalScore">0</div>
        <p style="color:var(--muted); margin-bottom:20px">Jenkins CI protocol verified. Pipeline logic cached.</p>
        <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_EXAM</button>
    </div>
</div>

<script>
const rawQuestions = [
  {q: "What is Jenkins?", opts: ["A testing framework","Open-source automation server for CI/CD","Cloud storage service","Version control system"], ans: 1, exp: "Jenkins is the industry standard for automating build, test, and deploy cycles."},
  {q: "Which company originally developed Jenkins (as Hudson)?", opts: ["Microsoft","Google","Sun Microsystems","Amazon"], ans: 2, exp: "It began at Sun Microsystems and was later forked to become the Jenkins we use today."},
  {q: "What is Continuous Integration (CI)?", opts: ["End-of-project merging","Frequent integration and automated testing of code changes","Direct production deployment","Manual testing"], ans: 1, exp: "CI focuses on merging code daily and verifying it with automated builds to find bugs early."},
  {q: "What is the primary benefit of Jenkins?", opts: ["Manual code review","Automating repetitive build/test tasks to reduce time-to-market","Eliminating Git","Replacing developers"], ans: 1, exp: "Automation reduces human error and ensures a consistent deployment process."},
  {q: "What is a Jenkins Job?", opts: ["Scheduled meeting","A runnable task managed by Jenkins (build, test, or deploy)","Cloud instance","IDE environment"], ans: 1, exp: "A Job is the basic unit of execution, representing a single project or task."},
  {q: "What is a Jenkins Pipeline?", opts: ["A sequence of jobs connected in a defined workflow","Artifact storage","Version control branch","Dashboard"], ans: 0, exp: "Pipelines connect multiple jobs to create complex, end-to-end delivery flows."},
  {q: "Which file defines a Pipeline as code?", opts: ["Buildfile","Dockerfile","Jenkinsfile","Pipelinefile"], ans: 2, exp: "The Jenkinsfile allows you to version control your entire CI/CD logic alongside your app code."},
  {q: "What does POLL SCM mean?", opts: ["Checking a repo for changes at specified intervals","Pushing code","Email alerts","Branch creation"], ans: 0, exp: "Polling is a pull-based method where Jenkins asks the Git server if there is new code."},
  {q: "What is the POLL SCM syntax for checking every 5 minutes?", opts: ["H/5 * * * *","*/5 * * * *","H H/5 * * *","0 */5 * * *"], ans: 0, exp: "The 'H' symbol helps balance the load by slightly offsetting the exact second the build starts."},
  {q: "Difference between 'Build Periodically' and 'Poll SCM'?", opts: ["Identical","Periodically runs regardless of changes; Poll checks for changes first","Poll is faster","Periodically is for Git only"], ans: 1, exp: "Poll SCM is usually better as it avoids unnecessary builds if no code has changed."},
  {q: "Which trigger uses cron syntax for scheduled builds?", opts: ["Webhook","Poll SCM","Build Periodically","Git Push"], ans: 2, exp: "Build Periodically allows you to run nightly builds or scheduled maintenance tasks."},
  {q: "What is a Jenkins Webhook?", opts: ["Manual trigger","HTTP callback from Git to Jenkins for instant builds","Backup tool","Monitoring tool"], ans: 1, exp: "Webhooks are push-based, making them much more efficient than polling for large teams."},
  {q: "What is the default port for Jenkins?", opts: ["8000","8080","9090","3000"], ans: 1, exp: "You access the dashboard via http://server-ip:8080 by default."},
  {q: "Which of the following is NOT a built-in trigger configuration?", opts: ["Poll SCM","Webhook","Build Periodically","Build Manually"], ans: 3, exp: "Manual builds are actions taken by a user, not an automated 'trigger' event."},
  {q: "What does SCM stand for?", opts: ["Source Code Manager","Source Control Management","System Config Monitor","Software Change Manager"], ans: 1, exp: "SCM refers to tools like Git that manage the history of source code files."},
  {q: "How to configure Jenkins to use a Git repository?", opts: ["Enter URL and branch in SCM section","Poll SCM only","Download manually","Use FTP"], ans: 0, exp: "You must provide the Git URL and usually credentials for Jenkins to access the code."},
  {q: "What happens when a build is triggered?", opts: ["Server shuts down","Jenkins clones code, runs scripts, and reports results","All jobs stop","Repo deleted"], ans: 1, exp: "The runner prepares the environment, executes your shell/Maven commands, and saves the output."},
  {q: "What is a Jenkins Artifact?", opts: ["Source code","Build output like JAR/WAR files or test reports","Virtual machine","Git commit"], ans: 1, exp: "Artifacts are the valuable results of a build that you might want to deploy later."},
  {q: "Which plugin builds Java projects with Maven?", opts: ["Docker","Git","Maven Integration Plugin","Pipeline"], ans: 2, exp: "The Maven plugin allows Jenkins to understand pom.xml files and run standard Maven lifecycles."},
  {q: "What is Jenkins Workspace?", opts: ["GUI for jobs","Dir on node where job checks out and builds code","Cloud bucket","Docs area"], ans: 1, exp: "Each job gets a clean folder on the agent to perform its work to prevent crosstalk."},
  {q: "What is the Jenkins Build Queue?", opts: ["Completed list","List of builds waiting for an available executor","Backup system","Monitor"], ans: 1, exp: "If all build slots are full, new build requests wait in the queue."},
  {q: "What are Jenkins Executors?", opts: ["Shell workers","Parallel build slots where jobs execute","Git branches","Test runners"], ans: 1, exp: "Executors define how many jobs a specific Jenkins node can run at the same time."},
  {q: "How to view build logs in UI?", opts: ["Click 'Console Output' on the build page","Check FS directly","SSH to server","Jenkins CLI"], ans: 0, exp: "Console Output is the primary way to debug why a build failed or check its progress."},
  {q: "What happens when a build fails?", opts: ["Job deleted","Jenkins stops","Job marked FAILED and alerts can be sent","Workspace cleared"], ans: 2, exp: "Jenkins records the failure and usually notifies the developer who made the commit via Slack or Email."},
  {q: "Which syntax checks for changes every morning at 2 AM?", opts: ["0 2 * * *","H 2 * * *","2 * * * *","*/2 * * * *"], ans: 1, exp: "H 2 * * * ensures the build runs once between 2:00 and 2:59 AM to prevent server spikes."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz() {
    const cache = localStorage.getItem('jenkinsIntroMasteryCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = rawQuestions.map(q => {
        let opts = [...q.opts];
        let correctText = opts[q.ans];
        shuffleArray(opts);
        return {
            q: q.q,
            opts: opts,
            ans: opts.indexOf(correctText),
            exp: q.exp,
            tag: "CI_FUNDAMENTALS"
        };
    });
    shuffleArray(questions);
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('jenkinsIntroMasteryCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render() {
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].ans) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.opts.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.ans) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.exp}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH EXAM ✓" : "NEXT STEP →";
}

function selectAnswer(i) {
    if (answered[current] !== null) return;
    answered[current] = i;
    if (i === questions[current].ans) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ() { if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ() { if(current > 0) { current--; render(); saveProgress(); } }

function showScore() {
    clearInterval(timerId);
    localStorage.removeItem('jenkinsIntroMasteryCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = `${score} / 25`;
}

function retryQuiz() { localStorage.removeItem('jenkinsIntroMasteryCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
