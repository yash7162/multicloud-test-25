<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAM Mastery | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#ec4899;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  .back-btn:hover{letter-spacing: 1px;}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #ec4899, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(236, 72, 153, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  /* Compact Explanation Style */
  .explanation{margin-top:20px;padding:15px;background:rgba(236, 72, 153, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← IDENTITY_EXIT</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">SECURE_IDENTITY_PROTOCOL_TOPIC_15</div>
      <h1>IAM Identity Framework</h1>
      <p class="desc">Mastering users, groups, roles, and fine-grained JSON permission policies.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Status</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Authorization Result</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Identity Protocol Complete. Cache Synchronized.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALIZE_IDENTITY</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is the AWS Root Account?",o:["An IAM admin user","The account created when you first sign up for AWS, with full unrestricted access","A shared admin account","An EC2 management account"],a:1,e:"The Root Account has unrestricted access. Best practices suggest enabling MFA and only using it for billing or initial setup tasks."},
  {q:"What is IAM (Identity and Access Management)?",o:["A database service","AWS service for managing identities and permissions to control access to resources","A networking service","A billing tool"],a:1,e:"IAM is a global service that manages authentication and authorization for users, groups, and roles within an AWS account."},
  {q:"What is Multi-Factor Authentication (MFA) in AWS?",o:["A backup login","A second layer of security requiring a verification factor beyond a password","A password manager","Biometric login"],a:1,e:"MFA adds a critical security layer. AWS supports virtual (TOTP), hardware tokens, and U2F security keys."},
  {q:"What is an IAM User?",o:["A managed AWS service","An identity representing a person/app with permanent long-term credentials","A temporary session","A billing account"],a:1,e:"IAM Users are permanent identities that use passwords for the console or access keys for programmatic API access."},
  {q:"What is an IAM Group?",o:["A collection of roles","A collection of IAM users that can be assigned common policies","A VPC network group","A billing tag group"],a:1,e:"Groups simplify permission management. Permissions granted to a group are inherited by all users added to that group."},
  {q:"What is an IAM Role?",o:["A permanent user","A temporary identity assumed by services or users to perform actions without permanent credentials","A group of permissions","An API key"],a:1,e:"Roles provide temporary security credentials (STS). They are ideal for EC2 instances or Lambda functions to access other AWS services."},
  {q:"What is an IAM Policy?",o:["A billing plan","A JSON document defining permissions (Allow/Deny) for specific actions on resources","A network rule","Account governance"],a:1,e:"Policies are the heart of IAM authorization. They explicitly state who can do what to which AWS resource."},
  {q:"What is an AWS Managed Policy?",o:["A policy you create","A pre-built policy maintained by AWS for common use cases (e.g. S3ReadOnlyAccess)","Billing policy","Resource embedded policy"],a:1,e:"AWS Managed Policies are created and updated by AWS, ensuring common access patterns stay current with new features."},
  {q:"What is a Customer Managed Policy?",o:["Policy created by AWS Support","A custom policy you manage in your account for full control over exact permissions","Inline policy","Billing manager"],a:1,e:"Customer Managed Policies are reusable, versioned policies that you define to match your specific organizational requirements."},
  {q:"What is an Inline Policy?",o:["On-screen policy","A policy embedded directly into a single IAM user, group, or role (non-reusable)","AWS created policy","Temporary access policy"],a:1,e:"Inline policies have a 1:1 relationship with an identity. They are usually avoided in favor of managed policies for better scalability."},
  {q:"What is the Principle of Least Privilege in IAM?",o:["Admin for everyone","Granting only the minimum permissions required for a specific task","Using managed policies only","Deny all by default"],a:1,e:"Least Privilege minimizes the potential blast radius by giving identities only the access they absolutely need to function."},
  {q:"What is the IAM Password Policy?",o:["API key policy","Account-level settings controlling complexity, expiry, and reuse of IAM passwords","VPN policy","Root account policy"],a:1,e:"This policy enforces security standards across the account, such as minimum length and required character types."},
  {q:"What are AWS Access Keys used for?",o:["Console login","Programmatic access to AWS via CLI, SDK, or API","MFA factor","SSH key pairs"],a:1,e:"Access Keys consist of an ID and a Secret Key. They should be rotated regularly and never committed to code."},
  {q:"What is the AWS CLI?",o:["Browser extension","A terminal tool for managing AWS services using access keys for authentication","Graphical console","SSH tool"],a:1,e:"The Command Line Interface (CLI) allows you to script and automate AWS management from your local shell environment."},
  {q:"What command configures the AWS CLI with credentials?",o:["aws setup","aws init","aws configure","aws login"],a:2,e:"'aws configure' sets up your access key, secret key, default region, and output format in a local configuration file."},
  {q:"What is an IAM Role's Trust Policy?",o:["Permission policy","A JSON policy defining which principals (services/accounts) can assume the role","Billing document","Audit log policy"],a:1,e:"Trust policies define the 'AssumeRole' relationship, specifying who is authorized to 'step into' the role."},
  {q:"What is AWS STS (Security Token Service)?",o:["Storage service","A service that provides temporary security credentials when assuming an IAM Role","Monitoring service","Encryption service"],a:1,e:"STS issues the short-term tokens (Access Key, Secret Key, and Session Token) required for temporary authorization."},
  {q:"What is IAM Access Analyzer?",o:["Billing tool","A service that identifies resources shared outside your account or organization","Performance tool","Code review"],a:1,e:"Access Analyzer helps you identify unintended public or cross-account access by analyzing resource-based policies."},
  {q:"What is AWS CloudTrail's role in IAM auditing?",o:["Monitoring performance","Recording all API calls made in your account (who, what, when, where)","Managing policies","Storing user data"],a:1,e:"CloudTrail provides a complete history of IAM changes and usage, which is essential for security forensics."},
  {q:"What is IAM Credential Report?",o:["List of endpoints","A CSV report listing all users and the status of their passwords/keys/MFA","Billing summary","Role usage report"],a:1,e:"The report is a snapshot of account security health, showing when credentials were last used or rotated."},
  {q:"What is the IAM Access Advisor?",o:["Consulting service","A report showing which services a principal has actually accessed and when","Performance advisor","Billing advisor"],a:1,e:"Access Advisor helps you refine permissions by identifying which authorized services haven't been used in months."},
  {q:"What is the difference between Authentication and Authorization?",o:["Same thing","Authentication verifies WHO you are; Authorization determines WHAT you can do","Authorization is first","Authentication is for services only"],a:1,e:"Authentication is about identity (login/keys); Authorization is about permissions (policies). You need both for secure access."},
  {q:"How many access keys can an IAM user have at one time?",o:["1","2 (enables safe rotation)","5","Unlimited"],a:1,e:"Having two keys allows you to create a new one, update your application, and then safely delete the old one without downtime."},
  {q:"What does 'sts:AssumeRoleWithWebIdentity' allow?",o:["CLI profile assumption","Allows users authenticated by providers like Google/Cognito to assume a role","Cross-account only","EC2 role assumption"],a:1,e:"This enables 'Federated' access, allowing social login users to get temporary credentials for AWS resources."},
  {q:"What happens if an IAM policy has an explicit Allow and an explicit Deny?",o:["Allow wins","Deny wins (Explicit Deny always overrides Allow)","Most recent wins","Prompt user"],a:1,e:"In AWS policy evaluation, an explicit DENY is the 'trump card'—it overrides any ALLOW, regardless of where it is defined."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsIamStudyCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsIamStudyCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_PROTOCOL ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsIamStudyCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsIamStudyCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
