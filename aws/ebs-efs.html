<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS / EFS | AWS Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#f59e0b;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  /* Smalled H1 with Gradient */
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, var(--accent), #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(245,158,11,.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:20px;background:rgba(245,158,11,.08);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.92rem;color:var(--text);line-height:1.7;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← AWS_HUB</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">BLOCK_AND_FILE_STORAGE_TOPIC_09</div>
      <h1>EBS & EFS Architecture</h1>
      <p class="desc">Master persistent block storage and shared file systems in the AWS ecosystem.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Current</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_BLOCK</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Accuracy</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Storage Session Complete. Logs cached.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">RESET_DATA_LAYER</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is Amazon EBS (Elastic Block Store)?",o:["A shared file system","Network-attached block storage volumes for EC2 instances, persisting independently of instance lifecycle","A managed database service","Object storage similar to S3"],a:1,e:"EBS provides persistent block-level storage volumes that attach to EC2 instances. Data persists independently and survives instance stops or reboots."},
  {q:"What is the scope of an EBS volume?",o:["Global","Regional","Availability Zone (AZ) specific","VPC-wide"],a:2,e:"EBS volumes are AZ-specific. A volume created in us-east-1a cannot be directly attached to an instance in us-east-1b."},
  {q:"Can a single EBS volume be attached to multiple EC2 instances simultaneously?",o:["No, only one instance at a time (standard)","Yes, any EBS volume can be attached to multiple instances","Yes, with EBS Multi-Attach for io1/io2 volumes and compatible instances","EBS volumes cannot be shared at all"],a:2,e:"Standard EBS attaches to one instance. EBS Multi-Attach allows io1/io2 volumes to attach to up to 16 Nitro instances in the same AZ."},
  {q:"Which EBS volume type is the default general-purpose SSD?",o:["io2","st1","gp2 / gp3","sc1"],a:2,e:"gp2/gp3 are the default root volume types. gp3 allows independent scaling of throughput and IOPS."},
  {q:"What EBS volume type should you choose for high-performance databases requiring consistent low latency?",o:["gp2","st1 (Throughput Optimized HDD)","sc1 (Cold HDD)","io1/io2 (Provisioned IOPS SSD)"],a:3,e:"io1/io2 are Provisioned IOPS SSDs designed for mission-critical, high-IOPS applications like database backends."},
  {q:"What is st1 (Throughput Optimized HDD) designed for?",o:["Boot volumes","Low-latency random I/O","High throughput sequential workloads like big data, data warehouses, log processing","Cold archival storage"],a:2,e:"st1 is optimized for high-throughput sequential workloads. It cannot be used as a boot volume."},
  {q:"What is sc1 (Cold HDD) optimized for?",o:["High IOPS databases","Infrequently accessed, lowest cost sequential storage workloads","Boot volumes","Real-time analytics"],a:1,e:"sc1 is the lowest cost HDD volume type for sequential data that is rarely accessed."},
  {q:"What is an EBS Snapshot?",o:["A real-time mirror of an EBS volume","An incremental point-in-time backup of an EBS volume stored in S3","A full copy stored on the instance","A network packet capture"],a:1,e:"Snapshots are incremental backups. Only the blocks changed since the last snapshot are saved to S3."},
  {q:"What is EBS Snapshot Archive?",o:["Automatically deletes old snapshots","Moves snapshots to a low-cost archive tier with a 24-72 hour restore time","Encrypts snapshots","Replicates snapshots across regions"],a:1,e:"This tier is 75% cheaper than standard storage but has a much longer retrieval time (hours/days)."},
  {q:"What is Amazon Data Lifecycle Manager (DLM)?",o:["A tool for managing EC2 instance lifecycles","A service to automate creation, retention, and deletion of EBS snapshots and AMIs based on schedules","A tool for managing S3 object lifecycles","An Auto Scaling lifecycle service"],a:1,e:"DLM simplifies snapshot management by automating backup policies based on resource tags."},
  {q:"Can you encrypt an existing unencrypted EBS volume directly?",o:["Yes, with one click in the console","No — you must create a snapshot, copy it with encryption enabled, then create an encrypted volume from the snapshot","Yes, using KMS directly","Only with CloudHSM"],a:1,e:"To encrypt an unencrypted volume, you must use the Snapshot-Copy-Restore process with encryption enabled during the copy."},
  {q:"What is Amazon EFS (Elastic File System)?",o:["A block storage service","A managed NFS that can be mounted on multiple EC2 instances simultaneously across AZs","An object storage service","A database storage service"],a:1,e:"EFS is a shared file system (NFS protocol) that supports concurrent access from thousands of instances."},
  {q:"What protocol does EFS use?",o:["SMB (Server Message Block)","iSCSI","NFS (Network File System) v4.0 and v4.1","FTP"],a:2,e:"EFS uses NFS v4. Windows instances cannot use EFS natively; they require FSx for Windows File Server (SMB)."},
  {q:"Can EFS be mounted on instances across multiple Availability Zones?",o:["No, EFS is AZ-specific like EBS","Yes, EFS is regional and can be accessed from all AZs in a region","Only within the same subnet","Only with VPC peering"],a:1,e:"EFS is a regional service. You create mount targets in each AZ to provide cross-AZ shared storage."},
  {q:"What is the EFS storage class for infrequently accessed files?",o:["EFS Standard","EFS Infrequent Access (EFS-IA)","EFS Archive","EFS Cold"],a:1,e:"EFS-IA is for files not accessed daily, offering significant cost savings over the Standard tier."},
  {q:"What is the key difference between EBS and EFS?",o:["EBS is for Linux; EFS is for Windows","EBS is block storage attached to one EC2 instance per AZ; EFS is shared NFS storage accessible by thousands of instances across AZs","EBS is faster; EFS is cheaper","EBS stores objects; EFS stores blocks"],a:1,e:"EBS is like a hard drive for one PC. EFS is like a shared network drive for a whole office."},
  {q:"What is EFS Throughput Mode?",o:["How fast EFS can encrypt data","Controls how EFS allocates throughput — Bursting (scales with size) or Provisioned (fixed regardless of size)","The number of IOPS","The replication speed"],a:1,e:"Bursting throughput is default. Provisioned throughput is used for workloads needing high bandwidth regardless of storage size."},
  {q:"What is EFS Performance Mode?",o:["Read vs Write speed","General Purpose (low latency) or Max I/O (higher throughput for massively parallel workloads)","Encrypted vs Unencrypted","SSD vs HDD"],a:1,e:"General Purpose is best for low-latency web servers; Max I/O is for massive data processing workloads."},
  {q:"What operating systems support mounting Amazon EFS?",o:["Windows only","Linux and Windows equally","Linux-based OS only (not Windows natively)","All OS including macOS"],a:2,e:"EFS is built on NFS v4, which is natively supported by Linux distributions but not Windows."},
  {q:"What is the maximum size of a single EBS gp3 volume?",o:["1 TB","4 TB","16 TB","64 TB"],a:2,e:"EBS volumes of the gp2/gp3 type scale up to 16 TiB per volume."},
  {q:"What happens to an EBS volume if the attached EC2 instance is terminated?",o:["The EBS volume is always deleted","The root volume is deleted by default; additional volumes are preserved by default","All volumes are preserved","All volumes are deleted"],a:1,e:"The Root volume usually has 'Delete on Termination' set to true. Data volumes stay attached/available unless configured otherwise."},
  {q:"What is EBS encryption powered by?",o:["AWS Certificate Manager (ACM)","AWS Key Management Service (KMS)","AWS Secrets Manager","AWS CloudHSM only"],a:1,e:"All EBS encryption for data at rest and snapshots is integrated with AWS KMS."},
  {q:"What is the difference between EFS Standard and EFS One Zone?",o:["Standard has more storage; One Zone is cheaper","EFS Standard replicates data across multiple AZs; EFS One Zone stores data in a single AZ at lower cost","No difference except pricing","One Zone is faster"],a:1,e:"Standard offers 99.99% availability across AZs. One Zone is cheaper (~47%) but loses data if the AZ fails."},
  {q:"Which EBS volume type provides the highest IOPS performance?",o:["gp3","st1","io2 Block Express","sc1"],a:2,e:"io2 Block Express supports up to 256,000 IOPS per volume."},
  {q:"How is EFS pricing different from EBS pricing?",o:["EFS is priced per IOPS; EBS per GB","EFS is priced per GB used (elastic); EBS is priced per GB provisioned even if unused","EFS is free for the first 5GB","EBS is more expensive than EFS per GB"],a:1,e:"EFS is elastic; you pay only for the MBs you store. EBS is provisioned; you pay for the size you requested."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e,
            tag: item.tag || "STORAGE_PROTOCOL"
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsStorageCache_v9');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    // Shuffle Question order
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsStorageCache_v9', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>💡 ARCHITECTURE_LOG:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "TERMINATE_SESSION ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsStorageCache_v9');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsStorageCache_v9'); location.reload(); }

initQuiz();
</script>
</body>
</html>
