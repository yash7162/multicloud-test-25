<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Groups MCQ | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#f97316;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  .back-btn:hover{letter-spacing: 1px;}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  /* Gradient H1 Header */
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #f97316, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(249, 115, 22, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  /* Compact Explanation Highlight */
  .explanation{margin-top:20px;padding:15px;background:rgba(249, 115, 22, 0.08);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← AWS_EXIT</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">NETWORK_SECURITY_TOPIC_SG</div>
      <h1>Security Group Protocol</h1>
      <p class="desc">Mastering instance-level stateful firewalls, inbound/outbound orchestration, and security chaining.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/20</span><span class="hs-lbl">Index</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Security Integrity</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Audit complete. Security state cached.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALIZE_PROTOCOL</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is an AWS Security Group?",o:["A physical firewall device","A virtual firewall that controls inbound and outbound traffic for EC2 instances","A group of IAM users","A VPC routing table"],a:1,e:"A Security Group acts as a virtual firewall at the instance level, controlling what traffic is allowed in (inbound) and out (outbound)."},
  {q:"At which level do Security Groups operate?",o:["Subnet level","VPC level","Instance/ENI level","Region level"],a:2,e:"Security Groups operate at the instance (or ENI) level — they are attached directly to instances or network interfaces, not subnets."},
  {q:"Are Security Groups stateful or stateless?",o:["Stateless","Stateful","Both","Neither"],a:1,e:"Security Groups are stateful — if you allow inbound traffic on a port, the return traffic is automatically allowed regardless of outbound rules."},
  {q:"What is the default inbound rule for a newly created Security Group?",o:["Allow all traffic","Deny all traffic","Allow HTTP only","Allow SSH only"],a:1,e:"By default, a new Security Group has NO inbound rules, effectively denying all inbound traffic. You must explicitly add allow rules."},
  {q:"What is the default outbound rule for a newly created Security Group?",o:["Deny all outbound traffic","Allow all outbound traffic","Allow only HTTP/HTTPS","No default rule"],a:1,e:"By default, a new Security Group allows ALL outbound traffic. You can restrict this by modifying outbound rules."},
  {q:"Can Security Groups have DENY rules?",o:["Yes, both allow and deny","No, Security Groups only support allow rules","Yes, but only for inbound","Yes, but only for outbound"],a:1,e:"Security Groups can only specify ALLOW rules. All traffic not explicitly allowed is implicitly denied. For explicit DENY rules, use Network ACLs."},
  {q:"How many Security Groups can you attach to a single EC2 instance?",o:["1","3","5","Up to 5 (default limit)"],a:3,e:"By default, you can attach up to 5 Security Groups per network interface. The rules from all attached groups are combined (union of all allow rules)."},
  {q:"What does referencing a Security Group in another Security Group's rule mean?",o:["The two SGs must be in different VPCs","Traffic from instances associated with the source SG is allowed, regardless of IP","It denies cross-SG communication","It creates a VPC peering connection"],a:1,e:"Referencing an SG as the source allows traffic from all instances associated with that SG — this is more flexible and maintainable than using IP ranges."},
  {q:"What is the difference between Security Groups and Network ACLs (NACLs)?",o:["SGs work on subnets, NACLs on instances","SGs are stateful and work on instances; NACLs are stateless and work on subnets","NACLs support only allow rules","SGs support numbered rules"],a:1,e:"Key differences: SGs are stateful (return traffic auto-allowed), instance-level, and allow-only. NACLs are stateless, subnet-level, and support both allow and deny rules."},
  {q:"What does 0.0.0.0/0 mean in a Security Group rule?",o:["All IPv6 addresses","All IPv4 addresses (any source/destination)","Only private IP ranges","Only AWS IP ranges"],a:1,e:"0.0.0.0/0 means any IPv4 address — it allows traffic from/to all IPv4 sources or destinations. ::/0 is the equivalent for IPv6."},
  {q:"Can a Security Group be used across different VPCs?",o:["Yes, any VPC in the same region","Yes, any VPC in the same account","No, Security Groups are VPC-specific","Yes, globally"],a:2,e:"Security Groups are scoped to a specific VPC. You cannot reference an SG from a different VPC in another SG's rules (except with VPC peering under certain conditions)."},
  {q:"What happens when you remove an inbound rule from a Security Group?",o:["Existing connections are immediately terminated","New connections matching the removed rule are denied; existing connections may continue","All outbound traffic is blocked","The SG is automatically deleted"],a:1,e:"Removing an inbound rule blocks new connections matching that rule. However, due to the stateful nature of SGs, established connections may continue briefly."},
  {q:"What types of traffic sources can you specify in a Security Group rule?",o:["Only IP ranges","Only other Security Groups","IP ranges (CIDR), Security Groups, and Prefix Lists","Only instance IDs"],a:2,e:"Security Group rules can reference: IP address ranges (CIDR blocks), other Security Groups (within same VPC or peered VPCs), and Managed Prefix Lists."},
  {q:"How many rules can a Security Group have by default?",o:["10 inbound, 10 outbound","50 inbound, 50 outbound","100 inbound, 100 outbound","Unlimited"],a:1,e:"By default, each Security Group supports up to 60 inbound and 60 outbound rules. This limit can be increased via service quotas."},
  {q:"What is Security Group chaining?",o:["Linking multiple VPCs","Using SGs as sources in other SGs to create layered security across tiers","Connecting SGs across regions","Inheritance of SG rules"],a:1,e:"Security Group chaining (or referencing) is using one SG as the source/destination in another SG's rule, enabling traffic flow between specific tiers (e.g., web tier → app tier → DB tier) without exposing IP addresses."},
  {q:"Which of the following is NOT a valid protocol to specify in a Security Group rule?",o:["TCP","UDP","ICMP","FTP (as a protocol type)"],a:3,e:"Security Group rules use protocol numbers (TCP=6, UDP=17, ICMP=1, or 'All'). FTP itself isn't a protocol type option — you specify TCP with port 21 for FTP."},
  {q:"Can you apply a Security Group to an RDS database instance?",o:["No, RDS uses separate firewall rules","Yes, Security Groups can be applied to RDS instances","Only NACLs apply to RDS","RDS doesn't require security groups"],a:1,e:"Yes, RDS instances use Security Groups to control access. You typically allow inbound traffic on the DB port (e.g., 3306 for MySQL) only from your application SG."},
  {q:"What is the purpose of the Description field in a Security Group rule?",o:["It's required for the rule to work","It's optional documentation for the rule's purpose","It sets rule priority","It defines the logging format"],a:1,e:"The Description field is optional documentation that helps you and your team understand why a rule was added. It has no functional effect on traffic."},
  {q:"When using VPC Peering, can you reference Security Groups from the peered VPC?",o:["No, never","Yes, always","Yes, but only within the same region","Yes, but only between same-account VPCs"],a:2,e:"With VPC peering, you can reference Security Groups from the peered VPC as traffic sources/destinations, but only for peering connections within the same AWS region."},
  {q:"What happens if multiple Security Groups are attached to an instance and they have conflicting rules?",o:["The most restrictive rule wins","The least restrictive rule wins — rules are unioned (all ALLOW rules apply)","Only the first SG's rules apply","It causes an error"],a:1,e:"Rules across multiple SGs are combined using union (OR logic). If any SG allows the traffic, it is permitted. There's no priority or conflict — all allow rules apply."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsSgStudyCache_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsSgStudyCache_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/20`;
    document.getElementById('progressFill').style.width = ((current+1)/20 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num"> Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 19) ? "SUBMIT_DATA_FINISH ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 19) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsSgStudyCache_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/20)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsSgStudyCache_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
