<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC2 Overview | AWS Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  /* Sized Down H1 with Blue Gradient */
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(59, 130, 246, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(59, 130, 246, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← EXIT_PORTAL</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">COMPUTE_SERVICE_TOPIC_05</div>
      <h1>EC2 Virtual Server Architecture</h1>
      <p class="desc">Foundational compute concepts: Instance types, AMIs, metadata services, and pricing tiers.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Analysis Result</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Evaluation Finished. Protocol synced to cache.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_BOOT</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What does EC2 stand for?",o:["Elastic Compute Cloud","Elastic Container Cloud","Extended Compute Cluster","Enterprise Compute Cloud"],a:0,e:"EC2 stands for Elastic Compute Cloud. It provides resizable virtual servers in the cloud."},
  {q:"Which of the following best describes Amazon EC2?",o:["A managed database service","A virtual server hosting service","A serverless platform","A CDN"],a:1,e:"Amazon EC2 provides virtual servers (instances) allowing you to run apps without managing physical hardware."},
  {q:"What is the underlying hypervisor technology used by modern AWS EC2 instances?",o:["Xen","VMware ESXi","AWS Nitro","KVM"],a:2,e:"Modern instances use the Nitro System, a combination of dedicated hardware and a lightweight hypervisor."},
  {q:"Which pricing model has no commitment and you pay only for what you use?",o:["Reserved","Spot","On-Demand","Dedicated Hosts"],a:2,e:"On-Demand Instances let you pay by the second or hour with no long-term commitment."},
  {q:"What is an Amazon Machine Image (AMI)?",o:["A physical server image","A preconfigured template for launching EC2 instances","A monitoring metric","A network interface"],a:1,e:"An AMI contains the software configuration (OS, apps) required to launch an instance."},
  {q:"Which components are included in an AMI?",o:["Operating system only","OS + application software only","OS, apps, and launch permissions","Launch permissions only"],a:2,e:"An AMI includes a root volume template, launch permissions, and block device mappings."},
  {q:"What are the two main types of AMIs based on root device?",o:["Public/Private","Instance Store-backed and EBS-backed","Regional/Global","Free/Paid"],a:1,e:"AMIs are either backed by EBS or by ephemeral Instance Store volumes."},
  {q:"How do you retrieve the Administrator password for a Windows instance?",o:["Sent via email","Using your key pair to decrypt it in the console","Call AWS Support","Always set to 'Admin'"],a:1,e:"You use your private key to decrypt the auto-generated password in the EC2 dashboard."},
  {q:"What is the first step to launch an EC2 instance in the console?",o:["Config SGs","Select an AMI","Choose instance type","Config storage"],a:1,e:"The wizard starts with selecting an AMI to define the OS foundations."},
  {q:"What is EC2 User Data used for?",o:["User login storage","Running bootstrap scripts automatically on first start","Configuring SGs","Assigning roles"],a:1,e:"User Data runs shell scripts automatically during the first boot for automated configuration."},
  {q:"By default, EC2 User Data scripts run as which user on Linux?",o:["ec2-user","ubuntu","root","admin"],a:2,e:"User Data scripts run as root, so you don't need sudo inside the script."},
  {q:"What is a Launch Template in EC2?",o:["CloudFormation stack","A versioned configuration for launching instances","VPC design blueprint","IAM policy template"],a:1,e:"Launch Templates store versioned configuration parameters for consistent scaling."},
  {q:"What is the advantage of Launch Templates over Launch Configurations?",o:["They are free","Templates support versioning and more EC2 features","Only for ECS","Auto-scaling specific"],a:1,e:"Templates allow you to update and version your configurations without deleting them."},
  {q:"Which feature allows you to view instance ID, IP address, and IAM role from within?",o:["Systems Manager","Instance Metadata Service (IMDS)","CloudWatch","AWS Config"],a:1,e:"IMDS is accessible locally to provide instance-specific identity information."},
  {q:"What is the URL to access EC2 instance metadata from within?",o:["http://192.168.1.1/meta-data","http://169.254.169.254/latest/meta-data/","http://localhost/aws","http://metadata.aws.com/"],a:1,e:"The link-local address 169.254.169.254 is the standard internal endpoint for IMDS."},
  {q:"Which pricing model is best for short-term, spiky workloads?",o:["Reserved","Dedicated Hosts","On-Demand","Spot"],a:2,e:"On-Demand is best for unpredictable spikes due to its flexibility and no-commitment nature."},
  {q:"What happens to Spot Instances when the spot price exceeds your bid?",o:["Migrates region","2-minute warning then termination","Pauses until drop","Keeps running"],a:1,e:"AWS interrupts spot instances with a 2-minute notice when capacity is reclaimed."},
  {q:"What is the purpose of EC2 Reserved Instance convertible type?",o:["Savings Plans link","Change family, OS, and scope during the term","Convert to Spot","Hourly billing"],a:1,e:"Convertible RIs allow you to exchange for different instance families during the term."},
  {q:"What is an EC2 Dedicated Instance?",o:["Dedicated hardware for your account","t2.micro free tier","Dedicated EBS volume","3-year commitment"],a:0,e:"Dedicated Instances run on hardware physically isolated for a single customer account."},
  {q:"Which family is best for gaming or scientific modeling?",o:["Memory Optimized","Burstable","Compute Optimized","Dense Storage"],a:2,e:"The C family provides high CPU ratios, ideal for intense batch processing and gaming."},
  {q:"How are EC2 instances billed for Linux?",o:["Per hour only","Per second (60s minimum)","Per day","Per minute"],a:1,e:"Linux instances are billed per second, allowing efficient cost management for short tasks."},
  {q:"What does it mean when an instance is in the 'stopped' state?",o:["Terminated and lost","Shut down but EBS is preserved; no compute charges","Running but no jobs","Sleep mode"],a:1,e:"Stopped instances incur no compute fees, but you still pay for the attached EBS storage."},
  {q:"Which service allows you to create a custom AMI from a running instance?",o:["AWS Backup","EC2 Image Builder","EC2 Create Image action","Both B and C"],a:3,e:"You can use the 'Create Image' console feature or the automated Image Builder service."},
  {q:"What is the difference between stopping and terminating an instance?",o:["No difference","Stopping preserves EBS; terminating permanently deletes instance","Stopping deletes data","Stopping is for Windows only"],a:1,e:"Stopping preserves the OS/Data; termination is permanent and deletes the root volume by default."},
  {q:"Which feature enables instances to access services like S3 without an Internet Gateway?",o:["Elastic IP","VPC Endpoint","NAT Gateway","Route 53"],a:1,e:"VPC Endpoints allow private connections to AWS services without traversing the internet."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsEc2OverviewCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsEc2OverviewCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">Q:${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>💡 LOG_EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_DATA ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsEc2OverviewCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsEc2OverviewCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
