<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing & Monitoring | AWS Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(59, 130, 246, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  /* Highlighted Explanation Style */
  .explanation{margin-top:20px;padding:15px;background:rgba(59, 130, 246, 0.12);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← AWS_PORTAL</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">FINOPS_AND_OBSERVABILITY_TOPIC_07</div>
      <h1>Billing & Monitoring Protocol</h1>
      <p class="desc">Master AWS Cost Management, CloudWatch metrics, and budgeting operations.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Active</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_BLOCK</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Efficiency</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">FinOps Analysis Complete. Session cached.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">INITIALIZE_NEW_BOOT</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"Which AWS service provides a consolidated view of your AWS charges and usage?",o:["AWS Config","AWS Billing Dashboard","AWS Cost Explorer","AWS Trusted Advisor"],a:1,e:"The AWS Billing Dashboard provides a consolidated overview of your current month charges, pending balance, and links to Cost Explorer and Budgets."},
  {q:"What is AWS Cost Explorer?",o:["A budgeting alert service","A visual tool to explore, analyze, and forecast AWS costs and usage over time","An EC2 pricing calculator","A service for reducing EC2 costs automatically"],a:1,e:"AWS Cost Explorer provides an interactive visualization interface to analyze costs and usage across services, linked accounts, and tags."},
  {q:"What is an AWS Budget?",o:["A report of past spending","A tool that sets custom cost and usage thresholds and sends alerts when limits are approached or exceeded","An IAM permission boundary","A CloudFormation cost template"],a:1,e:"AWS Budgets lets you set custom cost, usage, reservation, and Savings Plans thresholds with automated alerts via email or SNS."},
  {q:"What are the four types of AWS Budgets?",o:["Daily, Weekly, Monthly, Annual","Cost, Usage, Reservation, and Savings Plans budgets","EC2, S3, RDS, Lambda budgets","Free tier, On-Demand, Reserved, Spot budgets"],a:1,e:"The four budget types cover dollar amounts, service units, and the utilization/coverage of RIs and Savings Plans."},
  {q:"What service provides free-tier usage alerts and anomaly detection for unexpected cost spikes?",o:["AWS CloudTrail","AWS Cost Anomaly Detection","AWS Inspector","AWS Shield"],a:1,e:"AWS Cost Anomaly Detection uses machine learning to identify unusual spending patterns and proactively send alerts."},
  {q:"What is the AWS Free Tier?",o:["An AWS partner discount","Limited free usage of select AWS services for 12 months (new accounts) plus some always-free services","Free access to AWS documentation","A promotional code system"],a:1,e:"AWS Free Tier offers 12-month free usage (e.g., EC2 t2.micro), Always Free services (e.g., Lambda), and short-term trials."},
  {q:"Which AWS tool provides a detailed estimate of AWS costs before deploying resources?",o:["AWS Billing Dashboard","AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets"],a:2,e:"The AWS Pricing Calculator allows you to model your architecture and estimate monthly costs before any resources are launched."},
  {q:"What is a CloudWatch Alarm?",o:["A CloudFormation template","A notification that automatically watches a CloudWatch metric and triggers actions when a threshold is breached","A security vulnerability alert","A billing report"],a:1,e:"CloudWatch Alarms monitor a single metric over a time period and trigger actions like SNS notifications or Auto Scaling events when thresholds are met."},
  {q:"What are the three states a CloudWatch Alarm can be in?",o:["Active, Inactive, Disabled","OK, ALARM, INSUFFICIENT_DATA","Running, Stopped, Failed","Green, Yellow, Red"],a:1,e:"CloudWatch Alarm states: OK (normal), ALARM (threshold breached), or INSUFFICIENT_DATA (not enough data points to evaluate)."},
  {q:"What action can a CloudWatch Alarm trigger on an EC2 instance?",o:["Delete the instance","Stop, terminate, reboot, or recover an EC2 instance","Change the instance type","Migrate the instance to another region"],a:1,e:"CloudWatch Alarms can trigger EC2 actions like rebooting or recovering an instance to automate health remediation."},
  {q:"What is AWS CloudWatch?",o:["A deployment tool","A monitoring and observability service for AWS resources providing metrics, logs, and alarms","A code repository","A DNS service"],a:1,e:"CloudWatch is the core observability platform for AWS, collecting metrics, tracking logs, and reacting to resource changes."},
  {q:"What is the default metric collection interval for EC2 in CloudWatch?",o:["30 seconds","1 minute","5 minutes","1 hour"],a:2,e:"Standard monitoring sends metrics every 5 minutes at no extra cost. Detailed monitoring (1-minute intervals) is a paid feature."},
  {q:"Which metric is NOT available as a default CloudWatch metric for EC2 instances?",o:["CPUUtilization","NetworkIn","MemoryUtilization","DiskReadOps"],a:2,e:"Memory utilization is NOT a default metric because AWS does not have visibility into the instance OS; you must use the CloudWatch Agent for this."},
  {q:"What is the purpose of the CloudWatch Agent on EC2?",o:["To deploy applications","To collect custom metrics (memory, swap, disk) and logs from within the OS and send to CloudWatch","To manage IAM permissions","To configure security groups"],a:1,e:"The CloudWatch Agent collects OS-level metrics and application logs from within the instance to send them to CloudWatch."},
  {q:"What is AWS Cost Allocation Tags?",o:["Security labels for IAM","Labels applied to AWS resources that appear in billing reports for cost tracking by project, team, or environment","Monitoring tags for CloudWatch","DNS record tags"],a:1,e:"Cost Allocation Tags allow you to categorize and track costs by custom dimensions in Cost Explorer and billing reports."},
  {q:"What is the Consolidated Billing feature in AWS Organizations?",o:["A single payment method for multiple AWS accounts with combined usage benefits","A tool for auditing resource usage","An IAM feature for billing permissions","A CloudFormation stack for billing"],a:0,e:"Consolidated Billing aggregates usage from all linked accounts into one invoice, potentially unlocking volume discounts."},
  {q:"How long does AWS retain CloudWatch metrics by default?",o:["7 days","15 months","30 days","1 year"],a:1,e:"CloudWatch retains metrics for up to 15 months, though data resolution decreases over time (e.g., 1-second data is kept for 3 hours)."},
  {q:"What is a CloudWatch Dashboard?",o:["An EC2 monitoring panel","A customizable home page in the CloudWatch console showing graphs and metrics from multiple AWS services","A billing overview page","A VPC network map"],a:1,e:"CloudWatch Dashboards provide a centralized, customizable view of metrics and logs across multiple services and accounts."},
  {q:"Which AWS service automatically optimizes EC2 pricing by committing to a consistent amount of compute usage?",o:["Spot Instances","AWS Savings Plans","AWS Budgets","AWS Cost Explorer"],a:1,e:"AWS Savings Plans offer a flexible pricing model for compute usage (EC2, Lambda, Fargate) in exchange for a commitment."},
  {q:"What does the AWS Billing Dashboard 'Cost and Usage Report' provide?",o:["Real-time pricing alerts","The most granular billing data available, including hourly line items for every service","A simplified monthly summary","Only Reserved Instance data"],a:1,e:"The CUR is the most detailed billing dataset, providing hourly resource-level data exported to S3."},
  {q:"What is the purpose of SNS in the context of CloudWatch Alarms?",o:["To store alarm history","To send notifications (email, SMS, HTTP) when an alarm changes state","To create alarms automatically","To visualize alarm data"],a:1,e:"SNS is used by CloudWatch Alarms to deliver alerts to people or automated systems when an alarm state change occurs."},
  {q:"What is an AWS Billing Alert?",o:["A CloudTrail event","A CloudWatch Alarm set on the EstimatedCharges metric in the Billing namespace","An IAM permission violation","A Service Quota warning"],a:1,e:"Billing Alerts monitor your estimated monthly charges and notify you when costs exceed a set dollar threshold."},
  {q:"What is the Reserved Instance Utilization Report in Cost Explorer?",o:["A report showing RI purchases","Shows what percentage of your Reserved Instance hours are being used, helping identify unused RIs","A forecast of future RI needs","A comparison of RI vs Spot pricing"],a:1,e:"The RI Utilization Report helps identify if you are paying for Reserved Instances that are sitting idle."},
  {q:"What does 'Rightsizing' mean in AWS cost optimization?",o:["Choosing the correct AWS region","Analyzing resource utilization and recommending more appropriately sized instances to reduce costs","Setting exact billing thresholds","Resizing EBS volumes"],a:1,e:"Rightsizing involves matching instance sizes to actual workload performance to eliminate overprovisioning costs."},
  {q:"What is the AWS Trusted Advisor feature related to cost?",o:["It deploys cost-efficient infrastructure","It identifies underutilized resources, idle load balancers, and other cost-saving opportunities","It automatically terminates idle instances","It negotiates Reserved Instance pricing"],a:1,e:"Trusted Advisor checks for cost-saving opportunities like idle resources or unassociated Elastic IPs."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsBillingMonitorCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsBillingMonitorCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_DATA ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsBillingMonitorCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsBillingMonitorCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
