<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Scaling Group | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(59, 130, 246, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(59, 130, 246, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← AWS_PORTAL</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">SCALING_SERVICE_TOPIC_08</div>
      <h1>ASG Optimization Protocol</h1>
      <p class="desc">Scaling policies, lifecycle hooks, and high-availability fleet management.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Time</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Index</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_NODE →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Protocol Success Rate</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Scaling Analysis Complete. Data persists in cache.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">RESET_FLEET</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is an Auto Scaling Group (ASG)?",o:["A group of IAM users","A collection of EC2 instances managed as a logical unit that can automatically scale","A CloudFormation stack","A VPC subnet group"],a:1,e:"An ASG automates the launching or termination of instances to maintain availability and optimize costs based on demand."},
  {q:"What are the three capacity settings in an Auto Scaling Group?",o:["Low, Medium, High","Minimum, Desired, Maximum","Min, Max, Target","Start, Run, Stop"],a:1,e:"ASG uses Min (lowest), Desired (current goal), and Max (highest peak allowed) to govern fleet size."},
  {q:"What is the purpose of the 'Desired Capacity' in an ASG?",o:["Maximum instances allowed","The number of instances ASG tries to maintain at all times","The minimum number before scale-in","Healthy instances count"],a:1,e:"ASG constantly monitors the fleet and launches replacements if the current count falls below the Desired Capacity."},
  {q:"What is a Launch Template in the context of an ASG?",o:["A billing configuration","The configuration template ASG uses to launch instances (AMI, Key Pair, SGs)","An IAM template","A CloudWatch template"],a:1,e:"The Launch Template acts as the 'blueprint' for every new instance added to the group."},
  {q:"What is Scale-Out in Auto Scaling?",o:["Reducing instances","Increasing the number of EC2 instances when demand increases","Upgrading instance types","Moving regions"],a:1,e:"Scale-Out is the process of adding horizontal capacity to handle traffic spikes."},
  {q:"What is Scale-In in Auto Scaling?",o:["Upgrading memory","Removing EC2 instances when demand decreases","Adding more CPU","Moving instances"],a:1,e:"Scale-In reduces costs by terminating instances that are no longer needed during low-traffic periods."},
  {q:"What is Target Tracking Scaling Policy?",o:["Tracking S3 buckets","A policy that adjusts capacity to maintain a specific metric at a target value (e.g. CPU 50%)","Fixed-step policy","Cost tracking"],a:1,e:"Target Tracking functions like a thermostat, automatically adding/removing instances to keep a metric stable."},
  {q:"Which metric is commonly used with Target Tracking Scaling Policy?",o:["Memory utilization","Average CPU Utilization (ASGAverageCPUUtilization)","Network latency","Disk IOPS"],a:1,e:"CPU utilization is the standard metric, though ALB request counts per target are also common."},
  {q:"What is a Step Scaling Policy?",o:["Scales one instance at a time","A policy that scales in steps based on the size of the alarm breach","Gradual daily scaling","Schedule tied policy"],a:1,e:"Step scaling allows for more aggressive scaling if a metric (like CPU) spikes far beyond the threshold."},
  {q:"What is Scheduled Scaling in Auto Scaling?",o:["Real-time scaling","Scaling based on predictable time-based patterns","CloudWatch alarm scaling","Maintenance scaling"],a:1,e:"Scheduled scaling is ideal for known events, like scaling up every Monday morning before the workday starts."},
  {q:"What is the Cooldown Period in Auto Scaling?",o:["Warm up time","A pause after scaling where ASG won't trigger further actions to allow metrics to stabilize","Health check interval","Termination time"],a:1,e:"Cooldown prevents over-scaling by giving the fleet time to show the effect of the previous scaling action."},
  {q:"What is the default termination policy for Scale-In events in ASG?",o:["Newest first","Oldest first","Oldest launch configuration first, then oldest instance","Random"],a:2,e:"The default policy aims to balance across AZs while removing instances with the oldest configurations first."},
  {q:"What is a Lifecycle Hook in Auto Scaling?",o:["Billing checkpoint","A mechanism to pause launch or termination to perform custom actions (backups/config)","Health check","Alarm trigger"],a:1,e:"Hooks let you run custom scripts on an instance before it is fully added to or removed from the fleet."},
  {q:"How does ASG integrate with Elastic Load Balancing?",o:["Independent","Automatically registers/deregisters instances with the ELB target group","Manual registration","Only works with NLB"],a:1,e:"ASG handles the management of instances inside the Load Balancer target group automatically."},
  {q:"What is Predictive Scaling in Auto Scaling?",o:["CPU predictions","A machine learning-based policy that forecasts traffic and adjusts capacity proactively","Manual planning","Competitor analysis"],a:1,e:"Predictive scaling looks at historical data to scale up before a daily or weekly spike actually happens."},
  {q:"What happens when an ASG instance fails an ELB health check?",o:["Disables check","Terminates and replaces the unhealthy instance","SNS alert only","ELB handles it"],a:1,e:"If ELB health checks are enabled, ASG will automatically cycle out any instance that the balancer marks as failing."},
  {q:"What is the difference between EC2 and ELB health checks in ASG?",o:["No difference","EC2 checks instance status; ELB checks if the app is responding correctly","ELB is faster","EC2 is more accurate"],a:1,e:"ELB checks are better because they verify the application layer, not just whether the virtual hardware is 'on'."},
  {q:"What is Instance Warm-Up in ASG?",o:["Physical warming","A period after launch where an instance is not counted toward metrics to allow initialization","Reserved instance feature","Boot time"],a:1,e:"Warm-up ensures ASG doesn't panic and scale out again while a new instance is still finishing its boot scripts."},
  {q:"Can an ASG span multiple Availability Zones?",o:["No","Yes, for high availability and even distribution","Enhanced Networking only","Dedicated tenancy only"],a:1,e:"Spanning AZs is a best practice to ensure your application survives an isolated data center failure."},
  {q:"What is the purpose of Dynamic Scaling vs Scheduled Scaling?",o:["Same thing","Dynamic reacts to real-time load; Scheduled acts on known time patterns","Dynamic is more expensive","Scheduled is more accurate"],a:1,e:"Use Dynamic for unpredictable spikes and Scheduled for predictable daily cycles."},
  {q:"What does the ASG 'Suspend Processes' feature do?",o:["Stops instances","Temporarily pauses specific activities like Launch or Terminate for troubleshooting","Suspends billing","Pauses CloudWatch"],a:1,e:"Suspending is useful when you want to investigate a fleet issue without ASG automatically deleting evidence."},
  {q:"Which scaling type should you use to maintain exactly 70% CPU across your fleet?",o:["Scheduled","Step","Target Tracking Policy","Simple"],a:2,e:"Target Tracking is optimized for maintaining a constant specific 'set point' for a metric."},
  {q:"What is Simple Scaling Policy?",o:["Fixed step scaling","Triggers after an alarm and waits for a full cooldown before re-evaluating","1 instance only","No policy scaling"],a:1,e:"Simple scaling is an older method that is less responsive to rapid traffic changes compared to Step scaling."},
  {q:"What is the maximum number of instances you can launch in an ASG?",o:["100","Unlimited (subject to account vCPU quotas)","256","1000"],a:1,e:"While ASG settings have no hard cap, your actual limit is governed by your AWS Account's EC2 service limits."},
  {q:"What is 'Instance Refresh' in Auto Scaling?",o:["Simultaneous restart","A feature to gradually replace instances with a new config via rolling updates","Health check refresh","Billing cycle"],a:1,e:"Instance Refresh allows you to update your fleet to a new AMI or Launch Template without taking the whole app offline."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsAsgCache_v11');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsAsgCache_v11', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num"> Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH_PROTOCOL ✓" : "NEXT_NODE →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsAsgCache_v11');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsAsgCache_v11'); location.reload(); }

initQuiz();
</script>
</body>
</html>
