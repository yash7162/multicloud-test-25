<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 Fundamentals | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#a78bfa;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(167, 139, 250, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(167, 139, 250, 0.08);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← STORAGE_PORTAL</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">OBJECT_STORAGE_TOPIC_12</div>
      <h1>S3 Fundamental Architecture</h1>
      <p class="desc">Foundational object storage concepts, tiering strategies, and bucket management lifecycle.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Status</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_BLOCK</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Analysis</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Object protocol complete. Session state cached.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALIZE_STORAGE</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What does Amazon S3 stand for?",o:["Simple Storage System","Simple Storage Service","Scalable Storage System","Secure Storage Service"],a:1,e:"Amazon S3 stands for Simple Storage Service. It is AWS's industry-leading object storage platform."},
  {q:"What is the fundamental unit of storage in Amazon S3?",o:["File","Volume","Object","Block"],a:2,e:"S3 stores data as objects. Each object consists of the file data, metadata, and a unique key identifier."},
  {q:"What is an S3 Bucket?",o:["A virtual machine","A container that holds objects, similar to a folder at the root level","A database table","A network namespace"],a:1,e:"An S3 bucket is the top-level container for objects. Bucket names must be globally unique across all AWS accounts."},
  {q:"What is the max size of a single object you can upload with a single PUT operation?",o:["1 GB","5 GB","100 GB","5 TB"],a:1,e:"A single PUT supports up to 5 GB. For anything larger (up to the 5 TB limit), you must use Multipart Upload."},
  {q:"What is the maximum object size in Amazon S3?",o:["5 GB","100 GB","1 TB","5 TB"],a:3,e:"The total maximum size for any single object in S3 is 5 TB, regardless of how it was uploaded."},
  {q:"Which S3 storage class is for frequently accessed data with lowest retrieval latency?",o:["S3 Glacier","S3 Standard-IA","S3 Standard","S3 One Zone-IA"],a:2,e:"S3 Standard offers high durability and availability for active data with no retrieval fees."},
  {q:"What is S3 Standard-IA (Infrequent Access)?",o:["Cheaper standard","Lower cost for data accessed less frequently but requiring rapid access when needed","Archive with hours of delay","Temporary data class"],a:1,e:"Standard-IA has lower storage prices but includes a per-GB retrieval fee, making it ideal for backups."},
  {q:"What is the key difference between S3 Standard-IA and S3 One Zone-IA?",o:["No difference","Standard-IA is multi-AZ; One Zone-IA is single-AZ (20% cheaper but less resilient)","One Zone-IA is faster","Standard-IA is for archiving"],a:1,e:"Standard-IA replicates across 3+ AZs, while One Zone-IA stays in one facility, risking data loss if that AZ fails."},
  {q:"Which S3 storage class automatically moves objects between tiers?",o:["S3 Standard","S3 Glacier","S3 Intelligent-Tiering","S3 Standard-IA"],a:2,e:"Intelligent-Tiering monitors usage and moves data between frequent and infrequent tiers automatically to save costs."},
  {q:"What is Amazon S3 Glacier used for?",o:["Real-time data","Low-cost long-term archival storage with retrieval times from minutes to hours","High-performance cache","Temporary storage"],a:1,e:"Glacier is an archival tier for data that is rarely accessed, offering massive storage savings."},
  {q:"What is S3 Glacier Deep Archive?",o:["Same as Glacier","The lowest-cost storage for data retained 7-10+ years with 12-48 hour retrieval","Multimedia tier","Compliance only"],a:1,e:"Deep Archive is the cheapest tier in all of AWS, designed for long-term compliance data that is almost never read."},
  {q:"What is S3 Versioning?",o:["Auto-delete tool","Keeps multiple variants of an object in the same bucket to protect against accidental deletes","Bucket copy","Billing tracker"],a:1,e:"Versioning allows you to preserve, retrieve, and restore every version of every object stored in your bucket."},
  {q:"What happens when you delete a versioned object without specifying a version ID?",o:["Permanently deleted","A delete marker is placed; previous versions remain intact","All versions deleted","Bucket locked"],a:1,e:"S3 adds a 'Delete Marker'. The object seems gone, but you can see previous versions by toggling 'Show Versions'."},
  {q:"What is an S3 Delete Marker?",o:["Encryption tag","A zero-byte placeholder that indicates the latest version of an object is deleted","Billing marker","Compliance tag"],a:1,e:"A delete marker simply 'hides' the file from standard views. It does not actually remove any underlying data."},
  {q:"Which S3 feature prevents versioning from being disabled?",o:["Bucket Policy","MFA Delete","S3 Lock","Access Control List"],a:1,e:"MFA Delete requires a physical or virtual token to change versioning settings or permanently purge files."},
  {q:"What is an S3 Bucket Policy?",o:["CloudFormation template","A JSON-based access policy attached to a bucket to control permissions","IAM user policy","Network rule"],a:1,e:"Bucket policies are resource-based and can grant or deny access to specific users, IPs, or even other AWS accounts."},
  {q:"What is an S3 Access Control List (ACL)?",o:["Firewall rule","A legacy mechanism granting basic permissions to accounts and groups","VPC rule","IAM policy"],a:1,e:"ACLs are the original S3 security method. AWS now recommends using Bucket Policies instead for modern apps."},
  {q:"What does 'Block Public Access' setting do in S3?",o:["Encrypts objects","Overrides any policies that would allow public access","Disables versioning","Prevents replication"],a:1,e:"This acts as a master 'safety switch' to ensure that your private data never accidentally becomes public via a policy error."},
  {q:"What is S3 Object Ownership?",o:["Creator tracker","Controls whether the bucket owner or the uploader owns new objects","Billing responsibility","Encryption manager"],a:1,e:"'Bucket Owner Enforced' is the recommended setting to ensure the admin has full control over all uploaded data."},
  {q:"What are the 11 nines of durability in S3?",o:["99.9%","99.99%","99.999999999%","100%"],a:2,e:"S3 is designed to never lose data, providing 99.999999999% durability by replicating data across many devices."},
  {q:"What is S3 Transfer Acceleration?",o:["Glacier tool","Uses CloudFront edge locations to speed up long-distance uploads","Compresses objects","Parallel upload"],a:1,e:"It uses the AWS global network to route your upload through the closest edge location, avoiding the public internet."},
  {q:"What is the naming requirement for S3 bucket names?",o:["1-255 characters","3-63 characters, globally unique, lowercase, no underscores","Must start with aws-","Uppercase only"],a:1,e:"Bucket names are shared by everyone on AWS, so they must be unique, lowercase, and follow DNS naming rules."},
  {q:"What is S3 Requester Pays?",o:["Owner pays all","The requester (downloader) pays for data transfer and request costs","AWS pays","Glacier feature"],a:1,e:"This is useful for organizations sharing massive datasets with the public where they don't want to pay for everyone's downloads."},
  {q:"Which HTTP method is used to upload an object to S3?",o:["GET","POST","PUT","DELETE"],a:2,e:"S3 uses standard HTTP verbs. PUT is for creating or updating objects, while GET is for reading them."},
  {q:"What is an S3 pre-signed URL?",o:["Never expires","A temporary URL granting time-limited access without requiring IAM credentials","CloudFront URL","Private endpoint URL"],a:1,e:"Pre-signed URLs are great for letting customers download private files (like an invoice) securely for a limited time."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsS3FundamentalCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsS3FundamentalCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
          <div class="q-num">s3 Q${current+1}</div>
          <div class="q-text">${q.q}</div>
          <div class="options">${optsHtml}</div>
          <div class="explanation ${ua !== null ? 'show' : ''}">
              <strong>EXP:</strong> ${q.e}
          </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_DATA_SYNC ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsS3FundamentalCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsS3FundamentalCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
