<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 Advanced | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#a78bfa;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(167, 139, 250, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(167, 139, 250, 0.08);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← STORAGE_PORTAL</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">OBJECT_STORAGE_PROTOCOL_TOPIC_13</div>
      <h1>S3 Advanced Ecosystem</h1>
      <p class="desc">Lifecycle policies, cross-region replication, encryption layers, and static hosting orchestration.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Remaining</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Index</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_NODE</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Accuracy</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Storage analysis complete. Session persists in cache.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALIZE_PROTOCOL</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is S3 Cross-Region Replication (CRR)?",o:["Copying objects within a bucket","Automatically replicating objects to a destination bucket in a different AWS region","Replicating across accounts in one region","Manual syncing via CLI"],a:1,e:"CRR is used for compliance, disaster recovery, and reducing latency for users in different geographic locations."},
  {q:"What is S3 Same-Region Replication (SRR)?",o:["CRR in one account","Replicating objects between buckets in the same region for log aggregation or production/test syncing","Glacier backup","AZ replication"],a:1,e:"SRR is ideal for aggregating logs from multiple buckets or maintaining live copies between production and development accounts."},
  {q:"What is a prerequisite for enabling S3 Replication?",o:["Public bucket","Versioning must be enabled on both source and destination buckets","Same account only","Encrypted objects only"],a:1,e:"Without versioning, S3 cannot track the specific object states required to manage automated replication."},
  {q:"Does S3 Replication replicate existing objects by default?",o:["Yes, immediately","No — replication only applies to new objects uploaded after enabling. Use Batch Replication for old ones","Only unencrypted ones","Last 30 days only"],a:1,e:"Standard replication is triggered by new upload events. To sync legacy data, you must run an S3 Batch Replication job."},
  {q:"What is S3 Lifecycle Management?",o:["Yearly auto-delete","Rules that automatically transition objects between storage classes or delete them after defined periods","Access monitoring","Billing tool"],a:1,e:"Lifecycle rules help manage costs by moving data to cheaper tiers (like Glacier) as it ages or deleting temporary data."},
  {q:"What is the minimum days before transitioning from S3 Standard to S3 Standard-IA?",o:["1 day","30 days","60 days","90 days"],a:1,e:"AWS enforces a 30-day minimum storage duration for Standard objects before they can be transitioned to Infrequent Access classes."},
  {q:"What does S3 Object Lock do?",o:["Prevents encryption","Enforces WORM (Write Once Read Many) protection, preventing deletion or overwriting for a fixed time","Locks permissions","Prevents uploads"],a:1,e:"Object Lock is vital for regulatory compliance, ensuring that records cannot be altered or deleted even by the root user during the lock period."},
  {q:"What are the two server-side encryption options using AWS-managed keys?",o:["SSE-C and SSE-KMS","SSE-S3 (AES-256) and SSE-KMS (KMS keys with audit trail)","SSE-AES and SSE-RSA","Client and server side"],a:1,e:"SSE-S3 is the default/free managed encryption. SSE-KMS provides more control, including custom keys and CloudTrail logging."},
  {q:"What is SSE-C (Server-Side Encryption with Customer-Provided Keys)?",o:["AWS managed","You provide/manage encryption keys; AWS performs encryption but never stores the key","Client-side method","CloudHSM encryption"],a:1,e:"With SSE-C, you send the key with every request. If you lose that key, the data is unrecoverable as AWS does not store it."},
  {q:"What is S3 Client-Side Encryption?",o:["Auto encryption","You encrypt data on the client before uploading; AWS never sees unencrypted data","KMS on server","Bucket policy encryption"],a:1,e:"This ensures the highest security since data is encrypted before it ever leaves your local environment."},
  {q:"What is AWS KMS in the context of S3?",o:["NoSQL database","A managed service for creating/controlling cryptographic keys used to encrypt objects","Networking key","IAM rotation"],a:1,e:"KMS integrates with S3 to provide audit logs and centralized management of the keys used for SSE-KMS encryption."},
  {q:"What is S3 Static Website Hosting?",o:["Dynamic hosting","Serving HTML/CSS/JS files directly from S3 as a website via HTTP URL","EC2 behind S3","CloudFront feature"],a:1,e:"S3 can host entire front-end applications, providing a highly scalable and cost-effective hosting solution."},
  {q:"What is the S3 website endpoint URL format?",o:["https://s3.amazonaws.com/bucket","http://bucket-name.s3-website-region.amazonaws.com","https://bucket.cloudfront.net","http://www.bucket.s3.aws.com"],a:1,e:"Note that S3 website endpoints are HTTP-based and follow a specific region-based naming convention."},
  {q:"What are S3 Event Notifications?",o:["Billing alerts","Messages sent to SNS, SQS, or Lambda when specific events occur (PUT, DELETE)","CloudWatch metrics","Bucket emails"],a:1,e:"Event notifications allow you to build automated workflows, such as triggering a thumbnail generator Lambda whenever an image is uploaded."},
  {q:"Which destination allows the most flexibility for routing S3 events to multiple targets?",o:["SNS","SQS","Lambda","Amazon EventBridge"],a:3,e:"EventBridge can filter and route events to over 18 different AWS targets, making it superior for complex architectures."},
  {q:"What is S3 Multipart Upload?",o:["Batch upload","Splitting large files into parts and uploading them in parallel for speed and reliability","Versioning","Replication"],a:1,e:"Multipart upload is required for objects larger than 5GB and recommended for anything over 100MB to improve success rates."},
  {q:"What is S3 Data Partitioning?",o:["Region division","Organizing keys using prefixes to distribute I/O requests across partitions for performance","Bucket splitting","Class partitioning"],a:1,e:"Using unique prefixes or random hashes helps S3 scale beyond its standard throughput limits by avoiding hotspots."},
  {q:"What is S3 Batch Operations?",o:["Bulk upload","Performing large-scale bulk actions (copy, tag, restore) on millions of objects using a single job","Deleting buckets","Batch billing"],a:1,e:"Batch operations allow you to modify millions of existing objects simultaneously using an inventory report as a guide."},
  {q:"How do you move objects between S3 storage classes?",o:["Impossible","Re-upload with new class or use S3 Lifecycle rules for automation","Glacier transition only","EC2 copy only"],a:1,e:"Manual moves require a Copy operation to the same key with a different class header, but Lifecycle rules are the standard for automation."},
  {q:"What is S3 Inventory?",o:["Account list","A scheduled report listing all objects and their metadata exported to a bucket","Real-time API","Cost report"],a:1,e:"Inventory provides a daily or weekly audit of all files, useful for security compliance and large-scale management tasks."},
  {q:"What does S3 Object Tagging allow?",o:["Expiry dates","Attaching key-value pairs for classification, lifecycle management, and access control","Encryption","Permissions"],a:1,e:"Tags enable you to target specific groups of objects within a bucket for lifecycle rules or IAM permission conditions."},
  {q:"What is S3 CORS (Cross-Origin Resource Sharing)?",o:["Cross-region sharing","A security mechanism allowing browsers to request S3 assets from a different domain","Replication feature","CDN config"],a:1,e:"CORS is required if you are hosting a website on one domain (e.g. site.com) that needs to fetch fonts or images from your S3 bucket."},
  {q:"What is S3 Storage Lens?",o:["Inspection tool","An organization-wide analytics dashboard providing visibility into usage and cost trends","Access log","Encryption monitor"],a:1,e:"Storage Lens provides a macro-view of your entire S3 footprint across all accounts in an organization."},
  {q:"What encryption does SSE-S3 use?",o:["RSA-2048","AES-256","DES-128","3DES"],a:1,e:"SSE-S3 uses the industry-standard AES-256 encryption, where AWS manages all aspects of the key lifecycle."},
  {q:"What is the purpose of an S3 Lifecycle expiration rule?",o:["Glacier move","To automatically delete objects or old versions after a specified number of days","Encrypt objects","Compliance tags"],a:1,e:"Expiration rules help keep buckets clean and costs low by purging data that is no longer required by the business."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsS3AdvStudy_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsS3AdvStudy_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num"> Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_DATA_FINISH ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsS3AdvStudy_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsS3AdvStudy_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
