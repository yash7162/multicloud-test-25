<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDS Mastery | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#06b6d4;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #06b6d4, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(6,182,212,.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(6,182,212,.08);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← EXIT_DATABASE</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">DATABASES_TOPIC_16</div>
      <h1>RDS Architecture Protocol</h1>
      <p class="desc">Managed relational data, high availability syncing, and read-intensive caching strategies.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Index</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_BLOCK</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Data Integrity</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Relational Protocol Complete. Snapshot cached.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALIZE_PROTOCOL</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is Amazon RDS?",o:["A NoSQL database","A managed relational database service supporting MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, and Aurora","A key-value cache","A data warehouse service"],a:1,e:"RDS automates complex administration tasks like patching, backups, and replication for relational engines."},
  {q:"What is the main advantage of using RDS over running a database on EC2?",o:["RDS is free","RDS is fully managed — AWS handles OS patching, HA, and scaling automatically","RDS is always faster","RDS supports more databases"],a:1,e:"With RDS, AWS manages the heavy lifting of infrastructure, while on EC2 you are responsible for OS and engine maintenance."},
  {q:"Which database engines does Amazon RDS support?",o:["MySQL only","MySQL, PostgreSQL, MariaDB, Oracle, Microsoft SQL Server, and Amazon Aurora","MongoDB and Cassandra","DynamoDB and Redis"],a:1,e:"RDS currently supports six major engines, including cloud-native Amazon Aurora."},
  {q:"What is Amazon Aurora?",o:["A separate database product","AWS's cloud-native relational database — MySQL and PostgreSQL compatible with superior speed","A NoSQL database","A data lake service"],a:1,e:"Aurora is built for the cloud, providing up to 5x the throughput of standard MySQL and automated 6-way replication."},
  {q:"What is a Read Replica in RDS?",o:["A backup copy","A copy of the primary used to offload read traffic (SELECT queries) asynchronously","A DR instance","A staging database"],a:1,e:"Read Replicas allow you to scale your read capacity beyond a single DB instance and can be promoted if needed."},
  {q:"What is RDS Multi-AZ deployment?",o:["Deploying read replicas","Synchronously replicating the primary to a standby instance in another AZ for HA","A multi-region database","A load balancer"],a:1,e:"Multi-AZ provides high availability and automatic failover by keeping a standby in a different AZ ready at all times."},
  {q:"What is the difference between Read Replicas and Multi-AZ?",o:["No difference","Read Replicas: asynchronous, for scaling; Multi-AZ: synchronous, for HA/failover","Read Replicas are for failover","Multi-AZ supports more replicas"],a:1,e:"Read Replicas are for performance (scaling reads); Multi-AZ is for reliability (disaster recovery)."},
  {q:"What is RDS Automated Backup?",o:["Manual snapshots","Automatic daily snapshots and transaction logs enabling point-in-time recovery","Backup to Glacier","EC2 style backup"],a:1,e:"Automated backups allow you to restore your database to any specific second within your retention window."},
  {q:"What is an RDS DB Snapshot?",o:["Automated backup","Manual backup of an RDS instance retained indefinitely until deleted","A read replica","An RDS log file"],a:1,e:"Snapshots are manual backups that survive even if the DB instance is deleted."},
  {q:"What is RDS Proxy?",o:["A caching layer","A managed database proxy that pools connections to improve scalability for serverless apps","A load balancer","A replica manager"],a:1,e:"Proxy handles connection pooling, which is vital for Lambda functions that scale rapidly and might exhaust DB limits."},
  {q:"Why is RDS Proxy especially useful for AWS Lambda?",o:["Incompatible without proxy","Lambda creates new connections on each call; Proxy pools these to prevent exhaustion","Proxy handles encryption","Proxy enables VPC access"],a:1,e:"It prevents 'Connection Exhaustion' errors by multiplexing many Lambda connections onto a few DB connections."},
  {q:"What is Amazon ElastiCache?",o:["Long-term storage","A managed in-memory caching service supporting Redis and Memcached","A backup service","A message queue"],a:1,e:"ElastiCache improves performance by storing frequently accessed data in RAM for sub-millisecond response times."},
  {q:"What are the two caching engines supported by ElastiCache?",o:["MySQL and PostgreSQL","Redis and Memcached","DynamoDB and Cassandra","MongoDB and CouchDB"],a:1,e:"Redis is used for complex data and HA; Memcached is used for simple, high-speed string caching."},
  {q:"What is a common use case for ElastiCache with RDS?",o:["Replace RDS","Cache frequently read query results to reduce RDS load","Backup RDS","Replicate RDS"],a:1,e:"The 'Lazy Loading' pattern allows your app to hit ElastiCache first, only querying RDS if the data isn't in memory."},
  {q:"What is RDS Storage Autoscaling?",o:["Scales CPU","Automatically increases storage when running low without downtime","Manual increase","Scaling replicas"],a:1,e:"It prevents 'Storage Full' errors by automatically growing your allocated disk space based on actual usage."},
  {q:"What is the default RDS backup retention period?",o:["1 day","7 days","30 days","90 days"],a:1,e:"AWS defaults to 7 days, but you can configure it between 0 (disabled) and 35 days."},
  {q:"Can RDS Read Replicas be in a different AWS region?",o:["No","Yes, for disaster recovery and lower latency reads for global users","Only same VPC","Only for MySQL"],a:1,e:"Cross-region replicas are excellent for global disaster recovery and improving local read speeds for users far from the master."},
  {q:"What happens to RDS automated backups when you delete an instance?",o:["They persist","They are deleted unless a final snapshot is requested","Moved to Glacier","Transferred to S3"],a:1,e:"Unless you manually save a final snapshot, automated backups are purged when the instance is terminated."},
  {q:"What is the purpose of RDS Parameter Groups?",o:["IAM permissions","To configure database engine settings like memory and connection limits","Define routing","Manage pricing"],a:1,e:"Parameter Groups act as a configuration blueprint for your database engine settings."},
  {q:"What is RDS Performance Insights?",o:["Billing dashboard","A dashboard that visualizes DB load and identifies bottlenecks by SQL query","Query optimizer","Backup monitor"],a:1,e:"It helps you identify 'Expensive Queries' that are slowing down your application performance."},
  {q:"What is the connection endpoint for a Multi-AZ RDS deployment?",o:["Two endpoints","A single DNS endpoint that automatically points to the active primary","One per AZ","Load balancer endpoint"],a:1,e:"The application always uses the same DNS endpoint; AWS handles the underlying IP switch during a failover."},
  {q:"What RDS feature allows you to scale compute and memory vertically?",o:["Read Replicas","Instance Class modification (e.g. db.t3 to db.r5)","Storage Autoscaling","Multi-AZ"],a:1,e:"You can scale up your instance size to give your database more CPU and RAM during a maintenance window."},
  {q:"What is Amazon Aurora Serverless?",o:["Aurora without DBs","An on-demand, auto-scaling config that scales capacity based on demand","Free tier option","Aurora without VPC"],a:1,e:"Serverless is ideal for spiky or unpredictable workloads as it scales compute capacity instantly to match traffic."},
  {q:"What security feature does RDS provide for data in transit?",o:["No encryption","SSL/TLS encryption for connections","IPsec","VPN-only"],a:1,e:"RDS supports encrypted connections to ensure data cannot be intercepted while moving between your app and the DB."},
  {q:"What is the ElastiCache Cluster Mode for Redis?",o:["Standalone setup","Data is partitioned (sharded) across multiple groups for massive horizontal scaling","Backup mode","Multi-region setup"],a:1,e:"Cluster mode allows Redis to grow beyond the memory limits of a single node by sharding data across multiple instances."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsRdsMasterCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsRdsMasterCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">RDS Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_DATA ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsRdsMasterCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsRdsMasterCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
