<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Security Tools | AWS Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#f97316;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #f97316, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000 !important; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff !important; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px; position: relative;}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(249, 115, 22, 0.05)}
  .option.disabled{cursor:default}
  
  /* FIXED HIGHLIGHTING LOGIC */
  .option.correct-ans{border-color:var(--correct)!important; background:rgba(16, 185, 129, 0.2)!important; color: #fff !important;}
  .option.wrong-ans{border-color:var(--wrong)!important; background:rgba(239, 68, 68, 0.2)!important; color: #fff !important;}
  
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700; transition: all 0.2s;}
  .option.correct-ans .option-letter{background:var(--correct); color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong); color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(249, 115, 22, 0.1);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn:hover:not(:disabled){border-color:var(--accent); color: var(--text)}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← EXIT_VAULT</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">SEC_PROTOCOL_V4</div>
      <h1>AWS Security Arsenal</h1>
      <p class="desc">Evaluating governance, DDoS mitigation, and L7 protection tools.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/28</span><span class="hs-lbl">Active</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Audit Result</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Evaluation Finalized. Security state verified.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REBOOT_SYSTEM</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is AWS Certificate Manager (ACM)?",o:["IAM credential manager","Managed service to provision and renew SSL/TLS certificates","SSH key manager","Code signing service"],a:1,e:"ACM automates the lifecycle of SSL/TLS certificates. Public certificates used with AWS services like CloudFront are free and renew automatically."},
  {q:"How does ACM automatically renew SSL/TLS certificates?",o:["Manual renewal only","ACM monitors expiry and auto-renews DNS-validated certificates","Requires support ticket","Via email notification only"],a:1,e:"DNS validation is the preferred method for ACM because it allows for fully hands-off automatic renewal without user intervention."},
  {q:"What is AWS Inspector?",o:["Code review service","Automated security assessment for EC2, ECR images, and Lambda functions","Compliance audit tool","IAM analyzer"],a:1,e:"Inspector v2 continuously scans your workloads for software vulnerabilities and unintended network exposure."},
  {q:"What does AWS Inspector scan for?",o:["Billing anomalies","Software vulnerabilities (CVEs) and network reachability","IAM misconfiguration","CloudTrail gaps"],a:1,e:"Inspector focuses on the 'data plane' security of your instances and functions, scoring findings via CVSS standards."},
  {q:"What is AWS Trusted Advisor?",o:["Human consultant","Automated tool providing best practice recommendations across 5 categories","Support portal","Billing advisor"],a:1,e:"It audits your account for Cost Optimization, Performance, Security, Fault Tolerance, and Service Limits."},
  {q:"Which Trusted Advisor checks are free for all AWS customers?",o:["All checks","Security and Service Limits basic checks","All Performance checks","Cost Optimization only"],a:1,e:"Core security checks (like open ports and root MFA) are free, while full checks require a Business or Enterprise support plan."},
  {q:"What is AWS Shield?",o:["VPC security feature","Managed DDoS protection service (Standard and Advanced tiers)","WAF rule set","EC2 firewall"],a:1,e:"Shield Standard is free for all customers. Shield Advanced provides 24/7 access to the DDoS Response Team (DRT)."},
  {q:"What does AWS Shield Advanced provide beyond Standard?",o:["No extra benefit","Visibility, 24/7 DRT support, cost protection, and L7 detection","EC2 only support","Automatic WAF rules only"],a:1,e:"Advanced offers a premium package that covers the cost of scaling during an attack and provides personalized support."},
  {q:"What is AWS WAF?",o:["Network firewall","Layer 7 firewall that filters HTTP/HTTPS requests based on rules","DDoS service","Security group"],a:1,e:"WAF protects web applications from common exploits like SQL injection and Cross-Site Scripting (XSS)."},
  {q:"What are AWS Managed Rules in AWS WAF?",o:["Custom rules","Pre-configured rules maintained by AWS for threats like OWASP Top 10","Billing rules","Global account rules"],a:1,e:"AWS Managed Rules save you time by providing expert-crafted logic to block bad bots and known malicious IP addresses."},
  {q:"What is AWS CloudTrail?",o:["CDN service","Governance service recording API calls and user activity across the account","Packet capture","Performance monitor"],a:1,e:"CloudTrail is the 'audit log' of AWS, recording who made which API request and when."},
  {q:"What is the difference between Management and Data Events in CloudTrail?",o:["No difference","Management: resource changes; Data: object-level actions (S3/Lambda)","Management is paid","Data is for billing"],a:1,e:"Management events track infrastructure changes (free), while Data events track usage of data inside resources (paid)."},
  {q:"How long does CloudTrail retain event history by default?",o:["Forever","90 days in console","30 days","7 days"],a:1,e:"To keep logs longer than 90 days, you must create a 'Trail' that exports the events to an S3 bucket."},
  {q:"What is AWS Config?",o:["Deployment service","Service that records resource configuration history and evaluates compliance","CloudTrail add-on","IAM evaluator"],a:1,e:"Config allows you to travel back in time to see exactly how a resource was configured on a specific date."},
  {q:"What are AWS Config Rules?",o:["CloudFormation templates","Rules that evaluate if resource configs match desired settings (e.g. S3 encryption)","IAM policies","Budget rules"],a:1,e:"Config Rules act as automated compliance police, alerting or remediating when resources drift from standards."},
  {q:"What is the difference between CloudTrail and AWS Config?",o:["Identical","CloudTrail: Who/When (Audit); Config: What/Compliance (History)","Config replaces Trail","Trail is newer"],a:1,e:"CloudTrail tracks the action; Config tracks the result of that action on the resource state."},
  {q:"What is Amazon SNS?",o:["Database","Managed pub/sub messaging service for fan-out notifications","File storage","Event streaming"],a:1,e:"SNS is used to send one message to multiple destinations (Email, SMS, Lambda, SQS) simultaneously."},
  {q:"What is the difference between SNS and SQS?",o:["Identical","SNS: Push-based fan-out; SQS: Pull-based queuing","SQS is for email","SNS is synchronous"],a:1,e:"In SNS, the message is sent to all subscribers immediately. In SQS, the message waits in a queue for a worker to fetch it."},
  {q:"What is Amazon CloudFront?",o:["Cloud storage","Global Content Delivery Network (CDN) that caches content at edge locations","Load balancer","DNS service"],a:1,e:"CloudFront brings content closer to users globally, drastically reducing latency and reducing origin server load."},
  {q:"What are CloudFront Origins?",o:["DNS sources","Backend servers (S3, ALB, EC2) from which CloudFront retrieves content","Edge locations","AWS data centers"],a:1,e:"The Origin is the 'source of truth' server where the original, uncached version of your files resides."},
  {q:"What is a CloudFront Distribution?",o:["Billing plan","A configuration defining origins, behaviors, and CDN settings","CDN region","S3 policy"],a:1,e:"You create a Distribution to tell AWS which files to cache and how they should be served to the public."},
  {q:"What is a CloudFront Cache Invalidation?",o:["Delete from S3","Removing cached content from edges before TTL expires","User block","DNS update"],a:1,e:"Invalidation forces CloudFront to throw away its cached copy and fetch the newest version from the origin."},
  {q:"What is AWS Global Accelerator?",o:["CDN for static files","Service routing traffic through the AWS global backbone via Anycast IPs","DNS service","Multi-region balancer"],a:1,e:"Global Accelerator provides a consistent, high-speed path through AWS's private fiber network, bypassing the public internet."},
  {q:"What is the key difference between CloudFront and Global Accelerator?",o:["No difference","CloudFront: Caches HTTP content; Global Accelerator: Optimized route for all TCP/UDP (no cache)","CloudFront is faster","Accelerator is HTTPS only"],a:1,e:"Use CloudFront for websites/media. Use Global Accelerator for gaming or IoT where latency must be consistent."},
  {q:"What is AWS Config Conformance Pack?",o:["CloudFormation package","Collection of Config rules and remediations for specific standards (e.g. HIPAA)","IAM set","Billing report"],a:1,e:"Conformance Packs help you deploy organization-wide compliance blueprints with a single click."},
  {q:"What is CloudFront Origin Access Control (OAC)?",o:["User auth","Mechanism restricting S3 access so only CloudFront can fetch objects","Caching policy","SSL setting"],a:1,e:"OAC is the modern way to ensure your private S3 buckets are never accessed directly, only via the CDN."},
  {q:"What is AWS SNS FIFO Topic?",o:["Emergency topic","Topic ensuring strict First-In-First-Out delivery and exactly-once processing","FIFO queue router","Premium tier"],a:1,e:"FIFO Topics ensure that message ordering is preserved for downstream systems like financial processors."},
  {q:"What are CloudTrail Insights?",o:["Dashboard feature","ML-based feature detecting statistically unusual API activity volume","Log search","Compliance report"],a:1,e:"Insights flags spikes in API calls, such as a sudden burst of 'TerminateInstance' requests, which might indicate a breach."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsSecToolsFinal_v1');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsSecToolsFinal_v1', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/28`;
    document.getElementById('progressFill').style.width = ((current+1)/28 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num"> Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 27) ? "FINISH_AUDIT ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 27) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsSecToolsFinal_v1');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/28)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsSecToolsFinal_v1'); location.reload(); }

initQuiz();
</script>
</body>
</html>
