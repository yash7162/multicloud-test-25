<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDS Operations | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#06b6d4;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  .back-btn:hover{letter-spacing: 1px;}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  /* Gradient H1 Header - Sized Down */
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #06b6d4, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(6,182,212,.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  /* Compact Explanation Style */
  .explanation{margin-top:20px;padding:15px;background:rgba(6,182,212,.08);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← AWS_EXIT</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">DATA_PROTOCOL_TOPIC_17</div>
      <h1>RDS Operational Framework</h1>
      <p class="desc">Connections, query orchestration, and distributed replication lifecycle.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Status</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV_BLOCK</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT_BLOCK →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Integrity</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Data Analysis Complete. Results cached to local storage.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALize_SESSION</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What security group rule must you configure to allow an EC2 to connect to an RDS instance?",o:["Allow EC2's public IP in RDS security group","Allow EC2's security group as inbound source on the DB port","Allow all traffic (0.0.0.0/0)","No config needed"],a:1,e:"The RDS security group must allow inbound traffic on the database port specifically from the EC2 instance's security group ID."},
  {q:"What is the default port for MySQL/Aurora MySQL RDS instances?",o:["5432","1433","3306","27017"],a:2,e:"MySQL and Aurora MySQL use port 3306 by default. You can modify this during the DB configuration process."},
  {q:"What is the default port for PostgreSQL/Aurora PostgreSQL RDS instances?",o:["3306","5432","1521","5433"],a:1,e:"PostgreSQL and Aurora PostgreSQL standard communication occurs over port 5432."},
  {q:"How do you connect to an RDS MySQL instance from a local machine using MySQL Workbench?",o:["Use private IP only","Use RDS endpoint hostname, port 3306, and master credentials","SSH tunnel only","Via EC2 console exclusively"],a:1,e:"You need the DNS endpoint, valid credentials, and a security group rule that permits your local public IP address."},
  {q:"What is the RDS endpoint and how is it formatted?",o:["An IP address","A DNS hostname like dbname.region.rds.amazonaws.com","An S3 bucket URL","A CloudFront domain"],a:1,e:"RDS endpoints are DNS names that resolve to the database instance IP, providing an abstraction for failover events."},
  {q:"What SQL command creates a new database in MySQL RDS?",o:["NEW DATABASE mydb;","MAKE DATABASE mydb;","CREATE DATABASE mydb;","ADD DATABASE mydb;"],a:2,e:"CREATE DATABASE is the standard SQL syntax used to initialize a new logical database container."},
  {q:"What SQL command creates a table in a MySQL RDS database?",o:["NEW TABLE users;","CREATE TABLE users (id INT PRIMARY KEY, name VARCHAR(100));","MAKE TABLE users;","INSERT TABLE users;"],a:1,e:"CREATE TABLE defines the schema, including columns, data types, and primary key constraints."},
  {q:"What SQL command inserts data into an RDS MySQL table?",o:["ADD INTO users;","INSERT INTO users (name, email) VALUES ('Alice', 'alice@test.com');","PUT INTO users;","STORE users;"],a:1,e:"INSERT INTO adds new records to an existing table structure."},
  {q:"How do you verify a Read Replica is replicating from the correct master in RDS?",o:["Check billing","The console shows 'Replication Source' pointing to the master identifier","Use CloudWatch for lag","Query the master"],a:1,e:"The RDS dashboard explicitly lists the replication source and current status of replicas."},
  {q:"What happens to a Read Replica after it's promoted to a standalone database?",o:["Reconnects to master","Becomes an independent instance with its own endpoint","It is deleted","Becomes Multi-AZ standby"],a:1,e:"Promotion breaks the replication link, turning the replica into a standard primary instance for independent use."},
  {q:"Can you run write operations (INSERT, UPDATE) on an RDS Read Replica?",o:["Yes, both supported","No — Read Replicas are read-only; writes must go to the primary master","Yes, with Multi-AZ","Only with IAM"],a:1,e:"Standard Read Replicas are strictly for SELECT queries to offload read traffic from the master."},
  {q:"What MySQL command shows all databases in an RDS instance?",o:["LIST DATABASES;","SHOW DATABASES;","GET DATABASES;","SELECT * FROM databases;"],a:1,e:"SHOW DATABASES provides a list of all schemas the current user is permitted to see."},
  {q:"What MySQL command selects a database to use?",o:["OPEN mydb;","SELECT DATABASE mydb;","USE mydb;","CONNECT mydb;"],a:2,e:"The USE command sets the context for all following queries in the session."},
  {q:"What is the RDS ReplicaLag CloudWatch metric?",o:["Billing delay","Time delay between changes on primary and appearance on replica","Storage lag","Connection latency"],a:1,e:"ReplicaLag tracks how far behind the replica is from the master in terms of seconds."},
  {q:"How do you enable Multi-AZ on an existing single-AZ RDS instance?",o:["Recreate DB","Modify the instance and enable Multi-AZ; AWS creates standby synchronously","Cannot enable after","New subnet group"],a:1,e:"Multi-AZ can be enabled via a simple modification, though AWS will need time to sync the new standby."},
  {q:"What connection information do you need to connect to RDS from an application?",o:["Username/Pass only","Endpoint, port, DB name, username, and password","DB name only","Instance ID/Region"],a:1,e:"Full connectivity requires the hostname, the specific port, the schema name, and valid credentials."},
  {q:"What is the recommended way to store RDS credentials in production?",o:["Source code","AWS Secrets Manager or Parameter Store","Plaintext config","AMI env vars"],a:1,e:"Secrets Manager is best practice because it supports automated credential rotation without app restarts."},
  {q:"What SQL command retrieves all rows from an RDS table?",o:["GET * FROM users;","FETCH ALL FROM users;","SELECT * FROM users;","LIST users;"],a:2,e:"SELECT * is used to fetch all columns and records, though column naming is preferred in production."},
  {q:"What is the purpose of RDS subnet groups?",o:["Network security","Defines where RDS can place instances within a VPC across AZs","Billing group","Storage allocation"],a:1,e:"Subnet groups ensure RDS can deploy primary and standby instances across multiple Availability Zones."},
  {q:"What is an RDS Maintenance Window?",o:["Downtime period","Configurable weekly slot for AWS to apply patches or instance modifications","Backup window","Dashboard"],a:1,e:"This window defines when non-emergency maintenance or requested changes are applied by AWS."},
  {q:"Can an RDS Read Replica exist in a different region than the master?",o:["No","Yes, cross-region replicas are supported for major engines","Oracle only","Same VPC only"],a:1,e:"Cross-region replicas are vital for global read performance and disaster recovery readiness."},
  {q:"What is the maximum number of Read Replicas for standard RDS MySQL?",o:["1","5","15","100"],a:1,e:"Standard RDS instances allow up to 5 replicas. Aurora clusters support up to 15."},
  {q:"What does 'applying' mean in RDS instance status?",o:["Backup running","A modification (instance class/storage) is currently being processed","DB deleting","Syncing"],a:1,e:"This status indicates that a requested change is currently being executed by the RDS service."},
  {q:"How does RDS handle database engine version upgrades?",o:["Automatically","Via 'Modify DB' — you choose target and apply immediately or in window","Only via new instance","Snapshot only"],a:1,e:"Upgrades are managed through the modification process, allowing for version control and testing."},
  {q:"What is the purpose of the RDS 'publicly accessible' setting?",o:["Public performance","Assigns public IP to allow internet connections (if SG allows)","Enables public backups","Anonymous login"],a:1,e:"Enabling this assigns a public IP address, which is generally discouraged for production data for security reasons."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsRdsOpsCache_v3');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsRdsOpsCache_v3', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "SUBMIT_DATA_FINISH ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsRdsOpsCache_v3');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsRdsOpsCache_v3'); location.reload(); }

initQuiz();
</script>
</body>
</html>
