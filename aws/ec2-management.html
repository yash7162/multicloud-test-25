<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC2 Management | AWS Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, var(--accent), #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(59, 130, 246, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  /* Compact Explanation Style */
  .explanation{margin-top:20px;padding:15px;background:rgba(59, 130, 246, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← EXIT_PORTAL</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">COMPUTE_RESOURCE_TOPIC_05</div>
      <h1>EC2 Management Protocol</h1>
      <p class="desc">Instance types, connectivity, security groups, and image management lifecycle.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/25</span><span class="hs-lbl">Status</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Efficiency</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Compute Analysis Complete. Data Synced.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REBOOT_SESSION</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"Which EC2 instance family is optimized for memory-intensive applications like SAP HANA?",o:["C5 (Compute Optimized)","R5 (Memory Optimized)","T3 (Burstable)","I3 (Storage Optimized)"],a:1,e:"R-family instances provide high memory-to-CPU ratios. They are ideal for in-memory databases and large caches."},
  {q:"What is the purpose of an EC2 Key Pair?",o:["To encrypt S3 data","To authenticate and securely access instances (SSH for Linux, decrypt password for Windows)","To rotate IAM credentials","To enable MFA"],a:1,e:"AWS stores the public key; you keep the private key (.pem) to SSH into Linux or decrypt Windows admin passwords."},
  {q:"What file format is the private key downloaded when creating an EC2 key pair?",o:[".ppk only",".pem (and optionally .ppk for PuTTY)",".txt",".key"],a:1,e:"AWS provides .pem. For PuTTY, you convert it to .ppk using PuTTYgen."},
  {q:"What is an EC2 Security Group?",o:["A physical firewall device","A virtual firewall controlling inbound and outbound traffic at the instance level","A network ACL","An IAM policy"],a:1,e:"SGs act as virtual firewalls. They are stateful — allowed inbound traffic is automatically allowed outbound."},
  {q:"Security Groups are STATEFUL. What does this mean?",o:["Rules are applied in order","If you allow inbound traffic, the response is automatically allowed","Traffic is logged automatically","Rules expire"],a:1,e:"Stateful means if a request is allowed in, the response is automatically allowed out without a separate outbound rule."},
  {q:"By default, what traffic does a newly created Security Group allow?",o:["All traffic","All inbound, no outbound","No inbound traffic, all outbound traffic","No inbound, no outbound"],a:2,e:"New SGs block all inbound traffic and allow all outbound traffic by default."},
  {q:"Which EC2 connect method allows you to connect via browser directly without requiring SSH keys or open port 22?",o:["SSH Client","EC2 Instance Connect","PuTTY","AWS VPN"],a:1,e:"EC2 Instance Connect provides a browser-based SSH connection from the console using temporary keys."},
  {q:"Which service allows you to connect to EC2 instances without opening inbound ports — using SSM Agent?",o:["EC2 Instance Connect","AWS Systems Manager Session Manager","AWS Direct Connect","VPC Endpoint"],a:1,e:"Session Manager allows shell access via SSM Agent without requiring SSH or open ports."},
  {q:"What is the standard SSH port used to connect to Linux EC2 instances?",o:["443","3389","22","8080"],a:2,e:"Port 22 is the default SSH port for Linux systems."},
  {q:"What port is used for Remote Desktop Protocol (RDP) to connect to Windows instances?",o:["22","80","3389","5900"],a:2,e:"RDP uses TCP port 3389 for Windows graphical access."},
  {q:"What is an Elastic IP address?",o:["A dynamic IP","A static public IPv4 address that remains constant and can be remapped","An IPv6 address","A private IP"],a:1,e:"Elastic IPs are static. They don't change when you stop/start an instance and can be remapped for fault tolerance."},
  {q:"What is the cost implication of an unattached Elastic IP address?",o:["No charge","Free as long as you own it","You are charged for it when not associated with a running instance","It is deleted"],a:2,e:"AWS charges for allocated but unassociated EIPs to discourage IP hoarding."},
  {q:"What is an EBS Snapshot?",o:["Backup of config","A point-in-time backup of an EBS volume stored in S3","A real-time mirror","Packet capture"],a:1,e:"EBS Snapshots are incremental point-in-time backups stored durably in S3."},
  {q:"Can you copy an EBS Snapshot to another AWS region?",o:["No","Yes, snapshots can be copied to any region","Only within the same AZ","Only to same region"],a:1,e:"Snapshots can be copied across regions for disaster recovery and AMI migration."},
  {q:"What is the difference between stopping and terminating regarding EBS volumes?",o:["Both delete volumes","Stopping preserves data; terminating deletes the root volume by default","Stopping deletes data; terminating preserves it","Neither affects it"],a:1,e:"Stopping keeps volumes intact. Termination deletes the root volume by default but preserves additional data volumes."},
  {q:"What is EC2 User Data used for during launch?",o:["Storing credentials","Automatically running bootstrap scripts when instance first starts","VPC Config","Billing alarms"],a:1,e:"User Data scripts run once on first boot to automate package installation and code deployment."},
  {q:"What is the Metadata Service endpoint for retrieving the instance's public IP?",o:["http://169.254.169.254/latest/meta-data/public-ipv4","http://metadata.aws.com/public-ip","http://localhost/ip","http://169.254.169.254/userdata/ip"],a:0,e:"The Instance Metadata Service (IMDS) provides instance-specific info via the 169.254.169.254 IP."},
  {q:"Which EC2 instance type prefix is known for being Burstable Performance?",o:["C","R","T","M"],a:2,e:"T-series instances provide burstable CPU performance using a credit-based system."},
  {q:"What is the purpose of creating a custom AMI?",o:["To delete the instance","To create a reusable pre-configured image for faster launches","To move regions","To change types"],a:1,e:"A custom AMI captures your OS and app state into a template for consistent, rapid scaling."},
  {q:"Which connection method works for instances in a private subnet with no public IP?",o:["Direct SSH","EC2 Serial Console","AWS Systems Manager Session Manager","Elastic IP"],a:2,e:"Session Manager connects via AWS APIs, requiring no public IP or open inbound ports."},
  {q:"What is an EC2 Launch Template?",o:["CloudFormation template","A versioned, reusable configuration for instance launches","Blueprint for IAM","Auto-scaling file"],a:1,e:"Launch Templates store launch parameters. They support versioning and advanced Auto Scaling features."},
  {q:"How many Security Groups can be attached to a single EC2 instance?",o:["1","Up to 5","Up to 16 (soft limit, per network interface)","Unlimited"],a:2,e:"By default, up to 5 security groups can be attached per ENI."},
  {q:"Can Security Group rules reference other Security Groups?",o:["No","Yes, you can reference another SG as the source/destination","Only same VPC","Only outbound"],a:1,e:"SGs can reference other SGs as sources, allowing traffic only from specific tiers of an application."},
  {q:"What happens to the public IP of an instance when it is stopped and started again?",o:["Stays the same","It changes to a new public IP","It becomes an Elastic IP","Deleted"],a:1,e:"Standard public IPs are released upon stopping and a new one is assigned upon starting."},
  {q:"Which feature allows you to run a script as the EC2 instance boots every time?",o:["EC2 User Data (default)","EC2 Scheduled Scripts","Configuring OS-level services (systemd/rc.local)","Launch Template hooks"],a:2,e:"User Data only runs once by default. Recurring scripts must be handled by OS-level mechanisms or specific cloud-init configs."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsEc2Cache_v5');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsEc2Cache_v5', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress();
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/25`;
    document.getElementById('progressFill').style.width = ((current+1)/25 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">Q:${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 24) ? "FINISH_PROCEDURE ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 24) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsEc2Cache_v5');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/25)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsEc2Cache_v5'); location.reload(); }

initQuiz();
</script>
</body>
</html>
