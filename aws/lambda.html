<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambda | AWS MCQ Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#e879f9;--text:#e2e8f0;--muted:#64748b;--correct:#10b981;--wrong:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh; overflow-x: hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3;pointer-events:none;z-index:0}
  
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
  .back-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;transition:all .2s}
  
  .progress-bar{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s}
  
  .hero{position:relative;z-index:1;padding:40px 40px 20px;text-align:center}
  .topic-tag{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
  
  h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:8px; background: linear-gradient(to right, #e879f9, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  .desc{color:var(--muted);font-size:.85rem;max-width:600px;margin:0 auto}

  .header-stats{display:flex;justify-content:center;gap:15px;margin:20px 0}
  .hs-box{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:10px;text-align:center; min-width: 100px;}
  .hs-val{display:block;font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);font-size:1.2rem}
  .hs-lbl{font-size:0.6rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px}

  .timer-warn { color: var(--wrong) !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  .nav-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; max-width: 780px; margin: 0 auto 24px; background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); position: relative; z-index: 1;}
  .nav-item {height: 35px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: var(--muted)}
  .nav-item.active {border-color: var(--accent); color: var(--accent); font-weight: bold}
  .nav-item.correct {background: var(--correct); color: #000; border-color: var(--correct)}
  .nav-item.wrong {background: var(--wrong); color: #fff; border-color: var(--wrong)}

  .quiz-wrap{max-width:780px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:24px}

  .option{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
  .option:hover:not(.disabled){border-color:var(--accent);background:rgba(232, 121, 249, 0.05)}
  .option.disabled{cursor:default}
  .option.correct-ans{border-color:var(--correct)!important;background:rgba(16,185,129,.15)!important}
  .option.wrong-ans{border-color:var(--wrong)!important;background:rgba(239,68,68,.15)!important}
  .option-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700}
  .option.correct-ans .option-letter{background:var(--correct);color:#000}
  .option.wrong-ans .option-letter{background:var(--wrong);color:#fff}

  .explanation{margin-top:20px;padding:15px;background:rgba(232, 121, 249, 0.08);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--text);line-height:1.6;display:none}
  .explanation.show{display:block; animation: fadeIn 0.3s ease;}
  .explanation strong{color:var(--accent)}
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }

  .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .nav-btn{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
  .nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}

  .scoreboard{display:none;max-width:600px;margin:40px auto;text-align:center;position:relative;z-index:1}
  .score-num-big{font-size:5rem;font-weight:800;color:var(--accent);font-family:'Space Mono'}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="aws.html">← EXIT_NODE</a>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div id="mainQuiz">
    <div class="hero">
      <div class="topic-tag">SERVERLESS_COMPUTE_TOPIC_23</div>
      <h1>AWS Lambda Protocol</h1>
      <p class="desc">Execution models, concurrency tuning, cold start mitigation, and Boto3 automation triggers.</p>
      <div class="header-stats">
        <div class="hs-box"><span class="hs-val" id="scoreDisplay">0</span><span class="hs-lbl">Score</span></div>
        <div class="hs-box"><span class="hs-val" id="timerDisplay">15:00</span><span class="hs-lbl">Clock</span></div>
        <div class="hs-box"><span class="hs-val" id="progressDisplay">1/27</span><span class="hs-lbl">Status</span></div>
      </div>
    </div>

    <div class="nav-grid" id="navGrid"></div>
    <div class="quiz-wrap">
      <div id="questionContainer"></div>
      <div class="q-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevQ()">← PREV</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">NEXT →</button>
      </div>
    </div>
</div>

<div class="scoreboard" id="scoreboard">
  <div class="q-card">
    <div class="hs-lbl">Final Efficiency</div>
    <div class="score-num-big" id="finalScore">0</div>
    <p style="color:var(--muted); margin-bottom:20px">Compute protocol finalized. Results cached.</p>
    <button class="nav-btn primary" onclick="retryQuiz()">REINITIALIZE_SYSTEM</button>
  </div>
</div>

<script>
const rawQuestions = [
  {q:"What is AWS Lambda?",o:["A virtual machine service","A serverless compute service that runs code in response to events without provisioning servers","A container orchestration service","A managed Kubernetes service"],a:1,e:"Lambda is fully serverless. You upload code and AWS handles all scaling, high availability, and infrastructure management."},
  {q:"What is the Lambda execution model?",o:["Runs 24/7 like EC2","Runs only when triggered by an event and billed per ms of consumption","Requires a running EC2 instance","Polls for work continuously"],a:1,e:"Lambda is event-driven and uses a pay-as-you-go model where you only pay for the exact duration your code runs."},
  {q:"What programming runtimes does AWS Lambda natively support?",o:["Only Python and Node.js","Node.js, Python, Java, C#, Go, Ruby, and custom runtimes via Runtime API","Only Java and Python","Only interpreted languages"],a:1,e:"Lambda supports multiple high-level languages and provides an API to bring any other language as a custom runtime."},
  {q:"What is the Lambda handler function?",o:["A configuration file","The specific method AWS Lambda calls when the function is invoked","A Lambda Layer entry point","The IAM role for Lambda"],a:1,e:"The handler is the entry point in your code. Lambda passes the 'event' and 'context' objects to this specific method."},
  {q:"What is the maximum execution timeout for a Lambda function?",o:["1 minute","15 minutes (900 seconds)","1 hour","30 minutes"],a:1,e:"Lambda has a hard limit of 15 minutes. For longer processes, consider using AWS Step Functions or ECS Fargate."},
  {q:"What is Lambda memory configuration?",o:["Fixed at 128 MB","Configurable from 128 MB to 10,240 MB with proportional CPU allocation","Unlimited memory","Fixed based on runtime"],a:1,e:"As you increase memory, AWS proportionally increases CPU power and network bandwidth for the function."},
  {q:"What is the Lambda execution environment?",o:["A dedicated EC2 instance","An isolated runtime environment (microVM) that can be reused for subsequent calls","A Docker container you manage","A shared VM"],a:1,e:"Lambda uses Firecracker microVMs. Environments are kept 'warm' for a period to speed up subsequent invocations."},
  {q:"What is a Lambda Cold Start?",o:["Lambda in a cold region","The latency overhead when Lambda creates a new execution environment for the first time","Running on older hardware","A function not invoked for a year"],a:1,e:"Cold starts occur when a function is invoked after being idle or when scaling up, requiring environment initialization."},
  {q:"What is Lambda Provisioned Concurrency?",o:["Max concurrent limit","Pre-initializes environments so they are always warm and ready to eliminate cold starts","Reserved EC2 instances","Dedicated CPU"],a:1,e:"Provisioned Concurrency ensures a specific number of environments are always ready, which is vital for latency-sensitive apps."},
  {q:"What is Lambda Concurrency?",o:["Number of functions","The number of function instances handling requests simultaneously","Total invocation count","Monthly execution count"],a:1,e:"Concurrency is the number of simultaneous requests. Lambda scales horizontally by creating new instances of your environment."},
  {q:"What is Reserved Concurrency for Lambda?",o:["Guaranteed minimum","Limiting a function's max concurrency to protect downstream services and guarantee capacity","Pre-warmed environments","Dedicated CPU"],a:1,e:"Reserved concurrency acts as both a limit (to prevent overwhelming a DB) and a guarantee (ensuring the function has capacity)."},
  {q:"What is the AWS SDK for Python (Boto3) in Lambda?",o:["A web framework","The SDK used to programmatically interact with AWS services, pre-installed in Python runtimes","A monitoring tool","A testing framework"],a:1,e:"Boto3 allows your Lambda to talk to S3, DynamoDB, and other services. It is included by default in AWS Python runtimes."},
  {q:"What IAM permissions does a Lambda function need?",o:["Full access by default","An IAM Execution Role with policies granting specific resource access","Uses deployer credentials","Uses root account"],a:1,e:"Every function must have an Execution Role. You should follow the principle of least privilege for these permissions."},
  {q:"What are Lambda Environment Variables?",o:["OS variables only","Key-value pairs set at deploy time to configure behavior without changing code","Runtime settings","IAM placeholders"],a:1,e:"Environment variables allow you to store settings like database URLs or API keys separately from your function code."},
  {q:"How should sensitive values be handled in Lambda environment variables?",o:["Plaintext","Retrieve from Secrets Manager at runtime or encrypt with KMS","Store in deployment package","Use Lambda vault"],a:1,e:"For production secrets, always use AWS Secrets Manager or SSM Parameter Store to avoid exposing credentials in plaintext config."},
  {q:"What is a Lambda Deployment Package?",o:["CloudFormation template","A ZIP archive or container image containing code and dependencies","An EC2 AMI","A Docker Compose file"],a:1,e:"The package contains everything your code needs to run. ZIP files are standard, but container images allow for larger sizes."},
  {q:"What is a Lambda Layer?",o:["VPC subnet","A reusable archive containing libraries or runtimes shared across multiple functions","Security policy","Environment snapshot"],a:1,e:"Layers allow you to keep your deployment package small by sharing common libraries (like NumPy or SDKs) across many functions."},
  {q:"What are the main benefits of using Lambda Layers?",o:["Faster cold starts only","Reduce package size, share dependencies, and update libraries independently","Increase memory","Enable VPC"],a:1,e:"Layers promote code reuse and simplify the management of dependencies across a large serverless application."},
  {q:"How do Lambda Layers work with different runtimes?",o:["Universal","Must be compatible with the runtime; extracted to /opt in the environment","Replace the runtime","Python only"],a:1,e:"Layers are extracted to the /opt directory. Paths like /opt/python or /opt/nodejs are automatically added to the runtime path."},
  {q:"What is the Lambda function URL?",o:["Console URL","A built-in HTTPS endpoint enabling direct invocation without API Gateway","The function ARN","Runtime API endpoint"],a:1,e:"Function URLs provide a simple way to invoke your function over HTTPS without the complexity or cost of an API Gateway."},
  {q:"What is Lambda@Edge?",o:["Lambda for IoT","Functions deployed to CloudFront edge locations to customize content delivery","CDN acceleration","Network edge tool"],a:1,e:"Lambda@Edge allows you to run logic close to your users to perform tasks like A/B testing or header manipulation at the CDN level."},
  {q:"What is the Lambda /tmp directory used for?",o:["Permanent storage","Ephemeral local scratch space for temporary files during execution","Storing layers","Logging storage"],a:1,e:"/tmp is local storage. While it can persist between 'warm' invocations, it is not a reliable persistent storage solution."},
  {q:"What triggers are available for AWS Lambda?",o:["Only HTTP","Dozens of sources: S3, DynamoDB, Kinesis, SQS, SNS, EventBridge, and more","Only internal services","Only cron events"],a:1,e:"Lambda can be triggered by almost any event in the AWS ecosystem, from file uploads to database changes."},
  {q:"What is the difference between sync and async invocation?",o:["No difference","Sync: caller waits for result; Async: event is queued and Lambda returns immediately","Sync is faster","Async requires SQS"],a:1,e:"API Gateway is typically synchronous, while S3 and SNS triggers are asynchronous and include built-in retry logic."},
  {q:"How does Lambda scale automatically?",o:["Manual scaling","Horizontally by creating new environment instances for each concurrent request","Uses ASGs","Sequential processing"],a:1,e:"Lambda handles the heavy lifting of scaling. It can go from zero to thousands of instances in seconds to match demand."},
  {q:"What is Lambda Power Tuning?",o:["EC2 tool","An open-source tool that finds the optimal memory setting for cost and performance","Performance dashboard","CloudWatch metric"],a:1,e:"This tool runs your function at various memory levels to visualize where you get the best performance for the lowest price."},
  {q:"What is a Lambda Dead Letter Queue (DLQ)?",o:["Queue for deleted functions","An SQS/SNS destination for failed async events after retries are exhausted","Billing queue","Rollback queue"],a:1,e:"DLQs ensure that you don't lose data from failed asynchronous operations, allowing you to investigate the cause later."}
];

let questions = [];
let current = 0, score = 0, answered = [], timeLeft = 900;
let timerId;

function prepareQuestions(arr) {
    return arr.map(item => {
        let options = item.o.map((text, idx) => ({ text, isCorrect: idx === item.a }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: item.q,
            o: options.map(o => o.text),
            a: options.findIndex(o => o.isCorrect),
            e: item.e
        };
    });
}

function initQuiz() {
    const cache = localStorage.getItem('awsLambdaStudyCache_v2');
    if (cache) {
        try {
            const data = JSON.parse(cache);
            questions = data.questions;
            current = data.current;
            score = data.score;
            answered = data.answered;
            timeLeft = data.timeLeft;
        } catch(e) { startNew(); }
    } else { startNew(); }
    startTimer();
    render();
}

function startNew() {
    questions = prepareQuestions([...rawQuestions]);
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    answered = new Array(questions.length).fill(null);
    current = 0; score = 0; timeLeft = 900;
}

function saveProgress() {
    const data = { questions, current, score, answered, timeLeft };
    localStorage.setItem('awsLambdaStudyCache_v2', JSON.stringify(data));
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft < 60) document.getElementById('timerDisplay').classList.add('timer-warn');
        saveProgress(); 
        if (timeLeft <= 0) { clearInterval(timerId); showScore(); }
    }, 1000);
}

function render(){
    const q = questions[current];
    const ua = answered[current];
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('progressDisplay').textContent = `${current+1}/27`;
    document.getElementById('progressFill').style.width = ((current+1)/27 * 100)+'%';

    document.getElementById('navGrid').innerHTML = questions.map((_, i) => {
        let cls = 'nav-item';
        if (i === current) cls += ' active';
        if (answered[i] !== null) cls += (answered[i] === questions[i].a) ? ' correct' : ' wrong';
        return `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
    }).join('');

    const letters = ['A','B','C','D'];
    let optsHtml = q.o.map((optText, i) => {
        let cls = '';
        if (ua !== null) {
            if (i === q.a) cls = 'correct-ans';
            else if (i === ua) cls = 'wrong-ans';
            cls += ' disabled';
        }
        return `<div class="option ${cls}" onclick="selectAnswer(${i})">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${optText}</div>
        </div>`;
    }).join('');

    document.getElementById('questionContainer').innerHTML = `
        <div class="q-card">
            <div class="q-num">Q${current+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <div class="explanation ${ua !== null ? 'show' : ''}">
                <strong>EXP:</strong> ${q.e}
            </div>
        </div>`;
        
    document.getElementById('prevBtn').disabled = (current === 0);
    document.getElementById('nextBtn').textContent = (current === 26) ? "SUBMIT_DATA ✓" : "NEXT_BLOCK →";
}

function selectAnswer(i){
    if(answered[current] !== null) return;
    answered[current] = i;
    if(i === questions[current].a) score++;
    saveProgress();
    render();
}

function jumpTo(idx) { current = idx; render(); saveProgress(); }
function nextQ(){ if(current === 26) showScore(); else { current++; render(); saveProgress(); } }
function prevQ(){ if(current > 0){ current--; render(); saveProgress(); } }

function showScore(){
    clearInterval(timerId);
    localStorage.removeItem('awsLambdaStudyCache_v2');
    document.getElementById('mainQuiz').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'block';
    document.getElementById('finalScore').textContent = Math.round((score/27)*100) + "%";
}

function retryQuiz(){ localStorage.removeItem('awsLambdaStudyCache_v2'); location.reload(); }

initQuiz();
</script>
</body>
</html>
